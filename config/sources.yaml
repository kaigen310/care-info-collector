# ============================================================
#  Care Info Collector — 情報源設定
#  国内：海外 = 8：2 の比率でスタート
# ============================================================

settings:
  max_articles_per_feed: 12
  summary_sentences: 4
  days_to_keep: 30
  max_article_age_days_care:      7    # 国内・海外ケア記事（ニュース性が高い）
  max_article_age_days_tech:      30   # AIツール・生産性（月単位で有効）
  max_article_age_days_lifestyle: 3650 # ストア哲学・メンタルケア（普遍的=期限なし）
  # 国内:海外 比率調整 — 海外careフィードは上限を絞る
  max_articles_per_feed_en_care: 3    # McKnight'sなど海外careフィードの上限（8:2比率のため3に削減）
  max_articles_en_total: 10           # 英語記事の総数キャップ（8:2比率の最終調整）
  output_dir: docs
  data_dir: data
  request_timeout: 15
  request_delay: 0.8

# ── ブロックリスト（全記事共通: 介護と無関係な突発トピック）────────
blocklist_keywords:
  - "エボラ"
  - "Ebola"
  - "ハンタウイルス"
  - "Hantavirus"
  - "trachoma"
  - "smallpox"
  - "World Health Assembly"
  - "世界保健総会"
  - "BDBV"
  - "nicotine pouch"
  - "tobacco"

# ── 英語記事の関連性キーワード（content_type 別）──────────────────
# content_type: care
relevance_keywords_en:
  - "care"
  - "aging"
  - "elderly"
  - "senior"
  - "nursing"
  - "dementia"
  - "caregiver"
  - "long-term"
  - "resident"
  - "facility"
  - "workforce"
  - "staffing"
  - "gerontol"
  - "agetech"
  - "age tech"
  - "assisted living"

# content_type: tech
