  - "AI"
  - "agent"
  - "automation"
  - "workflow"
  - "productivity"
  - "notion"
  - "obsidian"
  - "llm"
  - "generative"
  - "chatgpt"
  - "claude"
  - "copilot"
  - "no-code"
  - "zapier"
  - "n8n"
  - "make.com"
  - "prompt"
  - "tool"
  - "app"
  - "startup"
  - "agetech"
  - "age tech"
  - "senior living tech"
  - "assistive technology"
  - "aging innovation"

# content_type: lifestyle
relevance_keywords_lifestyle:
  - "stoic"
  - "stoicism"
  - "marcus aurelius"
  - "seneca"
  - "mindfulness"
  - "meditation"
  - "resilience"
  - "self-improvement"
  - "mental"
  - "philosoph"        # philosophy + philosophical の両方にマッチ
  - "journal"
  - "burnout"
  - "wellbeing"
  - "habit"
  - "focus"
  - "deep work"
  - "joy"              # Daily Stoicの喜び・感情テーマ
  - "happiness"
  - "virtue"           # ストア哲学の核心
  - "wisdom"
  - "adversity"        # 逆境に関するストア記事
  - "lesson"           # life lessons テーマ
  - "courage"
  - "gratitude"
  - "regret"           # "How to deal with regret" 等
  - "meaning"

