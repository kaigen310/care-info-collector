 it.--no-detect-types\nremains available to disable detection.Database()\nnow raises asqlite_utils.db.TransactionError\nif passed a connection created with the Python 3.12+sqlite3.connect(..., autocommit=True)\norautocommit=False\noptions.commit()\nandrollback()\nbehave differently on those connections, which previously caused every write made by the library to be silently discarded when the connection closed.Everything else:\n- Fixed a bug where\ntable.delete_where()\n,table.optimize()\nandtable.rebuild_fts()\ndid not commit their changes, leaving the connection inside an open transaction. Their work—and any subsequent writes—could then be silently rolled back when the connection was closed. All three now usedb.atomic()\n, consistent with the other write methods.- The\nsqlite-utils drop-table\ncommand now refuses to drop a view, anddrop-view\nrefuses to drop a table. Previously each would silently drop the wrong type of object if the name matched. Both now exit with an error suggesting the correct command to use.- Migrations applied by the new migrations system now run inside a transaction, together with the record of the migration having been applied. If a migration raises an exception its changes are rolled back and it stays pending, so it can be safely re-applied after the error is fixed. Migrations that cannot run inside a transaction, such as those executing\nVACUUM\n, can opt out using@migrations(transactional=False)\n—see Migrations and transactions.table.upsert()\nandtable.upsert_all()\nnow detect the primary key or compound primary key of an existing table, so thepk=\nargument is no longer required when upserting into a table that already has a primary key.db.table(table_name).insert({})\ncan now be used to insert a row consisting entirely of default values into an existing table, usingINSERT INTO ... DEFAULT VALUES\n. (#759)- Improvements to the\nsqlite-utils migrate\ncommand:--stop-before\nvalues that do not match any known migration are now an error instead of being silently ignored,--stop-before\nnow works correctly with migration files that still use the oldersqlite_migrate.Migrations\nclass, and--list\nis now a read-only operation that no longer creates the database file or the migrations tracking table.migrations.applied()\nnow returns migrations in the order they were applied.- New\ndb.begin()\n,db.commit()\nanddb.rollback()\nmethods for taking manual control of transactions, as an alternative to thedb.atomic()\ncontext manager.- New documentation: Transactions and saving your changes describes how transactions work and when changes are committed, and a new Upgrading page details the changes needed to move between major versions.", "summary": "You are managing a transaction yourself with\ndb.begin()\n, in which case nothing is committed until you commit—the library will never commit a transaction you opened. The full release notes for sqlite-utils 4.0rc2\nHere are the full release notes for the RC. Breaking changes:\n- Write statements executed with\ndb.execute()\nare now committed automatically, unless a transaction is already open in which case they join it. Both now exit with an error suggesting the correct command to use.- Migrations applied by the new migrations system now run inside a transaction, together with the record of the migration having been applied.", "categories": ["AIツール・生産性"], "is_new": false, "title_ja": "sqlite-utils 4.0rc2、主に Claude Fable によって書かれました (約 $149.25)", "summary_ja": "あなたは自分でトランザクションを管理しています\ndb.begin()\nこの場合、コミットするまで何もコミットされません。ライブラリは、開いたトランザクションを決してコミットしません。 sqlite-utils 4.0rc2 の完全なリリース ノート\nRC の完全なリリース ノートは次のとおりです。重大な変更:\n- で実行されるステートメントを記述する\ndb.execute()\nトランザクションがすでにオープンしている場合はトランザクションに参加しない限り、自動的にコミットされるようになりました。どちらも、使用する正しいコマンドを示唆するエラーで終了します。 - 新しい移行システムによって適用された移行は、適用された移行の記録とともにトランザクション内で実行されるようになりました。"}, {"title": "〈福祉施設職員退職手当共済〉掛け金引き上げに慎重な検討求める声 - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45621", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-04 10:00", "description": "厚生労働省の社会福祉施設職員等退職手当共済制度の在り方に関する検討会が６月２６日に開かれ、関係団体へのヒアリングを行った。出席した団体からは大幅な掛け金引き上げについて慎重に検討するよう求める声が出た。 退職共済は、社会福祉法人の８割が契約し、加入者は８８万人に上る。法人が負担する掛け金は２０２６年度に職員１人当たり１４万８５００円。ただ、介護保険制度創設時に加入した職員が退職期を迎えたことなどから、掛け金の引き上げを抑える支払準備金の急速な減少が課題となっている。 ヒアリングでは、日本知的障害者福祉協会の榎本博文副会長が、５月に会員法人を対象に実施した調査で、退職共済の掛け金引き上げについて９割が経営に影響があると回答したと紹介。人件費や物価の高騰で経営基盤が脆弱な事業者も多いとして、大幅な掛け金の引き上げは慎重に検討するよう求めた。 また、掛け金の一括納入は特定月のキャッシュフローを圧迫するとして、分割納入を認めるよう提案。退職金本来の趣旨を踏まえ、支給要件を現行の勤続１年以上から３～５年程度に見直す案も示した。 全国児童養護施設協議会の則武直美副会長は、乳児院や母子生活支援施設も", "content": "〈福祉施設職員退職手当共済〉掛け金引き上げに慎重な検討求める声\n2026年07月04日 福祉新聞編集部厚生労働省の社会福祉施設職員等退職手当共済制度の在り方に関する検討会が６月２６日に開かれ、関係団体へのヒアリングを行った。出席した団体からは大幅な掛け金引き上げについて慎重に検討するよう求める声が出た。\n退職共済は、社会福祉法人の８割が契約し、加入者は８８万人に上る。法人が負担する掛け金は２０２６年度に職員１人当たり１４万８５００円。ただ、介護保険制度創設時に加入した職員が退職期を迎えたことなどから、掛け金の引き上げを抑える支払準備金の急速な減少が課題となっている。\nヒアリングでは、日本知的障害者福祉協会の榎本博文副会長が、５月に会員法人を対象に実施した調査で、退職共済の掛け金引き上げについて９割が経営に影響があると回答したと紹介。人件費や物価の高騰で経営基盤が脆弱な事業者も多いとして、大幅な掛け金の引き上げは慎重に検討するよう求めた。\nまた、掛け金の一括納入は特定月のキャッシュフローを圧迫するとして、分割納入を認めるよう提案。退職金本来の趣旨を踏まえ、支給要件を現行の勤続１年以上から３～５年程度に見直す案も示した。\n全国児童養護施設協議会の則武直美副会長は、乳児院や母子生活支援施設も含めた調査で、約８割が採用活動で退職共済を紹介していたと説明。「人材定着と長期勤続に重要な役割を果たしている」と述べ、一定程度の公費を確保してでも制度を維持するよう求めた。\nその上で、社会的養護の現場ではこどもとの安定した関係構築には職員の勤続年数が重要だとして「退職共済は単なる福利厚生ではなく、支援の質を担保する要素だ」と強調。今後も掛け金を引き上げる場合、措置費の増額を訴えた。", "summary": "〈福祉施設職員退職手当共済〉掛け金引き上げに慎重な検討求める声\n2026年07月04日 福祉新聞編集部厚生労働省の社会福祉施設職員等退職手当共済制度の在り方に関する検討会が６月２６日に開かれ、関係団体へのヒアリングを行った。出席した団体からは大幅な掛け金引き上げについて慎重に検討するよう求める声が出た。人件費や物価の高騰で経営基盤が脆弱な事業者も多いとして、大幅な掛け金の引き上げは慎重に検討するよう求めた。今後も掛け金を引き上げる場合、措置費の増額を訴えた。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "Takeda signs $600M AI drug discovery deal with Insilico", "url": "https://www.artificialintelligence-news.com/news/takeda-insilico-ai-drug-discovery-deal/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-07-03 19:00", "description": "Takeda has entered a strategic collaboration with Hong Kong-based Insilico Medicine to use AI in early-stage drug discovery across the Japanese pharmaceutical company’s therapeutic areas. The companies did not disclose which therapeutic areas or disease targets will be covered under the collaboration. The agreement gives Takeda access to Insilico’s Pharma.AI platform, which supports biological target […] The post Takeda signs $600M AI drug discovery deal with Insilico appeared first on AI News .", "content": "Takeda has entered a strategic collaboration with Hong Kong-based Insilico Medicine to use AI in early-stage drug discovery across the Japanese pharmaceutical company’s therapeutic areas.\nThe companies did not disclose which therapeutic areas or disease targets will be covered under the collaboration. The agreement gives Takeda access to Insilico’s Pharma.AI platform, which supports biological target identification, molecular design, and clinical trial prediction.\nThe companies said the collaboration will focus on identifying drug candidates that meet predefined scientific and early development criteria. Insilico will lead the AI-driven discovery work, while Takeda will take responsibility for advancing selected candidates through clinical development.\nDeal value and development rights\nTakeda will receive exclusive worldwide rights to develop, manufacture, and commercialise novel therapeutics selected through the collaboration.\nInsilico said the deal includes about US$60 million in project initiation fees, near-term payments, and milestones. The total value could reach about US$600 million if preclinical, clinical, commercial, and sales milestones are achieved.\nAdditional payments are tied to preclinical, clinical, commercial, and sales milestones. Insilico is also eligible to receive tiered royalties on future sales.\nInsilico founder and CEO Alex Zhavoronkov said proceeds from the deal will support early-stage research and development under the collaboration program. Zhavoronkov also said later-stage timelines will depend on Takeda’s clinical development activities and the coordinated work of both companies.\nAI drug discovery partnerships\nThe Pharma.AI suite includes tools used for target discovery, molecule generation, and clinical development prediction. Published descriptions of the platform identify PandaOmics for target discovery, Chemistry42 for de novo small-molecule generation, and InClinico for forecasting clinical trial transition probability.\nInsilico has also advanced its own AI-generated drug candidate into clinical testing. Rentosertib, formerly known as ISM001-055 or INS018_055, is a small-molecule TNIK inhibitor for idiopathic pulmonary fibrosis that was evaluated in a Phase 2a randomised clinical trial.\nChris Arendt, chief scientific officer and head of research at Takeda, said the agreement combines Takeda’s disease biology work with Insilico’s AI-enabled discovery capabilities. He said Takeda is also integrating automation, robotics, and generative AI into its discovery work.\nThe Insilico agreement follows another AI drug-discovery deal by Takeda earlier this year. In February, Takeda entered a multi-year collaboration with Iambic worth more than US$1.7 billion to use AI in the design of small-molecule drugs for cancer and gastrointestinal diseases.\nIambic’s platform includes NeuralPLexer, an AI model used to predict how drug molecules bind to proteins.\nChinese drugmakers signed 157 out-licensing deals worth US$135.7 billion in 2025, according to data cited by the South China Morning Post from China’s National Medical Products Administration.\nIn the Takeda–Insilico agreement, Takeda receives exclusive worldwide rights to candidates discovered through Insilico’s platform. Insilico said it has signed collaboration agreements with a combined potential value of more than US$7 billion since the start of the year.\nLast month, Insilico announced a collaboration with South Korea’s SK Biopharmaceuticals focused on neuroimmune disorders. That agreement includes up to US$18 million in upfront and near-term milestone payments, with a total potential value of more than US$2.5 billion.\nIn March, Eli Lilly expanded its collaboration with Insilico in an AI-powered drug discovery deal worth up to US$2.75 billion. The agreement gave Lilly exclusive worldwide rights to develop, manufacture, and commercialise certain oral treatments then in preclinical development.\nInsilico’s Hong Kong-listed shares rose 13.5% after the Takeda agreement was announced.\n(Photo by Serkan Yildiz)\nSee also: NVIDIA BioNeMo accelerates Anthropic Claude Science\nWant to learn more about AI and big data from industry leaders? Check out AI & Big Data Expo taking place in Amsterdam, California, and London. The comprehensive event is part of TechEx and is co-located with other leading technology events including the Cyber Security & Cloud Expo. Click here for more information.\nAI News is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars here.", "summary": "Insilico will lead the AI-driven discovery work, while Takeda will take responsibility for advancing selected candidates through clinical development. The Insilico agreement follows another AI drug-discovery deal by Takeda earlier this year. In the Takeda–Insilico agreement, Takeda receives exclusive worldwide rights to candidates discovered through Insilico’s platform. In March, Eli Lilly expanded its collaboration with Insilico in an AI-powered drug discovery deal worth up to US$2.75 billion.", "categories": ["業務改善・介護テック", "医療・健康"], "is_new": false, "title_ja": "武田薬品工業がインシリコ社と6億ドルのAI創薬契約を締結", "summary_ja": "インシリコはAI主導の発見作業を主導し、武田薬品は臨床開発を通じて選択された候補者を前進させる責任を負います。インシリコ契約は、今年初めに武田薬品が行った別のAI創薬契約に続くものだ。武田薬品とインシリコの契約では、武田薬品は、インシリコのプラットフォームを通じて発見された候補者に対する世界的な独占的権利を受け取ります。 3月、イーライリリーは、最大27億5,000万米ドル相当のAIを活用した創薬契約でインシリコとの協力を拡大した。"}, {"title": "【小濱道博】改正介護保険法などが成立　今後の施行スケジュールと介護事業者が今から準備すべきこと", "url": "https://www.joint-kaigo.com/articles/47187/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-03 16:47", "description": "社会福祉法や介護保険法などの一部を改正する法律が、6月19日に国会で成立し、同月25日に公布された。この「成立」「公布」、または「施行」はそれぞれ意味が異なるため、まずは整理しておきたい。【小濱道博】 成立とは、国会で法 […]", "content": "【小濱道博】改正介護保険法などが成立 今後の施行スケジュールと介護事業者が今から準備すべきこと\n社会福祉法や介護保険法などの一部を改正する法律が、6月19日に国会で成立し、同月25日に公布された。この「成立」「公布」、または「施行」はそれぞれ意味が異なるため、まずは整理しておきたい。【小濱道博】\n成立とは、国会で法案が可決され、改正法として文字通り成立した日をいう。公布とは、政府が成立した改正法を官報に掲載し、国民に正式に知らせた日である。そして施行とは、その改正法が実際にスタートする日を指す。\n今回の改正法は内容ごとに施行日が分かれており、段階的に制度がスタートしていくことになる。\n◆ 制度改正は段階的に実施へ\n今回の改正法で最も重要なタイミングは原則の施行日である令和9年4月1日である。\nこの日から、\n● 夜間対応型訪問介護の廃止\n● 中山間地域などを対象とした特定地域サービスの創設\n● 災害時福祉支援体制（DWAT）の整備\nなど多くの制度改正が一斉に始まる。\nなお、夜間対応型訪問介護の廃止については、既存事業者向けの経過措置が設けられている。具体的な適用期間や詳細については、今後示される政令などを確認する必要がある。\n公布から1年6ヵ月以内の政令で指定する日には、ケアマネジャーの資格制度が大きく見直される。最大の変更点は、5年ごとの更新制が廃止されることである。\nただし、これは単なる負担軽減ではない。専門性を維持するための研修の受講が新たに義務付けられ、正当な理由なくこれを受講しないケアマネジャーは、業務禁止処分の対象となる可能性もある。\nさらに、居宅介護支援などの事業者にもケアマネジャーが研修を受講できる体制を整えることが求められる。資格の更新制がなくなる一方で、継続的な人材育成と研修管理がこれまで以上に重要となる。\n公布から2年以内の政令で指定する日には、住宅型有料老人ホームに関する制度改正が動き出す。\n設置届出制度の見直しに加え、中重度者を受け入れる住宅型ホームを対象とした登録制度が創設される予定である。住宅型ホームを運営する法人や開設を予定している法人は、登録要件や手続きの詳細が示され次第、速やかに対応できるよう準備を進めておきたい。\n公布から3年以内の政令で指定する日には、登録制度の対象となる住宅型ホームの入居者に特化したケアマネジメントの「登録施設介護支援」が創設される。\n登録制度という規制が先に始まり、その後に新たな「登録施設介護支援」が創設されるという2段階の制度設計になる可能性があるため、住宅型ホームを運営する法人は、中長期的な経営計画を見据えた準備が必要である。\n◆ 今から進めておくべき準備\n今回の改正法では、施策ごとに施行時期が異なるため、まず自法人に関係する制度がいつ施行されるのかを確認することが重要である。特に令和9年4月1日に施行される制度については、令和8年度中に準備を進めておきたい。\nケアマネジャーが在籍する事業者では、新たな研修制度の詳細が示され次第、受講計画や研修記録の管理体制を整備することが求められる。\nまた、住宅型ホームを運営する法人は、登録制度の開始と新たな「登録施設介護支援」の創設が別々の時期に行われる可能性があることを踏まえ、登録要件や給付内容に関する情報を継続して収集し、計画的に準備を進めることが重要である。\nさらに、多くの制度は政令や省令などで具体的な施行日や運用方法が示されるため、国から発出される通知を継続的に確認し、最新情報を把握しておきたい。\n今回の改正法は、狭義の介護保険制度だけにとどまらず、ケアマネジャー制度や住宅型ホーム制度、地域の介護提供体制にも大きな影響を及ぼすものである。\n制度によって施行時期は異なるが、最も重要な節目は令和9年4月1日の原則の施行日である。その後も令和11年頃まで段階的に制度改正が続くため、「いつ、何が始まるのか」を正確に把握し、必要な準備を計画的に進めることが、今後の安定した事業運営につながるはずだ。", "summary": "設置届出制度の見直しに加え、中重度者を受け入れる住宅型ホームを対象とした登録制度が創設される予定である。公布から3年以内の政令で指定する日には、登録制度の対象となる住宅型ホームの入居者に特化したケアマネジメントの「登録施設介護支援」が創設される。◆ 今から進めておくべき準備\n今回の改正法では、施策ごとに施行時期が異なるため、まず自法人に関係する制度がいつ施行されるのかを確認することが重要である。特に令和9年4月1日に施行される制度については、令和8年度中に準備を進めておきたい。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "身の危険を感じる暴言や威圧、ケアマネの3割弱が被害　民間調査　8割超がカスハラ経験", "url": "https://www.joint-kaigo.com/articles/47174/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-03 10:11", "description": "全国のケアマネジャーが登録するウェブサイト「ケアマネジメント・オンライン」が、埼玉県川口市で発生した刺殺事件を踏まえた緊急意識調査の結果を公表した。【Joint編集部】 それによると、過去1年間に「身の危険を感じるほどの […]", "content": "全国のケアマネジャーが登録するウェブサイト「ケアマネジメント・オンライン」が、埼玉県川口市で発生した刺殺事件を踏まえた緊急意識調査の結果を公表した。【Joint編集部】\nそれによると、過去1年間に「身の危険を感じるほどの恫喝や暴言、精神的攻撃を受けた」との回答が28.9％にのぼることが判明した。\n何らかのハラスメントや暴力、暴言を経験した人は8割超に達する。\n具体的な被害内容（複数回答）は、「暴言や精神的攻撃」が55.8％で半数を超え、「不当なクレーム」も50.0％を占めるなど、日常的なリスクの深刻さが改めて浮き彫りとなった。\nこの調査は今年6月に実施されたもの。同サイト会員のケアマネジャーが対象で、1793人から有効回答を得ている。\n過去1年間に何らかのハラスメントや暴力、暴言を受けた人に加害者の属性（複数回答）を聞くと、「利用者の主介護者やキーパーソン」が78.2％で最多となり、利用者本人（61.5％）を上回った。全体の86.3％が「ケアマネジャーは被害者になりやすい」と考えており、現場の強い危機感が示されている。", "summary": "全国のケアマネジャーが登録するウェブサイト「ケアマネジメント・オンライン」が、埼玉県川口市で発生した刺殺事件を踏まえた緊急意識調査の結果を公表した。何らかのハラスメントや暴力、暴言を経験した人は8割超に達する。同サイト会員のケアマネジャーが対象で、1793人から有効回答を得ている。過去1年間に何らかのハラスメントや暴力、暴言を受けた人に加害者の属性（複数回答）を聞くと、「利用者の主介護者やキーパーソン」が78.2％で最多となり、利用者本人（61.5％）を上回った。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "ユニフォーム再利用でサッカーボールクッション製作　障害就労支援事業所PUERTO（東京） - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45613", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-03 10:00", "description": "東京都新宿区の社会福祉法人東京ムツミ会が運営する障害者就労支援事業所「ＰＵＥＲＴＯ（プエルト）」は１９日、サッカークラブ、クリアソン新宿の使用済みユニフォームを再利用したサッカーボールクッションを製作した。選手と共に細かく裁断した布を詰め込み、廃棄されるはずだったユニフォームを新たな製品によみがえらせた。 ユニフォームのロゴを再利用した クリアソン新宿によると、所属する約３０人の選手のユニフォームは契約の関係で毎年新調している。アウェー用を含め、選手１人につき６着あるという。 利用者らは事前に提供されたユニフォームを五角形に切り分けて縫製。およそ２時間かけて、余った布を約２センチずつに裁断して詰め込み、直径１７センチのボールクッションを完成させた。こどもの頃から手芸もサッカーも好きだったという利用者の天野嘉子さんは「活動が多くの人の目に留まれば」と笑顔を見せた。 クリアソン新宿は２００５年、立教大のサークルを母体に新宿区で誕生。現在はＪ３を目指して戦う。２０年には同区と協定を結び、福祉施設での運動プログラムなど地域活動にも力を入れている。 そうした中、スポーツ界で廃棄予定の物を別の製品", "content": "ユニフォーム再利用でサッカーボールクッション製作 障害就労支援事業所PUERTO（東京）\n2026年07月03日 福祉新聞編集部東京都新宿区の社会福祉法人東京ムツミ会が運営する障害者就労支援事業所「ＰＵＥＲＴＯ（プエルト）」は１９日、サッカークラブ、クリアソン新宿の使用済みユニフォームを再利用したサッカーボールクッションを製作した。選手と共に細かく裁断した布を詰め込み、廃棄されるはずだったユニフォームを新たな製品によみがえらせた。\nクリアソン新宿によると、所属する約３０人の選手のユニフォームは契約の関係で毎年新調している。アウェー用を含め、選手１人につき６着あるという。\n利用者らは事前に提供されたユニフォームを五角形に切り分けて縫製。およそ２時間かけて、余った布を約２センチずつに裁断して詰め込み、直径１７センチのボールクッションを完成させた。こどもの頃から手芸もサッカーも好きだったという利用者の天野嘉子さんは「活動が多くの人の目に留まれば」と笑顔を見せた。\nクリアソン新宿は２００５年、立教大のサークルを母体に新宿区で誕生。現在はＪ３を目指して戦う。２０年には同区と協定を結び、福祉施設での運動プログラムなど地域活動にも力を入れている。\nそうした中、スポーツ界で廃棄予定の物を別の製品に生まれ変わらせる「アップサイクル」を後押しする企業からの提案をきっかけに、同会との連携が実現した。\nクリアソン新宿は、ボールクッション１個当たり約２０００円の製作費を同会に支払う予定。クリアソン新宿地域共創室の岩舘直室長は「サッカーを通じて地域を盛り上げる方法はたくさんある。選手にも新宿でプレーする意味などを考えてもらえれば」と話す。完成したボールクッションは７月以降、サポーターなどを招いた催しで披露されるという。", "summary": "ユニフォーム再利用でサッカーボールクッション製作 障害就労支援事業所PUERTO（東京）\n2026年07月03日 福祉新聞編集部東京都新宿区の社会福祉法人東京ムツミ会が運営する障害者就労支援事業所「ＰＵＥＲＴＯ（プエルト）」は１９日、サッカークラブ、クリアソン新宿の使用済みユニフォームを再利用したサッカーボールクッションを製作した。クリアソン新宿によると、所属する約３０人の選手のユニフォームは契約の関係で毎年新調している。クリアソン新宿は２００５年、立教大のサークルを母体に新宿区で誕生。クリアソン新宿は、ボールクッション１個当たり約２０００円の製作費を同会に支払う予定。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "LIFE、7月末までに移行作業が必要　未対応なら関連加算が算定不可に　厚労省が呼びかけ", "url": "https://www.joint-kaigo.com/articles/47166/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-02 18:32", "description": "厚生労働省は2日に介護保険最新情報Vol.1520を発出し、新たなLIFE（科学的介護情報システム）への移行作業をまだ終えていない事業所・施設に対し、速やかな対応を改めて呼びかけた。【Joint編集部】 現在も未対応の事 […]", "content": "2026年7月2日\nLIFE、7月末までに移行作業が必要 未対応なら関連加算が算定不可に 厚労省が呼びかけ\n厚生労働省は2日に介護保険最新情報Vol.1520を発出し、新たなLIFE（科学的介護情報システム）への移行作業をまだ終えていない事業所・施設に対し、速やかな対応を改めて呼びかけた。【Joint編集部】\n現在も未対応の事業所・施設が一定数残っているという。\nLIFEの運営主体は5月から国保中央会へ移管されており、最終期限とされた7月31日までに新システムへの移行作業を完了させなければ、8月1日以降はデータの提出が不可能となる。その場合、7月分以降のLIFE関連加算の算定要件を満たすこともできなくなってしまう。\n7月サービス提供分の様式情報の提出期限は8月10日に迫る。厚労省は、公式マニュアルや解説動画なども参考に必要な移行作業を速やかに済ませるよう呼びかけている。", "summary": "2026年7月2日\nLIFE、7月末までに移行作業が必要 未対応なら関連加算が算定不可に 厚労省が呼びかけ\n厚生労働省は2日に介護保険最新情報Vol.1520を発出し、新たなLIFE（科学的介護情報システム）への移行作業をまだ終えていない事業所・施設に対し、速やかな対応を改めて呼びかけた。【Joint編集部】\n現在も未対応の事業所・施設が一定数残っているという。LIFEの運営主体は5月から国保中央会へ移管されており、最終期限とされた7月31日までに新システムへの移行作業を完了させなければ、8月1日以降はデータの提出が不可能となる。厚労省は、公式マニュアルや解説動画なども参考に必要な移行作業を速やかに済ませるよう呼びかけている。", "categories": ["施設運営・経営", "介護保険・制度"], "is_new": false}, {"title": "岸和田市社協が鍵預かりで高齢者の安否確認　府営住宅でモデル事業開始 - 福祉新聞Web", "url": "https://fukushishimbun.com/series05/45610", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-02 10:00", "description": "大阪府の岸和田市社会福祉協議会は１６日から、市内の府営住宅で暮らす高齢者の安否確認を行うための「鍵預かりサービス」モデル事業を始めた。地元の社会福祉法人や民生委員、地域包括支援センターなどと連携して実施。単身高齢者の自宅の鍵を預かり、「様子がおかしい」と思われるときにこの鍵を使って部屋に入り安否確認をする。 高齢者の単身世帯増加に伴い、円滑に安否確認できる体制構築の重要性が高まっている。死後数日を経て発見されるケースも増えているという。戸建てと比べて屋内の様子を確認しづらい団地では、緊急時に鍵が開けられないことで安否確認に時間がかかり、特に高層階で難儀になるといった課題がある。住民からは公的機関による鍵預かりを求める声も上がっていた。 窓ガラスなどを壊すことなく迅速な安否確認につなげようと、居住支援法人でもある市社協が鍵預かり事業を企画し、高齢化が進む府営土生団地（土生町、６００戸）でモデル的に取り組むことにした。近隣の社会福祉法人幸福荘（神須屋町）が地域貢献の一環として鍵の保管で協力する。 モデル事業を利用できるのは同団地に住む独居の６５歳以上で、利用は無料。希望者からあらかじめ自宅", "content": "岸和田市社協が鍵預かりで高齢者の安否確認 府営住宅でモデル事業開始\n2026年07月02日 福祉新聞編集部大阪府の岸和田市社会福祉協議会は１６日から、市内の府営住宅で暮らす高齢者の安否確認を行うための「鍵預かりサービス」モデル事業を始めた。地元の社会福祉法人や民生委員、地域包括支援センターなどと連携して実施。単身高齢者の自宅の鍵を預かり、「様子がおかしい」と思われるときにこの鍵を使って部屋に入り安否確認をする。\n高齢者の単身世帯増加に伴い、円滑に安否確認できる体制構築の重要性が高まっている。死後数日を経て発見されるケースも増えているという。戸建てと比べて屋内の様子を確認しづらい団地では、緊急時に鍵が開けられないことで安否確認に時間がかかり、特に高層階で難儀になるといった課題がある。住民からは公的機関による鍵預かりを求める声も上がっていた。\n窓ガラスなどを壊すことなく迅速な安否確認につなげようと、居住支援法人でもある市社協が鍵預かり事業を企画し、高齢化が進む府営土生団地（土生町、６００戸）でモデル的に取り組むことにした。近隣の社会福祉法人幸福荘（神須屋町）が地域貢献の一環として鍵の保管で協力する。\nモデル事業を利用できるのは同団地に住む独居の６５歳以上で、利用は無料。希望者からあらかじめ自宅の鍵を預かり、専用のファイルに入れて幸福荘が運営する高齢者施設で保管する。\n異変を感じた際、警察や民生委員、自治会長、ケアマネらが預かっている鍵を使って家屋内に入り、安否確認を行う。事業の必要経費は府社協による「大阪しあわせネットワーク助成金」を活用する。\n家屋内に入る必要があると判断する目安として、洗濯物が何日も干しっぱなしになっている▽異臭がする▽福祉サービス利用時にいつになく応答がない――などを想定する。\n１６日に同団地集会所で第１回の受け付けがあり、７０～９０代の１４人が利用登録。預かった鍵で実際に自宅のドアが開錠できるかどうか、市社協職員と民生委員がペアを組み一軒一軒訪問して確認した。３０～４０人ほどの利用を見込み、７、８月にも申し込み会を開く。今秋には模擬訓練の実施も目指す。\n沖藤政紀市社協地域福祉課長代理は「将来的には他の団地にも広げたいが、人材、予算の確保が課題になる。モデル事業を１年間実施して運営面での課題を検証し、行政に必要な支援を求めていきたい」と話した。", "summary": "岸和田市社協が鍵預かりで高齢者の安否確認 府営住宅でモデル事業開始\n2026年07月02日 福祉新聞編集部大阪府の岸和田市社会福祉協議会は１６日から、市内の府営住宅で暮らす高齢者の安否確認を行うための「鍵預かりサービス」モデル事業を始めた。単身高齢者の自宅の鍵を預かり、「様子がおかしい」と思われるときにこの鍵を使って部屋に入り安否確認をする。高齢者の単身世帯増加に伴い、円滑に安否確認できる体制構築の重要性が高まっている。異変を感じた際、警察や民生委員、自治会長、ケアマネらが預かっている鍵を使って家屋内に入り、安否確認を行う。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "【介護報酬改定】居宅介護支援の特定事業所加算、審議会で重度者割合や24時間体制の要件緩和を求める声", "url": "https://www.joint-kaigo.com/articles/47158/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-01 18:47", "description": "厚生労働省は6月29日、来年度の介護報酬改定に向けた協議を進めている審議会（社会保障審議会・介護給付費分科会）で居宅介護支援を取り上げた。【Joint編集部】 会合では委員から、質の高いケアマネジメントを実践する体制を評 […]", "content": "2026年7月1日\n【介護報酬改定】居宅介護支援の特定事業所加算、審議会で重度者割合や24時間体制の要件緩和を求める声\n厚生労働省は6月29日、来年度の介護報酬改定に向けた協議を進めている審議会（社会保障審議会・介護給付費分科会）で居宅介護支援を取り上げた。【Joint編集部】\n会合では委員から、質の高いケアマネジメントを実践する体制を評価する「特定事業所加算」をめぐり、算定要件の見直しを求める声が相次いだ。\n厚労省は居宅介護支援の論点として、「各地域の実情に応じて必要なケアマネジメントの提供体制を確保していく方策」を提示。委員による意見交換では、経営の成否を左右する「特定事業所加算」の算定要件に話が及んだ。\nまずは最上位の「加算Ⅰ」。厚労省のデータによると、事業所ベースの算定率は昨年11月の審査分で1.71%にとどまっている。\n全国老人福祉施設協議会の小泉立志副会長は、「算定率が極めて低い最大の要因は、要介護3以上の利用者が40%以上という算定要件にある」と問題を提起。「実態に即した算定要件の緩和が必須」と主張した。\n日本医師会の江澤和彦常任理事も同じ算定要件に言及。「加算Ⅰ」を算定するために要介護1、2の高齢者を敬遠する事業所が増える懸念もあるとして、「見直していく必要がある」と促した。\n日本介護支援専門員協会の濵田和則副会長は、24時間の連絡体制の確保を求める「加算Ⅰ」から「加算Ⅲ」の算定要件の緩和を求めた。\nケアマネジャーの負担軽減につなげる観点から、携帯電話などを持って勤務時間外でも対応する運用の改善を要請。「併設の関連施設でいったん受け付けたり、オンコールの代行事業者による対応を認めたりするなど、働く環境の改善へ向けて緩和の検討を」と呼びかけた。", "summary": "委員による意見交換では、経営の成否を左右する「特定事業所加算」の算定要件に話が及んだ。「実態に即した算定要件の緩和が必須」と主張した。「加算Ⅰ」を算定するために要介護1、2の高齢者を敬遠する事業所が増える懸念もあるとして、「見直していく必要がある」と促した。日本介護支援専門員協会の濵田和則副会長は、24時間の連絡体制の確保を求める「加算Ⅰ」から「加算Ⅲ」の算定要件の緩和を求めた。", "categories": ["介護保険・制度", "施設運営・経営"], "is_new": false}, {"title": "〈論説〉障害者雇用の現場　この無法・暴利を断て - 福祉新聞Web", "url": "https://fukushishimbun.com/miyatake/45607", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-01 10:00", "description": "７月から障害者の法定雇用率が改定される。対象の職場は常用労働者４０人以上から３７・５人以上へ拡大、雇用率は２・５％から２・７％へ引き上げられる（国や自治体などは３％）。 雇用数は過去最高（民間で約７０万人）だが、なお半数強の企業は達成できていない。未達成企業は納付金の支払い（常用１００人超で不足１人月額５万円）や企業名の公表を避けたい。 そこで職場・仕事・支援員をそろえて提供する「貸しオフィス」「貸し農園」などの代行ビジネスがはやる。 ４月には、大阪市を中心に総額１５０億円もの不正が発覚した。悪用されたのは、「就労継続支援Ａ型」（利用者約８万人）。 障害者は事業者と雇用契約を結び、最低賃金を保障される。事業者には訓練等給付費（支援員の人件費や事務所経費）が補助され、障害者は訓練を積み重ね、一般就労へ歩む。 絆ホールディングス傘下の４事業所は、グループ内のＡ型利用者をグループ内企業に一般就労させた。６カ月以上の「就労定着者」になって加算金（成功報酬）を得ると、Ａ型に戻したうえ、また別企業へ一般就労させ、補助金や加算金を得た。この〝たらい回し〟は２年余も続いた。 Ａ型でも一般就労でも動画を", "content": "〈論説〉障害者雇用の現場 この無法・暴利を断て\n2026年07月01日 福祉新聞編集部７月から障害者の法定雇用率が改定される。対象の職場は常用労働者４０人以上から３７・５人以上へ拡大、雇用率は２・５％から２・７％へ引き上げられる（国や自治体などは３％）。\n雇用数は過去最高（民間で約７０万人）だが、なお半数強の企業は達成できていない。未達成企業は納付金の支払い（常用１００人超で不足１人月額５万円）や企業名の公表を避けたい。\nそこで職場・仕事・支援員をそろえて提供する「貸しオフィス」「貸し農園」などの代行ビジネスがはやる。\n４月には、大阪市を中心に総額１５０億円もの不正が発覚した。悪用されたのは、「就労継続支援Ａ型」（利用者約８万人）。\n障害者は事業者と雇用契約を結び、最低賃金を保障される。事業者には訓練等給付費（支援員の人件費や事務所経費）が補助され、障害者は訓練を積み重ね、一般就労へ歩む。\n絆ホールディングス傘下の４事業所は、グループ内のＡ型利用者をグループ内企業に一般就労させた。６カ月以上の「就労定着者」になって加算金（成功報酬）を得ると、Ａ型に戻したうえ、また別企業へ一般就労させ、補助金や加算金を得た。この〝たらい回し〟は２年余も続いた。\nＡ型でも一般就労でも動画を見るような自己学習がほとんどだった、という。\n大阪市は指定を取り消し、約１１１億円の返還を請求、詐欺容疑で告発した。京都、奈良、埼玉などでの不正を含め総額１５０億円超とみられる。\nなぜ、こんな無法が長期間まかり通ったのか。厚生労働省は２年前、加算金対象の就労定着者の再申請は３年間できないルールを定めたが、機能しなかった。今回は、就労定着者の年間人数を事業所の定員内にとどめる歯止めも定めた。\nしかし、内部や外部の通報・告発を広く受け止め、早期に是正する行政の厳格な方針・実行がなければ効果はない。７５市町村に及ぶ不正の広域化に対し、データ上で不正を早期発見、波及を阻止する全国横断的な点検態勢も不可欠だ。\n「就労継続支援Ｂ型の事業所」（利用者約３８万人）も急増する。公費補助を受け、障害者の軽度作業に月２万円前後の「工賃」を払う。この福祉的就労でも、観葉植物の鉢やメダカの水槽を自宅に届け、世話をさせるだけの補助金狙いが報道される。\nＢ型のように乱立気味の分野では今年度から新規開業の報酬が下げられる。\n悪質な事業所を解散に追い込むと、障害者は働く場を一時失い、親族も困る。福祉行政はその矛盾に悩むが、障害者の意欲や誇りを奪う非道や荒稼ぎに手をこまねいてはなるまい。\n障害者を誠実に支える多くの職場・職員は不祥事の多発にいたたまれない。\n悪貨が良貨を駆逐する悪循環を早急に断ちたい。\nみやたけ・ごう 毎日新聞論説副委員長から埼玉県立大、目白大大学院の教授などを経て現職", "summary": "〈論説〉障害者雇用の現場 この無法・暴利を断て\n2026年07月01日 福祉新聞編集部７月から障害者の法定雇用率が改定される。悪用されたのは、「就労継続支援Ａ型」（利用者約８万人）。障害者は事業者と雇用契約を結び、最低賃金を保障される。「就労継続支援Ｂ型の事業所」（利用者約３８万人）も急増する。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "政府、家事支援の国家資格を新設　成長戦略原案に方針明示　来年秋に初回国試", "url": "https://www.joint-kaigo.com/articles/47143/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-01 05:10", "description": "政府は6月30日の「日本成長戦略会議」で新たな成長戦略の原案をまとめた。【Joint編集部】 現役世代が介護や子育てで仕事を辞めざるを得ないケースを防ぐため、負担を軽減する家事支援サービスの利用を促進していく構想を盛り込 […]", "content": "2026年7月1日\n政府、家事支援の国家資格を新設 成長戦略原案に方針明示 来年秋に初回国試\n政府は6月30日の「日本成長戦略会議」で新たな成長戦略の原案をまとめた。【Joint編集部】\n現役世代が介護や子育てで仕事を辞めざるを得ないケースを防ぐため、負担を軽減する家事支援サービスの利用を促進していく構想を盛り込んだ。\nその具体策として、家事支援サービスの複数等級の国家資格（技能検定）を新たに創設する方針を明示。来年秋を目途に第1回の国家試験の実施を目指すとして、審議会での議論や試験の作成など準備を進めていく計画を描いた。\n政府はあわせて、新たな国家資格の取得を後押しする講習プログラムの開発を民間に促し、来年春を目途に受講を始められるようにしたい考えも示した。\n家事支援サービスの品質や信頼性を高め、現役世代への浸透を図る狙いがある。\n介護離職などの一層の増加は、日本経済を支える貴重な人材の喪失や産業競争力の低下を招く。政府は新たな成長戦略の原案に、多くの人が家事支援サービスを安心して利用できる環境を作るために「その普及促進に取り組むことが必要」と書き込んだ。\n今後、政府はこうした原案をもとに与党との詰めの調整を行ったうえで、新たな成長戦略を7月中に閣議決定する予定だ。", "summary": "2026年7月1日\n政府、家事支援の国家資格を新設 成長戦略原案に方針明示 来年秋に初回国試\n政府は6月30日の「日本成長戦略会議」で新たな成長戦略の原案をまとめた。その具体策として、家事支援サービスの複数等級の国家資格（技能検定）を新たに創設する方針を明示。家事支援サービスの品質や信頼性を高め、現役世代への浸透を図る狙いがある。政府は新たな成長戦略の原案に、多くの人が家事支援サービスを安心して利用できる環境を作るために「その普及促進に取り組むことが必要」と書き込んだ。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "NDソフト「ほのぼのNEXT」、ショートステイの予約管理システムとAPI連携　7月から機能拡張", "url": "https://www.joint-kaigo.com/articles/47081/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-01 05:00", "description": "エヌ・デーソフトウェアが提供する介護請求ソフト「ほのぼのNEXT」シリーズが7月1日から、ショートステイ向けクラウド型予約管理システム「ペースノートSS」とのAPIデータ連携を開始した。【Joint編集部】 業界のデファ […]", "content": "NDソフト「ほのぼのNEXT」、ショートステイの予約管理システムとAPI連携 7月から機能拡張\nエヌ・デーソフトウェアが提供する介護請求ソフト「ほのぼのNEXT」シリーズが7月1日から、ショートステイ向けクラウド型予約管理システム「ペースノートSS」とのAPIデータ連携を開始した。【Joint編集部】\n業界のデファクトスタンダードとも言える「ほのぼのNEXT」が、機能のさらなる拡張に踏み切る。施設の重荷となっている利用者情報の二重入力などを解消し、介護現場のDXを一段と加速させる狙いがある。\nAPIデータ連携が始まる「ペースノートSS」は、ショートステイの稼働率アップを支援するクラウド型予約管理システム。生活相談員らが手作業で処理していた予約管理表をデジタル化し、独自の技術で利用傾向を自動分析する。リピート利用を促進するほか、利用者の属性や営業効率の見える化、フォローすべき利用者のリスト化、FAX送信の自動化など、集客・顧客管理に必要な機能を網羅している点が特徴だ。\nシンプルな操作性で導入実績はすでに全国300施設以上。相談員の頼れるパートナーとして、多くのショートステイでベッド稼働の最大化を下支えしている。\nエヌ・デーソフトウェアは今回のAPIデータ連携で、施設の事務負担のさらなる軽減を図る。これまでは、ショートステイの予約管理に必要な利用者情報や利用予定の登録などが介護請求ソフト側でも必要だったため、二重入力による転記ミスや確認作業が職員の頭痛の種だった。\n今後は利用者情報を「ほのぼのNEXT」で、利用予定を「ペースノートSS」で入力すれば済むようになる。円滑な一元管理への道が開かれ、業務時間を大幅に縮減する効果も期待できそうだ。\n「ほのぼのNEXT」は言わずと知れた業界のトップランナー。幅広いサービスの施設・事業所で導入されており、介護請求ソフト市場で最大のシェアを誇っている。\nペースノートの由井聖太代表取締役は、「今回の連携で多くの施設の業務効率化に直接貢献できると確信している。煩わしい事務作業の負担を減らし、希望するときにいつでも介護サービスを受けられる社会の実現を後押ししていきたい」とコメントした。", "summary": "NDソフト「ほのぼのNEXT」、ショートステイの予約管理システムとAPI連携 7月から機能拡張\nエヌ・デーソフトウェアが提供する介護請求ソフト「ほのぼのNEXT」シリーズが7月1日から、ショートステイ向けクラウド型予約管理システム「ペースノートSS」とのAPIデータ連携を開始した。APIデータ連携が始まる「ペースノートSS」は、ショートステイの稼働率アップを支援するクラウド型予約管理システム。相談員の頼れるパートナーとして、多くのショートステイでベッド稼働の最大化を下支えしている。今後は利用者情報を「ほのぼのNEXT」で、利用予定を「ペースノートSS」で入力すれば済むようになる。", "categories": ["施設運営・経営", "業務改善・介護テック"], "is_new": false}, {"title": "介護付きホーム協会が総会　物価高など経営の三重苦が直撃　生産性向上へ一丸強調", "url": "https://www.joint-kaigo.com/articles/47131/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-30 17:39", "description": "全国介護付きホーム協会は29日、今年度の総会を東京都内で開催した。【Joint編集部】 鷲見隆充代表理事（SOMPOケア株式会社代表取締役社長）は冒頭の挨拶で、「介護業界は食材費、光熱費、人件費が高騰する三重苦の影響をま […]", "content": "全国介護付きホーム協会は29日、今年度の総会を東京都内で開催した。【Joint編集部】\n鷲見隆充代表理事（SOMPOケア株式会社代表取締役社長）は冒頭の挨拶で、「介護業界は食材費、光熱費、人件費が高騰する三重苦の影響をまともに受けた」と指摘。他産業で賃上げが先行していることで、「人材採用が本当に一気に厳しくなった」との認識も示した。\nそのうえで、「私たちはこの圧倒的な人材不足の中で、介護の品質を維持し、生産性を向上させる」と強調。「このことに協会が一丸となって取り組まなければ、日本の介護の未来は、ひいては日本の未来はない」と意欲をみせた。\n来賓として挨拶した厚生労働省老健局の黒田秀郎局長は、全国介護付きホーム協会が力を入れている生産性向上について、「介護分野をリードする取り組みを展開している」と評価。「さらなる推進に向けた継続的な支援を進めていく」と述べた。", "summary": "全国介護付きホーム協会は29日、今年度の総会を東京都内で開催した。そのうえで、「私たちはこの圧倒的な人材不足の中で、介護の品質を維持し、生産性を向上させる」と強調。「このことに協会が一丸となって取り組まなければ、日本の介護の未来は、ひいては日本の未来は
