osed to MicroPython\nFable identified that it could use Brett Cannon’s cpython-wasi-build builds for this, but was unable to download them itself due to environment restrictions.\nSo I grabbed the two zip files from that page and uploaded them to Claude:\nHere's the Brett Cannon builds\n(python-3.zip\n,_build-python-3.zip\nas attachments)\nAnd that was that. It churned away for a few minutes and got the entire thing working.\nPart of the response included:\nI tried the cleaner single-zip-stdlib approach to shrink the filesystem surface, but CPython’s\ngetpath\nbootstrap fails to findencodings\nfrom inside a zip without more prefix finessing — the directory-preopen approach works reliably, so that’s what the PoC uses. The zip path is solvable but needs_PYTHONHOME\n/frozen-getpath work.\nSo I said:\nTry a bit more at the single-zip-stdlib problem\nThen a little later:\nI want a wheel that has the whole system in it, the Python wrappers and the WASM files and the stdlibrary, so I can do uv run --with path-to-whl python -c \"demo code\"\n... and it gave me this 13.9MB cpython_wasm-0.1.0-py3-none-any.whl file. You can try running Python code in a sandbox using that wheel URL and uv\nlike this:\nuv run --with https://static.simonwillison.net/static/cors-allow/2026/cpython_wasm-0.1.0-py3-none-any.whl \\\ncpython-wasm -c 'print(45 ** 56)'\nHere’s the full chat transcript.\nThis was a very strong start.\nAdding features to Datasette Agent and LLM using Claude Code\nBefore I’d realized it was Fable day, my stretch goal for today was to add a new feature to Datasette Agent: I wanted tool calls within that agent software to gain the ability to pause mid-execution and request approval directly from the user.\nThis felt like a suitably meaty task to throw at the new model.\nOver the course of the day Fable not only solved that problem, it also identified and then implemented four issues in my underlying LLM library that would help support this kind of advanced pause-resume mechanism in tool calls.\nIt got everything working first using somewhat gnarly hacks, but the moment I told it that changes to LLM itself were in scope it set to work unraveling the hacks and turning them into supported features of LLM instead.\nMy stretch goal turned into LLM 0.32a3, almost entirely written by Fable. Here are the release notes:\nDriven by the needs of Datasette Agent’s human-in-the-loop\nask_user()\nfeature, made the following improvements to how tool calls work:\n- Tool implementations can declare a parameter named\nllm_tool_call\nin order to be passed thellm.ToolCall\nobject for the current invocation. This allows them to access the currentllm_tool_call.tool_call_id\n. See Accessing the tool call from inside a tool. #1480- Every tool call is now guaranteed a unique\ntool_call_id\n—providers that do not supply one get a synthesizedtc_\n-prefixed ULID. #1481- Tools can raise a\nllm.PauseChain\nexception to cleanly pause the tool chain, useful for things like waiting for human approval. The exception propagates to the caller with.tool_call\nand.tool_results\n(completed sibling results) attached, and no model call is made with a placeholder result. See Pausing a chain from inside a tool. #1482- Failure semantics for concurrent tool execution: async sibling tool calls always run to completion before a pause or hook exception propagates. #1482\n- Chains can now resume from a\nmessages=\nhistory ending in unresolved tool calls: the calls are executed through the normalbefore_call\n/after_call\nmachinery before the first model call, skipping any that already have results. Theexecute_tool_calls()\nmethod also accepts a new optionaltool_calls_list=\nargument for executing an explicit list ofToolCall\nobjects in place of the calls requested by the response. See Resuming a chain with pending tool calls. #1482- Fixed a bug where the async tool executor silently dropped calls to tools not present in\ntools=\n—these now returnError: tool \"...\" does not exist\nresults, matching the sync executor. #1483\nI’m really impressed with the quality of API design, tests, code and documentation that Fable put together for this. I spent several hours on it today, but it feels like several days’ worth of work.\nHow much I’ve spent\nI recently started using AgentsView to help track my local LLM usage across all of the different coding agents. I published a TIL today about adding custom Fable pricing to that tool, which I expect will not be necessary in the very near future.\nAfter setting the price, I ran this command to start a localhost web server to explore my usage:\nuvx agentsview serve\nHere’s the treemap showing the breakdown of my Fable usage across various projects today:\nI used $110.42 worth of tokens today, all as part of my $100/month subscription.\nAnd some pelicans\nI ran “Generate an SVG of a pelican riding a bicycle” against all five thinking effort levels with Fable.\nHere are the results, including the token cost for each one:\nIt’s interesting that high ended up using fewer tokens than medium for this particular run.\nHere are the Opus 4.8 pelicans for comparison.\nMore recent articles\n- Running Python code in a sandbox with MicroPython and WASM - 6th June 2026\n- Claude Opus 4.8: \"a modest but tangible improvement\" - 28th May 2026", "summary": "sqlite-utils (~2018-2019) – A Python library and CLI tool for manipulating SQLite databases, often used alongside Datasette. Is Fable really bigger than Opus?. Using Fable in Claude.ai\nAnthropic made Fable 5 available across all of their surfaces—the Claude.ai chat interface, Claude Code for web, Claude Code CLI and Claude Cowork as well. See Accessing the tool call from inside a tool.", "categories": ["AIツール・生産性", "業務改善・介護テック"], "is_new": true, "title_ja": "クロード・ファブル5の第一印象", "summary_ja": "sqlite-utils (~2018-2019) – SQLite データベースを操作するための Python ライブラリおよび CLI ツール。データセットと一緒によく使用されます。ファブルは本当にオーパスより大きいのでしょうか? Claude.ai で Fable を使用する\nAnthropic は、Claude.ai チャット インターフェイス、Claude Code for Web、Claude Code CLI、Claude Cowork など、すべてのサーフェスで Fable 5 を利用できるようにしました。 「ツール内からツール呼び出しへのアクセス」を参照してください。"}, {"title": "来年度の介護報酬改定は「基本報酬引き上げを重点に」　自民議連が要請　各種加算見直しも", "url": "https://www.joint-kaigo.com/articles/46667/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-09 20:53", "description": "雨の多い季節に入り、政府が7月にもまとめる今年度の「骨太の方針」に向けた業界の働きかけが活発になっている。【Joint編集部】 9日には自民党の「地域の介護と福祉を考える参議院議員の会」が、来年度の介護報酬改定に関する要 […]", "content": "2026年6月9日\n来年度の介護報酬改定は「基本報酬引き上げを重点に」 自民議連が要請 各種加算見直しも\n雨の多い季節に入り、政府が7月にもまとめる今年度の「骨太の方針」に向けた業界の働きかけが活発になっている。【Joint編集部】\n9日には自民党の「地域の介護と福祉を考える参議院議員の会」が、来年度の介護報酬改定に関する要望書を小林鷹之政調会長へ提出した。\n要望書では、介護従事者の賃上げの遅れやサービス提供にかかるコストの膨張を念頭に、物価や人件費が毎年上がっていくことを前提とした構造的な施策を講じるべきと求めた。あわせて、事業所・施設の経営改善に確実につながるよう「基本報酬の引き上げを重点とすべき」と訴えた。\nこの申し入れには、全国老人保健施設連盟、全国介護事業者連盟、全国老人福祉施設協議会、全国介護事業者協議会、介護人材政策研究会の5団体が同行。来年度の介護報酬改定で十分な支援策を講じるよう要請した。\n要望書ではこのほか、介護報酬の各種加算の見直しも提言。要件を簡素化するとともに、その取得に伴うコスト・手間に見合った単価の設定が欠かせないと主張した。", "summary": "【Joint編集部】\n9日には自民党の「地域の介護と福祉を考える参議院議員の会」が、来年度の介護報酬改定に関する要望書を小林鷹之政調会長へ提出した。この申し入れには、全国老人保健施設連盟、全国介護事業者連盟、全国老人福祉施設協議会、全国介護事業者協議会、介護人材政策研究会の5団体が同行。来年度の介護報酬改定で十分な支援策を講じるよう要請した。要望書ではこのほか、介護報酬の各種加算の見直しも提言。", "categories": ["介護保険・制度", "施設運営・経営"], "is_new": false}, {"title": "【壷内令子】身寄りのない高齢者の支援、介護報酬の評価も必要　ケアマネの不可避の隙間業務に光を", "url": "https://www.joint-kaigo.com/articles/46660/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-09 19:21", "description": "近年、身寄りのない高齢者への支援が地域の大きな課題となっています。【壷内令子】 政府も動き始めています。今年4月には、頼れる身寄りがいない高齢者らに対し、日常生活支援、入院・入所の手続き支援、死後事務支援などを行う事業を […]", "content": "【壷内令子】身寄りのない高齢者の支援、介護報酬の評価も必要 ケアマネの不可避の隙間業務に光を\n近年、身寄りのない高齢者への支援が地域の大きな課題となっています。【壷内令子】\n政府も動き始めています。今年4月には、頼れる身寄りがいない高齢者らに対し、日常生活支援、入院・入所の手続き支援、死後事務支援などを行う事業を第二種社会福祉事業に位置づける法案を閣議決定しました。\nまた、すでに民間では「高齢者等終身サポート事業」として身元保証や死後事務、日常生活支援などを行うサービスも広がっています。こうした仕組みが整っていくことは、地域にとって大きな前進だと感じます。\n一方で、居宅介護支援のケアマネジャーとして現場を担う立場から見ると、制度や事業が用意されれば、それだけですぐに支援が動き出すわけではありません。必要な支援にたどり着くまでには、いくつもの小さな壁があります。\n◆ 支援につながるまでの「隙間」\nケアマネジャーが本人の状況を把握し、必要なサービスや関係機関につなぐことは、本来のケアマネジメント業務です。ただ、身寄りのない高齢者の場合、その「つなぐ」までの過程で壁にぶつかることがあります。\nたとえば、高齢者等終身サポート事業や保険外サービスがあっても、本人があらかじめ契約しているとは限りません。むしろ、何も起きていない段階から費用をかけて契約している方は少ないのではないでしょうか。\n「まだ自分でできる」「今はお金をかけたくない」「そこまで困っていない」。そう思っている間は、なかなか契約にはつながりません。\n一方で、経済的に余裕がない方の場合は、有償の保険外サービスを利用すること自体が難しい場合があります。低額または無償で利用できる仕組みが整っていくことは大切ですが、そこにつながるまでにも、本人の状況整理や対象確認、関係機関との調整が必要になります。\nつまり、経済的に一定の余裕がある方には「今はまだ契約したくない」という壁があり、経済的に余裕がない方には「有償サービスを使えない」という壁があります。どちらの場合も、必要な支援にすぐつながるとは限らないのが実情です。\nしかし、入院や急変、生活上の困りごとは突然起こります。そのときには、まず目の前の課題に待ったなしで対応し、そのうえで必要な支援や事業につなげていくことにならざるを得ません。\n◆ 身寄りの有無で、現場の負担は変わる\n身寄りのある高齢者であれば、書類の確認、入院時の手続き、支払いの確認、急な連絡への対応などを、家族や親族に相談できる場面があります。\nもちろん、家族がいるからといってすべてがスムーズに進むわけではありません。それぞれ事情があり、迅速な支援が難しい場合も多々あります。それでも、頼れる家族や支援者がいる場合と、まったく頼れる人がいない場合とでは、現場で発生する確認や調整の量は大きく異なります。\n頼れる身寄りがいない方の場合、ちょっとした書類の確認、代読・代筆、支払い状況の確認、入院時の細かな手続きなどを担う人がいません。一つひとつは小さな対応であっても、それが少しずつ積み重なっていきます。\n身寄りのある高齢者と身寄りのない高齢者とでは、同じ出来事が起きても、ケアマネジャーに求められる対応量や調整の難しさが大きく異なる ーー 。ここに、現場として感じる重い課題があります。\nこの小さな対応の積み重ねが、ケアマネジャーにとって、いわゆる「シャドーワーク」と感じられる部分ではないでしょうか。\n◆「つなぐこと」は本来業務、しかしそれだけではない\nケアマネジャーがインフォーマルな支援や地域の社会資源を把握し、必要に応じてつなぐことは重要な役割です。しかし、身寄りのない高齢者の場合、課題は「つなぐこと」だけではありません。\n本来であれば保険外サービスとして対応したり、他機関につないだりすべき業務であっても、すぐに適切な支援につながるとは限りません。費用の問題、本人の理解、契約の難しさ、地域資源の不足、そして緊急性が重なると、支援が動き出すまでに時間がかかります。\nそのため、身寄りのある高齢者と比べて身寄りのない高齢者では、支援につながるまでの間に、ケアマネジャーが動かざるを得ない場面が多くなりがちです。この差を、すべて基本の居宅介護支援費の中に含めて考えてよいのか。ここに問題意識を持っています。\n◆ 自費サービスで対応すればよいのか\nこうした業務について、「保険外サービスとして、居宅介護支援事業所が自費で対応すればよいのではないか」という考え方もあるかもしれません。しかし、それも現場では簡単ではありません。\n身寄りのない高齢者に生じる隙間の対応は、定期的・計画的なサービスではなく、突発的に発生することが多いのが実情です。内容も一定ではありません。その都度、契約し、料金を設定し、説明し、請求し、記録する仕組みを整えることは、事業所にとって大きな負担になります。\nまた、ケアマネジャーが保険外サービスの提供者になってしまうと、ケアマネジメントの中立性や役割の明確化という点でも課題が生じます。\nさらに、ケアマネジャーの人材不足が課題となっている中で、限られたケアマネジャーの時間を保険外サービスの提供に振り向けてしまえば、本来必要とされているケアマネジメントそのものに使える時間が削られてしまうでしょう。\nこれらを踏まえると、「居宅介護支援事業所が自費サービスとして対応すればよい」という整理だけでは、現場の課題は解決しにくいのではないでしょうか。\n◆ 現代に合った評価のあり方を\nかつて、居宅介護支援には認知症加算や独居高齢者加算がありましたが、2015年度の介護報酬改定で基本報酬に包括化されました。もちろん、当時の加算をそのまま戻せばよいという話ではありません。\n現在の課題は、単に独り暮らしかどうかだけでは捉えきれません。頼れる身寄りがない状態では、支援につながるまでの間に小さな対応が積み重なりやすく、現場のケアマネジャーがそれを「シャドーワーク」と認識していることです。\n特に、身寄りがないことに認知症が重なる場合は、本人の理解、同意、契約、金銭管理、緊急時対応などの難易度が一段高くなります。\nそのため、現在の社会背景に合わせて、「身寄りのない高齢者支援」に対する加算などの評価を検討してもよいのではないでしょうか。\n身寄りのない高齢者を地域で支える仕組みを進めていくのであれば、その入り口でケアマネジャーが担っている隙間の対応にも、何らかの評価が必要ではないかと感じます。小さな対応の積み重ねを、個々のケアマネジャーの責任感や善意だけに委ね続けることは、持続可能とはいえません。\n国が身寄りのない高齢者に対する支援の仕組みを整えようとしている今だからこそ、現場でその支援につなぐ役割を担っているケアマネジャーの業務についても、あわせて考えていく時期に来ているのではないでしょうか。", "summary": "ただ、身寄りのない高齢者の場合、その「つなぐ」までの過程で壁にぶつかることがあります。しかし、身寄りのない高齢者の場合、課題は「つなぐこと」だけではありません。そのため、身寄りのある高齢者と比べて身寄りのない高齢者では、支援につながるまでの間に、ケアマネジャーが動かざるを得ない場面が多くなりがちです。しかし、それも現場では簡単ではありません。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "How to sign PDFs easily online with a PDF signer", "url": "https://www.artificialintelligence-news.com/news/how-to-sign-pdfs-easily-online-with-a-pdf-signer/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-09 18:01", "description": "Signing PDFs has become an important task for businesses and individuals alike. Whether you’re handling contracts, legal agreements, or forms, the ability to quickly and securely sign PDFs online is essential. Fortunately, with the rise of online PDF signers, signing PDFs has never been easier. Common challenges in signing PDFs Signing PDFs might seem straightforward, […] The post How to sign PDFs easily online with a PDF signer appeared first on AI News .", "content": "Signing PDFs has become an important task for businesses and individuals alike. Whether you’re handling contracts, legal agreements, or forms, the ability to quickly and securely sign PDFs online is essential. Fortunately, with the rise of online PDF signers, signing PDFs has never been easier.\nCommon challenges in signing PDFs\nSigning PDFs might seem straightforward, but several challenges often arise during the process. Some of the most common issues include:\n- File compatibility: Not all PDF editors or viewers allow you to easily add a signature, especially if the document is encrypted or password-protected.\n- Document security: Ensuring that your signature is secure and not vulnerable to tampering is critical, particularly in sensitive legal documents.\n- Legal compliance: Making sure your electronic signature is legally valid is crucial, especially for contracts and formal agreements.\nBy understanding these challenges, you can better prepare for a smooth and secure PDF signing experience.\nChoosing the right PDF signer\nSelecting the right PDF signer is essential for a hassle-free experience. With many options available, it’s important to choose a tool that meets your needs and ensures your documents are signed efficiently and securely.\nKey features to look for\nWhen evaluating PDF signers, here are some important features to consider:\n- Ease of use: The interface should be intuitive, allowing you to quickly upload documents, sign them, and download the signed copy.\n- Security: Look for a PDF signer that offers encryption and complies with e-signature laws, like the ESIGN Act and UETA.\n- Integration with other tools: A good PDF signer should integrate with cloud storage solutions like Google Drive, Dropbox, or OneDrive, allowing easy access to documents.\n- Multi-signature support: If you need multiple parties to sign a document, choose a signer that supports multi-party signatures.\n- Audit trail: Ensure the signer provides an audit trail for legal purposes, documenting who signed the document and when.\nComparing popular PDF signers\nThere are several options to choose from when it comes to PDF signing tools. Here’s a quick comparison of popular PDF signers:\n- Lumin: A comprehensive solution for signing and collaborating on PDFs. Lumin’s easy-to-use interface and robust security features make it a top choice for professionals.\n- DocuSign: A well-known and trusted electronic signature platform with enterprise-level features and extensive legal compliance.\n- Adobe Acrobat Sign: Adobe’s offering integrates with other Adobe tools and provides a reliable, secure way to sign PDFs.\n- HelloSign: Known for its user-friendly interface and ease of use, HelloSign is a great option for small businesses and individuals looking to sign documents online.\nEach of these tools offers different features, but the best option will depend on your specific needs.\nStep-by-step guide to signing PDFs online\nNow that you know how to choose a PDF signer, let’s walk through the process of signing a PDF online, whether you’re using Lumin or another tool.\nPreparing your document\nBefore you sign your document, make sure it’s ready:\n- Ensure the document is complete: Double-check that the content of the document is final and there are no further edits needed before signing.\n- Check for any required fields: Some PDFs, especially forms, may have fields that need to be filled out before you sign.\n- Ensure document compatibility: Make sure the PDF is not encrypted or password-protected, as this could prevent you from adding a signature.\nUsing a PDF signer tool\nHere’s a simple guide to signing PDFs online using a PDF signer:\n- Upload the PDF: Open the PDF signer of your choice and upload the PDF document you need to sign.\n- Choose Signature Type: Most PDF signers will allow you to either type your name, draw your signature, or upload an image of your signature.\n- Place the Signature: Drag and drop your signature to the appropriate spot on the document. You may also be able to resize or adjust its placement.\n- Add Initials or Date: If required, you can add your initials or the date of signing.\n- Save and Download: After signing the document, save it and download the signed copy for your records or to share with others.\nVerifying your signature\nOnce you’ve signed your PDF, it’s important to verify that the signature is correctly applied and that the document is secure. Many PDF signers, including Lumin, automatically ensure that your signature is encrypted and legally binding. Always check the signature’s status before finalizing any legal agreement.\nBenefits of using an online PDF signer\nThere are numerous advantages to using an online PDF signer, especially when compared to traditional methods like printing and scanning.\nTime and cost efficiency\nOne of the primary benefits of signing PDFs online is the time saved by eliminating the need to print and scan documents. You can sign documents from anywhere, at any time, which is particularly helpful for remote work and teams spread in multiple locations. And, many online PDF signers offer free versions or affordable subscription plans, which saves you the cost of ink and postage.\nEnhanced security measures\nUsing an online PDF signer often offers enhanced security features, including encryption and compliance with legal e-signature regulations. Tools like Lumin ensure that the signed document is protected from tampering and provide an audit trail that verifies who signed the document and when. This is especially important for businesses that deal with sensitive contracts or legal agreements.\nTips for a seamless PDF signing experience\nHere are a few tips for a seamless signing experience in order to get the most out of your online PDF signer:\nEnsuring compatibility\nMake sure that the PDF signer you choose is compatible with your operating system and the devices you use regularly. Many tools work in multiple platforms, including Windows, macOS, and mobile devices, but it’s always best to confirm before starting.\nMaintaining signature legality\nEnsure that the tool you’re using complies with the necessary electronic signature laws, like the ESIGN Act in the US or eIDAS in the EU. These laws ensure that your digital signature is legally binding, so you can confidently sign contracts and agreements online.\nFinal thoughts\nSigning PDFs online has never been easier, and with the right PDF signer, you can streamline your workflow and ensure that your documents are signed securely and efficiently. Whether you’re using Lumin, DocuSign, or another tool, taking the time to choose the right PDF signer for your needs will help you save time, reduce costs, and improve document security.", "summary": "Step-by-step guide to signing PDFs online\nNow that you know how to choose a PDF signer, let’s walk through the process of signing a PDF online, whether you’re using Lumin or another tool. Using a PDF signer tool\nHere’s a simple guide to signing PDFs online using a PDF signer:\n- Upload the PDF: Open the PDF signer of your choice and upload the PDF document you need to sign. - Choose Signature Type: Most PDF signers will allow you to either type your name, draw your signature, or upload an image of your signature. Verifying your signature\nOnce you’ve signed your PDF, it’s important to verify that the signature is correctly applied and that the document is secure.", "categories": ["業務改善・介護テック"], "is_new": true, "title_ja": "PDF 署名者を使用してオンラインで PDF に簡単に署名する方法", "summary_ja": "オンラインで PDF に署名するためのステップバイステップ ガイド\nPDF 署名者の選択方法がわかったので、Lumin または他のツールを使用しているかどうかに関係なく、オンラインで PDF に署名するプロセスを見てみましょう。 PDF 署名ツールの使用\nPDF 署名者を使用してオンラインで PDF に署名するための簡単なガイドは次のとおりです。\n- PDF をアップロードする: 選択した PDF 署名者を開き、署名が必要な PDF ドキュメントをアップロードします。 - 署名タイプの選択: ほとんどの PDF 署名者では、名前を入力するか、署名を描くか、署名の画像をアップロードすることができます。署名を確認する\nPDF に署名したら、署名が正しく適用されていること、およびドキュメントが安全であることを確認することが重要です。"}, {"title": "人口１億2305万人に　減少幅は過去最大 - 福祉新聞Web", "url": "https://fukushishimbun.com/fukushiippan/45475", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-09 14:00", "description": "総務省が５月２９日に発表した２０２５年国勢調査の速報値で、日本の人口が１億２３０４万９５２４人であることが分かった。５年前の前回調査から３０９万６５７５人減り、減少幅は過去最大だった。 人口が減少したのは１５年と２０年調査に続いて３回連続。減少幅も２０年の０．７％から今回は２・５％となり、人口減少が加速した。 都道府県別に見ると、東京（１４２４万６２１９人）がトップで、全国の１２％を占めた。次いで神奈川（９１９万３６５７人）▽大阪（８７６万４５７８人）▽愛知（７４４万９４０３人）▽埼玉（７２８万７１６９人）▽千葉（６２５万８５１２人）の順。逆に人口が最も少ないのは鳥取（５２万３７３２人）だった。 人口が増えたのは東京と沖縄だけで、４５道府県が前回より減った。中でも埼玉と千葉は１９２０年の調査開始以来、初めて減少に転じた。 一方、世帯数は５７１２万４５０７世帯で、前回より約１２９万世帯増え、過去最多となった。 １世帯当たりの人数は２．１５人で、前回の２．２６人から減った。都道府県別では、山形（２．４９人）▽福井（２．４８人）▽佐賀（２．４４人）の順だった。 福祉新聞Web", "content": "人口１億2305万人に 減少幅は過去最大\n2026年06月09日 福祉新聞編集部総務省が５月２９日に発表した２０２５年国勢調査の速報値で、日本の人口が１億２３０４万９５２４人であることが分かった。５年前の前回調査から３０９万６５７５人減り、減少幅は過去最大だった。\n人口が減少したのは１５年と２０年調査に続いて３回連続。減少幅も２０年の０．７％から今回は２・５％となり、人口減少が加速した。\n都道府県別に見ると、東京（１４２４万６２１９人）がトップで、全国の１２％を占めた。次いで神奈川（９１９万３６５７人）▽大阪（８７６万４５７８人）▽愛知（７４４万９４０３人）▽埼玉（７２８万７１６９人）▽千葉（６２５万８５１２人）の順。逆に人口が最も少ないのは鳥取（５２万３７３２人）だった。\n人口が増えたのは東京と沖縄だけで、４５道府県が前回より減った。中でも埼玉と千葉は１９２０年の調査開始以来、初めて減少に転じた。\n一方、世帯数は５７１２万４５０７世帯で、前回より約１２９万世帯増え、過去最多となった。\n１世帯当たりの人数は２．１５人で、前回の２．２６人から減った。都道府県別では、山形（２．４９人）▽福井（２．４８人）▽佐賀（２．４４人）の順だった。", "summary": "５年前の前回調査から３０９万６５７５人減り、減少幅は過去最大だった。人口が減少したのは１５年と２０年調査に続いて３回連続。逆に人口が最も少ないのは鳥取（５２万３７３２人）だった。都道府県別では、山形（２．４９人）▽福井（２．４８人）▽佐賀（２．４４人）の順だった。", "categories": ["福祉・社会保障"], "is_new": false}, {"title": "介護・障害の基本報酬増を　全社協政策委が厚労省に要望 - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45472", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-09 10:00", "description": "全国社会福祉協議会政策委員会（平田直之委員長）は５月２８日、上野賢一郎厚生労働大臣に、２０２７年度予算などに関する要望書を提出した。物価高騰や賃上げ努力を続ける中、社会福祉法人の経営が悪化しているとして、介護や障害福祉の基本報酬をプラス改定にすることなどを求めている。 要望の背景には、福祉現場の厳しい経営実態がある。福祉医療機構が２６年２月に公表したデータによると、赤字の社会福祉法人の割合は介護分野４２％▽障害分野２６％▽保育分野１７％――に上る。 ２７年度には臨時で報酬改定も行われたが、処遇改善だけでは法人の収支改善にはつながらないのが実情だ。要望書は事業継続に必要な基本報酬の引き上げが不可欠だと訴えた。 また、福祉人材不足も深刻化している。全産業平均との月収差は、介護８万２０００円、障害７万７０００円、保育５万３０００円で、今後広がる可能性もある。そのため３年に１回の報酬改定ではなく、全産業の賃金上昇や物価に連動して継続的に処遇を改善する仕組みの導入を求めた。 これに対し、厚労省の鹿沼均社会・援護局長は「社会保障に何らかの問題が起きてはならない。要望を踏まえ、必要なことは意見を申し", "content": "介護・障害の基本報酬増を 全社協政策委が厚労省に要望\n2026年06月09日 福祉新聞編集部全国社会福祉協議会政策委員会（平田直之委員長）は５月２８日、上野賢一郎厚生労働大臣に、２０２７年度予算などに関する要望書を提出した。物価高騰や賃上げ努力を続ける中、社会福祉法人の経営が悪化しているとして、介護や障害福祉の基本報酬をプラス改定にすることなどを求めている。\n要望の背景には、福祉現場の厳しい経営実態がある。福祉医療機構が２６年２月に公表したデータによると、赤字の社会福祉法人の割合は介護分野４２％▽障害分野２６％▽保育分野１７％――に上る。\n２７年度には臨時で報酬改定も行われたが、処遇改善だけでは法人の収支改善にはつながらないのが実情だ。要望書は事業継続に必要な基本報酬の引き上げが不可欠だと訴えた。\nまた、福祉人材不足も深刻化している。全産業平均との月収差は、介護８万２０００円、障害７万７０００円、保育５万３０００円で、今後広がる可能性もある。そのため３年に１回の報酬改定ではなく、全産業の賃金上昇や物価に連動して継続的に処遇を改善する仕組みの導入を求めた。\nこれに対し、厚労省の鹿沼均社会・援護局長は「社会保障に何らかの問題が起きてはならない。要望を踏まえ、必要なことは意見を申し上げていきたい」と応じた。\n社会的養護の予算確保を\n全社協政策委は５月２６日、黄川田仁志こども政策担当大臣に対して、社会的養護、保育など２７年度予算に関する要望書を提出した。\n社会的養護関係については、里親での養育が困難なこどもへの専門的対応や、里親支援など多機能化や高機能化が求められていると強調し、十分な予算を確保するよう求めた。施設の専門的機能を十分に発揮できるよう職員配置基準の抜本的な見直しも訴えた。\nこのほか、保育に関しては、保育士の勤務年数が長期化しているとして、福祉職俸給表の格付け見直しも含めた公定価格の基本単価引き上げなどを要請。主任保育士の専任必置化も求めた。\nさらに、現在、厚生労働省の検討会で退職手当共済制度が見直されていることに触れ、掛け金に対する現行の公費助成を継続することも要望している。", "summary": "物価高騰や賃上げ努力を続ける中、社会福祉法人の経営が悪化しているとして、介護や障害福祉の基本報酬をプラス改定にすることなどを求めている。また、福祉人材不足も深刻化している。社会的養護の予算確保を\n全社協政策委は５月２６日、黄川田仁志こども政策担当大臣に対して、社会的養護、保育など２７年度予算に関する要望書を提出した。このほか、保育に関しては、保育士の勤務年数が長期化しているとして、福祉職俸給表の格付け見直しも含めた公定価格の基本単価引き上げなどを要請。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "【必須】今年度の「生産性向上セミナー」、今夏開催　厚労省　参加無料", "url": "https://www.joint-kaigo.com/articles/46617/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-08 19:54", "description": "加速する人材不足に対応し、介護サービスの質の向上や職員の負担軽減、働きやすい職場環境の整備などの実現に向けて、厚生労働省は今年度も「生産性向上セミナー」を開催する。【Joint編集部】 5日に介護保険最新情報Vol.15 […]", "content": "2026年6月8日\n【必須】今年度の「生産性向上セミナー」、今夏開催 厚労省 参加無料\n加速する人材不足に対応し、介護サービスの質の向上や職員の負担軽減、働きやすい職場環境の整備などの実現に向けて、厚生労働省は今年度も「生産性向上セミナー」を開催する。【Joint編集部】\n5日に介護保険最新情報Vol.1510を発出し、現場の関係者へ広く周知した。参加申し込みは公式サイトから。\n生産性向上ビギナーセミナー／生産性向上フォローアップセミナーはこちらから\n個々の事業所・施設の習熟度や目的などに応じて選べる3コースが用意されている。\n「ビギナーセミナー」では、取り組みの意義や手順といった基本を学び、他の事業所・施設の具体的な実践事例を知ることができる。また「フォローアップセミナー（講義形式）」では、課題の見える化や実行計画の作成など、より実践的な内容を体系的に学べる。\nさらに、もう一歩踏み込んで生産性向上の推進スキルを習得したい事業所・施設向けに、講師や他の参加者と双方向にやり取りする「ワーク形式」もある。全2回の実践的な演習を通じて、現場での具体的な課題の特定や実行計画の策定・見直しの手法を習得するなど、取り組みを継続して推進できるノウハウの獲得を目指す内容だ。\n※「ワーク形式」への参加は、ビギナーセミナーを受講していること、または過去のビギナーセミナーを受講していることが必須条件となる。\n全てのセミナーがオンライン（Zoom）で開催され、参加費は無料。これから取り組みをスタートさせたい事業所・施設はもちろん、過去にチャレンジしたもののうまく進んでいないところの再挑戦も歓迎している。\n詳細なプログラムや各回の開催日程、申し込みの締め切りなどは公式サイトで確認できる。厚労省は早期の受講申し込みや職場内での共有を呼びかけている。", "summary": "生産性向上ビギナーセミナー／生産性向上フォローアップセミナーはこちらから\n個々の事業所・施設の習熟度や目的などに応じて選べる3コースが用意されている。「ビギナーセミナー」では、取り組みの意義や手順といった基本を学び、他の事業所・施設の具体的な実践事例を知ることができる。※「ワーク形式」への参加は、ビギナーセミナーを受講していること、または過去のビギナーセミナーを受講していることが必須条件となる。全てのセミナーがオンライン（Zoom）で開催され、参加費は無料。", "categories": ["AIツール・生産性", "施設運営・経営"], "is_new": false}, {"title": "【結城康博】ケアマネは本当に国家資格か？　名実ともに真の専門職として正当に評価されるために", "url": "https://www.joint-kaigo.com/articles/46589/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-08 17:07", "description": "政府は4月22日に開催した「日本成長戦略会議」で、家事支援サービスの品質の向上と信頼性の確保に向けて新たな国家資格を創設する方針を打ち出した。【結城康博】 職業能力開発促進法の「技能検定」の職種に位置付け、2027年秋に […]", "content": "【結城康博】ケアマネは本当に国家資格か？ 名実ともに真の専門職として正当に評価されるために\n政府は4月22日に開催した「日本成長戦略会議」で、家事支援サービスの品質の向上と信頼性の確保に向けて新たな国家資格を創設する方針を打ち出した。【結城康博】\n職業能力開発促進法の「技能検定」の職種に位置付け、2027年秋にも第1回試験を行う可能性が高い。\nこの話題に接すると、ケアマネジャーの資格との比較を考えずにはいられない。先日、厚生労働省で介護保険を所管する老健局の黒田秀郎局長が国会答弁で、ケアマネジャーは国家資格だと明言していた。しかし、介護現場では一般的にそのように認識されていないのではないだろうか？\n◆ 更新研修を廃止すべき\n私はケアマネジャーの資格を有している（更新はしていない）が、当時の資格証（介護支援専門員証）は石原慎太郎東京都知事の名義で発行されたものだ。\n一方で、社会福祉士、介護福祉士の資格も有しているが、それらの資格証は厚生労働大臣の名義で発行されている。私は持っていないが、医師や歯科医師、看護師、薬剤師、理学療法士、歯科衛生士といった医療系の国家資格も、厚生労働大臣の名義で発行されている。\nつまり、医療系・福祉系の国家資格の大半は、厚生労働大臣の名義で資格証が発行されているのだ。確かに、ケアマネジャーは現行の法令の解釈において明確に国家資格なのかもしれないが、介護現場の関係者の多くはそう捉えていないのが実情ではないだろうか。\nではどうすればいいのか。ケアマネジャーが国家資格だと言うのであれば、多くの人が納得できるように、都道府県知事ではなく厚生労働大臣の名義で資格証を発行すべきだ。\nあわせて、法令上の義務と位置付けられる更新研修を廃止すべきである。周知のように、社会福祉士や介護福祉士、看護師、医師など他の資格において更新研修は義務付けられていない。\nなお、更新研修に相当する仕組みが義務付けられている国家資格も一部にある。例えば「キャリアコンサルタント」や「無人航空機操縦者技能証明」がそれに該当する。\nただ、医療系・福祉系の国家資格では基本的に更新研修が義務付けられていない。ケアマネジャーも更新研修を廃止し、他の国家資格と同等に扱うべきと考える。\n◆ 言葉だけの応援ではなく制度で示せ\n政府が新たに創設する家事支援サービスの国家資格は、どのような扱いになるのだろうか。\n現在、家事支援サービスの関連資格としては、公益社団法人日本看護家政紹介事業協会による「家政士」検定（厚生労働大臣認定）がある。衣・食・住の家事やコミュニケーション、ホスピタリティを中心として、介護や子育てを含む生活全体をサポートする技能などを評価する仕組みだ。今後、この仕組みがベースとなって新たな国家資格が具体化されていくとみられる。\nこれはまだ予測だが、新しい家事支援サービスの国家資格は厚生労働大臣の名義で資格証が発行されるのではないだろうか。高市早苗首相の肝いりで創設される経緯を考えれば、社会福祉士や介護福祉士といった他の国家資格と同等の扱いになることも十分に考えられる。\nその場合、ケアマネジャーの資格の扱いが今のままではよくない。ケアマネジャーは必死に頑張って高齢者の生活を支えている。地域にとって欠かせない存在であることは、今や多くの国民が知るところになった。\n政府はケアマネジャーを応援すべきで、そのモチベーションを下げるような制度の構造を作ってはいけない。厚生労働大臣の名義で資格証を発行し、更新研修は廃止する。それがケアマネジャーを国家資格にするということではないだろうか。", "summary": "【結城康博】ケアマネは本当に国家資格か？。つまり、医療系・福祉系の国家資格の大半は、厚生労働大臣の名義で資格証が発行されているのだ。厚生労働大臣の名義で資格証を発行し、更新研修は廃止する。それがケアマネジャーを国家資格にするということではないだろうか。", "categories": ["人材育成・HR", "福祉・社会保障"], "is_new": false}, {"title": "障害者雇用代行ビジネスで団体ヒアリング　指針策定に賛否〈厚労省〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45469", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-08 14:00", "description": "厚生労働省の労働政策審議会障害者雇用分科会（座長＝山川隆一明治大教授）が５月２７日に開かれ、障害者雇用の質や障害者雇用ビジネス（利用企業に農園などを貸し、働く障害者も紹介して雇用を事実上代行する）などについて団体ヒアリングを行った。 ２月に策定された厚労省研究会の報告書で、雇用ビジネスの指針を創設する論点が示されたことに対し、雇用ビジネスの業界団体である日本障害者雇用促進事業者協会は賛同。労務管理などの責任は利用企業にあることを前提に、協働関係を整理することが重要だとした。また、企業には利益を生みづらい業務もあるため、障害者の業務内容は利益創出や黒字化を絶対条件としないよう要望した。利用企業に報告義務を課すことに対しては慎重に検討すべきだとした。 障害者就業・生活支援センターなどでつくる全国就業支援ネットワークは、指針を創設する必要性は低いと主張。障害者雇用の質の指針を確固たるものとして整備すべきであり、それにより不適切なサービスはおのずと淘汰とうたされると指摘した。 報告書は、障害者手帳を持たない難病患者について就労困難性（職業生活への制限の程度）を個別判定する基準を作り、実雇用率に", "content": "障害者雇用代行ビジネスで団体ヒアリング 指針策定に賛否〈厚労省〉\n2026年06月08日 福祉新聞編集部厚生労働省の労働政策審議会障害者雇用分科会（座長＝山川隆一明治大教授）が５月２７日に開かれ、障害者雇用の質や障害者雇用ビジネス（利用企業に農園などを貸し、働く障害者も紹介して雇用を事実上代行する）などについて団体ヒアリングを行った。\n２月に策定された厚労省研究会の報告書で、雇用ビジネスの指針を創設する論点が示されたことに対し、雇用ビジネスの業界団体である日本障害者雇用促進事業者協会は賛同。労務管理などの責任は利用企業にあることを前提に、協働関係を整理することが重要だとした。また、企業には利益を生みづらい業務もあるため、障害者の業務内容は利益創出や黒字化を絶対条件としないよう要望した。利用企業に報告義務を課すことに対しては慎重に検討すべきだとした。\n障害者就業・生活支援センターなどでつくる全国就業支援ネットワークは、指針を創設する必要性は低いと主張。障害者雇用の質の指針を確固たるものとして整備すべきであり、それにより不適切なサービスはおのずと淘汰とうたされると指摘した。\n報告書は、障害者手帳を持たない難病患者について就労困難性（職業生活への制限の程度）を個別判定する基準を作り、実雇用率に算定できるようにする論点も示しており、日本難病・疾病団体協議会は支持し、就労困難性認定の参考事例としてドイツの仕組みを紹介した。\n分科会は次回以降、報告書に挙げられた各論点について議論を深めていく。", "summary": "障害者雇用代行ビジネスで団体ヒアリング 指針策定に賛否〈厚労省〉\n2026年06月08日 福祉新聞編集部厚生労働省の労働政策審議会障害者雇用分科会（座長＝山川 64", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-07 14:00", "description": "２０２１年６月に議員立法で成立した医療的ケア児支援法の改正を議論している超党派医療的ケア児者支援議員連盟（野田聖子会長）が５月２７日、衆議院第１議員会館で開かれた。関係団体などが２７年度障害報酬改定についてヒアリングを受け、親の支援を前提とせず、本人が尊厳を持って地域で暮らせるようサービスの拡充などを訴えた。 医療的ケア児から成人した人や、小児期に疾患があって成人してから医療的ケア者になった人らを対象にした２５年度厚生労働科学研究の調査では、意思疎通が難しい人が多く、自宅で親が全介助し、小児期は学校と放課後等デイサービスに通えていた人もいた。親のレスパイト（休息）のため短期入所が必要だが、利用率は低かった。いまだに小児科受診が多く、災害時避難行動要支援者の登録率は低かった。 研究代表者の是松聖悟埼玉医科大総合医療センター教授は調査結果を踏まえ、グループホームや生活介護などに医療的ケア児者管理加算を設けて２４時間のケアや見守りのための職員を雇用できるようにすることを要望。介護保険の看護小規模多機能型居宅介護や老人保健施設などの短期入所を障害児者も利用できる共生型にすることなども求めた。 ", "content": "親ありきでない支援を 医療的ケア児者議連に関係団体が要望\n2026年06月07日 福祉新聞編集部２０２１年６月に議員立法で成立した医療的ケア児支援法の改正を議論している超党派医療的ケア児者支援議員連盟（野田聖子会長）が５月２７日、衆議院第１議員会館で開かれた。関係団体などが２７年度障害報酬改定についてヒアリングを受け、親の支援を前提とせず、本人が尊厳を持って地域で暮らせるようサービスの拡充などを訴えた。\n医療的ケア児から成人した人や、小児期に疾患があって成人してから医療的ケア者になった人らを対象にした２５年度厚生労働科学研究の調査では、意思疎通が難しい人が多く、自宅で親が全介助し、小児期は学校と放課後等デイサービスに通えていた人もいた。親のレスパイト（休息）のため短期入所が必要だが、利用率は低かった。いまだに小児科受診が多く、災害時避難行動要支援者の登録率は低かった。\n研究代表者の是松聖悟埼玉医科大総合医療センター教授は調査結果を踏まえ、グループホームや生活介護などに医療的ケア児者管理加算を設けて２４時間のケアや見守りのための職員を雇用できるようにすることを要望。介護保険の看護小規模多機能型居宅介護や老人保健施設などの短期入所を障害児者も利用できる共生型にすることなども求めた。\n全国医療的ケアラインは、常態化している親の付き添いを減らすため学校や施設における人員配置基準の強化や、支援の地域差解消のため国の財政措置などを訴えた。\n全国医療的ケア児者支援協議会は、放デイと生活介護の報酬差解消や、動ける医療的ケア児の受け入れ拡充などを要望。短期入所に医療的ケア児者専用の類型を創設する提言もあった。\n議連には厚労省も出席しており、「改正法の動きも踏まえ、報酬改定をしっかりやっていく必要がある」と応じた。", "summary": "親ありきでない支援を 医療的ケア児者議連に関係団体が要望\n2026年06月07日 福祉新聞編集部２０２１年６月に議員立法で成立した医療的ケア児支援法の改正を議論している超党派医療的ケア児者支援議員連盟（野田聖子会長）が５月２７日、衆議院第１議員会館で開かれた。医療的ケア児から成人した人や、小児期に疾患があって成人してから医療的ケア者になった人らを対象にした２５年度厚生労働科学研究の調査では、意思疎通が難しい人が多く、自宅で親が全介助し、小児期は学校と放課後等デイサービスに通えていた人もいた。全国医療的ケア児者支援協議会は、放デイと生活介護の報酬差解消や、動ける医療的ケア児の受け入れ拡充などを要望。短期入所に医療的ケア児者専用の類型を創設する提言もあった。", "categories": ["医療・健康", "福祉・社会保障"], "is_new": false}, {"title": "「OTC類似薬」に追加負担　改正健康保険法が成立　 - 福祉新聞Web", "url": "https://fukushishimbun.com/seiji/45462", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会
