Each May during the American Speech-Language-Hearing Association’s National Speech-Language-Hearing Month, healthcare providers across the country have an opportunity to recognize the life-changing impact of speech-language pathology services. Speech-language pathologists help interdisciplinary teams navigate that complexity. The role of speech-language pathologists in post-acute care continues to evolve alongside healthcare itself. However, ultimately, speech-language pathology is about far more than words.", "categories": ["医療・健康", "施設運営・経営"], "title_ja": "言葉以上のもの: 急性期後のケアにおける熟練した言語病理学", "summary_ja": "毎年 5 月の米国言語聴覚協会の全国言語聴覚月間では、全米の医療提供者が言語聴覚士サービスの生活を変える影響を認識する機会があります。言語聴覚士は、学際的なチームがその複雑さを乗り越えるのを支援します。急性期後のケアにおける言語聴覚士の役割は、医療そのものとともに進化し続けています。しかし、最終的には、言語の病理学は言葉以上のものを意味します。"}, {"title": "介護保険法の改正案は「社会保険の原則破壊」　国会で異論　「介護職を大切にしていない」との批判も", "url": "https://www.joint-kaigo.com/articles/46153/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-21 16:50", "description": "衆議院・厚生労働委員会で20日、審議中の介護保険法などの改正案をめぐって参考人質疑が行われた。【Joint編集部】 この中で、意見陳述に立ったNPO法人「暮らしネット・えん」代表理事の小島美里氏は、中山間・人口減少地域を […]", "content": "2026年5月21日\n介護保険法の改正案は「社会保険の原則破壊」 国会で異論 「介護職を大切にしていない」との批判も\n衆議院・厚生労働委員会で20日、審議中の介護保険法などの改正案をめぐって参考人質疑が行われた。【Joint編集部】\nこの中で、意見陳述に立ったNPO法人「暮らしネット・えん」代表理事の小島美里氏は、中山間・人口減少地域を対象とした介護サービスのルール緩和に言及。「社会保険の原則を破壊する」などと強い懸念を示した。\n政府は今国会へ提出した改正案に、介護ニーズの縮小や人手不足が顕著な中山間・人口減少地域を対象とする措置として、事業所の人員配置基準の柔軟化や包括評価（定額報酬）の導入を認める「特定地域サービス」の新設を盛り込んでいる。また、市町村が介護サービスを給付ではなく事業として実施できる新たな仕組み（特定地域居宅サービス等事業）の創設も打ち出している。\nこれに対し小島氏は、人員配置基準の柔軟化がもたらす弊害として「労働環境のさらなる悪化を招く」と指摘。包括評価の導入についても、訪問介護などのサービスの質を低下させる危険性をはらんでいると警鐘を鳴らした。\nまた、特定地域居宅サービス等事業の創設については、「介護保険の給付の原則を外す改正。社会保険の原則を破壊する」と批判。「暮らしている地域によって受けるサービスが違ってくるというのは、全国標準の保険としてあり得ない。あってはならない」と再考を求めた。\n小島氏はこのほか、訪問介護のホームヘルパーをはじめ介護人材の不足が深刻化の一途をたどっていることにも言及。「何が原因だったのかよく考えていただきたい。制度として介護職員を大切にしてこなかったのではないか」と述べ、政府に介護政策の転換を強く訴えた。", "summary": "また、市町村が介護サービスを給付ではなく事業として実施できる新たな仕組み（特定地域居宅サービス等事業）の創設も打ち出している。また、特定地域居宅サービス等事業の創設については、「介護保険の給付の原則を外す改正。社会保険の原則を破壊する」と批判。「暮らしている地域によって受けるサービスが違ってくるというのは、全国標準の保険としてあり得ない。", "categories": ["介護保険・制度", "人材育成・HR"]}, {"title": "北九州市社協が日本郵便と終活協定　連携し適切な支援につなぐ - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45343", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-21 14:00", "description": "高齢化の進展に伴い終活の相談ニーズが高まる中、北九州市社会福祉協議会（小林一彦会長）と日本郵便は４月２０日、終活に関する連携協定を締結した。日本郵便が社協とこうした連携協定を結ぶのは初めてだという。 同市社協は２０２５年１１月に「終活あんしんセンター」を開設。葬儀や納骨、遺言、財産の処分など終活に関するさまざまな相談を受け付け、内容に応じて市社協が信頼性を確認した民間事業者を紹介する流れだ。 日本郵便では「郵便局の終活日和」を２４年２月からスタート。専用のコールセンター「生活相談ダイヤル」で終活に関する相談を無料で受け付け、ニーズや希望に応じて提携する終活関連企業を紹介している。 市社協によると、市内で終活支援をする民間事業者が増える一方、安心して相談、利用できる事業者の選択で迷う市民も少なくないという。地域に身近な郵便局と専門相談機関である市社協が連携することで、市民が迷うことなく適切な支援につながれる体制の構築を目指す。 この日、協定締結式があり、小林会長と、吉満健二北九州中央郵便局長、大庭浩若松桜町郵便局長が出席した。 協定に基づき、市社協の終活あんしんセンターに相談に訪れた高齢", "content": "北九州市社協が日本郵便と終活協定 連携し適切な支援につなぐ\n2026年05月21日 福祉新聞編集部高齢化の進展に伴い終活の相談ニーズが高まる中、北九州市社会福祉協議会（小林一彦会長）と日本郵便は４月２０日、終活に関する連携協定を締結した。日本郵便が社協とこうした連携協定を結ぶのは初めてだという。\n同市社協は２０２５年１１月に「終活あんしんセンター」を開設。葬儀や納骨、遺言、財産の処分など終活に関するさまざまな相談を受け付け、内容に応じて市社協が信頼性を確認した民間事業者を紹介する流れだ。\n日本郵便では「郵便局の終活日和」を２４年２月からスタート。専用のコールセンター「生活相談ダイヤル」で終活に関する相談を無料で受け付け、ニーズや希望に応じて提携する終活関連企業を紹介している。\n市社協によると、市内で終活支援をする民間事業者が増える一方、安心して相談、利用できる事業者の選択で迷う市民も少なくないという。地域に身近な郵便局と専門相談機関である市社協が連携することで、市民が迷うことなく適切な支援につながれる体制の構築を目指す。\nこの日、協定締結式があり、小林会長と、吉満健二北九州中央郵便局長、大庭浩若松桜町郵便局長が出席した。\n協定に基づき、市社協の終活あんしんセンターに相談に訪れた高齢者らに対し、内容や本人の希望に応じて日本郵便の終活日和を紹介する。両者の強みを生かし、高齢者と家族の不安軽減に向けた支援も実施していきたいとしている。", "summary": "北九州市社協が日本郵便と終活協定 連携し適切な支援につなぐ\n2026年05月21日 福祉新聞編集部高齢化の進展に伴い終活の相談ニーズが高まる中、北九州市社会福祉協議会（小林一彦会長）と日本郵便は４月２０日、終活に関する連携協定を締結した。日本郵便では「郵便局の終活日和」を２４年２月からスタート。専用のコールセンター「生活相談ダイヤル」で終活に関する相談を無料で受け付け、ニーズや希望に応じて提携する終活関連企業を紹介している。協定に基づき、市社協の終活あんしんセンターに相談に訪れた高齢者らに対し、内容や本人の希望に応じて日本郵便の終活日和を紹介する。", "categories": ["福祉・社会保障"]}, {"title": "介護付きホームの代表を審議会委員に　国会議員らが上野厚労相へ要請", "url": "https://www.joint-kaigo.com/articles/46142/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-21 13:30", "description": "国会議員でつくる「終の棲家『介護付きホーム』を考える議員懇話会」（会長・平将明衆院議員）は19日、上野賢一郎厚生労働相と面会した。【Joint編集部】 介護保険の制度改正や報酬改定を議論する国の審議会の委員に、全国介護付 […]", "content": "2026年5月21日\n介護付きホームの代表を審議会委員に 国会議員らが上野厚労相へ要請\n国会議員でつくる「終の棲家『介護付きホーム』を考える議員懇話会」（会長・平将明衆院議員）は19日、上野賢一郎厚生労働相と面会した。【Joint編集部】\n介護保険の制度改正や報酬改定を議論する国の審議会の委員に、全国介護付きホーム協会（介ホ協）の代表者を選任するよう求める要請書を提出した。\n要請書では、現在の審議会の委員構成に介護付きホームの団体の代表者が含まれていないと指摘。有料老人ホームの利用者が約61万人に達していることなどを念頭に、「多様化する高齢者の住まいに関する政策議論に不可欠な存在」と強調した。\nまた、介ホ協の会員企業が介護現場でのテクノロジーの活用を積極的に進め、国の実証事業にもエビデンスを提供してきた実績を紹介。「深刻な人材不足の中で持続可能な介護保険制度を構築するためには、民間の創意工夫による新たな取り組みが必要。介ホ協の参画により、審議の質を一層高めてほしい」と訴えた。", "summary": "2026年5月21日\n介護付きホームの代表を審議会委員に 国会議員らが上野厚労相へ要請\n国会議員でつくる「終の棲家『介護付きホーム』を考える議員懇話会」（会長・平将明衆院議員）は19日、上野賢一郎厚生労働相と面会した。【Joint編集部】\n介護保険の制度改正や報酬改定を議論する国の審議会の委員に、全国介護付きホーム協会（介ホ協）の代表者を選任するよう求める要請書を提出した。要請書では、現在の審議会の委員構成に介護付きホームの団体の代表者が含まれていないと指摘。介ホ協の参画により、審議の質を一層高めてほしい」と訴えた。", "categories": ["介護保険・制度", "施設運営・経営"]}, {"title": "赤い羽根共同募金が創立80周年に　記念のロゴを発表 - 福祉新聞Web", "url": "https://fukushishimbun.com/fukushiippan/45340", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-21 10:00", "description": "社会福祉法人中央共同募金会（村木厚子会長）は２０２７年度に赤い羽根共同募金が８０周年を迎えるにあたり、記念ロゴを作成した。ふっくらとした柔らかなフォルムで温かさと親しみやすさを表現。赤い羽根共同募金の広報ポスターやＳＮＳなどで使用し、８０周年の歴史を知って関心を高めてもらう。 赤い羽根共同募金運動は１９４７年に「国民たすけあい運動」として始まった。２０２４年度は１６５億２１８９万円（前年度比２・８％増）の募金が集まり、全国４万４３２６件の地域福祉活動に助成した。これまで７８年間の募金実績総額は１兆１０００億円を超える。 福祉新聞Web", "content": "赤い羽根共同募金が創立80周年に 記念のロゴを発表\n2026年05月21日 福祉新聞編集部社会福祉法人中央共同募金会（村木厚子会長）は２０２７年度に赤い羽根共同募金が８０周年を迎えるにあたり、記念ロゴを作成した。ふっくらとした柔らかなフォルムで温かさと親しみやすさを表現。赤い羽根共同募金の広報ポスターやＳＮＳなどで使用し、８０周年の歴史を知って関心を高めてもらう。\n赤い羽根共同募金運動は１９４７年に「国民たすけあい運動」として始まった。２０２４年度は１６５億２１８９万円（前年度比２・８％増）の募金が集まり、全国４万４３２６件の地域福祉活動に助成した。これまで７８年間の募金実績総額は１兆１０００億円を超える。", "summary": "赤い羽根共同募金が創立80周年に 記念のロゴを発表\n2026年05月21日 福祉新聞編集部社会福祉法人中央共同募金会（村木厚子会長）は２０２７年度に赤い羽根共同募金が８０周年を迎えるにあたり、記念ロゴを作成した。赤い羽根共同募金の広報ポスターやＳＮＳなどで使用し、８０周年の歴史を知って関心を高めてもらう。赤い羽根共同募金運動は１９４７年に「国民たすけあい運動」として始まった。これまで７８年間の募金実績総額は１兆１０００億円を超える。", "categories": ["福祉・社会保障"]}, {"title": "2040年問題「全国一律ではない」　野口介護保険部会長、地域ごとのサービス基盤整備を促す", "url": "https://www.joint-kaigo.com/articles/46131/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-20 19:35", "description": "衆議院の厚生労働委員会で20日、審議中の介護保険法などの改正案をめぐって参考人質疑が行われた。【Joint編集部】 この中で、これまで制度改正に向けた議論を重ねてきた社会保障審議会・介護保険部会の部会長を務める野口晴子氏 […]", "content": "2026年5月20日\n2040年問題「全国一律ではない」 野口介護保険部会長、地域ごとのサービス基盤整備を促す\n衆議院の厚生労働委員会で20日、審議中の介護保険法などの改正案をめぐって参考人質疑が行われた。【Joint編集部】\nこの中で、これまで制度改正に向けた議論を重ねてきた社会保障審議会・介護保険部会の部会長を務める野口晴子氏（早稲田大学政治経済学術院教授）が意見陳述に立ち、いわゆる「2040年問題」について「全国一律ではない」と指摘。横並びの制度設計や事業運営からの脱却を促した。\n野口氏は、介護需要が既に減少局面に入った町村部が少なからずある半面、3大都市圏ではそれが2035年以降に順次ピーク期を迎えていくなど、状況が地域間で大きく異なる実情を説明。従来の画一的なアプローチは限界に達しているとして、自らの地域が今どのフェーズにあるかを的確に把握することが第一歩になると呼びかけた。\n政府は今国会へ提出した介護保険法などの改正案に、中山間・人口減少地域の事業所をより柔軟に運用できるようにする新たな仕組みの創設を盛り込んでいる。野口氏はこうした法改正の方向性を支持しつつ、「今後は全国一律ではなく、地域ごとの人口構造やサービス需要の変化を踏まえた対応がこれまで以上に必要になる」と強調した。\nこのほか、深刻な人材不足などで事業所単独での安定的な運営は一段と厳しくなると予測。「地域によっては事業所間の連携・協働、バックオフィスの共同化などを進めながら、ある程度規模の経済を生かしていくということも重要」と説いた。", "summary": "2026年5月20日\n2040年問題「全国一律ではない」 野口介護保険部会長、地域ごとのサービス基盤整備を促す\n衆議院の厚生労働委員会で20日、審議中の介護保険法などの改正案をめぐって参考人質疑が行われた。横並びの制度設計や事業運営からの脱却を促した。政府は今国会へ提出した介護保険法などの改正案に、中山間・人口減少地域の事業所をより柔軟に運用できるようにする新たな仕組みの創設を盛り込んでいる。野口氏はこうした法改正の方向性を支持しつつ、「今後は全国一律ではなく、地域ごとの人口構造やサービス需要の変化を踏まえた対応がこれまで以上に必要になる」と強調した。", "categories": ["介護保険・制度", "施設運営・経営"]}, {"title": "厚労省、「リハビリ統括調整室」を新設　法施行から約60年　制度見直し視野", "url": "https://www.joint-kaigo.com/articles/46125/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-20 18:47", "description": "厚生労働省は19日、省内の関係部局を横断してリハビリテーション政策を推進する「リハビリテーション統括調整室」を同日付で設置した。【Joint編集部】 上野賢一郎厚労相が閣議後の記者会見で明らかにした。 近年、理学療法士や […]", "content": "厚生労働省は19日、省内の関係部局を横断してリハビリテーション政策を推進する「リハビリテーション統括調整室」を同日付で設置した。【Joint編集部】\n上野賢一郎厚労相が閣議後の記者会見で明らかにした。\n近年、理学療法士や作業療法士といった専門職が活躍するフィールドは医療、介護、予防、健康増進など幅広くなっている。上野厚労相は会見で「今後、攻めの予防医療の具体化に取り組んでいく中で、リハビリテーション専門職の果たす役割は大きい」と述べた。\nまた、「理学療法士及び作業療法士法」の施行から約60年が経過していることにも言及。この間に生じた役割の変化なども踏まえ、制度の見直しが考えられるかどうかの検討を進めていく方針を示した。\n新たな「リハビリテーション統括調整室」は、各分野の縦割りを排し、国民の健康増進に寄与するリハビリテーションを国家戦略として底上げする役割を担う。室長には江浪武志大臣官房審議官が就き、医政局や老健局、保険局の課長らが次長を固める陣容となった。介護予防などを担当する職員らも加わり、総勢17名の体制でスタートを切った。", "summary": "厚生労働省は19日、省内の関係部局を横断してリハビリテーション政策を推進する「リハビリテーション統括調整室」を同日付で設置した。近年、理学療法士や作業療法士といった専門職が活躍するフィールドは医療、介護、予防、健康増進など幅広くなっている。上野厚労相は会見で「今後、攻めの予防医療の具体化に取り組んでいく中で、リハビリテーション専門職の果たす役割は大きい」と述べた。新たな「リハビリテーション統括調整室」は、各分野の縦割りを排し、国民の健康増進に寄与するリハビリテーションを国家戦略として底上げする役割を担う。", "categories": ["医療・健康", "介護保険・制度"]}, {"title": "拡大読書器の補助増額は90市町村　価格上昇で負担重く〈日視連調査〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45337", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-20 14:00", "description": "視覚障害者が本や書類を読むときなどに使う拡大読書器について、日本視覚障害者団体連合（日視連）は、市町村による購入費の給付基準額（補助上限額）を調べた結果をウェブサイトで公表している。物価高などの影響で拡大読書器の価格が値上がりしているが、３月時点で従来の補助上限額１９万８０００円から増額していたのは８９市町村だった。 拡大読書器はすべて海外製。据え置き型と携帯型があり、読み上げ機能付きもある。障害者総合支援法（２０１３年４月施行）で暮らしに必要な機器と位置付けられ、日常生活用具給付として身体障害者手帳保持者に原則価格の１割を自己負担とした上で、市町村それぞれが上限額を定めて補助している。 補助上限額は約３０年前から１９万８０００円が標準とされてきた。ただ、拡大読書器の価格が上昇し、据え置き型では３０万円近い機器もある。購入者は１割負担に加え、補助上限を超えた額を負担しなければならず、負担が重くて購入を諦める人もいる。 日視連の調査では、補助上限額が高額なのは神奈川県大和市、名古屋市の２６万９０００円。次いで北海道音更町、東京都東久留米市、石川県中能登町、大阪市の２６万８０００円。東京都", "content": "拡大読書器の補助増額は90市町村 価格上昇で負担重く〈日視連調査〉\n2026年05月20日 福祉新聞編集部視覚障害者が本や書類を読むときなどに使う拡大読書器について、日本視覚障害者団体連合（日視連）は、市町村による購入費の給付基準額（補助上限額）を調べた結果をウェブサイトで公表している。物価高などの影響で拡大読書器の価格が値上がりしているが、３月時点で従来の補助上限額１９万８０００円から増額していたのは８９市町村だった。\n拡大読書器はすべて海外製。据え置き型と携帯型があり、読み上げ機能付きもある。障害者総合支援法（２０１３年４月施行）で暮らしに必要な機器と位置付けられ、日常生活用具給付として身体障害者手帳保持者に原則価格の１割を自己負担とした上で、市町村それぞれが上限額を定めて補助している。\n補助上限額は約３０年前から１９万８０００円が標準とされてきた。ただ、拡大読書器の価格が上昇し、据え置き型では３０万円近い機器もある。購入者は１割負担に加え、補助上限を超えた額を負担しなければならず、負担が重くて購入を諦める人もいる。\n日視連の調査では、補助上限額が高額なのは神奈川県大和市、名古屋市の２６万９０００円。次いで北海道音更町、東京都東久留米市、石川県中能登町、大阪市の２６万８０００円。東京都八王子市は身体障害者手帳１、２級が４０万円だが、３～６級は１９万８０００円。\n日常生活用具給付は市町村が実施しており、各地で日視連の加盟団体などが補助上限額の増額を働き掛ける必要がある。日視連は「今回、当事者団体が調査したことで自治体に気付きを与えることができ、交渉の余地ができた」と捉え、調査結果を市町村との交渉に活用してほしいとしている。\n点字図書館で展示・販売\n東京・高田馬場にある日本点字図書館では約２０種類の拡大読書器を展示、販売している。高齢者の利用が多く、携帯型を中心に月約３０程度の購入がある。\nこの日、来館した視覚障害のある６０代女性は、読み上げ機器を見にきたついでに拡大読書器も試用した。「勉強になった。実際に見てみると違う。書類整理や読書のため拡大読書器の購入を検討したい」と話した。", "summary": "物価高などの影響で拡大読書器の価格が値上がりしているが、３月時点で従来の補助上限額１９万８０００円から増額していたのは８９市町村だった。補助上限額は約３０年前から１９万８０００円が標準とされてきた。ただ、拡大読書器の価格が上昇し、据え置き型では３０万円近い機器もある。書類整理や読書のため拡大読書器の購入を検討したい」と話した。", "categories": ["福祉・社会保障", "介護保険・制度"]}, {"title": "医療的ケア児・者の災害支援　電源整備で避難場所確保〈大阪・みなと寮〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/bosai/45334", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-20 10:00", "description": "社会福祉法人みなと寮（大西豊美理事長）が運営する大阪府河内長野市の救護施設みなと寮は大阪府富田林保健所と、災害時に医療的ケアが必要な人を施設に受け入れて支援する協定を結んだ。みなと寮は自家発電だけでなく、ポータブル電源を新たに確保して万一に備えている。協定締結は、みなと寮を含めて３社会福祉法人１０施設と、１企業１施設に広がっている。 富田林保健所の管轄は富田林、河内長野、大阪狭山市、太子、河南町、千早赤阪村の３市２町１村。総人口は約２８万６０００人で、在宅の医ケア児・者は約３０人。３分の２が１８歳未満のこどもだ。 地震や豪雨などの災害で停電すると、人工呼吸器などは動かなくなる。常時、医療的ケアが必要な人は、いったん自宅を離れて、停電になっていない地域への移動か、非常電源のある施設への移動が不可欠となる。 大規模災害の場合は、広域停電になる可能性があり、非常電源を完備している福祉施設は避難先として期待されている。 家族、介助者の付き添い前提 今回の災害時支援協定では、医療的ケアが必要な人を「患者」と表記して、患者の療養に対する施設側の協力範囲について、次のように定めた。 （１）避難場所の", "content": "医療的ケア児・者の災害支援 電源整備で避難場所確保〈大阪・みなと寮〉\n2026年05月20日 福祉新聞編集部社会福祉法人みなと寮（大西豊美理事長）が運営する大阪府河内長野市の救護施設みなと寮は大阪府富田林保健所と、災害時に医療的ケアが必要な人を施設に受け入れて支援する協定を結んだ。みなと寮は自家発電だけでなく、ポータブル電源を新たに確保して万一に備えている。協定締結は、みなと寮を含めて３社会福祉法人１０施設と、１企業１施設に広がっている。\n富田林保健所の管轄は富田林、河内長野、大阪狭山市、太子、河南町、千早赤阪村の３市２町１村。総人口は約２８万６０００人で、在宅の医ケア児・者は約３０人。３分の２が１８歳未満のこどもだ。\n地震や豪雨などの災害で停電すると、人工呼吸器などは動かなくなる。常時、医療的ケアが必要な人は、いったん自宅を離れて、停電になっていない地域への移動か、非常電源のある施設への移動が不可欠となる。\n大規模災害の場合は、広域停電になる可能性があり、非常電源を完備している福祉施設は避難先として期待されている。\n家族、介助者の付き添い前提\n今回の災害時支援協定では、医療的ケアが必要な人を「患者」と表記して、患者の療養に対する施設側の協力範囲について、次のように定めた。\n（１）避難場所の確保および避難の際に必要な医療機器等の電源等の確保（２）人工呼吸器等、医療機器の電源（コンセント）提供（３）施設避難のための福祉車両を活用した移送支援（４）施設避難のため移送時や避難生活に対する人的支援。\nまた、協定書とは別に、災害時支援に関する細目を定めた運用要領を策定。その中で、災害で避難したときの患者への必要なケアは「その家族らが行う」と明記した。痰たんの吸引などの呼吸管理、胃ろうなどによる栄養管理、排せつ管理などは、常時、ケアしている家族や介助者が行うのが最も安全として、家族・介助者の付き添い支援を前提としたのだ。\nさらに、避難が長期化した場合には、患者が日ごろから受けている医療系、福祉系サービスの担当者や、避難生活において必要な支援者の施設への受け入れを許可する、と定めた。\n専用のポータブル電源\nみなと寮では、施設の会議室を避難場所に充てて、簡易の間仕切りでベッド２～３床分を確保することを決めた。\nまた、患者の命にかかわる電源確保については、施設の自家発電の活用で対応するが、自家発電の電源が喪失する事態も考えられるので、患者専用のポータブル電源を新たに確保した。\n３月１３日にみなと寮で行われた締結式には、大阪府の広報担当副知事「もずやん」も登場。近くの障害児施設のこどもたちが見守る中で、大西理事長と富田林保健所地域保健課長の山内一寛さんが協定書を交わした。\n協定の輪、全国に広げたい\n山内さんは前任地の大阪府茨木保健所時代も、２０２２年ごろから、高齢者施設や企業と協定を結んできた。\n「難病担当の保健師と『充電する場所がいるよね』と話し合って、支援を始めました。あまり例はないですが、しっかり連携しようと、協定締結の形を取りました」と山内さん。\n全国救護施設協議会の会長を務める大西理事長は、「地震や豪雨など、異常気象で自然災害が増えている。山火事なども頻繁に起きている。避難先と電源の確保は、医ケア児・者の皆さんにとって命綱です。協定の輪を全国に広げていきたい」と話した。", "summary": "医療的ケア児・者の災害支援 電源整備で避難場所確保〈大阪・みなと寮〉\n2026年05月20日 福祉新聞編集部社会福祉法人みなと寮（大西豊美理事長）が運営する大阪府河内長野市の救護施設みなと寮は大阪府富田林保健所と、災害時に医療的ケアが必要な人を施設に受け入れて支援する協定を結んだ。みなと寮は自家発電だけでなく、ポータブル電源を新たに確保して万一に備えている。協定締結は、みなと寮を含めて３社会福祉法人１０施設と、１企業１施設に広がっている。避難先と電源の確保は、医ケア児・者の皆さんにとって命綱です。", "categories": ["福祉・社会保障", "施設運営・経営"]}, {"title": "カスハラ対策、10月から義務化へ、無料オンライン研修に厚労省担当者が登壇＝介ホ協", "url": "https://www.joint-kaigo.com/articles/46118/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-19 17:39", "description": "今年10月1日の改正労働施策総合推進法の施行に伴い、事業主に対するカスタマーハラスメントの防止措置がいよいよ義務付けられる。【Joint編集部】 これを受けて、全国介護付きホーム協会は6月11日に、経営者や管理者らを対象 […]", "content": "2026年5月19日\nカスハラ対策、10月から義務化へ、無料オンライン研修に厚労省担当者が登壇＝介ホ協\n今年10月1日の改正労働施策総合推進法の施行に伴い、事業主に対するカスタマーハラスメントの防止措置がいよいよ義務付けられる。【Joint編集部】\nこれを受けて、全国介護付きホーム協会は6月11日に、経営者や管理者らを対象とする「カスハラ対策義務化対応研修」をオンラインで開催する。\n制度を所管する厚生労働省の担当者を直接講師に招く。登壇するのは、雇用環境・均等局ハラスメント防止対策室の澤渡恭子室長補佐。法改正の背景や経緯にとどまらず、企業が具体的に講じるべき措置まで詳細な解説を聞くことができる。介護付きホームの事業者や管理者らが必ず押さえておくべき内容だ。\n時間は14時から15時まで。定員は100名で、参加費は無料。受講希望者は介ホ協の公式サイトから申し込む。締め切りは6月8日の17時まで。\n介ホ協はこのほか、今回の経営者や管理者らを対象とする研修だけでなく、現場で働く職員、リーダーらに向けたカスハラ対策研修も別途予定している。7月28日に「オンライン実践編」、8月25日に「ロールプレイ編」を開催する予定で、詳細は公式サイトで後日アナウンスされる。", "summary": "2026年5月19日\nカスハラ対策、10月から義務化へ、無料オンライン研修に厚労省担当者が登壇＝介ホ協\n今年10月1日の改正労働施策総合推進法の施行に伴い、事業主に対するカスタマーハラスメントの防止措置がいよいよ義務付けられる。【Joint編集部】\nこれを受けて、全国介護付きホーム協会は6月11日に、経営者や管理者らを対象とする「カスハラ対策義務化対応研修」をオンラインで開催する。締め切りは6月8日の17時まで。7月28日に「オンライン実践編」、8月25日に「ロールプレイ編」を開催する予定で、詳細は公式サイトで後日アナウンスされる。", "categories": ["人材育成・HR", "施設運営・経営"]}, {"title": "公定価格の適性改定を　義肢装具議連が厚労・文科大臣に要望 - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45331", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-19 14:00", "description": "自民党の「義肢装具の未来を共に推進する議員連盟」が１１日、参院議員会館で開かれ、一般社団法人日本義肢協会など関係団体が補装具（義肢、装具、電動車いすなど）の公定価格に原材料費や人件費を適正に反映させること、賃上げを含めた義肢装具士の確保策や養成体制を強化することを要望した。 議連は現場が抱える課題を共有し、関係団体の要望の実現に尽力するよう、厚生労働、文部科学両大臣宛てに要望書を手渡した。同日、議連の会長に就任した橋本岳衆院議員は「意見を聞きながら今後も強力に進めていきたい」と述べた。 補装具の原材料価格はコロナ禍で上昇し、特に主原材料のアルミニウム合金は約２００％も急騰した。しかし、補装具は公定価格のため、補装具事業者は価格に転嫁できず、経営難に陥る事業者も少なくない。義肢装具士を含めた従事者の賃上げも難しく、人材が流出。人手不足で補装具の供給が滞ってしまう恐れもある。 厚労省の最新調査では補装具事業者の営業利益率は２・７％。全産業の５％と比べて低く、２６％の事業者が赤字。義肢装具士の月給は３８万２７００円で全産業より約７万円低い。直近３年間の賃上げ率は５・７％で最低賃金の９・８％を", "content": "公定価格の適性改定を 義肢装具議連が厚労・文科大臣に要望\n2026年05月19日 福祉新聞編集部自民党の「義肢装具の未来を共に推進する議員連盟」が１１日、参院議員会館で開かれ、一般社団法人日本義肢協会など関係団体が補装具（義肢、装具、電動車いすなど）の公定価格に原材料費や人件費を適正に反映させること、賃上げを含めた義肢装具士の確保策や養成体制を強化することを要望した。\n議連は現場が抱える課題を共有し、関係団体の要望の実現に尽力するよう、厚生労働、文部科学両大臣宛てに要望書を手渡した。同日、議連の会長に就任した橋本岳衆院議員は「意見を聞きながら今後も強力に進めていきたい」と述べた。\n補装具の原材料価格はコロナ禍で上昇し、特に主原材料のアルミニウム合金は約２００％も急騰した。しかし、補装具は公定価格のため、補装具事業者は価格に転嫁できず、経営難に陥る事業者も少なくない。義肢装具士を含めた従事者の賃上げも難しく、人材が流出。人手不足で補装具の供給が滞ってしまう恐れもある。\n厚労省の最新調査では補装具事業者の営業利益率は２・７％。全産業の５％と比べて低く、２６％の事業者が赤字。義肢装具士の月給は３８万２７００円で全産業より約７万円低い。直近３年間の賃上げ率は５・７％で最低賃金の９・８％を下回っている。\n義肢装具士養成校は全国に８校しかなく、定員割れも起きている。国家試験受験料は５万９８００円で医師の１万５３００円と比べても突出して高い。\n関係団体はこうした課題を挙げながら「経営努力も続けていくが、もはや限界だ」と解決を求めている。", "summary": "しかし、補装具は公定価格のため、補装具事業者は価格に転嫁できず、経営難に陥る事業者も少なくない。義肢装具士を含めた従事者の賃上げも難しく、人材が流出。義肢装具士の月給は３８万２７００円で全産業より約７万円低い。義肢装具士養成校は全国に８校しかなく、定員割れも起きている。", "categories": ["人材育成・HR", "施設運営・経営"]}, {"title": "【田中紘太】新たな登録施設介護支援、基本報酬どう設定？　個人宅を支える居宅ケアマネが不利にならない環境整備を", "url": "https://www.joint-kaigo.com/articles/46113/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-19 13:57", "description": "国会では現在、住宅型有料老人ホームの入居者に特化したケアマネジメントの新たなサービス類型「登録施設介護支援」の創設を盛り込んだ、介護保険法などの改正案が審議されています。【田中紘太】 「基本報酬は居宅介護支援と同等、おお […]", "content": "【田中紘太】新たな登録施設介護支援、基本報酬どう設定？ 個人宅を支える居宅ケアマネが不利にならない環境整備を\n国会では現在、住宅型有料老人ホームの入居者に特化したケアマネジメントの新たなサービス類型「登録施設介護支援」の創設を盛り込んだ、介護保険法などの改正案が審議されています。【田中紘太】\n「基本報酬は居宅介護支援と同等、おおむね据え置きになるのではないか」\n現場の関係者の間では、そんな楽観論もささやかれています。ただ私は、登録施設介護支援の基本報酬はこれまでより低く設定すべきと考えます。この判断こそが、居宅介護支援のケアマネジャーの健全性を守れるかどうかのポイントになると思うからです。これは、来年度の介護報酬改定をめぐる大きな焦点のひとつとなるでしょう。\n◆ 基本報酬の据え置きがもたらす歪み\nなぜ、登録施設介護支援の基本報酬は低く設定すべきなのでしょうか。地域の個人宅を一件一件まわる居宅介護支援とは、移動コストや業務負担が大きく異なるという紛れもない現実があるからです。\nもし、基本報酬が同じであればどうなるのか。「住宅型ホームの入居者を中心に担当している併設型の事業所の方が儲かる」という構造がより強固になり、事業者が一斉に登録施設介護支援へ流れてしまうでしょう。\n当然、こうした構造になれば多くの利用者を抱える住宅型ホームの力はさらに強まります。ケアマネジャーは経営面で都合の良いケアプランの作成を求められ、営業的にそれに応じる「囲い込み」がより横行する結果を招くでしょう。これでは、ケアマネジャーの健全性は根底から崩れ去ってしまいます。\n登録施設介護支援の報酬を低く設定すべきという主張は、財務省も4月末の審議会で展開しています。これは客観的なデータに基づくもので、現場の実態を正しく捉えた意見だと言えるでしょう。\n明確な根拠となるのは、昨年度の調査・研究事業（居宅介護支援事業所における介護支援専門員等の業務実態に関する調査研究事業）の報告書です。ケアマネジメントの利用者1人あたりの労働投入時間をみると、住宅型ホームは個人宅より月22.8%少ないと指摘されています。両者の違いは明白。これが揺るぎのないファクトです。\n◆ 求められる不条理の是正\nでは、登録施設介護支援の基本報酬はどう設定すればいいのでしょうか。私は既存の同一建物減算の強化でお茶を濁すのではなく、基本報酬そのものと特定事業所加算（＊）で居宅介護支援と明確な差をつけるべきと考えます。\n＊ 例えば登録施設介護支援では特定事業所加算を算定できないなど。\n例えば、訪問介護の同一建物減算のパーセンテージをひとつの参考値として、居宅介護支援より10%から15%ほど低い基本報酬とするのはどうでしょうか。\n患者の居住場所によって管理料が大きく変わる医療の診療報酬（在医総管・施設総管）を見習うべきです。個人宅などが高く設定される仕組みで、これが最も理にかなっていると考えます。\n新設する登録施設介護支援を、「誰もがやりたがる楽で儲かるサービス」にしてはいけません。その移動コストや業務負担を適切に反映しつつ、個人宅を支える居宅介護支援のケアマネジャーが不利にならない環境、住宅型ホームと対等に渡り合える環境の整備を目指すべきです。それこそが、今後のケアマネジメントの健全性を守る正しい制度ではないでしょうか。\n現在の介護報酬も既に、住宅型ホームに併設される事業所の方が経営的に有利となる仕組みになっています。要介護度の重い利用者が集まりやすいほか、相対的に業務負担が軽くケアマネジャーを確保しやすいという構造が、実際に多くの事業者やケアマネジャーの行動に影響を与えています。\nそのしわ寄せは、個人宅の高齢者とそれを支える居宅介護支援のケアマネジャーに来ています。登録施設介護支援の創設を契機に、こうした不条理はしっかりと是正すべきではないでしょうか。\n国には毅然とした対応をとっていただきたい。実現すべきなのは、居宅介護支援のケアマネジャーが住宅型ホームのビジネスモデルに飲み込まれることなく、専門職としての独立性や公正・中立さを保ち続けていけるようにすること。来年度の介護報酬改定を、こうした良い環境づくりに舵を切る転換点にしてほしいと願っています。", "summary": "【田中紘太】新たな登録施設介護支援、基本報酬どう設定？。ただ私は、登録施設介護支援の基本報酬はこれまでより低く設定すべきと考えます。◆ 基本報酬の据え置きがもたらす歪み\nなぜ、登録施設介護支援の基本報酬は低く設定すべきなのでしょうか。そのしわ寄せは、個人宅の高齢者とそれを支える居宅介護支援のケアマネジャーに来ています。", "categories": ["福祉・社会保障", "施設運営・経営"]}, {"title": "スポットワークのカイテクと介護福祉士会が連携協定　人材の確保や質の向上で協力", "url": "https://www.joint-kaigo.com/articles/46107/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-19 13:33", "description": "介護職などのスポットワークを仲介するカイテクと日本介護福祉士会は18日、介護人材の確保やサービスの質の向上などを目指す包括連携協定を締結したと発表した。【Joint編集部】 15日付で包括連携協定を結んだ。介護福祉士らの […]", "content": "2026年5月19日\nスポットワークのカイテクと介護福祉士会が連携協定 人材の確保や質の向上で協力\n介護職などのスポットワークを仲介するカイテクと日本介護福祉士会は18日、介護人材の確保やサービスの質の向上などを目指す包括連携協定を締結したと発表した。【Joint編集部】\n15日付で包括連携協定を結んだ。介護福祉士らの活躍促進やキャリア形成、学習機会の拡大などを図る構えだ。\n深刻化する人手不足や多様な働き方の浸透などが背景にある。介護現場でスポットワークの活用が広がるなか、専門職が長く安心して働ける環境の整備、継続的な自己研鑽の機会の提供などが急務となっている。\n今回の協定では、カイテクが強みとする潜在有資格者の復職の後押し、多様な働き方の創出などと、職能団体である日本介護福祉士会の資質向上・倫理醸成に関するノウハウをかけ合わせる。双方の知見を融合し、介護人材の確保やサービスの質の向上につなげる狙いがある。\n今後の取り組みには、カイテクの登録者に対する情報提供や周知・啓発活動なども含まれる。両者は定期的に協議の場を設け、より具体的な連携策を検討していくと説明している。", "summary": "2026年5月19日\nスポットワークのカイテクと介護福祉士会が連携協定 人材の確保や質の向上で協力\n介護職などのスポットワークを仲介するカイテクと日本介護福祉士会は18日、介護人材の確保やサービスの質の向上などを目指す包括連携協定を締結したと発表した。介護福祉士らの活躍促進やキャリア形成、学習機会の拡大などを図る構えだ。深刻化する人手不足や多様な働き方の浸透などが背景にある。双方の知見を融合し、介護人材の確保やサービスの質の向上につなげる狙いがある。", "categories": ["人材育成・HR", "福祉・社会保障"]}, {"title": "財務省、障害福祉の費用抑制求める　10年で約２倍に拡大〈財政審〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45329", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-19 10:00", "description": "４月２８日に開かれた財政制度等審議会財政制度分科会では、障害福祉分野についても議論が交わされた。財務省は、公費と利用者負担を合わせた障害福祉サービスの総費用額が２０２４年度時点で４兆２０００億円に達し、１０年で約２倍に拡大していることから、費用の伸び抑制が必要との認識を示した。 費用増加の要因には、利用者数の増加に加え、１人当たり費用の上昇、営利事業者の参入拡大などを挙げた。今後、配置基準の厳格化も含め、報酬体系の見直しを進めたい考えだ。 就労継続支援Ｂ型については、利用時間が４時間未満の事業所の収支差率が１７％と、全事業所平均を大きく上回っている点を問題視。現行報酬が過大になっているとして、サービスの質をきめ細かく評価する報酬体系へ
