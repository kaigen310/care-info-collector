model.\n- Chrome, Firefox and Safari are all now capable of running this kind of model—I tried it in all three.\n- The CacheStorage API works with ~1.3GB model files.\n- ... which means we can have inpainting as a feature of a client-only web application! (If our users can tolerate the 1.3GB download.)\nI felt like I should probably try and learn a little more about my project. I fired up Claude.ai and prompted:\nClone https://github.com/simonw/moebius-web/ and use it to teach me all about the model and ONNX and the process of converting a model to ONNX and WebGPU and basically everything I'd need to know in order to fully understand this repo\nHere’s the transcript and the understanding.md Markdown file it created, which I’ve now added to the GitHub repo. I found the explanation of ONNX particularly enlightening:\nONNX (Open Neural Network Exchange) is a portable, framework-neutral file format for neural networks. An\n.onnx\nfile is essentially two things bundled together:\n- A computation graph — a directed graph of nodes, where each node is an operator (\nConv\n,MatMul\n,Add\n,Einsum\n,Softmax\n,Gather\n,Resize\n, …) wired together by named tensors flowing between them. This is the “recipe” for the forward pass.- The weights — the learned parameter tensors (the convolution kernels, the embedding table, etc.), stored as initializers in that same graph.\nCrucially, ONNX describes what to compute, abstractly, without saying how or on what hardware. The operator set is versioned by an opset number (this repo uses opset 18), which pins down exactly which operators exist and what their semantics are.\nIt turns out PyTorch has built in mechanisms for exporting to ONNX, as seen here in export_onnx.py:\ntorch.onnx.export( dec, (lat,), dec_path, opset_version=args.opset, input_names=[\"latent\"], output_names=[\"image\"], dynamic_axes={\"latent\": {0: \"B\"}, \"image\": {0: \"B\"}}, )\nClaude also included a handy glossary and an only-slightly-broken ASCII-art diagram showing how the model pipeline fits together.\nMore recent articles\n- sqlite-utils 4.0rc1 adds migrations and nested transactions - 21st June 2026\n- Datasette Apps: Host custom HTML applications inside Datasette - 18th June 2026", "summary": "TL;DR: I got it working, and you can try the demo at simonw.github.io/moebius-web/. Since I didn’t expect this project to actually work I did everything in my /tmp\nfolder:\ncd /tmp\nmkdir Moebius\ncd Moebius\n# Grab the Moebius python code\ngit clone https://github.com/hustvl/Moebius\n# And the model weights (Claude figured this out):\nGIT_LFS_SKIP_SMUDGE=0 git clone \\\nhttps://huggingface.co/hustvl/Moebius Moebius-weights\n# Finally a couple of libraries we might use:\ngit clone https://github.com/huggingface/transformers.js\ngit clone https://github.com/microsoft/onnxruntime\nSetting off Claude Code\nI created a directory for the rest of the project and ran git init\nin that so Claude could start committing code notes:\nmkdir /tmp/Moebius/moebius-web\ncd /tmp/Moebius/moebius-web\ngit init\n# Copy in that research.md from earlier\ngit add research.md\ngit commit -m \"Initial research by Claude Opus 4.8\"\nI fired up a claude\ninstance in the /tmp/Moebius\nfolder, the level above all of the research materials I had prepared for it. It published the 1.24GB of converted ONNX weights to huggingface.co/simonw/Moebius-ONNX for me. I’ve shared the full Claude Code transcript for this project (published using my claude-code-transcripts tool).", "categories": ["業務改善・介護テック", "AIツール・生産性"], "is_new": false, "title_ja": "クロード コードを使用してブラウザで実行するようにメビウス 0.2B イメージ修復モデルを移植する", "summary_ja": "TL;DR: 動作するようになりました。simonw.github.io/moebius-web/ でデモを試すことができます。このプロジェクトが実際に機能するとは予想していなかったので、すべてを /tmp で実行しました\nフォルダ:\ncd /tmp\nmkdir メビウス\ncd メビウス\n# メビウスの Python コードを取得する\ngit clone https://github.com/hustvl/Moebius\n# そしてモデルの重み (クロードがこれを計算しました):\nGIT_LFS_SKIP_SMUDGE=0 git クローン \\\nhttps://huggingface.co/hustvl/Moebius Moebius-weights\n# 最後に、使用できるライブラリをいくつか紹介します。\ngit clone https://github.com/huggingface/transformers.js\ngit clone https://github.com/microsoft/onnxruntime\nクロード・コードを始める\nプロジェクトの残りのディレクトリを作成し、 git init を実行しました。\nクロードがコードノートのコミットを開始できるようにするためです。\nmkdir /tmp/メビウス/メビウス-web\ncd /tmp/メビウス/メビウス-web\ngitの初期化\n# 先ほどの Research.md をコピーします\ngit add Research.md\ngit commit -m \"Claude Opus 4.8 による初期調査\"\nクロードに火をつけました\n/tmp/Moebius 内のインスタンス\nフォルダーは、私が準備したすべての研究資料の上位レベルにあります。変換された ONNX ウェイトの 1.24 GB が、huggingface.co/simonw/Moebius-ONNX に公開されました。このプロジェクトのクロード コードの完全なトランスクリプトを共有しました (クロード コードトランスクリプト ツールを使用して公開しました)。"}, {"title": "介護職員等処遇改善加算の実績報告（令和7年度分）について - town.samukawa.kanagawa.jp", "url": "https://news.google.com/rss/articles/CBMivgFBVV95cUxPbEFTTm5MdjE2MEpQanNRczJZeEIyNG5NbTMzS3NldGlpSHZfMWFsX1hHTzdCclhLZVRzQlZGOUtaLTE3T0FVZ2wtdmZnMnczckh1NVNVTUU4N0pIZTZBeU5aeGNWdE9Ua1FzNHpJN2l3OHBQd2lJVnQ2QnRLY0Qwb2dReEtrSHVjUWpILW43TGdId0x3Yk1pVDN0TkhocmZnNTBRbXRqS0FMeldSQzU1MGNoZ1RTMWR0MktiOTNB?oc=5", "source": "介護 ICT・業務改善・見守りシステム", "lang": "ja", "content_type": "care", "category_hint": "業務改善・介護テック", "published": "2026-06-22 16:00", "description": "介護職員等処遇改善加算の実績報告（令和7年度分）について town.samukawa.kanagawa.jp", "content": "介護職員等処遇改善加算の実績報告（令和7年度分）について town.samukawa.kanagawa.jp", "summary": "介護職員等処遇改善加算の実績報告（令和7年度分）について town.samukawa.kanagawa.jp", "categories": ["人材育成・HR", "施設運営・経営"], "is_new": true}, {"title": "27年度障害報酬改定に向け団体ヒアリング　８月に論点整理へ - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45569", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-22 10:00", "description": "２０２７年度障害報酬改定に向け、議論をしている厚生労働省の検討チームが１５日に開かれ、関係団体ヒアリングが始まった。８月にかけて計５３団体から意見を聞いて議論の論点を整理し、１２月に基本的な考え方を取りまとめる。 同日は８団体が出席した。全国身体障害者施設協議会、全国介護事業者連盟などの事業者団体をはじめ大半の団体が、物価高に応じた報酬の増額、他産業と遜色のない水準までの賃上げを要望。テクノロジーの導入支援、重度対応など専門性の評価を求める意見もあった。 障害当事者団体では、全国脊髄損傷者連合会が重度訪問介護、行動援護などを通勤・通学、職場内・学校内で利用できるよう見直すことを要望。日本高次脳機能障害友の会は、重い社会的行動障害のある人を重度者と判定する客観的な基準の設定を求めた。日本失語症協議会は、言語機能訓練を受ければ社会復帰などの可能性が高まるが、人材不足などで訓練を提供できない現状の改善を訴えた。 厚労省は、障害福祉予算額が膨らむ中で持続可能な制度とするための方策、多様な主体参入による支援の質のばらつき是正なども視野に入れて議論を進めていく意向だ。 福祉新聞Web", "content": "27年度障害報酬改定に向け団体ヒアリング ８月に論点整理へ\n2026年06月22日 福祉新聞編集部２０２７年度障害報酬改定に向け、議論をしている厚生労働省の検討チームが１５日に開かれ、関係団体ヒアリングが始まった。８月にかけて計５３団体から意見を聞いて議論の論点を整理し、１２月に基本的な考え方を取りまとめる。\n同日は８団体が出席した。全国身体障害者施設協議会、全国介護事業者連盟などの事業者団体をはじめ大半の団体が、物価高に応じた報酬の増額、他産業と遜色のない水準までの賃上げを要望。テクノロジーの導入支援、重度対応など専門性の評価を求める意見もあった。\n障害当事者団体では、全国脊髄損傷者連合会が重度訪問介護、行動援護などを通勤・通学、職場内・学校内で利用できるよう見直すことを要望。日本高次脳機能障害友の会は、重い社会的行動障害のある人を重度者と判定する客観的な基準の設定を求めた。日本失語症協議会は、言語機能訓練を受ければ社会復帰などの可能性が高まるが、人材不足などで訓練を提供できない現状の改善を訴えた。\n厚労省は、障害福祉予算額が膨らむ中で持続可能な制度とするための方策、多様な主体参入による支援の質のばらつき是正なども視野に入れて議論を進めていく意向だ。", "summary": "27年度障害報酬改定に向け団体ヒアリング ８月に論点整理へ\n2026年06月22日 福祉新聞編集部２０２７年度障害報酬改定に向け、議論をしている厚生労働省の検討チームが１５日に開かれ、関係団体ヒアリングが始まった。全国身体障害者施設協議会、全国介護事業者連盟などの事業者団体をはじめ大半の団体が、物価高に応じた報酬の増額、他産業と遜色のない水準までの賃上げを要望。障害当事者団体では、全国脊髄損傷者連合会が重度訪問介護、行動援護などを通勤・通学、職場内・学校内で利用できるよう見直すことを要望。日本高次脳機能障害友の会は、重い社会的行動障害のある人を重度者と判定する客観的な基準の設定を求めた。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "sqlite-utils 4.0rc1 adds migrations and nested transactions", "url": "https://simonwillison.net/2026/Jun/21/sqlite-utils-40rc1/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-22 08:35", "description": "sqlite-utils is my combined Python library and CLI tool for working with SQLite databases. It provides an extensive set of higher-level operations on top of Python's default sqlite3 package , including support for complex table transformations , automatic table creation from JSON data and a whole lot more. I released sqlite-utils 4.0rc1 , the first release candidate for sqlite-utils v4. The major version bump indicates some (minor) backwards incompatible changes, so I'm interested in having peop", "content": "sqlite-utils 4.0rc1 adds migrations and nested transactions\n21st June 2026\nsqlite-utils is my combined Python library and CLI tool for working with SQLite databases. It provides an extensive set of higher-level operations on top of Python’s default sqlite3 package, including support for complex table transformations, automatic table creation from JSON data and a whole lot more.\nI released sqlite-utils 4.0rc1, the first release candidate for sqlite-utils v4. The major version bump indicates some (minor) backwards incompatible changes, so I’m interested in having people try this out before I commit to a stable release.\nNew feature: migrations\nThere are two significant new features in this RC compared to the previous 4.0 alphas.\nThe first is support for database migrations. This isn’t a completely new implementation—it’s a slightly modified port of the sqlite-migrate package I released a few years ago. I think that package has proved itself over time, so I’m now ready to bundle it with sqlite-utils\ndirectly.\nHere’s what a set of migrations in a migrations.py\nfile looks like:\nfrom sqlite_utils import Database, Migrations migrations = Migrations(\"creatures\") @migrations() def create_table(db): db[\"creatures\"].create( {\"id\": int, \"name\": str, \"species\": str}, pk=\"id\", ) @migrations() def add_weight(db): db[\"creatures\"].add_column(\"weight\", float)\nThis defines a set of two migrations, one creating the creatures\ntable and another adding a column to it.\nYou can then run those migrations either using Python:\ndb = Database(\"creatures.db\") migrations.apply(db)\nOr with the command-line migrate\ncommand:\nsqlite-utils migrate creatures.db migrations.py\nThe system is deliberately small: it doesn’t provide reverse migrations, so any mistakes you make should be fixed by deploying a fresh migration to undo them.\nIts predecessor has been used by LLM and various other projects for several years, so I’m confident that the design is stable and works well.\nThe new migrations feature is documented here.\nNew feature: db.atomic() transactions\nThis feature is a lot less exercised than migrations, so it deserves more attention from testers.\nPreviously, sqlite-utils\nmostly left transaction management up to its users, via a with db.conn:\nconstruct that reused the sqlite3\nmechanism directly.\nSQLite supports nested transactions in the form of savepoints, so I wanted an abstraction that could make those as easy to use as possible.\nI borrowed the terminology “atomic” from Django and Peewee. Here’s what the new API looks like:\nwith db.atomic(): db.table(\"dogs\").insert({\"id\": 1, \"name\": \"Cleo\"}, pk=\"id\") try: with db.atomic(): db.table(\"dogs\").insert({\"id\": 2, \"name\": \"Pancakes\"}) raise ValueError(\"skip this one\") except ValueError: pass db.table(\"dogs\").insert({\"id\": 3, \"name\": \"Marnie\"})\nMore details in the documentation.\nBackwards incompatible changes\nThe backwards incompatible changes in v4 were described in the alpha release notes. For 4.0a0:\n- Upsert operations now use SQLite’s\nINSERT ... ON CONFLICT SET\nsyntax on all SQLite versions later than 3.23.1. This is a very slight breaking change for apps that depend on the previousINSERT OR IGNORE\nfollowed byUPDATE\nbehavior. (#652)- Python library users can opt-in to the previous implementation by passing\nuse_old_upsert=True\nto theDatabase()\nconstructor, see Alternative upserts using INSERT OR IGNORE.- Dropped support for Python 3.8, added support for Python 3.13. (#646)\nsqlite-utils tui\nis now provided by the sqlite-utils-tui plugin. (#648)- Test suite now also runs against SQLite 3.23.1, the last version (from 2018-04-10) before the new\nINSERT ... ON CONFLICT SET\nsyntax was added. (#654)\nAnd for 4.0a1:\n- Breaking change: The\ndb.table(table_name)\nmethod now only works with tables. To access a SQL view usedb.view(view_name)\ninstead. (#657)- The\ntable.insert_all()\nandtable.upsert_all()\nmethods can now accept an iterator of lists or tuples as an alternative to dictionaries. The first item should be a list/tuple of column names. See Inserting data from a list or tuple iterator for details. (#672)- Breaking change: The default floating point column type has been changed from\nFLOAT\ntoREAL\n, which is the correct SQLite type for floating point values. This affects auto-detected columns when inserting data. (#645)- Now uses\npyproject.toml\nin place ofsetup.py\nfor packaging. (#675)- Tables in the Python API now do a much better job of remembering the primary key and other schema details from when they were first created. (#655)\n- Breaking change: The\ntable.convert()\nandsqlite-utils convert\nmechanisms no longer skip values that evaluate toFalse\n. Previously the--skip-false\noption was needed, this has been removed. (#542)- Breaking change: Tables created by this library now wrap table and column names in\n\"double-quotes\"\nin the schema. Previously they would use[square-braces]\n. (#677)- The\n--functions\nCLI argument now accepts a path to a Python file in addition to accepting a string full of Python code. It can also now be specified multiple times. (#659)- Breaking change: Type detection is now the default behavior for the\ninsert\nandupsert\nCLI commands when importing CSV or TSV data. Previously all columns were treated asTEXT\nunless the--detect-types\nflag was passed. Use the new--no-detect-types\nflag to restore the old behavior. TheSQLITE_UTILS_DETECT_TYPES\nenvironment variable has been removed. (#679)\nTry it out\nYou can install the new RC like this:\npip install sqlite-utils==4.0rc1\nOr try the CLI version directly with uvx\nlike this:\nuvx --with sqlite-utils==4.0rc1 sqlite-utils --help\nCome chat with us about it in the sqlite-utils Discord channel, or file any bugs in GitHub Issues.", "summary": "sqlite-utils 4.0rc1 adds migrations and nested transactions\n21st June 2026\nsqlite-utils is my combined Python library and CLI tool for working with SQLite databases. I released sqlite-utils 4.0rc1, the first release candidate for sqlite-utils v4. For 4.0a0:\n- Upsert operations now use SQLite’s\nINSERT . (#646)\nsqlite-utils tui\nis now provided by the sqlite-utils-tui plugin.", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false, "title_ja": "sqlite-utils 4.0rc1 は移行とネストされたトランザクションを追加します", "summary_ja": "sqlite-utils 4.0rc1 は移行とネストされたトランザクションを追加します\n2026 年 6 月 21 日\nsqlite-utils は、SQLite データベースを操作するための Python ライブラリと CLI ツールを組み合わせたものです。 sqlite-utils v4 の最初のリリース候補である sqlite-utils 4.0rc1 をリリースしました。 4.0a0の場合:\n- Upsert 操作で SQLite が使用されるようになりました。\nを挿入します。 (#646)\nsqlite-utils tui\nは sqlite-utils-tui プラグインによって提供されるようになりました。"}, {"title": "福祉と環境は切り離せない〈コラム一草一味〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/issoichimi/45566", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-21 10:00", "description": "恩賜財団済生会 理事長 炭谷茂 職場近くの東京都港区立芝公園で昼食を食べることが多い。東京タワーの下で広々と芝生が広がり、爽快な気持ちになる。保育所のこどもが、保育士に見守られながら、いつも元気に遊び回っている。こどもには保育所の狭い部屋よりもずっと楽しそう。 旧厚生省で保育所を所管する課長を務めたときに、１９９０年から施行の第１次保育指針改訂作業に従事した。保育内容について従来６領域（健康、社会、言語、自然、音楽、造形）から５領域（健康、人間関係、環境、言葉、表現）に改正された。保育指針制定以来２５年ぶりの大きな見直しだった。 この改訂では、「環境」を保育の重要事項に位置付けたことが良かった。こどもの成育には環境が重要な要素である。 松山市にある済生会松山乳児保育園は、ゼロ歳児から２歳児までを対象に定員６０人である。「こどもたちは小さな原始人である」をモットーに掲げている。園庭にはすべり台やブランコのような遊具や三輪車など人工的な物はない。水、砂、土、石、木、動植物などの自然素材だけで遊ぶ。自然との関わりを深めながらこどもたちは、感性、意欲、創造性、社会性を育みながら成長していく。環", "content": "福祉と環境は切り離せない〈コラム一草一味〉\n2026年06月21日 福祉新聞編集部恩賜財団済生会 理事長 炭谷茂\n職場近くの東京都港区立芝公園で昼食を食べることが多い。東京タワーの下で広々と芝生が広がり、爽快な気持ちになる。保育所のこどもが、保育士に見守られながら、いつも元気に遊び回っている。こどもには保育所の狭い部屋よりもずっと楽しそう。\n旧厚生省で保育所を所管する課長を務めたときに、１９９０年から施行の第１次保育指針改訂作業に従事した。保育内容について従来６領域（健康、社会、言語、自然、音楽、造形）から５領域（健康、人間関係、環境、言葉、表現）に改正された。保育指針制定以来２５年ぶりの大きな見直しだった。\nこの改訂では、「環境」を保育の重要事項に位置付けたことが良かった。こどもの成育には環境が重要な要素である。\n松山市にある済生会松山乳児保育園は、ゼロ歳児から２歳児までを対象に定員６０人である。「こどもたちは小さな原始人である」をモットーに掲げている。園庭にはすべり台やブランコのような遊具や三輪車など人工的な物はない。水、砂、土、石、木、動植物などの自然素材だけで遊ぶ。自然との関わりを深めながらこどもたちは、感性、意欲、創造性、社会性を育みながら成長していく。環境の効果を十分に活用している。\n福祉関係者は、一般的に環境に対する関心が薄い。しかし、本来は、環境と福祉は、大変関係が強い。\n例えば、貧困と環境の関係は切り離せない。貧困に陥ると住環境が悪化し、健康を害し、貧困は一層悪化する。内務省が１８（大正７）年に設置した救済事業調査会は、このことに着目をして対策が検討された。これと類似した状況は最近、日本の各地で見られる。また、地球温暖化の進行によって熱中症で倒れる高齢者が多くなっている。\n私は、川崎医療福祉大学長だった江草安彦先生や、国立国際医療センター総長だった鴨下重彦先生らの指導を得て、２００４年に環境福祉学会を立ち上げたゆえんもここにある。福祉関係者は、環境問題に関心を深め、福祉の向上に役立ててほしいものだ。", "summary": "こどもの成育には環境が重要な要素である。環境の効果を十分に活用している。福祉関係者は、一般的に環境に対する関心が薄い。例えば、貧困と環境の関係は切り離せない。", "categories": ["福祉・社会保障", "医療・健康"], "is_new": false}, {"title": "通所介護の送迎に報酬上の配慮を求める声　介護給付費分科会で議論〈厚労省〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series05/45563", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-20 10:00", "description": "厚生労働省の社会保障審議会介護給付費分科会が１５日に開かれ、２０２７年度介護報酬改定に向け、通所介護などをテーマに議論した。委員からは、特に中山間地域などの送迎に報酬上の配慮を求める声が上がった。 ２４年度の通所介護の収支差率は、前年度より０．３ポイント減の６．２％。ただ、地域密着型を含めた通所介護の事業所数は、１６年度の４万３４４０事業所をピークに、その後約１０年間にわたり横ばいで推移している。 通所介護事業者には送迎の体制に課題意識があるケースも少なくない。厚労省が２５年度に実施した調査研究によると、通所介護事業者の９７％が送迎を実施。基本的に１人で対応している事業所が７３％を占め、非常勤を含む事務職員が担うケースが多いのが実情だ。 全国市長会の長内繁樹豊中市長は、送迎時間が介護報酬で評価されないため、中山間地域などでは採算性が低く、事業撤退につながっていると指摘。送迎を適切に評価する報酬体系を求めた。 全国町村会の中島栄茨城県美浦村長も、送迎に必要な職員の確保を課題とする事業者が多いとして、中山間地域でも安定的に運営できる制度を求めた。 また、現場の立場から全国老人福祉施設協議会", "content": "通所介護の送迎に報酬上の配慮を求める声 介護給付費分科会で議論〈厚労省〉\n2026年06月20日 福祉新聞編集部厚生労働省の社会保障審議会介護給付費分科会が１５日に開かれ、２０２７年度介護報酬改定に向け、通所介護などをテーマに議論した。委員からは、特に中山間地域などの送迎に報酬上の配慮を求める声が上がった。\n２４年度の通所介護の収支差率は、前年度より０．３ポイント減の６．２％。ただ、地域密着型を含めた通所介護の事業所数は、１６年度の４万３４４０事業所をピークに、その後約１０年間にわたり横ばいで推移している。\n通所介護事業者には送迎の体制に課題意識があるケースも少なくない。厚労省が２５年度に実施した調査研究によると、通所介護事業者の９７％が送迎を実施。基本的に１人で対応している事業所が７３％を占め、非常勤を含む事務職員が担うケースが多いのが実情だ。\n全国市長会の長内繁樹豊中市長は、送迎時間が介護報酬で評価されないため、中山間地域などでは採算性が低く、事業撤退につながっていると指摘。送迎を適切に評価する報酬体系を求めた。\n全国町村会の中島栄茨城県美浦村長も、送迎に必要な職員の確保を課題とする事業者が多いとして、中山間地域でも安定的に運営できる制度を求めた。\nまた、現場の立場から全国老人福祉施設協議会の小泉立志副会長も、中山間地域などは燃料費がかさむことから、通常の報酬とは別の配慮が必要だと同調した。\n小泉副会長は、２４年度の通所介護の収支差率が６．２％である点について「金額ベースでは３７万円に過ぎない」と強調した。人件費の影響を大きく受けるため、安定した経営ではないと訴えた。\nその上で「中山間地域では一つの通所介護事業所が地域包括ケアシステムの中で大きな役割を担っている」と指摘。仮に通所介護が２７年度介護報酬改定でマイナス改定となれば、昨年の倒産件数が過去最多となった訪問介護と同様の状況になりかねないとして警鐘を鳴らした。", "summary": "通所介護の送迎に報酬上の配慮を求める声 介護給付費分科会で議論〈厚労省〉\n2026年06月20日 福祉新聞編集部厚生労働省の社会保障審議会介護給付費分科会が１５日に開かれ、２０２７年度介護報酬改定に向け、通所介護などをテーマに議論した。２４年度の通所介護の収支差率は、前年度より０．３ポイント減の６．２％。通所介護事業者には送迎の体制に課題意識があるケースも少なくない。その上で「中山間地域では一つの通所介護事業所が地域包括ケアシステムの中で大きな役割を担っている」と指摘。", "categories": ["介護保険・制度", "福祉・社会保障"], "is_new": false}, {"title": "ケアマネ資格の更新制の廃止が正式決定　改正介護保険法が成立　研修受講は義務に　オンデマンド化で負担減へ", "url": "https://www.joint-kaigo.com/articles/46891/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-19 15:44", "description": "国会では19日、改正介護保険法や改正社会福祉法などが参議院本会議で可決、成立した。【Joint編集部】 ケアマネジャー資格の更新制の廃止が正式に決まった。改正法の施行後は、更新研修を受講しないと直ちに資格を失う現行のルー […]", "content": "2026年6月19日\nケアマネ資格の更新制の廃止が正式決定 改正介護保険法が成立 研修受講は義務に オンデマンド化で負担減へ\n国会では19日、改正介護保険法や改正社会福祉法などが参議院本会議で可決、成立した。【Joint編集部】\nケアマネジャー資格の更新制の廃止が正式に決まった。改正法の施行後は、更新研修を受講しないと直ちに資格を失う現行のルールがなくなる。\nただし、一定の研修の受講がケアマネジャーの義務として改めて位置付けられる。居宅介護支援や介護施設などの事業者にも、雇用するケアマネジャーが研修を受けられる機会を確保することが義務付けられる。\n厚生労働省は一定の研修のオンデマンド化、時間数の圧縮などにより、ケアマネジャーの負担をできるだけ軽くする方針。現行の再研修も廃止し、円滑な復職のための簡素な研修の仕組みを新たに設ける。\n改正法にはこのほか、中山間・人口減少地域を対象にサービスの運営基準の弾力化を認める新たな仕組みを設けたり、中重度の要介護者らを受け入れる住宅型有料老人ホームに事前規制の登録制を導入したりすることも盛り込まれている。", "summary": "2026年6月19日\nケアマネ資格の更新制の廃止が正式決定 改正介護保険法が成立 研修受講は義務に オンデマンド化で負担減へ\n国会では19日、改正介護保険法や改正社会福祉法などが参議院本会議で可決、成立した。【Joint編集部】\nケアマネジャー資格の更新制の廃止が正式に決まった。ただし、一定の研修の受講がケアマネジャーの義務として改めて位置付けられる。居宅介護支援や介護施設などの事業者にも、雇用するケアマネジャーが研修を受けられる機会を確保することが義務付けられる。", "categories": ["人材育成・HR", "福祉・社会保障"], "is_new": false}, {"title": "福祉法人が居住サポート住宅を運用　独居高齢者、障害者らを支援 - 福祉新聞Web", "url": "https://fukushishimbun.com/fukushiippan/45543", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-19 14:00", "description": "住宅確保要配慮者の入居を支援するため、国土交通省と厚生労働省が連携して２０２５年１０月１日に始まった認定制度「居住サポート住宅」。名古屋市の共生福祉会（齋藤亮人理事長）が、社会福祉法人として初めて認定を受けた住宅を運用している。家賃の高騰で住宅確保が難しくなる中、相談支援を行う現場担当者に居住支援の現状や課題を聞いた。 居住サポート住宅は、生活困窮者や独居高齢者、障害者ら住宅確保要配慮者が安価に借りることができる。ＮＰＯ法人や株式会社などが事業に参画しており、５月時点で全国２７７戸の登録がある。社会福祉法人の登録は同法人含めて２者のみにとどまっている。 登録条件として床面積の制限や風呂、トイレ、キッチンが備え付けられていること、安否確認と見守り、福祉へのつなぎを義務付ける「専用住宅」を１戸以上整備することも必要とされる。 共生福祉会は、市内で借り上げ、利用者に転貸する民間賃貸住宅４棟２１戸が、１月に居住サポート住宅の認定を受けた。 現在の利用者は、高齢者６人、障害者１３人、低所得者２人。いずれも同法人が運営する「ソーネ居住支援センター」や「障害者基幹相談支援センター」などに生活相談に来", "content": "福祉法人が居住サポート住宅を運用 独居高齢者、障害者らを支援\n2026年06月19日 福祉新聞編集部住宅確保要配慮者の入居を支援するため、国土交通省と厚生労働省が連携して２０２５年１０月１日に始まった認定制度「居住サポート住宅」。名古屋市の共生福祉会（齋藤亮人理事長）が、社会福祉法人として初めて認定を受けた住宅を運用している。家賃の高騰で住宅確保が難しくなる中、相談支援を行う現場担当者に居住支援の現状や課題を聞いた。\n居住サポート住宅は、生活困窮者や独居高齢者、障害者ら住宅確保要配慮者が安価に借りることができる。ＮＰＯ法人や株式会社などが事業に参画しており、５月時点で全国２７７戸の登録がある。社会福祉法人の登録は同法人含めて２者のみにとどまっている。\n登録条件として床面積の制限や風呂、トイレ、キッチンが備え付けられていること、安否確認と見守り、福祉へのつなぎを義務付ける「専用住宅」を１戸以上整備することも必要とされる。\n共生福祉会は、市内で借り上げ、利用者に転貸する民間賃貸住宅４棟２１戸が、１月に居住サポート住宅の認定を受けた。\n現在の利用者は、高齢者６人、障害者１３人、低所得者２人。いずれも同法人が運営する「ソーネ居住支援センター」や「障害者基幹相談支援センター」などに生活相談に来て入居が決まった。年齢は２５歳から８７歳と幅広い。家賃は名古屋市から補助が出て、自己負担額１万円から２万１０００円。２１戸中２戸を専用住宅として運用していて、人の動きを感知するセンサーによる安否確認、月に１度の職員による定期訪問を行っている。\nソーネ居住支援センターで居住支援相談を担当する職員の崔保さんは「最近は独居高齢者からの相談が増えた」と話す。\nあるケースでは、８０歳を超える男性が認知症の影響でローンの支払いが滞り、自宅を手放すことになったという相談を受けた。施設入所を嫌がり１人暮らしを望んだため、毎日ヘルパーを入れる条件で入居。現在も暮らしている。\n専用住宅に住む高齢の利用者とは、定期的に顔を合わせて話をするため「徐々に身の上話をしてくれるようになり、打ち解けてきた」（崔さん）。\n支援を続ける一方で、住宅確保の難しさもある。課題について崔さんは「近年の物価高が影響している」と話す。\n同市での生活保護費のうち、単身世帯の住宅扶助費は３万７０００円。この金額をベースに物件を探しているが、賃料の高騰で対象となる住宅が減っているのが現状だ。\n居住サポート住宅は一時入居を目的としていないため空きが出づらい。同法人の昨年の居住支援相談は１１２件、うち５９件が入居を実現したが、不動産会社を紹介して別の低廉な住宅に住んでもらうことも少なくなかった。\n今後も現状の住宅を維持しながら、引き続き居住支援を行っていく方針だ。\n共生福祉会 障害の有無を越えて共に働き共に生き、暮らす共同体づくりを進めてきた団体「わっぱの会」を母体とし、１９８７年に社会福祉法人を設立。障害者、高齢者、生活困窮者らへの幅広い支援を行っている。", "summary": "名古屋市の共生福祉会（齋藤亮人理事長）が、社会福祉法人として初めて認定を受けた住宅を運用している。居住サポート住宅は、生活困窮者や独居高齢者、障害者ら住宅確保要配慮者が安価に借りることができる。居住サポート住宅は一時入居を目的としていないため空きが出づらい。障害者、高齢者、生活困窮者らへの幅広い支援を行っている。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "もう済んだ？　LIFE新システムへの移行作業、加算取得に必須　厚労省が対応呼びかけ", "url": "https://www.joint-kaigo.com/articles/46881/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-19 11:10", "description": "厚生労働省は18日に介護保険最新情報Vol.1512を発出し、新たなLIFE（科学的介護情報システム）への移行作業が済んでいない事業所・施設に対し、改めて速やかな対応を呼びかけた。【Joint編集部】 以前は厚労省だった […]", "content": "2026年6月19日\nもう済んだ？ LIFE新システムへの移行作業、加算取得に必須 厚労省が対応呼びかけ\n厚生労働省は18日に介護保険最新情報Vol.1512を発出し、新たなLIFE（科学的介護情報システム）への移行作業が済んでいない事業所・施設に対し、改めて速やかな対応を呼びかけた。【Joint編集部】\n以前は厚労省だったLIFEの運営主体は、5月11日から国保中央会へ移管されている。引き続きLIFEを活用し、データの提出が要件となっている各種加算を継続して取得していくためには、事業所・施設サイドも移行作業を済ませなければならない。\nただ、厚労省によると6月中旬になっても移行作業を済ませていない事業所・施設がある。新システムへの移行期間は、これまでの介護保険最新情報Vol.1504などで7月31日までとアナウンスされており、事業所・施設には期間内での対応が求められる。\n厚労省は今回の介護保険最新情報Vol.1512で、事業所・施設が移行作業を行う際に活用できるマニュアルや説明動画などを改めて紹介。現場からの問い合わせを受け付けるヘルプデスクも周知した。", "summary": "LIFE新システムへの移行作業、加算取得に必須 厚労省が対応呼びかけ\n厚生労働省は18日に介護保険最新情報Vol.1512を発出し、新たなLIFE（科学的介護情報システム）への移行作業が済んでいない事業所・施設に対し、改めて速やかな対応を呼びかけた。ただ、厚労省によると6月中旬になっても移行作業を済ませていない事業所・施設がある。新システムへの移行期間は、これまでの介護保険最新情報Vol.1504などで7月31日までとアナウンスされており、事業所・施設には期間内での対応が求められる。厚労省は今回の介護保険最新情報Vol.1512で、事業所・施設が移行作業を行う際に活用できるマニュアルや説明動画などを改めて紹介。", "categories": ["施設運営・経営", "介護保険・制度"], "is_new": false}, {"title": "戸別訪問で認知症見守りの模擬訓練　困っている人を支えられる地域に〈東京・立川〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series05/45540", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-19 10:00", "description": "東京都立川市羽衣町で６日、認知症見守り声掛け模擬訓練が行われた。地域住民、福祉・医療関係者、民生委員、市職員ら４５人が８グループに分かれて個別訪問などをして、認知症の人の困り事に対応してもらうことで認知症の理解と支援の輪を広げていく。今年で８回目となる。 各グループで案内交渉役、認知症役、お礼役、記録係を決め、それぞれ約１時間かけて地域を回った。６０代男性宅では、認知症役「娘を迎えにきた」、６０代男性「ここにはいないよ」、認知症役「ここは保育所ではないの」、６０代男性「違いますね。一緒に探しますか。近くに地域包括支援センターがあるので一緒に行きましょう」。 ５分程度でやり取りが終わり、６０代男性が「何と答えていいか難しい」と話すと、グループから「否定すると認知症の人はパニックになってしまう。受け入れてくれると安心する」と助言した。 ほかの訪問宅でも、認知症役の話を親身になって聞き、戸惑いながらも解決に導こうと優しく対応してくれる人が多かった。 個別訪問を終えた参加者からは「この活動がほかの地域にも広がるとよい」「認知症の人への対応に自信がなかったが、気付きが得られた」といった感想が聞か", "content": "戸別訪問で認知症見守りの模擬訓練 困っている人を支えられる地域に〈東京・立川〉\n2026年06月19日 福祉新聞編集部東京都立川市羽衣町で６日、認知症見守り声掛け模擬訓練が行われた。地域住民、福祉・医療関係者、民生委員、市職員ら４５人が８グループに分かれて個別訪問などをして、認知症の人の困り事に対応してもらうことで認知症の理解と支援の輪を広げていく。今年で８回目となる。\n各グループで案内交渉役、認知症役、お礼役、記録係を決め、それぞれ約１時間かけて地域を回った。６０代男性宅では、認知症役「娘を迎えにきた」、６０代男性「ここにはいないよ」、認知症役「ここは保育所ではないの」、６０代男性「違いますね。一緒に探しますか。近くに地域包括支援センターがあるので一緒に行きましょう」。\n５分程度でやり取りが終わり、６０代男性が「何と答えていいか難しい」と話すと、グループから「否定すると認知症の人はパニックになってしまう。受け入れてくれると安心する」と助言した。\nほかの訪問宅でも、認知症役の話を親身になって聞き、戸惑いながらも解決に導こうと優しく対応してくれる人が多かった。\n個別訪問を終えた参加者からは「この活動がほかの地域にも広がるとよい」「認知症の人への対応に自信がなかったが、気付きが得られた」といった感想が聞かれた。\n訓練は認知症グループホームの入居者が行方不明になったことから地域で見守ろうと始まった。雨の中、傘も差さずに歩いていた高齢者に訓練参加者が声を掛けて保護するといった効果も出ている。\n訓練実行委員会の岡村深鈴みすず市南部東はごろも地域包括支援センターサービス長は「個別訪問するのがポイント。認知症の人だけでなく、困っている人を支えられる地域になれば」と話している。", "summary": "戸別訪問で認知症見守りの模擬訓練 困っている人を支えられる地域に〈東京・立川〉\n2026年06月19日 福祉新聞編集部東京都立川市羽衣町で６日、認知症見守り声掛け模擬訓練が行われた。６０代男性宅では、認知症役「娘を迎えにきた」、６０代男性「ここにはいないよ」、認知症役「ここは保育所ではないの」、６０代男性「違いますね。訓練は認知症グループホームの入居者が行方不明になったことから地域で見守ろうと始まった。認知症の人だけでなく、困っている人を支えられる地域になれば」と話している。", "categories": ["医療・健康", "福祉・社会保障"], "is_new": false}, {"title": "Datasette Apps: Host custom HTML applications inside Datasette", "url": "https://simonwillison.net/2026/Jun/18/datasette-apps/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-19 08:58", "description": "Today we launched a new plugin for Datasette, datasette-apps , with this launch announcement post on the Datasette project blog. That post has the what , but I'm going to expand on that a little bit here to provide the why . The TL;DR Datasette Apps are self-contained HTML+JavaScript applications that run in a tightly constrained <iframe> sandbox hosted on your Datasette application. They can use JavaScript to run read-only SQL queries against data in Datasette, and can run write queries too if ", "content": "Datasette Apps: Host custom HTML applications inside Datasette\n18th June 2026\nToday we launched a new plugin for Datasette, datasette-apps, with this launch announcement post on the Datasette project blog. That post has the what, but I’m going to expand on that a little bit here to provide the why.\nThe TL;DR\nDatasette Apps are self-contained HTML+JavaScript applications that run in a tightly constrained <iframe>\nsandbox hosted on your Datasette application. They can use JavaScript to run read-only SQL queries against data in Datasette, and can run write queries too if you configure them with some stored queries.\nHere’s a very simple example and a more complex custom timeline example—the latter looks like this:\nApps are allowed to run JavaScript and render HTML and CSS. They are limited in terms of access—the <iframe sandbox=\"allow-scripts allow-forms\">\nthey run in prevents them from accessing cookies or localStorage and they also have an injected CSP header (thanks to this research) which prevents them from making HTTP requests to outside hosts, preventing a malicious or buggy app from exfiltrating private data.\nDatasette Apps started out as my attempt at building a Claude Artifacts mechanism for Datasette Agent, but I quickly realised that the sandboxed pattern is interesting for way more than just adding custom apps in a chat interface and promoted it to its own top-level concept within the Datasette ecosystem.\nThey’re also a fun way to turn my multi-year experiment in vibe-coded HTML tools into a core feature of my main project!\nYou can try out Datasette Apps by signing in with GitHub to the agent.datasette.io demo instance.\nWhy build this?\nSince the very first release, Datasette has offered a flexible backend for creating custom HTML apps via its JSON API.\nOne of my earliest Datasette projects was an internal search engine for documentation when I worked at Eventbrite—it worked by importing documents from different systems into SQLite on a cron and then serving them through a Datasette instance with a custom HTML+JavaScript search interface that directly queried the Datasette API.\nI had client-side JavaScript constructing SQL queries, which originally was intended as an engineering joke but turned out to be a really productive way of iterating on the app!\nThat project, combined with my experience building my HTML tools collection and my experiments with Claude Artifacts, has convinced me that adding a Datasette-style backend to a self-contained HTML frontend is an astonishingly powerful combination.\nImagine how much more useful Claude Artifacts could be if they had access to a persistent relational database. That’s what I’m building with Datasette Apps!\nNeat ideas in Datasette Apps\nHere are a few of the ideas and patterns I’ve figured out building this which I think have staying power.\n<iframe sandbox=\"allow-scripts\" srcdoc=\"...\">\n+ <meta http-equiv=\"Content-Security-Policy\" content=\"default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:;\">\nThis is the magic combination that makes Datasette Apps feasible in the first place. I need to run untrusted HTML and JavaScript on a highly sensitive domain—an authenticated Datasette instance can contain all sorts of private data. The sandbox=\nattribute lets me run that untrusted code in a way that cannot interact with the parent application—it can’t read the DOM, or access cookies, or steal secrets from localStorage\n. It can however use fetch()\nand friends to load content (or exfiltrate data) from other domains. But... it turns out if you start an HTML page with a <meta http-equiv=\"Content-Security-Policy\">\nheader you can set additional policies that lock down access to other domains. I was worried that malicious JavaScript would be able to update or remove that header but it turns out that doesn’t work—once set, the CSP policy is immutable for the content of that frame.\nLocked down APIs with postMessage()\nand MessageChannel()\nHaving locked down those iframes to the point that they couldn’t do anything interesting at all, the challenge was to open them back again such that they could run an allow-list of operations, starting with read-only SQL queries against specified databases.\nI built the first version of this with postMessage()\n, which allows a child iframe to send messages to the parent window. I created a simple protocol for requesting that the parent run a SQL query—the parent could then verify it was against an allow-listed database before executing it.\nOne of the LLM tools, I think it was GPT-5.5, suggested that postMessage()\non its own can be exploited if the iframe somehow loads additional code from an untrusted domain. I don’t think that applies to Datasette Apps, but I also believe in defense in depth, so I had GPT-5.5 help me port to a MessageChannel() based transport instead.\nMessageChannel()\nhas the advantage that if a page navigates to somewhere else the channel closes automatically, removing any chance of executing commands sent from an untrusted external page.\nVisible logs, for queries and errors\nIf you navigate to the timeline demo and search for the string usercontent\nyou’ll pull in some search results that embed images from the user-images.githubusercontent.com\ndomain. This domain is not in the CSP allow-list, so it trips an error.\nThose errors are captured and transmitted back to the parent frame, where they can be displayed in a useful error log. This is meant to make hacking on apps more productive by surfacing otherwise-invisible problems.\nI built an experiment demonstrating that you can even turn this into a one-click-to-allow mechanism for building the CSP allow-list based on what breaks, but I haven’t integrated that idea into datasette-apps\njust yet.\nSQL queries are also visibly logged—scroll to the bottom of the timeline page to see that in action.\nStored queries for write operations\nI want apps to be able to conditionally write to the database, but this is an even more dangerous proposition than SQL reads!\nMy solution involves Datasette’s stored queries feature, rebranded from “canned queries” and given a major upgrade in the recent Datasette 1.0a31—work that was directly inspired by Datasette Apps.\nUsers can create a stored write query that performs an insert or update, then allow-list that specific query for an app to use. Usage from code inside an app looks like this:\nconst result = await datasette.storedQuery(\"todos\", \"add_todo\", {\ntitle: \"Buy milk\",\ndue_date: \"2026-06-20\",\npriority: \"high\",\ncompleted: false\n});\nI’m only just beginning to explore the possibilities this unlocks myself, but my goal is to support full read-write applications built safely as Datasette Apps.\nCopy and paste a prompt to build an app\nThe Datasette Apps plugin has no dependency on LLMs at all, but these self-contained apps are the perfect shape to be written by a modern LLM.\nThe create app form includes a copyable prompt at the end. This prompt has everything a model needs to know to build a new app, including the schema of any selected databases.\nThis means you can click “copy”, paste it into ChatGPT or Claude or Gemini, tell it what you need, and there’s a good chance the model will spit out the code necessary to build the app.\nIf you have Datasette Agent installed your AI assistant will also gain tools to both create new apps and edit existing ones, Claude Artifacts style.\nBuilt with so much AI assistance\nDatasette Apps started life back in April as datasette-agent-artifacts, a plugin I have since renamed to datasette-agent-edit\nkeeping only its editing tools. I built that as one of the first plugins for Datasette Agent, to help get the plugin hooks into the right shape. That first prototype was mainly built using Claude Opus 4.6 in Claude Code.\nWhen I switched track to Datasette Apps I started with a plan constructed using Codex Desktop and GPT-5.5 xhigh, based on extensive dialog and feeding in both datasette-agent-artifacts\nand other prototypes I had built.\nMost of the work that followed stuck with Codex, but in the few short days that we had access to Claude Fable 5 I had it run a security evaluation of the product (an ability that would get it banned by the US government shortly afterwards) and it found a very real problem.\nI was allowing users to allow-list CSP hosts for their apps, but Fable pointed out the following attack:\n- A less privileged user with\ncreate-app\npermission creates an app that queries SQLite for all available tables and selects and exfiltrates all of the data to a host they had allow-listed via CSP. - They then trick an administrator user with access to private data into visiting their app.\n- ... and the app can now run queries as that user and steal their private data!\nThat’s clearly unacceptable. I fixed it by restricting the ability to allow-list any domain to a new apps-set-csp\npermission, which is intended just for trusted staff. Site administrators can also configure Datasette with a list of allowed_csp_origins\n, which regular users can then select. This means you can do things like allow cdnjs.cloudflare.com\nand your users will be able to build apps that load extra JavaScript libraries from the cdnjs CDN.\nI’ve reviewed Datasette Apps extremely closely, especially the security-adjacent parts of it. The critical sandbox and CSP configuration are based on multiple AI-assisted prototypes and tests.\nIt’s looking good so far\nI’m really pleased with this initial release.\nDatasette is growing beyond its origins as an application for serving read-only data into a much richer ecosystem of tools for doing useful things with that data once it has been collected.\nDatasette’s roots are in data journalism. I’ve always been interested in the question of what comes next after a journalist gets their hands on a giant dump of data about the world. Datasette supports exploring and publishing it. Datasette Agent adds interrogating it with AI assistance. Now Datasette Apps expands that to building custom interfaces and visualizations to help unlock the stories that are hidden within.", "summary": "Datasette Apps: Host custom HTML applications inside Datasette\n18th June 2026\nToday we launched a new plugin for Datasette, datasette-apps, with this launch announcement post on the Datasette project blog. You can try out Datasette Apps by signing in with GitHub to the agent.datasette.io demo instance. That’s what I’m building with Datasette Apps!. Datasette’s roots are in data journalism.", "categories": ["業務改善・介護テック"], "is_new": false, "title_ja": "データセット アプリ: データセット内でカスタム HTML アプリケーションをホストします。", "summary_ja": "データセット アプリ: データセット内でカスタム HTML アプリケーションをホストします。\n2026 年 6 月 18 日\n本日、Datasette プロジェクト ブログにこの発表の投稿を掲載し、Datasette の新しいプラグイン datasette-apps をリリースしました。 GitHub を使用して Agent.datasette.io デモ インスタンスにサインインすることで、Datasette Apps を試すことができます。それが私が Datasett Apps で構築しているものです。 Datasette のルーツはデータ ジャーナリズムにあります。"}, {"title": "カスハラ対策、すべての介護事業者に義務付け　厚労省局長　ケアマネ殺害受け改めて明言", "url": "https://www.joint-kaigo.com/articles/46871/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-18 16:53", "description": "厚生労働省で介護保険制度を所管する老健局の黒田秀郎局長は18日の参議院・厚労委員会で、カスタマーハラスメントから介護従事者を守る対策をすべての介護事業者に義務付ける方針を改めて示した。【Joint編集部】 各サービスの運 […]", "content": "2026年6月18日\nカスハラ対策、すべての介護事業者に義務付け 厚労省局長 ケアマネ殺害受け改めて明言\n厚生労働省で介護保険制度を所管する老健局の黒田秀郎局長は18日の参議院・厚労委員会で、カスタマーハラスメントから介護従事者を守る対策をすべての介護事業者に義務付ける方針を改めて示した。【Joint編集部】\n各サービスの運営基準を厳格化する考え。来年度の介護報酬改定を念頭に審議会で詳しい検討を進める。\nケアマネジャーが利用者宅で殺害された埼玉県川口市の事件を受けて、介護従事者を守る体制をどう強化するか問われて改めて説明した。公明党の川村雄大議員の質問に対する答弁。\nカスハラの防止に向けた雇用管理上必要な措置をすべての事業者に義務付ける改正労働施策総合推進法が、今年10月から施行されることを見据えた動き。厚労省は昨年末の審議会で、すべての介護事業者にカスハラ対策を義務付ける意向を明らかにしていた経緯がある。\n黒田老健局長は厚労委で、「介護従事者が利用者やその家族などからハラスメントを受けることなく、安心して働ける環境の整備が重要」と強調。「介護事業者が取り組むべきことの運営基準への位置付けなど、必要な措置を検討して講じる」と明言した。", "summary": "2026年6月18日\nカスハラ対策、すべての介護事業者に義務付け 厚労省局長 ケアマネ殺害受け改めて明言\n厚生労働省で介護保険制度を所管する老健局の黒田秀郎局長は18日の参議院・厚労委員会で、カスタマーハラスメントから介護従事者を守る対策をすべての介護事業者に義務付ける方針を改めて示した。厚労省は昨年末の審議会で、すべての介護事業者にカスハラ対策を義務付ける意向を明らかにしていた経緯がある。黒田老健局長は厚労委で、「介護従事者が利用者やその家族などからハラスメントを受けることなく、安心して働ける環境の整備が重要」と強調。「介護事業者が取り組むべきことの運営基準への位置付けなど、必要な措置を検討して講じる」と明言した。", "categories": ["施設運営・経営", "介護保険・制度"], "is_new": false}, {"title": "介護保険法などの改正案、参院厚労委で可決　今国会で成立へ", "url": "https://www.joint-kaigo.com/articles/46863/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-18 15:00", "description": "参議院・厚生労働委員会で18日、介護保険法、老人福祉法、社会福祉法などの改正案が賛成多数で原案通り可決された。【Joint編集部】 今国会で近く成立する見通し。 厚労委ではあわせて、改正案に対する15項目の附帯決議も採択 […]", "content": "2026年6月18日\n介護保険法などの改正案、参院厚労委で可決 今国会で成立へ\n参議院・厚生労働委員会で18日、介護保険法、老人福祉法、社会福祉法などの改正案が賛成多数で原案通り可決された。【Joint編集部】\n今国会で近く成立する見通し。\n厚労委ではあわせて、改正案に対する15項目の附帯決議も採択された。上野賢一郎厚労相は、「附帯決議の趣旨を十分に尊重して努力していく」と述べた。\n介護や福祉に関する制度を今後どう見直していくか −− 。\n今回の改正案にはその具体策が多く盛り込まれている。中重度の要介護者らを受け入れる住宅型有料老人ホームに事前規制の登録制を導入したり、中山間・人口減少地域にサービスの運営基準の弾力化を認める新たな仕組みを設けたりすることが柱だ。\nこのほか、頼れる身寄りがいない高齢者らの日常生活の支援を第2種社会福祉事業に位置付けること、ケアマネジャー資格の更新制を廃止することなども含まれている。", "summary": "2026年6月18日\n介護保険法などの改正案、参院厚労委で可決 今国会で成立へ\n参議院・厚生労働委員会で18日、介護保険法、老人福祉法、社会福祉法などの改正案が賛成多数で原案通り可決された。厚労委ではあわせて、改正案に対する15項目の附帯決議も採択された。介護や福祉に関する制度を今後どう見直していくか −− 。今回の改正案にはその具体策が多く盛り込まれている。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "令和７年度介護職員等処遇改善加算等実績報告書の提出について - city.hakodate.hokkaido.jp", "url": "https://news.google.com/rss/articles/CBMiaEFVX3lxTE5ETU5Sa1E2WTdlbUlnQWpjaS0xb01SbTNFRW1oWDZyQ2dkbjRweGVkb0E3YUFEbDFpQTNtWU5DZnlKTnlOM3pLRHpjNkNlZ0dISXQ5UGtDb1ZkVVlpOVQwdG8yRTA5YW1u?oc=5", "source": "介護 ICT・業務改善・見守りシステム", "lang": "ja", "content_type": "care", "category_hint": "業務改善・介護テック", "published": "2026-06-18 14:35", "description": "令和７年度介護職員等処遇改善加算等実績報告書の提出について city.hakodate.hokkaido.jp", "content": "令和７年度介護職員等処遇改善加算等実績報告書の提出について city.hakodate.hokkaido.jp", "summary": "令和７年度介護職員等処遇改善加算等実績報告書の提出について city.hakodate.hokkaido.jp", "categories": ["人材育成・HR", "業務改善・介護テック"], "is_new": false}, {"title": "横浜市役所に寄付付きガチャ設置　社協がYocco18とコラボ - 福祉新聞Web", "url": "https://fukushishimbun.com/fukushiippan/45537", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-18 14:00", "description": "横浜市の１８区それぞれの地名をモチーフにした人気キャラクターが印刷された寄付付き缶バッジの販売が２日、市内で始まった。５００円玉を入れてハンドルを回すとカプセルに入った缶バッジが出てくる「カプセルトイ」で、そのうち１００円が市社会福祉協議会に寄付される。 寄付はひとり親世帯や不登校のこども、児童養護施設を退所した若者の支援に充てる。缶バッジの企画や制作は市内の複数の障害福祉事業所が担い、工賃にも反映。企業、福祉事業所、市社協が協働し、お金が循環する仕組みを構築した。 キャラクターはＹｏｃｃｏ（株）が開発した「Ｙｏｃｃｏ１８」。缶バッジの第１弾は「浦舟みなみ」（南区）、「屏風浦びょうぶがうらしおみ」（磯子区）など六つだ。 一般的にガチャガチャと呼ばれるカプセルトイとして市役所内の「ＴＳＵＢＡＫＩ食堂」の店内に機材を設置した。同店によると、初日はこの缶バッジを目当てに来店する人が多く、その年齢層も幅広いという。 このキャラクターは地域の魅力を発信するメディアとして２０２０年に誕生。２２年からは一部の区の赤い羽根共同募金の駅頭パネルとして登場し、募金を呼び掛ける〝応援役〟を担ってきた。 同社", "content": "横浜市役所に寄付付きガチャ設置 社協がYocco18とコラボ\n2026年06月18日 福祉新聞編集部横浜市の１８区それぞれの地名をモチーフにした人気キャラクターが印刷された寄付付き缶バッジの販売が２日、市内で始まった。５００円玉を入れてハンドルを回すとカプセルに入った缶バッジが出てくる「カプセルトイ」で、そのうち１００円が市社会福祉協議会に寄付される。\n寄付はひとり親世帯や不登校のこども、児童養護施設を退所した若者の支援に充てる。缶バッジの企画や制作は市内の複数の障害福祉事業所が担い、工賃にも反映。企業、福祉事業所、市社協が協働し、お金が循環する仕組みを構築した。\nキャラクターはＹｏｃｃｏ（株）が開発した「Ｙｏｃｃｏ１８」。缶バッジの第１弾は「浦舟みなみ」（南区）、「屏風浦びょうぶがうらしおみ」（磯子区）など六つだ。\n一般的にガチャガチャと呼ばれるカプセルトイとして市役所内の「ＴＳＵＢＡＫＩ食堂」の店内に機材を設置した。同店によると、初日はこの缶バッジを目当てに来店する人が多く、その年齢層も幅広いという。\nこのキャラクターは地域の魅力を発信するメディアとして２０２０年に誕生。２２年からは一部の区の赤い羽根共同募金の駅頭パネルとして登場し、募金を呼び掛ける〝応援役〟を担ってきた。\n同社によると、Ｘで毎日地域情報を発信しており、フォロワーは３万人弱。缶バッジの初回生産（１００個）は１週間もたたずに完売の見込みで、同社は追加生産に踏み切った。\n寄付付きのグッズ販売を同社に持ち掛けた社協はその狙いを「寄付を身近なものに感じてほしいし、障害のある人が質の高い缶バッジ作りに関わっていることも知ってほしい」（市民活動支援課）と話している。", "summary": "横浜市役所に寄付付きガチャ設置 社協がYocco18とコラボ\n2026年06月18日 福祉新聞編集部横浜市の１８区それぞれの地名をモチーフにした人気キャラクターが印刷された寄付付き缶バッジの販売が２日、市内で始まった。５００円玉を入れてハンドルを回すとカプセルに入った缶バッジが出てくる「カプセルトイ」で、そのうち１００円が市社会福祉協議会に寄付される。缶バッジの企画や制作は市内の複数の障害福祉事業所が担い、工賃にも反映。キャラクターはＹｏｃｃｏ（株）が開発した「Ｙｏｃｃｏ１８」。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "【介護報酬改定】ショートステイ、審議会で各種加算の要件緩和を求める声　送迎加算の引き上げも", "url": "https://www.joint-kaigo.com/articles/46854/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-18 11:50", "description": "厚生労働省は15日、来年度の介護報酬改定に向けた協議を進めている審議会を開き、ショートステイ（短期入所生活介護）を取り上げた。【Joint編集部】 今後の論点として、利用者の多様なニーズに応じたサービスを提供するための方 […]", "content": "2026年6月18日\n【介護報酬改定】ショートステイ、審議会で各種加算の要件緩和を求める声 送迎加算の引き上げも\n厚生労働省は15日、来年度の介護報酬改定に向けた協議を進めている審議会を開き、ショートステイ（短期入所生活介護）を取り上げた。【Joint編集部】\n今後の論点として、利用者の多様なニーズに応じたサービスを提供するための方策などを提示した。\n会合では、特別養護老人ホームの経営者らで組織する全国老人福祉施設協議会の小泉立志副会長が、現場の実情を踏まえて施策を提言した。\n小泉副会長は、ショートステイの8割以上を占める併設型事業所の各種加算をめぐり、職員の専従配置を求める現行要件が取得の「大きな壁」になっていると指摘。例えば、個別機能訓練加算や看護体制加算といった重要なインセンティブについて、本体施設の職員との連携、併任・兼任を柔軟に認めるなど要件の大幅な緩和を求めた。\nあわせて、送迎コストの膨張を介護報酬に適切に反映することも要請。車両の維持費や燃料費、人件費の高騰を踏まえ、既存の送迎加算の単価を引き上げるよう訴えた。", "summary": "2026年6月18日\n【介護報酬改定】ショートステイ、審議会で各種加算の要件緩和を求める声 送迎加算の引き上げも\n厚生労働省は15日、来年度の介護報酬改定に向けた協議を進めている審議会を開き、ショートステイ（短期入所生活介護）を取り上げた。小泉副会長は、ショートステイの8割以上を占める併設型事業所の各種加算をめぐり、職員の専従配置を求める現行要件が取得の「大きな壁」になっていると指摘。あわせて、送迎コストの膨張を介護報酬に適切に反映することも要請。車両の維持費や燃料費、人件費の高騰を踏まえ、既存の送迎加算の単価を引き上げるよう訴えた。", "categories": ["施設運営・経営", "介護保険・制度"], "is_new": false}, {"title": "千葉県が養育里親の職員規定改定　子育て休暇取得など容易に - 福祉新聞Web", "url": "https://fukushishimbun.com/yoiku/45534", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-18 10:00", "description": "千葉県は１日、養育里親である県職員が子育て休暇などを取得できるよう、職員関係規定を改正し、運用を始めた。養育里親の職員が働きやすい職場環境を整えるとともに、里親委託を推進するのが狙い。 養育里親とは、保護者の病気や児童虐待などの事情により、家庭で暮らせないこどもを一定期間自宅に迎えて養育する里親を指す。 今回の規程改正では、養育里親である職員が、中学卒業前のこどもの看護や予防接種、学校行事への参加などで取得できる子育て休暇などを利用できるようにした。 休憩時間の特例措置も対象に加えた。具体的には、退庁時間を１５分早めるため、休憩時間を短縮できる。フレックスタイム制についても、原則４週間としている単位期間を１～３週間でも利用できるようにし、柔軟な働き方を可能にした。 また、職員が里親登録に必要な研修を受講する場合は年６日を上限に、児童相談所から一時保護を受託した場合は年５日を上限に、職務専念義務を免除する。 県は、こどもの最善の利益を考えた保護や養育を充実させるため、児童虐待防止対策や児童相談所の機能強化に取り組んでいる。 福祉新聞Web", "content": "千葉県が養育里親の職員規定改定 子育て休暇取得など容易に\n2026年06月18日 福祉新聞編集部千葉県は１日、養育里親である県職員が子育て休暇などを取得できるよう、職員関係規定を改正し、運用を始めた。養育里親の職員が働きやすい職場環境を整えるとともに、里親委託を推進するのが狙い。\n養育里親とは、保護者の病気や児童虐待などの事情により、家庭で暮らせないこどもを一定期間自宅に迎えて養育する里親を指す。\n今回の規程改正では、養育里親である職員が、中学卒業前のこどもの看護や予防接種、学校行事への参加などで取得できる子育て休暇などを利用できるようにした。\n休憩時間の特例措置も対象に加えた。具体的には、退庁時間を１５分早めるため、休憩時間を短縮できる。フレックスタイム制についても、原則４週間としている単位期間を１～３週間でも利用できるようにし、柔軟な働き方を可能にした。\nまた、職員が里親登録に必要な研修を受講する場合は年６日を上限に、児童相談所から一時保護を受託した場合は年５日を上限に、職務専念義務を免除する。\n県は、こどもの最善の利益を考えた保護や養育を充実させるため、児童虐待防止対策や児童相談所の機能強化に取り組んでいる。", "summary": "千葉県が養育里親の職員規定改定 子育て休暇取得など容易に\n2026年06月18日 福祉新聞編集部千葉県は１日、養育里親である県職員が子育て休暇などを取得できるよう、職員関係規定を改正し、運用を始めた。養育里親の職員が働きやすい職場環境を整えるとともに、里親委託を推進するのが狙い。養育里親とは、保護者の病気や児童虐待などの事情により、家庭で暮らせないこどもを一定期間自宅に迎えて養育する里親を指す。今回の規程改正では、養育里親である職員が、中学卒業前のこどもの看護や予防接種、学校行事への参加などで取得できる子育て休暇などを利用できるようにした。", "categories": ["人材育成・HR", "福祉・社会保障"], "is_new": false}, {"title": "GLM-5.2 is probably the most powerful text-only open weights LLM", "url": "https://simonwillison.net/2026/Jun/17/glm-52/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-18 08:58", "description": "Chinese AI lab Z.ai released GLM-5.2 to their coding plan subscribers on June 13th, and then yesterday (June 16th) released the full open weights under an MIT license. Similar in size to their previous GLM-5 and GLM-5.1 releases this is a 753B parameter, 1.51TB monster - with 40 active parameters (Mixture of Experts). GLM-5.2 is a text input only model - Z.ai have a separate vision family most recently represented by GLM-5V-Turbo , but that one isn't open weights. GLM-5.2 has a 1 million token c", "content": "GLM-5.2 is probably the most powerful text-only open weights LLM\n17th June 2026\nChinese AI lab Z.ai released GLM-5.2 to their coding plan subscribers on June 13th, and then yesterday (June 16th) released the full open weights under an MIT license. Similar in size to their previous GLM-5 and GLM-5.1 releases this is a 753B parameter, 1.51TB monster—with 40 active parameters (Mixture of Experts). GLM-5.2 is a text input only model—Z.ai have a separate vision family most recently represented by GLM-5V-Turbo, but that one isn’t open weights. GLM-5.2 has a 1 million token context window, up from GLM-5.1’s 200,000.\nThe buzz around this model is strong.\nArtificial Analysis, who run one of the most widely respected independent benchmarks: GLM-5.2 is the new leading open weights model on the Artificial Analysis Intelligence Index.\nGLM-5.2 is the leading open weights model on the Intelligence Index v4.1. At 51, it leads MiniMax-M3 (44), DeepSeek V4 Pro (max, 44) and Kimi K2.6 (43)\nThey did however find it to be quite token-hungry:\nGLM-5.2 uses more output tokens per task than other leading open weights models: the model uses 43k output tokens per Intelligence Index task, up from GLM-5.1 (26k) and above MiniMax-M3 (24k), Kimi K2.6 (35k) and DeepSeek V4 Pro (max, 37k)\nThe model is also now ranked 2nd on the Code Arena WebDev leaderboard, behind only Claude Fable 5. That leaderboard measures “front-end web development tasks, including agentic coding workflows”. I’m impressed to see it rank so highly given the lack of image input, which I had incorrectly assumed was a key part of building a truly great frontend coding model.\nI’ve been trying it out via OpenRouter, which has it from 9 different providers, almost all of which are charging $1.40/million for input and $4.40/million for output. For comparison, GPT-5.5 is $5/$30 and Claude Opus 4.5-4.8 is $5/$25.\nExcellent pelican, disappointing opossum\nGLM-5.1 gave me one of my favorite pelicans and my all time favorite opossum (for the prompt “Generate an SVG of a NORTH VIRGINIA OPOSSUM ON AN E-SCOOTER”.) Interestingly, in both of those cases the model chose to return SVG wrapped in an HTML document that added additional animations using CSS.\nLet’s try GLM-5.2. For “Generate an SVG of a pelican riding a bicycle” I got this:\nIt’s a self-contained fully animated SVG, and the animations aren’t broken! Often I’ll see eyes falling off or wheels rotating independently of the bicycle but here everything works great. It’s a very nice vector illustration of a pelican too. Very impressive.\nSadly, the NORTH VIRGINIA OPOSSUM ON AN E-SCOOTER did not come out nearly as well:\nThis is such a step down from GLM-5.1! As a reminder, that possum looked like this:\n5.2 didn’t even try to animate it.\nMore recent articles\n- Porting the Moebius 0.2B image inpainting model to run in the browser with Claude Code - 22nd June 2026\n- sqlite-utils 4.0rc1 adds migrations and nested transactions - 21st June 2026\n- Datasette Apps: Host custom HTML applications inside Datasette - 18th June 2026", "summary": "GLM-5.2 is a text input only model—Z.ai have a separate vision family most recently represented by GLM-5V-Turbo, but that one isn’t open weights. GLM-5.2 has a 1 million token context window, up from GLM-5.1’s 200,000. GLM-5.2 is the leading open weights model on the Intelligence Index v4.1. Let’s try GLM-5.2.", "categories": ["業務改善・介護テック", "AIツール・生産性"], "is_new": false, "title_ja": "GLM-5.2 はおそらく最も強力なテキスト専用オープンウェイト LLM です", "summary_ja": "GLM-5.2 はテキスト入力専用モデルです。Z.ai には、最近では GLM-5V-Turbo に代表される別のビジョン ファミリがありますが、これはオープンウェイトではありません。 GLM-5.2 には、GLM-5.1 の 200,000 トークン コンテキスト ウィンドウから増加した 100 万トークン コンテキスト ウィンドウがあります。 GLM-5.2 は、Intelligence Index v4.1 の主要なオープン ウェイト モデルです。 GLM-5.2を試してみましょう。"}, {"title": "Publishing WASM wheels to PyPI for use with Pyodide", "url": "https://simonwillison.net/2026/Jun/13/publishing-wasm-wheels/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-14 08:55", "description": "The Pyodide 314.0 release announcement (via Hacker News ) includes news I've been looking forward to for a long time: You can now publish Python packages built for Pyodide (or any Python runtime compatible with the PyEmscripten platform defined in PEP 783 ) directly to PyPI and install them at runtime. Previously, the Pyodide maintainers had to maintain, build, and host over 300 packages ourselves. This created a significant burden on our maintainers and became a major bottleneck for the communi", "content": "Publishing WASM wheels to PyPI for use with Pyodide\n13th June 2026\nThe Pyodide 314.0 release announcement (via Hacker News) includes news I’ve been looking forward to for a long time:\nYou can now publish Python packages built for Pyodide (or any Python runtime compatible with the PyEmscripten platform defined in PEP 783) directly to PyPI and install them at runtime.\nPreviously, the Pyodide maintainers had to maintain, build, and host over 300 packages ourselves. This created a significant burden on our maintainers and became a major bottleneck for the community, as every new package required manual review.\nMoving forward, package maintainers can simply build and publish Pyodide wheels to PyPI, just as they do for native wheels on Linux, macOS, or Windows.\nHere’s the PR to PyPI itself supporting this, which landed on April 21st.\nI adore Pyodide, and have been frustrated in the past by this limitation. It’s possible to compile C or Rust extensions to WASM in a wheel file, but before now there was no easy way to distribute them.\nThanks to the efforts of a whole lot of people, that’s now been fixed!\nTrying it out with luau-wasm\nI decided to celebrate by finding something I could package. I have quite a few experimental Pyodide projects lying around, but the best fit for this looked to be my Luau WebAssembly research spike from 9th March.\nLuau is a “small, fast, and embeddable programming language based on Lua with a gradual type system”, developed by Roblox and released under an MIT license.\nIt’s written in C++. I already knew it was possible to compile it to WebAssembly and get it running inside of Pyodide, so I set Codex + GPT-5.5 xhigh the task of packaging my experiment up and publishing it to PyPI using GitHub Actions.\nIt took some iteration, but here’s the result: luau-wasm is a brand new PyPI package which publishes a 276KB luau_wasm-0.1a0-cp314-cp314-pyemscripten_2026_0_wasm32.whl\nfile which can be used in Pyodide like this:\nimport micropip await micropip.install(\"luau-wasm\") import luau_wasm print(luau_wasm.execute(r''' local animals = {\"fox\", \"owl\", \"frog\", \"rabbit\"} table.sort(animals, function(a, b) return #a < #b end) for i, name in animals do print(i .. \". \" .. name .. \" (\" .. #name .. \")\") end '''))\nYou can run that code in the Pyodide REPL demo to see it in action.\nThe GitHub repo for luau-wasm includes all of the build and deploy scripts (using the latest cibuildwheel) and also deploys an HTML demo page which loads Pyodide, installs luau-wasm\nand provides an interface for trying it out: https://simonw.github.io/luau-wasm/\nHow many packages are using this so far?\nI was curious to see how many packages are currently publishing wheels for this platform.\nAfter some tinkering with ChatGPT I got to this BigQuery SQL which I ran against PyPI’s public dataset on BigQuery. Here’s the raw JSON of query results and here’s a SQLite SQL query in Datasette Lite which dedupes packages by most recent upload date.\nIf the query is right, there are currently 28 PyPI packages publishing with the new pyemscripten_202*_wasm32\ntags:\nluau-wasm, uuid7-rs, cmm-16bit, pyOpenTTDAdmin, imgui-bundle, numbertoolkit, bashkit, geoarrow-rust-core, arro3-io, arro3-core, arro3-compute, onnx, powerfit-em, tcod, chonkie-core, tokie, robotraconteur, pydantic_core, yaml-rs, cadquery-ocp-novtk-OCP.wasm, uuid_utils, base64_utils, pycdfpp, lib3mf-OCP.wasm, typst, toml-rs, onnx-weekly, dummy-pyodide-ext-test\nHere’s hoping we see a whole lot more of those showing up over the coming months and years.\nMore recent articles\n- Porting the Moebius 0.2B image inpainting model to run in the browser with Claude Code - 22nd June 2026\n- sqlite-utils 4.0rc1 adds migrations and nested transactions - 21st June 2026\n- Datasette Apps: Host custom HTML applications inside Datasette - 18th June 2026", "summary": "Publishing WASM wheels to PyPI for use with Pyodide\n13th June 2026\nThe Pyodide 314.0 release announcement (via Hacker News) includes news I’ve been looking forward to for a long time:\nYou can now publish Python packages built for Pyodide (or any Python runtime compatible with the PyEmscripten platform defined in PEP 783) directly to PyPI and install them at runtime. Previously, the Pyodide maintainers had to maintain, build, and host over 300 packages ourselves. Trying it out with luau-wasm\nI decided to celebrate by finding something I could package. The GitHub repo for luau-wasm includes all of the build and deploy scripts (using the latest cibuildwheel) and also deploys an HTML demo page which loads Pyodide, installs luau-wasm\nand provides an interface for trying it out: https://simonw.github.io/luau-wasm/\nHow many packages are using this so far?.", "categories": ["業務改善・介護テック", "福祉・社会保障"], "is_new": false, "title_ja": "Pyodide で使用するために WASM ホイールを PyPI に公開する", "summary_ja": "Pyodide で使用するために WASM ホイールを PyPI に公開する\n2026 年 6 月 13 日\nPyodide 314.0 のリリース発表 (Hacker News 経由) には、私が長い間楽しみにしていたニュースが含まれています。\nPyodide (または PEP 783 で定義されている PyEmscripten プラットフォームと互換性のある Python ランタイム) 用に構築された Python パッケージを PyPI に直接公開し、実行時にインストールできるようになりました。以前は、Pyodide のメンテナは 300 を超えるパッケージを自分たちで保守、構築、ホストする必要がありました。 luau-wasm で試してみる\n何か包装できるものを見つけてお祝いすることにしました。 luau-wasm の GitHub リポジトリには、すべてのビルドおよびデプロイ スクリプト (最新の cibuildwheel を使用) が含まれており、Pyodide をロードして luau-wasm をインストールする HTML デモ ページもデプロイされます。\nそしてそれを試すためのインターフェースを提供します: https://simonw.github.io/luau-wasm/\nこれまでにこれを使用しているパッケージが何個ありますか?"}];
const CAT_META  = {"介護保険・制度": {"color": "#2563EB", "icon": "📋"}, "医療・健康": {"color": "#DC2626", "icon": "🏥"}, "福祉・社会保障": {"color": "#059669", "icon": "🤝"}, "施設運営・経営": {"color": "#D97706", "icon": "🏢"}, "人材育成・HR": {"color": "#7C3AED", "icon": "👥"}, "業務改善・介護テック": {"color": "#0891B2", "icon": "💡"}, "組織・心理": {"color": "#EA580C", "icon": "🧠"}, "海外エイジテック": {"color": "#0D9488", "icon": "🔬"}, "AIツール・生産性": {"color": "#6D28D9", "icon": "⚡"}, "メンタル・哲学": {"color": "#BE185D", "icon": "🌿"}};
const DEFAULT_CLR = '#6b7280';

// ── State ────────────────────────────────────────────────────────
let state = { period:'all', cat:'all', lang:'all', sort:'date', search:'', newOnly:false };

// ── Utils ────────────────────────────────────────────────────────
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseDate(s) {
  if (!s) return new Date(0);
  return new Date(s.replace(' ','T') + (s.length===10?'T00:00:00+09:00':'+09:00'));
}

function ageBucket(d) {
  const h = (Date.now() - parseDate(d)) / 3.6e6;
  if (h < 48) return 'new';
  if (h < 168) return 'week';
  return 'old';
}

function ageBadgeHtml(dateStr) {
  const d = parseDate(dateStr);
  const h = (Date.now() - d) / 3.6e6;
  let label, cls;
  if (h < 24)       { label='今日';            cls='age-new';  }
  else if (h < 48)  { label='昨日';            cls='age-new';  }
  else if (h < 168) { label=Math.floor(h/24)+'日前'; cls='age-week'; }
  else              { label=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); cls='age-old'; }
  return `<span class="age-badge ${cls}">${label}</span>`;
}

function catBadgesHtml(cats) {
  return (cats||[]).map(c => {
    const m = CAT_META[c] || {color:DEFAULT_CLR,icon:'📰'};
    const clr = m.color;
    return `<span class="cat-badge" style="background:${clr}18;color:${clr};border:1px solid ${clr}35">` +
           `${m.icon} ${esc(c)}</span>`;
  }).join('');
}

// ── Card builder ─────────────────────────────────────────────────
function buildCard(a) {
  const displaySummary = (a.lang==='en' && a.summary_ja) ? a.summary_ja : (a.summary||'');
  const displayTitle   = (a.lang==='en' && a.title_ja)   ? a.title_ja   : (a.title||'');
  const isEn = a.lang === 'en';

  const langBadge  = isEn
    ? '<span class="lang-badge lang-en">EN</span>'
    : '<span class="lang-badge lang-ja">JP</span>';
  const transBadge = isEn ? '<span class="trans-badge">🌐 翻訳</span>' : '';
  const newBadge   = a.is_new ? '<span class="is-new-badge">NEW</span>' : '';

  const summaryBlock = displaySummary.trim().length > 30
    ? `<p class="card-summary">${esc(displaySummary)}</p>`
    : `<p class="card-summary-empty">要約を取得できませんでした</p>`;

  const publishedDate = (a.published||'').slice(0,10);

  return `<article class="article-card"
  data-cats="${esc(JSON.stringify(a.categories||[]))}"
  data-lang="${a.lang||'ja'}"
  data-date="${a.published||''}"
  data-isnew="${a.is_new ? '1' : '0'}"
  data-source="${esc(a.source||'')}"
  data-search="${esc(((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase())}">

  <div class="card-band">
    <div class="card-cats">${catBadgesHtml(a.categories)}</div>
    <div class="card-meta">
      ${newBadge}
      ${ageBadgeHtml(a.published)}
      ${transBadge}
      ${langBadge}
    </div>
  </div>

  <div class="card-body">
    ${summaryBlock}
  </div>

  <div class="card-footer">
    <div class="card-footer-left">
      <div class="card-source">
        <span>${esc(a.source)}</span>
        <span class="card-source-dot">·</span>
        <span>${publishedDate}</span>
      </div>
      <a class="card-title" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
        ${esc(displayTitle)}
      </a>
    </div>
    <a class="read-btn" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" aria-label="記事を読む">
      記事を読む
      <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </a>
  </div>
</article>`;
}

// ── Filter ───────────────────────────────────────────────────────
function filterArticles() {
  const now = Date.now();
  return ARTICLES.filter(a => {
    if (state.newOnly && !a.is_new) return false;
    if (state.period !== 'all') {
      const h = (now - parseDate(a.published)) / 3.6e6;
      if (state.period==='today' && h>48)  return false;
      if (state.period==='week'  && h>168) return false;
      if (state.period==='month' && h>720) return false;
    }
    if (state.cat  !== 'all' && !(a.categories||[]).includes(state.cat)) return false;
    if (state.lang !== 'all' && a.lang !== state.lang) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const hay = ((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (state.sort==='date') return parseDate(b.published)-parseDate(a.published);
    const ca=(a.categories||[''])[0]||'', cb=(b.categories||[''])[0]||'';
    return ca!==cb ? ca.localeCompare(cb,'ja') : parseDate(b.published)-parseDate(a.published);
  });
}

// ── Section header ───────────────────────────────────────────────
function sectionHeader(catName, count) {
  const m = CAT_META[catName] || {color:DEFAULT_CLR, icon:'📰'};
  return `<div class="section-header">
    <span class="section-icon">${m.icon}</span>
    <span class="section-name" style="color:${m.color}">${esc(catName)}</span>
    <span class="section-count">${count}件</span>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const filtered = filterArticles();
  const container = document.getElementById('articlesContainer');
  const empty = document.getElementById('emptyState');
  document.getElementById('visibleCount').textContent = filtered.length;

  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    renderSidebar(filtered);
    return;
  }
  empty.style.display = 'none';

  if (state.sort==='cat' && state.cat==='all') {
    const groups = {};
    const ORDER = Object.keys(CAT_META);
    filtered.forEach(a => {
      const c = (a.categories||[])[0] || '未分類';
      (groups[c]=groups[c]||[]).push(a);
    });
    let html='';
    ORDER.forEach(c => {
      if (groups[c]?.length) html += sectionHeader(c,groups[c].length)+groups[c].map(buildCard).join('');
    });
    if (groups['未分類']?.length) html += sectionHeader('未分類',groups['未分類'].length)+groups['未分類'].map(buildCard).join('');
    container.innerHTML = html;
  } else {
    container.innerHTML = filtered.map(buildCard).join('');
  }

  renderSidebar(filtered);
}

// ── Sidebar render ───────────────────────────────────────────────
function renderSidebar(filtered) {
  const catCounts={}, srcCounts={};
  filtered.forEach(a => {
    (a.categories||[]).forEach(c=>{ catCounts[c]=(catCounts[c]||0)+1; });
    srcCounts[a.source]=(srcCounts[a.source]||0)+1;
  });

  // Categories
  const sidebarCats = document.getElementById('sidebarCats');
  let html = `<button class="sidebar-item ${state.cat==='all'?'active':''}" data-scat="all">
    <span class="sidebar-item-label">すべて</span>
    <span class="sidebar-count">${filtered.length}</span>
  </button>`;
  Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).forEach(([cat,cnt]) => {
    const m = CAT_META[cat]||{icon:'📰'};
    html += `<button class="sidebar-item ${state.cat===cat?'active':''}" data-scat="${esc(cat)}">
      <span class="sidebar-item-label">${m.icon} ${esc(cat)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarCats.innerHTML = html;

  // Sources
  const sidebarSrc = document.getElementById('sidebarSources');
  let srcHtml='';
  Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([src,cnt]) => {
    srcHtml += `<button class="sidebar-item" data-ssrc="${esc(src)}">
      <span class="sidebar-item-label" style="font-size:.8rem">${esc(src)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarSrc.innerHTML = srcHtml;

  // Sidebar category click
  sidebarCats.querySelectorAll('[data-scat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.scat;
      document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
      const chip = document.querySelector(`.cat-chip[data-cat="${CSS.escape(btn.dataset.scat)}"]`);
      if (chip) chip.classList.add('active'); else {
        const allChip = document.querySelector('.cat-chip[data-cat="all"]');
        if (allChip) allChip.classList.add('active');
      }
      render();
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Stats
  const newCnt = ARTICLES.filter(a=>a.is_new).length;
  document.getElementById('statTotal').textContent = ARTICLES.length;
  document.getElementById('statJa').textContent    = ARTICLES.filter(a=>a.lang==='ja').length;
  document.getElementById('statEn').textContent    = ARTICLES.filter(a=>a.lang==='en').length;
  document.getElementById('statNew').textContent   = newCnt;

  // Build category chips
  const wrap = document.getElementById('catChips');
  Object.entries(CAT_META).forEach(([name, m]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip';
    btn.dataset.cat = name;
    btn.textContent = m.icon + ' ' + name;
    wrap.appendChild(btn);
  });

  // Period tabs
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.period = btn.dataset.period;
      render();
    });
  });

  // Category chips
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.cat-chip');
    if (!btn) return;
    document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.cat = btn.dataset.cat;
    render();
  });

  // New-only toggle
  const newToggle = document.getElementById('newToggle');
  newToggle.addEventListener('click', () => {
    state.newOnly = !state.newOnly;
    newToggle.classList.toggle('active', state.newOnly);
    newToggle.setAttribute('aria-pressed', String(state.newOnly));
    render();
  });

  // Controls
  document.getElementById('langFilter').addEventListener('change', e=>{ state.lang=e.target.value; render(); });
  document.getElementById('sortBy').addEventListener('change',     e=>{ state.sort=e.target.value; render(); });
  document.getElementById('searchInput').addEventListener('input', e=>{ state.search=e.target.value.trim(); render(); });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
