している私立大学の削減案について懸念する緊急声明を発表した。福祉系大学の機械的な削減は地域を支える基盤が失われるとして、維持するための支援策などを要望。ソ教連は「福祉系大学を減らせば、適切なサービスを受けられない高齢者が続出する」と危機感を募らせている。\n財務省は４月２３日に開いた財政制度等審議会の分科会で、２０２４年時点で６２４校ある私大の４割を４０年までに削減するよう提案した。\n背景には１８歳人口の急減がある。２４年時点では１０９万人で、１９８９年より８９万人も減少。一方、私大数は８１３校と３１４校も増え、半数以上が定員割れとなっている。この結果、財務省は義務教育で学ぶ内容の授業をする大学もあると批判している。\nこれに対し、松本洋平文部科学大臣は４月２４日の会見で「機械的に判断するのではなく、分野や地域のリバランスを図りながら質の高い大学教育を実現することが重要」と説明。地域の福祉や医療、産業、インフラなどを支える人材と高等教育へのアクセスの確保を目指すべきとの考えを示した。\nソ教連の声明はこうした松本大臣の見解について支持を表明した。福祉系大学の削減は単に一つの教育機関の減少だけでなく、地域を支える専門職養成の循環がなくなると訴えている。\nその上で声明は、機械的な縮減ではなく、専門職の養成機能や卒業生の地域定着、自治体と福祉現場の連携などを総合的に評価するよう要請。社会人学生の受け入れや大学間の連携などにより、地域に必要な福祉人材の養成機能を維持する支援策を求めた。\nまた今後、養成校だけでなく福祉事業者や社会福祉協議会、自治体などの意見を十分に聞くよう訴えている。\nソ教連は現在、社会福祉士や精神保健福祉士を養成する大学や専門学校など２４２校で構成。すでに少子化の影響で２０１７年の２８０校から２割減少している。会員校が送り出す卒業生は年１万８０００人以上に上る。\nソ教連は「一度なくした養成校を復活させるのは不可能に近い。これから国内の高齢者が増加するにもかかわらず、福祉系大学を減らせば、適切なサービスを受けられないケースが続出するのは間違いない」と話している。", "summary": "福祉系大学の機械的な削減は地域を支える基盤が失われるとして、維持するための支援策などを要望。ソ教連は「福祉系大学を減らせば、適切なサービスを受けられない高齢者が続出する」と危機感を募らせている。福祉系大学の削減は単に一つの教育機関の減少だけでなく、地域を支える専門職養成の循環がなくなると訴えている。ソ教連は現在、社会福祉士や精神保健福祉士を養成する大学や専門学校など２４２校で構成。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "上野厚労相、リハビリ現場を視察　人材確保などの課題に「戦略的な政策を」", "url": "https://www.joint-kaigo.com/articles/46267/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-26 12:16", "description": "上野賢一郎厚生労働相は25日、リハビリテーションの現場の実態を把握するため、慶應義塾大学病院と初台リハビリテーション病院を視察した。【Joint編集部】 視察後に取材に応じた上野厚労相は、現場の課題解決に向けて「しっかり […]", "content": "上野賢一郎厚生労働相は25日、リハビリテーションの現場の実態を把握するため、慶應義塾大学病院と初台リハビリテーション病院を視察した。【Joint編集部】\n視察後に取材に応じた上野厚労相は、現場の課題解決に向けて「しっかりとした政策を戦略的に取ることができるよう努めていきたい」と意欲を示した。\n厚労省は今月19日、省内の関係部局を横断して政策を推進する「リハビリテーション統括調整室」を新設したばかり。ここを中心に医療や介護、予防などにまたがるリハビリテーション政策を国家戦略として推進する考えで、必要性に応じて制度改正も検討していく構えをみせている。\n上野厚労相は取材陣に対し、視察した両病院の職員らと行った意見交換の中で、リハビリテーション分野の人材確保や研修などの課題について話を聞いたと説明。患者や利用者がリハビリテーションを切れ目なく受けられる体制を構築することの重要性を、前線に立つ関係者から改めて指摘されたとも述べた。\nリハビリテーション専門職の賃上げについては、「他産業と遜色のない処遇改善を目指していく方針は今後も変わらない」と強調。報酬改定など現行の施策の効果を見極めつつ、「今後の対応をしっかり検討していかなければならない」との意向を示した。", "summary": "上野賢一郎厚生労働相は25日、リハビリテーションの現場の実態を把握するため、慶應義塾大学病院と初台リハビリテーション病院を視察した。厚労省は今月19日、省内の関係部局を横断して政策を推進する「リハビリテーション統括調整室」を新設したばかり。ここを中心に医療や介護、予防などにまたがるリハビリテーション政策を国家戦略として推進する考えで、必要性に応じて制度改正も検討していく構えをみせている。リハビリテーション専門職の賃上げについては、「他産業と遜色のない処遇改善を目指していく方針は今後も変わらない」と強調。", "categories": ["医療・健康", "人材育成・HR"], "is_new": false}, {"title": "介護の人員欠如減算、猶予特例を６月開始〈厚労省〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series05/45376", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-26 10:00", "description": "厚生労働省は８日、介護職員の配置基準を下回った際に適用される「人員基準欠如減算」を猶予する特例措置を６月から開始すると発表した。深刻な人材不足が続く介護現場への配慮が狙い。 現行制度では、特別養護老人ホームなどで介護職員やケアマネジャー、看護職員らの配置数が基準を下回った場合、翌月以降の介護給付費を原則３割減額する。制度創設時から設けられている仕組みだが、厚労省の審議会では「人材不足が深刻化する中、直ちに３割減算とするのは経営悪化につながりかねない」などとして、見直しを求める意見が出ていた。 特例では、職員や家族の突発的な体調不良など、やむを得ない事情で一時的に人員基準を満たせなくなった場合は年１回に限り、最長３カ月間、減算の適用を猶予する。 福祉人材センターやハローワークなどを通じて職員募集することや、事業所のウェブサイトで採用情報を公表することなどを条件とした。 特例の適用を受ける際は、人員基準を下回った月の翌月までに、所定様式に必要事項を記入し、報告時点で有効な求人票の写しを添付し、都道府県へ提出する必要がある。 福祉新聞Web", "content": "介護の人員欠如減算、猶予特例を６月開始〈厚労省〉\n2026年05月26日 福祉新聞編集部厚生労働省は８日、介護職員の配置基準を下回った際に適用される「人員基準欠如減算」を猶予する特例措置を６月から開始すると発表した。深刻な人材不足が続く介護現場への配慮が狙い。\n現行制度では、特別養護老人ホームなどで介護職員やケアマネジャー、看護職員らの配置数が基準を下回った場合、翌月以降の介護給付費を原則３割減額する。制度創設時から設けられている仕組みだが、厚労省の審議会では「人材不足が深刻化する中、直ちに３割減算とするのは経営悪化につながりかねない」などとして、見直しを求める意見が出ていた。\n特例では、職員や家族の突発的な体調不良など、やむを得ない事情で一時的に人員基準を満たせなくなった場合は年１回に限り、最長３カ月間、減算の適用を猶予する。\n福祉人材センターやハローワークなどを通じて職員募集することや、事業所のウェブサイトで採用情報を公表することなどを条件とした。\n特例の適用を受ける際は、人員基準を下回った月の翌月までに、所定様式に必要事項を記入し、報告時点で有効な求人票の写しを添付し、都道府県へ提出する必要がある。", "summary": "介護の人員欠如減算、猶予特例を６月開始〈厚労省〉\n2026年05月26日 福祉新聞編集部厚生労働省は８日、介護職員の配置基準を下回った際に適用される「人員基準欠如減算」を猶予する特例措置を６月から開始すると発表した。現行制度では、特別養護老人ホームなどで介護職員やケアマネジャー、看護職員らの配置数が基準を下回った場合、翌月以降の介護給付費を原則３割減額する。特例では、職員や家族の突発的な体調不良など、やむを得ない事情で一時的に人員基準を満たせなくなった場合は年１回に限り、最長３カ月間、減算の適用を猶予する。福祉人材センターやハローワークなどを通じて職員募集することや、事業所のウェブサイトで採用情報を公表することなどを条件とした。", "categories": ["人材育成・HR", "施設運営・経営"], "is_new": false}, {"title": "医療・介護のAI活用、高市首相が一層の推進を指示　ケアプラン作成や記録など効率化　現場の負担を軽減", "url": "https://www.joint-kaigo.com/articles/46252/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-25 20:38", "description": "政府は22日に開催した経済財政諮問会議で、今後の社会保障制度の改革を俎上に載せた。【Joint編集部】 高市早苗首相はこの中で、医療・介護分野のDX、AIやロボティクスの活用を一層推進するよう関係閣僚に指示した。労働供給 […]", "content": "2026年5月25日\n医療・介護のAI活用、高市首相が一層の推進を指示 ケアプラン作成や記録など効率化 現場の負担を軽減\n政府は22日に開催した経済財政諮問会議で、今後の社会保障制度の改革を俎上に載せた。【Joint編集部】\n高市早苗首相はこの中で、医療・介護分野のDX、AIやロボティクスの活用を一層推進するよう関係閣僚に指示した。労働供給制約が強まっていく中で、より効率的な体制を構築してサービスの質の確保につなげる狙いがある。\n今回の諮問会議では、民間議員が「限られた人材・財源の下でも持続可能なサービス提供体制へ転換していく必要がある」と提言。ケアプランの作成支援や音声入力、フィジカルAIによる介護支援など、AIを最大限に活用して現場の負担軽減と生産性の向上を一体的に進めるべきと促した。\nこのほか上野賢一郎厚生労働相も、「これまでの人材確保は各分野の縦割りで量的なマンパワーの確保に終始し、デジタル・AI時代の変化に対応できていない」と指摘。AIによる業務改革などと介護職員らの処遇改善をセットで進める意向を示し、「デジタル・AI時代の変化に対応した効率的・安定的な地域の人材の確保・養成」を図る方針を打ち出した。", "summary": "【Joint編集部】\n高市早苗首相はこの中で、医療・介護分野のDX、AIやロボティクスの活用を一層推進するよう関係閣僚に指示した。労働供給制約が強まっていく中で、より効率的な体制を構築してサービスの質の確保につなげる狙いがある。このほか上野賢一郎厚生労働相も、「これまでの人材確保は各分野の縦割りで量的なマンパワーの確保に終始し、デジタル・AI時代の変化に対応できていない」と指摘。AIによる業務改革などと介護職員らの処遇改善をセットで進める意向を示し、「デジタル・AI時代の変化に対応した効率的・安定的な地域の人材の確保・養成」を図る方針を打ち出した。", "categories": ["業務改善・介護テック", "人材育成・HR"], "is_new": false}, {"title": "日本ケアマネジメント学会が研究大会　「暮らしを耕す」をテーマに多角的な議論を展開", "url": "https://www.joint-kaigo.com/articles/46237/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-25 17:06", "description": "日本ケアマネジメント学会の第25回研究大会が5月23日、24日の両日に福井県福井市で開催された。【Joint編集部】 今回は「暮らしを耕すケアマネジメント 〜いのち・日常・環境にかかわるケアマネジャーの仕事を考える〜 」 […]", "content": "日本ケアマネジメント学会の第25回研究大会が5月23日、24日の両日に福井県福井市で開催された。【Joint編集部】\n今回は「暮らしを耕すケアマネジメント 〜いのち・日常・環境にかかわるケアマネジャーの仕事を考える〜 」をメインテーマに掲げた。\n初日の23日には、福井県医師会会長の池端幸彦氏による基調講演「これからのケアマネジャーの使命」や、福井県立大学名誉教授の奥西栄介氏による大会長講演「暮らしを耕すケアマネジメント」が行われた。\nまた、食事・嚥下ケアや認知症ケア、障害者ケア、ヤングケアラーへの対応など、複雑化・複合化する今日的な課題をテーマとした多彩なシンポジウムやワークショップ、口頭発表が展開された。\n学会の理事長を務める国際医療福祉大学大学院教授の白澤政和氏は、「新たなケアマネジメントの可能性を探る」と題した講演の中で、介護報酬の給付対象とならない業務をケアマネジャーが担っている地域の状況にも言及。ケアマネジメントの一時的・代替的な機能について、その重要性を指摘しつつ、「ケアマネジャーの仕事ではないとは言えない」との認識を示した。\nそのうえで、「そこに介護報酬がつかないところに課題がある。介護報酬上の議論をきちんと主張することが必要だ」と述べた。白澤氏はこのほか講演で、AIには代替できないケアマネジャーの専門性・創造性の追求、高齢者の強みに着目する「ストレングスモデル」の実践、本人の生きがいの支援など、多角的な視点から今後のケアマネジメントの可能性を展望した。", "summary": "日本ケアマネジメント学会の第25回研究大会が5月23日、24日の両日に福井県福井市で開催された。【Joint編集部】\n今回は「暮らしを耕すケアマネジメント 〜いのち・日常・環境にかかわるケアマネジャーの仕事を考える〜 」をメインテーマに掲げた。初日の23日には、福井県医師会会長の池端幸彦氏による基調講演「これからのケアマネジャーの使命」や、福井県立大学名誉教授の奥西栄介氏による大会長講演「暮らしを耕すケアマネジメント」が行われた。ケアマネジメントの一時的・代替的な機能について、その重要性を指摘しつつ、「ケアマネジャーの仕事ではないとは言えない」との認識を示した。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "物価高対策に実効性ある制度的対応を　自民党介護委員会が決議 - 福祉新聞Web", "url": "https://fukushishimbun.com/seiji/45373", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-25 14:00", "description": "来年度の介護報酬改定に向け、自民党の社会保障制度調査会介護委員会（委員長＝加藤勝信衆院議員）は１２日、物価高に実効性のある制度的対応を求める決議をまとめた。賃金と物価が上昇する中、公定価格で運営される介護分野では十分な価格転嫁ができず、経営悪化や人材流出への懸念が強まっていると訴えている。 決議は認知症高齢者の増加と生産年齢人口の減少が進む中、２０４０年に向けて人材確保や地域の実情に応じた支援体制の構築が極めて重要だと強調。一方、収入が公定価格で決まる介護分野では、約４割が赤字となるなど事業者の経営基盤が弱体化していると危機感を示した。 その上で、継続的な物価上昇を見据え、将来にわたり経営が安定するための制度的対応が必要だと要望。実効性のある人材確保策と、他業種と遜色のない処遇改善の確実な実現を訴えている。 また、報酬体系や算定要件の複雑化に伴って増加する事務負担への配慮や、生産性向上の取り組み、災害時における介護施設などの機能強化も求めた。 会合には、全国社会福祉法人経営者協議会や全国老人福祉施設協議会など１３団体が出席。田村憲久元厚生労働大臣は、３年ごとの介護報酬改定では物価や人件", "content": "物価高対策に実効性ある制度的対応を 自民党介護委員会が決議\n2026年05月25日 福祉新聞編集部来年度の介護報酬改定に向け、自民党の社会保障制度調査会介護委員会（委員長＝加藤勝信衆院議員）は１２日、物価高に実効性のある制度的対応を求める決議をまとめた。賃金と物価が上昇する中、公定価格で運営される介護分野では十分な価格転嫁ができず、経営悪化や人材流出への懸念が強まっていると訴えている。\n決議は認知症高齢者の増加と生産年齢人口の減少が進む中、２０４０年に向けて人材確保や地域の実情に応じた支援体制の構築が極めて重要だと強調。一方、収入が公定価格で決まる介護分野では、約４割が赤字となるなど事業者の経営基盤が弱体化していると危機感を示した。\nその上で、継続的な物価上昇を見据え、将来にわたり経営が安定するための制度的対応が必要だと要望。実効性のある人材確保策と、他業種と遜色のない処遇改善の確実な実現を訴えている。\nまた、報酬体系や算定要件の複雑化に伴って増加する事務負担への配慮や、生産性向上の取り組み、災害時における介護施設などの機能強化も求めた。\n会合には、全国社会福祉法人経営者協議会や全国老人福祉施設協議会など１３団体が出席。田村憲久元厚生労働大臣は、３年ごとの介護報酬改定では物価や人件費の高騰に対応しきれないとの危機感を示し、現行制度の見直しが必要との認識を示した。", "summary": "物価高対策に実効性ある制度的対応を 自民党介護委員会が決議\n2026年05月25日 福祉新聞編集部来年度の介護報酬改定に向け、自民党の社会保障制度調査会介護委員会（委員長＝加藤勝信衆院議員）は１２日、物価高に実効性のある制度的対応を求める決議をまとめた。賃金と物価が上昇する中、公定価格で運営される介護分野では十分な価格転嫁ができず、経営悪化や人材流出への懸念が強まっていると訴えている。一方、収入が公定価格で決まる介護分野では、約４割が赤字となるなど事業者の経営基盤が弱体化していると危機感を示した。田村憲久元厚生労働大臣は、３年ごとの介護報酬改定では物価や人件費の高騰に対応しきれないとの危機感を示し、現行制度の見直しが必要との認識を示した。", "categories": ["施設運営・経営", "福祉・社会保障"], "is_new": false}, {"title": "民生委員にチーム制導入を　負担軽減へ調査研究で提言〈厚労省〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/fukushiippan/45371", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-25 10:00", "description": "厚生労働省は民生委員・児童委員の担い手不足解消に向けた調査研究を行い、民生委員が１人で１区域を担う負担が重いことから、複数の民生委員で区域を担当するチーム制を導入することなどが提言された。 民生委員は全国に約２２万人おり、３年に１度一斉改選される。直近の２０２５年度改選では欠員が初めて２万人を超え、担い手確保の問題はより深刻化している。 調査研究は委託を受けた日本総合研究所が実施。市区町村アンケート（回収８３７カ所）によると民生委員の８７％が６０代以上で、５４％は就業していた。２５年度改選での新任委員の割合は３５％。推薦母体は「自治会、町内会」「現任民生委員」「市区町村民生委員児童委員協議会、地区民児協」が多かった。担い手確保の取り組みは、民生委員に対する研修の実施、表彰事業、感謝状授与、サポートする仕組みの整備が上位だった。 民生委員が特に負担に感じていることは「訪問活動」が最多。次いで「行政からの充て職や動員」「行事、事業、会議」と続いた。負担軽減に関する取り組みは、定例会などの会議や研修の見直しが多かった。７４％は民生委員活動と仕事を両立するための支援をしていなかった。 提言では", "content": "民生委員にチーム制導入を 負担軽減へ調査研究で提言〈厚労省〉\n2026年05月25日 福祉新聞編集部厚生労働省は民生委員・児童委員の担い手不足解消に向けた調査研究を行い、民生委員が１人で１区域を担う負担が重いことから、複数の民生委員で区域を担当するチーム制を導入することなどが提言された。\n民生委員は全国に約２２万人おり、３年に１度一斉改選される。直近の２０２５年度改選では欠員が初めて２万人を超え、担い手確保の問題はより深刻化している。\n調査研究は委託を受けた日本総合研究所が実施。市区町村アンケート（回収８３７カ所）によると民生委員の８７％が６０代以上で、５４％は就業していた。２５年度改選での新任委員の割合は３５％。推薦母体は「自治会、町内会」「現任民生委員」「市区町村民生委員児童委員協議会、地区民児協」が多かった。担い手確保の取り組みは、民生委員に対する研修の実施、表彰事業、感謝状授与、サポートする仕組みの整備が上位だった。\n民生委員が特に負担に感じていることは「訪問活動」が最多。次いで「行政からの充て職や動員」「行事、事業、会議」と続いた。負担軽減に関する取り組みは、定例会などの会議や研修の見直しが多かった。７４％は民生委員活動と仕事を両立するための支援をしていなかった。\n提言では、民生委員の選出に地域包括支援センターや社会福祉法人などが関与する仕組みの整備を求め、住民の情報を把握できる小地域で推薦準備会を設けて候補者を選出することも有効だとした。現役世代に向けた広報活動を推進することや、「隣人愛」など民生委員の基本理念は維持しつつ、「現在の民生委員像」について議論を深めていくことも提言された。", "summary": "民生委員にチーム制導入を 負担軽減へ調査研究で提言〈厚労省〉\n2026年05月25日 福祉新聞編集部厚生労働省は民生委員・児童委員の担い手不足解消に向けた調査研究を行い、民生委員が１人で１区域を担う負担が重いことから、複数の民生委員で区域を担当するチーム制を導入することなどが提言された。推薦母体は「自治会、町内会」「現任民生委員」「市区町村民生委員児童委員協議会、地区民児協」が多かった。民生委員が特に負担に感じていることは「訪問活動」が最多。７４％は民生委員活動と仕事を両立するための支援をしていなかった。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "介護・障害報酬のプラス改定を　経営協が厚労大臣に緊急要望 - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45368", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-24 14:00", "description": "全国社会福祉法人経営者協議会（磯彰格会長）は１８日、上野賢一郎厚生労働大臣に、２０２７年度の介護報酬と障害福祉サービス等報酬のプラス改定を求める要望書を提出した。物価高騰や人件費上昇が続く中、社会福祉法人の経営が悪化しているとして、迅速な財政支援も求めている。 ２５年度における全産業平均の月収は３９万６０００円。これに対し、介護は３１万４０００円、障害福祉は３１万９０００円、保育は３４万３０００円と大きく差が開いている。 ２６年度は臨時で介護が２・０３％、障害福祉が１・８４％のプラス改定が行われたが、ほとんどが職員の処遇改善分で、法人運営の財源ではないのが現状だ。 同日、経営協の磯会長は山田雅人副会長、久木元司副会長、廣江晃総務広報委員長、堤洋三滋賀経営協会長ら幹部とともに厚労省を訪問した。社会福祉法人は社会保障を支える重要なインフラだと訴え、赤字割合が３割に上る厳しい経営環境を説明。現状のままでは介護職員と全産業平均の賃金差が１０万円に広がる懸念を示した。 さらに建築工事費がこの１０年で１・６倍に上昇したにもかかわらず、補助単価がほぼ横ばいである点にも触れ、建物の改修などを見送らざる", "content": "介護・障害報酬のプラス改定を 経営協が厚労大臣に緊急要望\n2026年05月24日 福祉新聞編集部全国社会福祉法人経営者協議会（磯彰格会長）は１８日、上野賢一郎厚生労働大臣に、２０２７年度の介護報酬と障害福祉サービス等報酬のプラス改定を求める要望書を提出した。物価高騰や人件費上昇が続く中、社会福祉法人の経営が悪化しているとして、迅速な財政支援も求めている。\n２５年度における全産業平均の月収は３９万６０００円。これに対し、介護は３１万４０００円、障害福祉は３１万９０００円、保育は３４万３０００円と大きく差が開いている。\n２６年度は臨時で介護が２・０３％、障害福祉が１・８４％のプラス改定が行われたが、ほとんどが職員の処遇改善分で、法人運営の財源ではないのが現状だ。\n同日、経営協の磯会長は山田雅人副会長、久木元司副会長、廣江晃総務広報委員長、堤洋三滋賀経営協会長ら幹部とともに厚労省を訪問した。社会福祉法人は社会保障を支える重要なインフラだと訴え、赤字割合が３割に上る厳しい経営環境を説明。現状のままでは介護職員と全産業平均の賃金差が１０万円に広がる懸念を示した。\nさらに建築工事費がこの１０年で１・６倍に上昇したにもかかわらず、補助単価がほぼ横ばいである点にも触れ、建物の改修などを見送らざるを得ない法人もあると訴えた。\nほかの幹部らは「福祉分野の職員も消費者であり、処遇改善は地域経済を支えることになる」「人口減少の影響で地域では毎年のように社会福祉法人の解散がみられる」「営利法人の利益率が高いのは、採算が取れない地域からは早期に撤退する傾向があるからだ」などと各地域の現状を説明した。\nこれに対し上野大臣は、福祉職の処遇改善は重要との認識を示し「２７年度は相応の水準が達成できるよう努力したい」と語った。", "summary": "介護・障害報酬のプラス改定を 経営協が厚労大臣に緊急要望\n2026年05月24日 福祉新聞編集部全国社会福祉法人経営者協議会（磯彰格会長）は１８日、上野賢一郎厚生労働大臣に、２０２７年度の介護報酬と障害福祉サービス等報酬のプラス改定を求める要望書を提出した。物価高騰や人件費上昇が続く中、社会福祉法人の経営が悪化しているとして、迅速な財政支援も求めている。２５年度における全産業平均の月収は３９万６０００円。これに対し、介護は３１万４０００円、障害福祉は３１万９０００円、保育は３４万３０００円と大きく差が開いている。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "30人特養の49％が赤字　通常単価移行の影響も〈厚労省調査〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series05/45366", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-24 10:00", "description": "全国に約５００ある定員３０人の小規模特別養護老人ホームの４９％が赤字であることが、厚生労働省の最新調査で分かった。赤字割合は地域密着型特養４３％、広域型特養４２％より高い。特に１法人１施設、または地域で唯一の施設はより厳しい経営状況にあった。 小規模特養は高齢者が少ない離島や過疎地、土地を確保できない都市圏などで特例的に設置が認められた。スケールメリットを生かせないといった事情に配慮し、介護報酬は比較的高い「経過的単価」だったが、２０２５年４月、離島や過疎地以外にあり、ほかの特養と併設されている場合は通常の基本単価とする見直しなどがあった。 調査は全国老人福祉施設協議会に委託して２５年８～９月に行われ、小規模特養５０５カ所、地域密着型特養、広域型特養各１５００カ所に２４年度決算の状況などを聞いた（回収率２３～５４％）。 小規模特養が開設された時期は００年３月以前（介護保険法施行前）が４０％を占め、所在地は離島、過疎地、中山間地が計２４％。１法人１施設は２０％で、サービス活動収益は１億～２億円未満が７９％だった。 約５年後の事業について聞くと、現状維持が６２％で最多だったが、縮小、休止、", "content": "30人特養の49％が赤字 通常単価移行の影響も〈厚労省調査〉\n2026年05月24日 福祉新聞編集部全国に約５００ある定員３０人の小規模特別養護老人ホームの４９％が赤字であることが、厚生労働省の最新調査で分かった。赤字割合は地域密着型特養４３％、広域型特養４２％より高い。特に１法人１施設、または地域で唯一の施設はより厳しい経営状況にあった。\n小規模特養は高齢者が少ない離島や過疎地、土地を確保できない都市圏などで特例的に設置が認められた。スケールメリットを生かせないといった事情に配慮し、介護報酬は比較的高い「経過的単価」だったが、２０２５年４月、離島や過疎地以外にあり、ほかの特養と併設されている場合は通常の基本単価とする見直しなどがあった。\n調査は全国老人福祉施設協議会に委託して２５年８～９月に行われ、小規模特養５０５カ所、地域密着型特養、広域型特養各１５００カ所に２４年度決算の状況などを聞いた（回収率２３～５４％）。\n小規模特養が開設された時期は００年３月以前（介護保険法施行前）が４０％を占め、所在地は離島、過疎地、中山間地が計２４％。１法人１施設は２０％で、サービス活動収益は１億～２億円未満が７９％だった。\n約５年後の事業について聞くと、現状維持が６２％で最多だったが、縮小、休止、廃止を予定または検討しているとの回答が１５％あった。理由は「職員、入所者の確保難」「収益が見込めない」が多かった。\n１法人１施設においては６７％の法人が赤字。日常生活圏域で唯一の入所系サービスである小規模特養では７３％が赤字で、縮小、休止、廃止を想定している割合が２９％と高かった。\n一方、２５年４月に経過的単価から外れた小規模特養は８２カ所。そのうち３７カ所（４５％）が２５年４～６月のサービス活動増減差額が減少した。外れたことで年１２００万円減収となった小規模特養もあり、「外されると運営は厳しい」との声も聞かれた。調査報告では「２５年４月の通常単価への移行後の経営状況を、引き続き注視していく必要がある」としている。", "summary": "赤字割合は地域密着型特養４３％、広域型特養４２％より高い。特に１法人１施設、または地域で唯一の施設はより厳しい経営状況にあった。日常生活圏域で唯一の入所系サービスである小規模特養では７３％が赤字で、縮小、休止、廃止を想定している割合が２９％と高かった。一方、２５年４月に経過的単価から外れた小規模特養は８２カ所。", "categories": ["施設運営・経営", "介護保険・制度"], "is_new": false}, {"title": "How To Deal With Regret ( 3 Stoic Strategies to Live Free)", "url": "https://dailystoic.com/how-to-deal-with-regret-3-stoic-strategies-to-live-free/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-08-24 01:48", "description": "What Is Regret? “Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic After a long day at work and terrible traffic, […] The post How To Deal With Regret ( 3 Stoic Strategies to Live Free) appeared first on Daily Stoic .", "content": "What Is Regret?\n“Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic\nAfter a long day at work and terrible traffic, you finally make it home. The stress has taken its toll, and you’re exhausted, bored, and frustrated with the day’s events all at once. You walk into your kitchen to find a heaping pile of dishes–something you asked your spouse to take care of this morning! Yet, they’re relaxing in front of the TV as if nothing’s wrong.\nYou feel the anger rising up, and unable to control yourself, you yell at your spouse. You don’t hold back. You’re out to make a point, to prove that what happened is a really big deal.\nYour spouse is frightened and embarrassed. They’re worried–you’ve never yelled at them like this before. They were going to do the dishes later, but you never gave them that opportunity. The day’s been long for them too, yet you didn’t care. They just wanted to have a nice night with you, but now that’s ruined.\nLater that night, you finally start to understand what losing your temper has cost you. You know you shouldn’t have said what you said. You should have been more considerate. You should have acted differently–you regret your choices.\nMaybe for you it wasn’t a pile of dishes that set you off. Maybe it was your kids using markers on the wall. Or your boss dumping that report on you before your vacation. Regardless of the scenario, we’ve all lost it at some point, and we’ve all felt the pang of regret.\nThe Stoics would define regret as the moment when past events consume our present lives. When we dwell over things we have no control over. When we resist our fate. Marcus Aurelius argued that we must be “satisfied with what [we] have, and accept the present–all of it.” Regret is the contrary–when we’re not satisfied with what we have, when we reject what we’ve been given.\nSeneca said “we often suffer more in imagination than in reality.” He was saying that regret is no more than an emotion of our imagination. We believe that had we said something (or held our tongue), had we acted differently, the outcome would have been different.\nMarcus Aurelius carried a similar mindset, and provided a solution to this problem. “External things are not the problem. It is your assessment of them. Which you can erase right now.”\nLet’s take another look at that “fight” you had with your spouse. Your regrets are not about the actual dishes or your spouse–it’s about your perception of expectations. You expected your spouse to have the dishes done when you got home. So you believe it should have been different, and had it been different, you would be better off.\nSo does that mean it’s your spouse’s fault? Maybe for leaving the dishes in the sink. But certainly not for your overreaction. And definitely not for the regret you felt later that night. Regret is an internal problem, to be both diagnosed and treated by ourselves. We must learn to look past these “self-focused emotions” and master our feelings of regret. This post aims to help you understand your emotions, use the past to your advantage, and conquer your biggest regrets.\nWhy Do I Feel Regret?\n“Life is very short and anxious for those who forget the past, neglect the present, and fear the future” – Seneca\nWe’ve all told ourselves, “no regrets.” There are countless memes, inspirational quotes, and videos reminding us online. Poets, singers, painters, and writers have been creating art about it for millenia. We’ve practically been conditioned to live by it.\nBut no matter how many times we read about it, sing along to a song about it, or tell ourselves not to, we all have something we regret. We all have that nagging feeling that comes back to us. That hits us exactly when we thought we forgot about that time, that place, those people. It comes back at the very worst time. It sucks. It hurts.\nThe power of regret is not to be understated. Bestselling author and founder of the American Regret Project Daniel Pink found that 82 percent of Americans experience regret at least occasionally. Pink describes regret as “an indispensable emotion,” yet also claims it can be “a positive instrument for improving your life.”\nIf we truly want to improve our life, we can’t run away from these negative feelings. We can’t hide them. But should we just accept this despair? Should we just come to terms living with regret?\nThis is what the great writer Samuel Johnson must have been wondering near the end of 1775. With 1776 on the horizon, Johnson wrote in his diary:\n“When I look back on resolutions of improvement and amendment which have year after year been made and broken, either by negligence, forgetfulness, vicious idleness, casual interruption, or morbid infirmity; when I find that so much of my life has been stolen unprofitably away, and that I can descry by retrospection scarcely a few single days properly and vigorously employed, why do I yet try to resolve again? I try because reformation is necessary and despair is criminal.”\nJohnson came to terms with his past, but not with his regret. He chose to reflect upon his hardships in order to better himself, to avoid making those same mistakes in the future. He chose to fight regret–not to wallow in it.\nIf there’s one thing we can learn from Johnson, it must be that experiencing regret is inevitable–but our actions and our mindset are not. Thus, the question is not ‘Why do I feel regret?’, but rather ‘How do I deal with it?’ ‘How do I move on?’ ‘How can I make myself better because of this?’ In order to answer these questions, the Stoics practiced the following strategies to help them build their mental toughness and resilience–starting with examining what they controlled.\nFocus On What You Control\n“Every event has two handles, one by which it can be carried, and one by which it can’t. If your brother does you wrong, don’t grab it by his wronging, because this is the handle incapable of lifting it. Instead, use the other—that he is your brother, that you were raised together, and then you will have hold of the handle that carries.” – Epictetus\nOne of the most important practices in Stoic philosophy, which was introduced by Epictetus, is determining what we control and what we don’t. What we have power over and what we don’t. What we can change and what we can’t.\nThere are two ways in which we can look at the past–two handles we can grab, to use Epictetus’ quote. The first handle forces us to perceive the past as an inevitable experience, destined to wrong and hurt us from the beginning. The opposite handle, however, allows us to extract the good parts, and use our experiences to benefit ourselves.\nIn looking at past decisions, we must grab them by the latter handle. We must understand that what happened, happened. We must see that we can’t change the past, no matter how much it hurt us or someone else. So what good does regret do?\nAbsolutely nothing, as Holocaust survivor and author Dr. Edith Eger explained to Ryan Holiday on an episode of The Daily Stoic Podcast. Ryan was discussing a relationship he regretted messing up, and Dr. Eger offered him one gift that would solve the guilt right then. “I give you a sentence,” she said, “One sentence—if I knew then what I know now, I would have done things differently.” That’s the end of that, she said. “Guilt is in the past, and the one thing you cannot change is the past.”\nAs a society we’ve become disillusioned by the idea of what we control. We all believe we have some control over the outcome of whatever we encounter. We all believe that if we keep thinking about what happened, somehow we’ll be able to change what happened.\nYet, we must come to terms with the fact that some things simply can’t be changed. We must understand that some things are in our control and some that aren’t. Say, if you regret getting a haircut, you’re in control. You can style it, cover it, or just wait for it to grow out again–you command your situation. But if you regret cursing out your boss before quitting your job, you’re not in control–you can’t take back your words.\nAs Marcus Aurelius wrote to himself—and by extension, to us:\n“Remind yourself that past and future have no power over you. Only the present—and even that can be minimized. Just mark off its limits. And if your mind tries to claim that it can’t hold out against that…well, then, heap shame upon it.”\nThe past is done. We can’t linger in our insecurities. We can’t ponder over our regrets. We must learn that what happened is out of our control now–we must let go.\n“Letting go is a necessary, if sometimes heart-wrenching gateway to genuine transformation,” is how the always-zen basketball coach Phil Jackson put it. The Stoics called it the “art of acquiescence”—the giving up and the assenting of whatever things are so that they can be what they are to become.\nIn one way, regret is just wishing things went the way we wanted them to. But by letting things become what they must, we are less likely to regret what we’ve done. In accepting that some things are simply out of our control, we are less likely to wish for a different outcome.\nThe past is something we can’t control anymore. We can’t change what we said, what we did, or how we felt.\nWe can, however, control the present. We control how we grow from our experiences. We control how we respond to adversity. We control how we can use our regret to our advantage.\nWe control how we act right now. We must.\nTo learn more on this topic, check out “You Control How You Play”, where Ryan speaks to the Cleveland Browns about the importance of perspective, staying motivated, and knowing what they control.\nLove Your Fate\n“A blazing fire makes flame and brightness out of everything that is thrown into it.” – Marcus Aurelius\nAfter we sort out what we control, we must find how to respond–regardless if we control what’s happening or not. We must determine how we handle ourselves. We must determine how we overcome obstacles. We must determine how to move forward.\nIn the first book of his Discourses, Epictetus envisions himself being executed by Roman guards, his life out of his control. In a display of tranquility and wisdom, he lays out his thoughts:\n“I must die. But must I die bawling? I must be put in chains–but moaning and groaning too? I must be exiled; but is there anything to keep me from going with a smile, calm and self-composed.”\nThough the term was first coined by German philosopher Friedrich Nietzsche, the practice of amor fati–loving your fate–dates back to Epictetus and the Stoics. Often by means of reflection and meditation, the Stoics would use this practice to settle past trauma and help them achieve a greater sense of inner peace. “The Fates guide the person who accepts them,” Cleanthes said, “and hinder the person who resists them.”\nAmor fati is more than just understanding what happens to us. It’s understanding that our perception doesn’t always have to be negative. It’s understanding that accepting the present circumstances will make us better. It’s understanding that we must be grateful for the cloudy weather sometimes–and that there’s always a way through the storm.\nWe all face hardships. We all get stuck in traffic. We all deal with slow WiFi, or bad cell service, right when we need to send that important message. As rational people, we tend to think that these hardships were made specifically for us. That the world is out to get us. That we can’t win.\nBut this couldn’t be farther from the truth. Everybody goes through obstacles. Everybody gets tripped up sometimes. As we talked about in the first section, we can’t control some things in life. And these hardships, no matter how hard we try, will always be out of our control.\nWhen we accept what happens to us, after understanding that certain things— particularly bad things—are outside our control, we are left with this: loving whatever happens to us and facing it with unfailing cheerfulness and strength. As bestselling author Robert Greene (48 Laws of Power, Mastery) put it, we need to, “accept the fact that all events occur for a reason, and that it is within your capacity to see this reason as positive.”\nMarcus Aurelius portrays this concept perfectly in Meditations through the image of an artisans shop:\n“There are thorns on the path, then keep away! Enough said. Why ponder the existence of nuisance? Such thinking would make you a laughing-stock to the true student of Nature, just as a carpenter or cobbler would laugh if you pointed out the sawdust and chips on the floors of their shops. Yet while those shopkeepers have dustbins for disposal, Nature has no need of them.”\nWhy get tripped up by the thorns? Why ponder over the sawdust on your floor? It’s simply part of nature! As long as you have the capability to see them, you have the capability to move past them.\nIn practicing amor fati, we’re also less likely to have regrets in the future. By embracing the challenges that lay ahead of us, we’re less likely to regret the decisions we make to conquer them – regardless of the outcome. We’re able to tackle the future with confidence, conviction, courage, and so much more.\nAmor fati is more than just a mindset–it’s a way of life. Incorporating amor fati into your life will take time, effort, and sacrifices that probably won’t feel comfortable. But we must. We must move past this existential angst. We must move forward, away from our regret, and towards our future.\nLove what’s happened to you. Love who you’ve become, and how much you’ve changed. Love your fate–amor fati.\nCarry this reminder with you every day with our amor fati medallion from the Daily Stoic Store. Carry this in your pocket as a reminder to treat each and every moment–no matter how challenging–as something to be embraced, not avoided.\nLook Ahead\n“We should project our thoughts ahead of us at every turn and have in mind every possible eventuality instead of only the usual course of action.” – Seneca\nBefore Ryan Holiday gets on stage for a big speech, he runs through everything that could go wrong: trouble with the microphone, the clicker not advancing a slide, the audience not reacting as anticipated. He is able to see potential problems before they arise, and come up with solutions before anything actually happens. He is able to prevent himself from being overwhelmed if a problem arises by being prepared.\n“Rehearse them in your mind: exile, torture, war, shipwreck,” Seneca said. “All the terms of our human lot should be before our eyes.”\nThis practice, called premeditatio malorum, is one of the oldest and most common practices in Stoic philosophy. It literally means the “premeditation of evils.” The Stoics used this practice to help them prepare for life’s inevitable hardships, and remain calm and confident in turbulent times.\nThe world isn’t fair. We all know this. We don’t always get what is ours, even if we’ve earned it. We don’t always win, even if we play hard.\nBut we can’t be surprised when we don’t win. If it comes as a constant surprise each and every time something unexpected occurs, you’re not only going to be miserable whenever you attempt something big, you’re going to have a much harder time accepting it and moving on to attempts two, three, and four. You’re going to have a much harder time living in the present instead of lingering in the past. You’re going to have a much harder time trusting your instincts–and fighting regret.\nThere’s perhaps no better personification of premeditatio malorum than the great Booker T. Washington. Washington ran a school with 1,500 students, all while advising politicians and activists and traveling across the country to give speeches. But how? How did he maintain this lifestyle, and with such striking success?\n“When I begin my work in the morning, I expect to have a successful and pleasant day of it, but at the same time I prepare myself to hear that one of our school buildings is on fire, or has burned, or that some disagreeable accident had occurred, or that someone has abused me in a public address or a printed article, for something that I have done or omitted to do, or or something that he had heard that I had said—probably something I had never thought of saying.”\nHe envisioned the worst possible things that could happen to him throughout his day. Not only envisioned, but he expected them to happen. In doing this, Washington was more prepared for the hardships of the day. A canceled train couldn’t be as bad as his school burning down. Being late to dinner couldn’t be as bad as someone verbally abusing him in public.\nIn preparing himself for challenges, Washington was simultaneously preparing himself for regret. Since he saw his fears right in front of him, and anticipated them happening, he was less scared of the outcomes of his choices–and he was less likely to regret them.\nIn the same manner, Epictetus used this to help him foresee all of the dangers that came with a seemingly easy decision–bathing:\n“If you are going to bathe, represent to yourself the incidents usual in the bath—some persons pouring out, others pushing in, others scolding, others pilfering…. For thus, if any impediment arises in bathing, you will be able to say, “It was not only to bathe that I desired, but to keep my will in harmony with nature; and I shall not keep it thus if I am out of humor at things that happen.”\nPracticing premeditatio malorum allows us to be more prepared for life’s inevitable setbacks. Though it may be hard to admit, everything will not go our way. We might not get that job that we want. We might not win that game. But we will be ready for any obstacles that cross our path.\nWe’ll know that we made the right decision – and we won’t regret our choices.\nIf you want to hear Ryan talk more about this topic, check out The Stoic Secret Of Facing Failure To Achieve Success: Premeditatio Malorum on the Daily Stoic YouTube Channel.\n10 Best Stoic Quotes on Regret\n“Then remind yourself that past and future have no power over you. Only the present – and even that can be minimized.” – Marcus Aurelius, from Meditations\n“He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has.” – Epictetus, from Fragments\n“External things are not the problem. It is your assessment of them. Which you can erase right now.” – Marcus Aurelius, from Meditations\n“Give yourself a gift, the present moment.” – Marcus Aurelius, from Meditations\n“The man who has anticipated the coming of troubles takes away their power when they arrive.”- Seneca, from Consolation to Marcia\n“To shrug it all off and wipe it clean—every annoyance and distraction—and reach utter stillness. Child’s play.” — Marcus Aurelius, from Meditations\n“Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic\n“When we are no longer able to change a situation, we are challenged to change ourselves.” – Viktor Frankl\n“There is only one way to happiness and that is to cease worrying about things which are beyond the power of our will.” – Epictetus, from Discourses\n“Do not spoil what you have by desiring what you have not; remember that what you now have was once among the only things you hoped for.” – Epicurus\nAdditional Resources\nPodcasts:\nHolocaust Survivor Dr. Edith Eger on the Gift of Forgiveness\nKate Courtney, Karen Duffy, Meg Mason, and Susan Cain on Using Stoicism to Endure Life’s Obstacles\nYou can subscribe to the Daily Stoic Podcast here, and our podcast YouTube channel here.\nDaily Stoic Meditations:\n“We Almost Always Regret This”\n“The Question To Ask When You Mess Up”\nTo sign up for one free email per day inspired by Stoic philosophy, click here.\nRyan Holiday’s RSS newsletter:\n24 Things I Wish I Had Done Sooner (or my biggest regrets), from ryanholiday.net\n40 Ways To Live A Full Life (And Leave Nothing On The Table) By Age 30, from ryanholiday.net\nTo receive more of Ryan’s “insider” emails, subscribe here. Twice each month, Ryan writes a longer-than-normal essay on various topics, including wealth, philosophy, parenting, and living the good life. Join over 170,000 subscribers today!\nDaily Stoic Store:\nPremeditatio Malorum Medallion\nTo find other Stoic reminders, jewelry, books, courses and more, you can visit the Daily Stoic store here.", "summary": "You know you shouldn’t have said what you said. You should have acted differently–you regret your choices. Say, if you regret getting a haircut, you’re in control. Love what’s happened to you.", "categories": ["メンタル・哲学", "業務改善・介護テック"], "is_new": false, "title_ja": "後悔にどう対処するか (自由に生きるための 3 つのストイックな戦略)", "summary_ja": "あなたは自分が言ったことを言うべきではなかったと知っています。別の行動を取るべきだった――自分の選択を後悔している。たとえば、散髪したことを後悔しても、それは自分で決めることができます。あなたに起こったことを愛してください。"}, {"title": "What Does It Mean To Be Wealthy?", "url": "https://dailystoic.com/what-does-it-mean-to-be-wealthy/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-08-01 02:13", "description": "“These individuals have riches just as we say that we ‘have a fever,’ when really the fever has us.” — Seneca We all know those people who have lots of money, and yet, they are miserable. On the flip side, we all know people who live happy and fulfilled lives despite not having lots of money. […] The post What Does It Mean To Be Wealthy? appeared first on Daily Stoic .", "content": "“These individuals have riches just as we say that we ‘have a fever,’ when really the fever has us.” — Seneca\nWe all know those people who have lots of money, and yet, they are miserable. On the flip side, we all know people who live happy and fulfilled lives despite not having lots of money.\nMoney, the Stoics said, is not an indicator of wealth.\nThe slave turned teacher Epictetus liked to tell his students of a man who had been offered a lucrative job by the emperor Augustus. “I told him not to touch it,” Epictetus told his students.\nBut, the man told Epictetus, I will make a lot of money.\nYes, Epictetus said, “for little in return.”\nBut, the man said, a lot of people will learn my name.\n“Ok,” Epictetus said, “are you planning to be there every time someone utters your name?”\nBut, the man said, my name will outlive me.\n“So will a rock you carve your name into,” Epictetus said.\nBut, the man said, I will get to wear a gold crown.\n“And they will put a crown made of roses on you for your funeral,” Epictetus said. “You will look even more elegant in that.”\nThe man saw the sum of money, but he didn’t see that a sum of money is a poor indication of value. As Epictetus liked to ask his students,\n“What decides whether a sum of money is good? The money is not going to tell you.”\nIt’s not going to tell you about all you have to give up in exchange for that money. It’s not going to tell you that you might be happier in a job that offers less money. It’s not going to tell you about all the losses that come with the gain.\nWe will. We created this guide—rooted in the experiences and writings of the Stoics—to give you a time-tested playbook to help you learn how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life. This post is going to cover the high level ideas. If you really want to get serious about living what the Stoics called the good life, we suggest checking out our course The Wealthy Stoic: A Daily Stoic Guide To Being Rich, Free, and Happy, a 9-week course designed to equip you with the tools, mindsets, and habits of the wealthiest Stoics in history.\nThis is a long post. It should be saved and revisited. It can be read straight through or if you prefer, feel free to jump around…\nHOW DID THE STOICS VIEW WEALTH?\nMoney Doesn’t Make You Rich\nLook at any millionaire, Seneca tells Lucilius in one of his letters, they are some of the poorest people in Rome. Money has made them obsess over public opinion. Money has control of their schedules and their decisions. Money has put them in the center of a circle of sycophants and grifters. Money has escalated their tastes and expectations beyond quenching.\n“These individuals,” Seneca writes, “have riches just as we say that we ‘have a fever,’ when really the fever has us.” It’s a sad sight, he says.\nWhat’s sadder is that the look-at-any-millionaire experiment still works today—a lot of rich people in this world live very poor lives. They’re rarely not thinking about money. About how to acquire more and of it, about what they can trade of their life in exchange for it, about who they know who has more of it than they do. These poor souls know they have a lot of money, but what they don’t understand is that, really, money has a lot of them.\n“Money never made a man rich,” Seneca adds, “Do you ask the reason for this? He who possesses more begins to be able to possess still more.” This is a universal human battle. It doesn’t really matter the number in your bank account, it is hard to turn off the brain’s desire for more. Until you can turn it off, until you have a sense for what is enough, you are poorer than the poorest people in Rome.\n“[H]e who has enough,” Seneca writes, “has attained that which never fell to the rich man’s lot—a stopping-point.”\nTo learn more on this topic, check out Ryan’s interview with Morgan Housel on the Daily Stoic podcast.\nTHREE STOIC PRACTICES THAT CAN LEAD TO A WEALTHIER LIFESTYLE\nDefine What Wealth Means To You\n“It never ceases to amaze me: we all love ourselves more than other people, but care more about their opinion than our own.” — Marcus Aurelius\nIf Ramit Sethi didn’t beat us to it, we might have named the Daily Stoic Wealth Course, “The Rich Life.”\nRamit is the bestselling author of I Will Teach You To Be Rich and host of the I Will Teach You To Be Rich podcast (one of Ryan’s favorite podcasts), and of the Netflix series How to Get Rich. His work focuses on how to help people live what he calls “The Rich Life.”\nThe title is a bit misleading because he doesn’t use “rich” solely in a monetary wealth way. It’s more an all-encompassing philosophy about living a good life. Ramit talks and writes about entrepreneurship, spending, investing, social skills, fitness, psychology, productivity, and on and on—all these interconnected components that go into living well.\nKey to Ramit’s work is the idea that the definition of The Rich Life varies from person to person. When we interviewed him a while back, he gave this example:\nI have a friend who always has fresh flowers throughout her tiny New York apartment. They look amazing. When I asked her how she keeps up and maintains all these fresh flowers, despite her busy full-time job, she told me that she spends the equivalent of a cable bill every month to surround herself with beautiful, artisanal flowers that are delivered to her house every week. Every week…on “just” flowers!\nThis is the idea of living a Rich Life: If you love how flowers look and make you feel in your home, you don’t “save” buying flowers only for special occasions. You make sure you have them around you all the time.\nRamit, on the other hand, doesn’t really care about flowers. So his Rich Life looks different. His definition of a rich life, he says, is never having to step into a Home Depot.\nThe point is, everyone’s different. Therefore, everyone’s definition of wealth is different. We live in a world that constantly bombards us with messages about what a rich life is supposed to look like. We see pictures of lavish vacations, designer clothing, expensive cars, and luxurious homes. We are told that having more money, more possessions, and more status is the key to happiness and fulfillment.\nBut the truth is the Rich Life means something different for everyone. What makes one person feel rich may not do the same for another.\nThis is why it’s essential to figure out your definition of the Rich Life.\nWatch Ryan Holiday discuss some of the key Stoic concepts of wealth in The Stoics Guide To Becoming Wealthy on the Daily Stoic YouTube channel.\nKnow What Enough Is\n“If you don’t regard what you have as enough, you will never be happy even if you rule the entire world.” – Seneca\nSeneca said this is what it means to be poor: wanting more than you have.\nConsider, Seneca says, the person who has or wants the nicest stuff—the furniture with gold trim, the silverware made by ancient artists, a team of butlers, jewelry from every part of the globe. “Though he should pile up all of these,” Seneca writes, “never will they satisfy his insatiable mind…This is not a thirst, but a sickness. And it is not merely money or food that leads to this result; the same nature is to be found in every desire that derives, not from need, but from vice: all that you pile up to satisfy it will not terminate but advance desire.”\nThat’s the irony of material riches. It’s a series of moving goal posts. You think having X will be sufficient only to find that 2x is better and that 3x is preferable still.\n“Prosperity is a restless thing: it troubles itself,” Seneca says elsewhere. Or rather, it propels itself.\nSee if you can find one millionaire who isn’t trying to become a billionaire. See if you can find one billionaire who doesn’t check the Forbes list every year and glare jealously at the names above them.\nThat’s what getting rich does to us. It rarely gives us a sense of “enough.” Instead, it gives us a sense of how much more there could be.\nNeedless to say this is a path to bankruptcy, mentally and emotionally if not financially. It’s a hedonic treadmill that eventually breaks down…or breaks the person frantically running atop it.\nThe Stoics would try to caution us from ever getting on, or to get off while we still can.\nThere is a story Ryan Holiday writes about in Stillness is the Key. Kurt Vonnegut and Joseph Heller, the authors of Slaughterhouse Five and Catch-22, respectively, were once at a fancy party in New York. As they stood in the home of some billionaire, Vonnegut needled his friend.\n“Joe,” he said, “how does it feel that our host only yesterday may have made more money than your novel has earned in its entire history?”\n“I’ve got something he can never have,” Heller replied.\n“And what on earth could that be?” Vonnegut asked.\n“The knowledge that I’ve got enough.”\nKnowing what is enough. Living in a place of fullness rather than of craving. That, the Stoics would say, is a wealthy person. That is someone whose life is one of abundance.\nPractice Poverty\n“Set aside a certain number of days, during which you shall be content with the scantiest and cheapest fare, with coarse and rough dress, saying to yourself the while: ‘Is this the condition that I feared?’” — Seneca\nWhen Benjamin Franklin was 18 years old, he asked his father for a loan to start a printing business. His father refused to help, so Franklin saved and eventually founded The Pennsylvania Gazette.\nThe business chugged along for a while, but eventually ran into financial troubles, at which point Franklin received a lucrative offer from a customer who wanted to publish a piece in the Gazette.\nFranklin, whose first son had just been born, would have greatly benefited from the money. But the customer’s piece, as Franklin described it, was not only completely misaligned with his principles, it was “scurrilous and defamatory.”\nFranklin lost sleep deciding what to do. It seemed irresponsible to say no. He had a family to take care of. He was afraid that if the business failed he would be poor, they would be poor. Franklin was terrified of poverty. With all that at stake, with all those emotions roiling inside him, why not bite the bullet and just publish the piece?\nTo figure out if he should accept the money, Franklin tried something new by doing something with ancient roots. He channeled his inner Seneca and decided to live like a poor person, to test whether poverty was really the burden he feared it to be. For a few days, he restricted his diet to just bread and water and for a few nights, he wrapped himself in a coat and slept on the floor.\n“From this regimen,” he said, “I feel no inconvenience whatever. Finding I can live in this manner, I have formed a determination never to prostitute my press to the purposes of corruption and abuse of this kind for the sake of gaining a more comfortable subsistence.”\nIsn’t that why many of us do the things we do, take the jobs we take, make the sacrifices we make?\nIt’s why Seneca stood beside Nero for so long. It’s why people continue to work on Wall Street despite being miserable. It’s why people become lawyers despite having no interest in the law. It’s why people take jobs in the incoming administration despite not voting for the president.\nFor the sake of gaining (or holding onto) a more comfortable subsistence, we take jobs we don’t like, we put up with people we don’t like, and we do things we know aren’t right.\nThat is not a rich life. That is not the life of a Wealthy Stoic.\nWhen we interviewed Tim Ferriss, he told us that once a month, he does a three-day fast “to simply expose myself to the rather, often unfamiliar, sensation of real hunger.” Then he mentioned his friend, a wealthy CEO, who schedules a week every quarter where he sleeps on the floor in his living room, limits his spending to $15 for the week, and survives on instant coffee and instant oatmeal. With the reminder that he can thrive on very little, his decision making improves—he doesn’t do things out of fear. “At the end of such an experiment,” Tim said, “people will very often be in a better mental state, feel more content than they did beforehand. It’s very freeing.”\nBut do not misunderstand, Tim is not saying these people no longer care about anything or that they no longer have grand ambitions. To the contrary, many of the people he’s talking about who have run this poverty experiment are elite performers at the top of their industry or sport or craft who only got better, stronger, happier, richer as a result.\nFor The Wealthy Stoic, as Seneca wrote, “Freedom is the prize we are working for.” The freedom to decide what you do most days. The freedom to do what you think is right. The freedom to spend time with who you want to spend time with. The freedom to pursue the things you are interested in. The freedom to leave a job that makes you miserable.\nThe freedom that comes, Seneca wrote, after you “learn how far poverty is from being a burden.”\nWHAT ARE SOME OF THE BEST STOIC QUOTES ON WEALTH?\n“It is not the man who has too little, but the man who craves more, that is poor.” – Seneca\n“Any man, who does not think that what he has is more than ample, is an unhappy man, even if he is the master of the whole world. ” – Seneca\n“At last, then, away with all these treacherous goods! They look better for those who hope for them than to those who have attained them.” -Seneca\n“Anything at all: the applause of the crowd, high office, wealth, or self-indulgence. All of them might seem to be compatible with it—for a while. But suddenly they control us and sweep us away.” – Marcus Aurelius,\n“Wealth consists not in having great possessions, but in having few wants.” – Epictetus\nWHERE CAN I LEARN MORE ABOUT STOICISM AND WEALTH?\nIf you enjoyed these principles and want to incorporate them more into your life, check out….\nThere Is Nothing Special About MoneyWho Owns Who?\nThe Psychology of Money by Morgan Housel\nI Will Teach You To Be Rich by Ramit Sethi\nIf you want to take a deeper dive into Stoicism’s foundational concepts and daily practices how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life, check out The Wealthy Stoic: A Daily Stoic Guide To Being Rich, Free, and Happy!\nIt’s a 9-week course designed to equip you with the tools, mindsets, and habits of the wealthiest Stoics in history.\nThis is not a get-rich-quick kind of a thing.\nThis is not a hustle culture-esque course.\nIt’s the exact opposite. It’s about what Stoicism’s foundational concepts and daily practices were designed to teach us: how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life.\nIf that is the kind of life you want, the Stoics can show you the way.\n“And if you can’t stop prizing a lot of other things? Then you’ll never be free—free, independent, imperturbable. Because you’ll always be envious and jealous, afraid that people might come and take it all away from you.” — Marcus Aurelius", "summary": "The money is not going to tell you.”\nIt’s not going to tell you about all you have to give up in exchange for that money. You make sure you have them around you all the time. That is not a rich life. If that is the kind of life you want, the Stoics can show you the way.", "categories": ["業務改善・介護テック", "メンタル・哲学"], "is_new": false, "title_ja": "裕福であるとはどういう意味ですか?", "summary_ja": "お金ではわかりません。」\nそのお金と引き換えに放棄しなければならないすべてについては説明しません。常にあなたの周りにそれらを置いておくようにしてください。それは豊かな人生ではありません。それがあなたが望むような人生であるなら、ストア派がその道を示してくれるでしょう。"}, {"title": "Perseverance: 7 Stoic Lessons on How To Keep Going", "url": "https://dailystoic.com/perseverance/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-05-10 03:50", "description": "“To be like the rock that the waves keep crashing over. It stands unmoved and the raging of the sea falls still around it.” — Marcus Aurelius The question of why and how we are supposed to live has been contemplated for centuries. Absurdist Albert Camus wrote that life is like the Sisyphean task of […] The post Perseverance: 7 Stoic Lessons on How To Keep Going appeared first on Daily Stoic .", "content": "“To be like the rock that the waves keep crashing over. It stands unmoved and the raging of the sea falls still around it.” — Marcus Aurelius\nThe question of why and how we are supposed to live has been contemplated for centuries. Absurdist Albert Camus wrote that life is like the Sisyphean task of pushing a boulder up a mountain for all of eternity. Existence itself, in other words, is persevering. Camus writes, “One must imagine Sisyphus happy.” So, how do we persevere well? How do we persevere happily?\nThankfully, we can look to the Stoics. The Stoics not only wrote about how to persevere, they used Stoicism to persevere in the face of plagues, exiles, imprisonment, and wars.\nThis post is just a small sample of the kind of lessons, ideas, and stories we write about in our daily email newsletter. Every morning, we send a short (~500 word) email inspired by Marcus Aurelius, Seneca, Epictetus, and more. Each email will help you cultivate strength, insight, and wisdom to live your best life.\nJoin over 600,000 people who start their day off with the philosophy that has guided some of history’s greatest men and women.\nDrawing on the timeless wisdom of the Stoics, we created this guide to give you a time-tested playbook to help you persevere. This is a long post. It should be saved and revisited. It can be read straight through or if you prefer, feel free to click the links below to navigate to a specific section\nWhat Does It Mean To Persevere?\n7 Stoic lessons on how to keep going\n10 Best Stoic Quotes on Perseverance\nThe Best Books About Perseverance\nWhat does it mean to persevere?\n“Ask, ‘Why is this so unbearable? Why can’t I endure it?’ You’ll be embarrassed to answer.” — Marcus Aurelius\nJames Stockdale was held captive in Hanoi, North Vietnam. He was sent to a war camp that was famous for its brutal treatment of prisoners.\nWhat got him through more than 7 years of imprisonment?\nStoicism.\nStoicism not only helped Stockdale get through his imprisonment, but it helped him refrain from betraying himself and his country. He was able to internally uphold his moral code. He accepted the fact that he could not control his external circumstances. Instead, he mastered his internal dialogue and feelings.\nThat is persevering. It’s not simply “getting through it.” It’s getting through it while still maintaining your morality and humanity. Stoicism does not breed apathy, but strength.\nHow do we persevere?\n7 Stoic Lessons on How to Keep Going\nAccept your fate\n“Do not seek for things to happen the way you want them to; rather, wish that what happens happen the way it happens: then you will be happy.” – Epictetus\nAs mentioned before, hardship allows you to show your true character. So, embrace hardship. Amor Fati. Love your fate. Embrace every single moment, even moments of hell.\nThe chance of us existing is small, but here we are. The chances of that particular sperm fertilizing that particular egg were small. But here you are. You have already beaten seemingly insurmountable odds. Your existence is rare and beautiful. So, even our suffering is rare and beautiful.\nAccepting your fate does not mean you’re necessarily okay with bad things happening to you. It means you are accepting that struggling is a part of existing. We can use this to persevere because this gives us the courage to act. Loving and appreciating every minute shows us that we are not helpless. We are just experiencing what it means to exist.\nDon’t complain\n“Everything that happens is either endurable or not. If it’s endurable, then endure it. Stop complaining. If it’s unendurable… then stop complaining. Your destruction will mean its end as well. Just remember: you can endure anything your mind can make endurable, by treating it as in your interest to do so. In your interest, or in your nature.” — Marcus Aurelius\nEither you persevere or you don’t. Regardless, complaining does not necessarily tip the odds in your favor. Yes, feel emotions. Yes, confide in people. But do not tell yourself you will fail. Do not tell anyone else you will fail. Don’t tell anyone that this specific struggle will be the end of you.\nComplaining, in fact, makes it harder to endure. Marcus argues that you can endure anything by thinking it’s endurable. If you allow yourself to complain, you’re defeating yourself.\nYou may be able to get through something by complaining. But, that will not leave your good nature intact. To exercise virtue in the face of adversity, we must have control over our own minds.\nRealize it’s not the end of the world\n“Never say of anything, ‘I have lost it’ but, ‘I have returned it.’ Is your child dead? It is returned…Is your estate taken away? Well, and is not that likewise returned? ‘But he who took it away is a bad man.’ What difference is it to you who the giver assigns to take it back?” — Epictetus\nWay harsh, but there’s still a lesson here. Epictetus urges us to not take things personally. Things are not taken from you, but returned. After all, the entire universe existed before us and will exist after us.\nLikewise, we existed before our current struggle and will exist after it.\nIn the final episode of Bojack Horseman, Bojack says, “Life’s a bitch and then you die, right?” Diane responds, “Sometimes. Sometimes life’s a bitch and then you keep living.” We live despite and in spite of how much life sucks. Life won’t always be suffering, but life is contingent on suffering. When we lose an opportunity, a loved one, or when life is just bad, the best thing to do is live virtuously no matter what.\nThis difficulty will end. You will end. We can only control our response to that.\nDon’t just sit there and take it\n“Putting things off is the biggest waste of life: it snatches away each day as it comes, and denies us the present by promising the future. The greatest obstacle to living is expectancy, which hangs upon tomorrow and loses today. You are arranging what lies in Fortune’s control, and abandoning what lies in yours. What are you looking at? To what goal are you straining? The whole future lies in uncertainty: live immediately.” — Seneca\nSeneca is reminding us that we have some control over our lives. By putting off action, we are allowing our suffering to have full control.\nBy working towards ending our suffering, we are regaining control. Persevering is active. We don’t persevere by shutting down until it’s over.\nWe persevere by responding rationally to our hardships. We persevere by determining the most virtuous course of action. Persevere immediately.\nDemand better, don’t just want better\n“How long are you going to wait before you demand the best for yourself and in no instance bypass the discriminations of reason? You have been given the principles that you ought to endorse, and you have endorsed them. What kind of teacher, then, are you still waiting for in order to refer your self-improvement to him? You are no longer a boy but a full-grown man. If you are careless and lazy now and keep putting things off and always deferring the day after which you will attend to yourself, you will not notice that you are making no progress but you will live and die as someone quite ordinary.” — Epictetus\nWhen we are struggling, we may want to give up on ourselves. We may settle. We may get used to things being okay and give up on striving for a good life. This is unacceptable.\nLike we said, you can either persevere or stop. Either way, we are dying at some point. As Epictetus says, we can die ordinary if we choose to not persevere. Everything ends at some point, but there is power in the choice to persevere. A hardship can either end because we act to make it end or we die. We have some control over when our suffering ends.\nWe must demand that we get through this hardship. Clean your room a little. Ask for better treatment. Advocate for yourself and take care of yourself. We cannot get used to suffering. We can accept the existence of suffering, but we still have to fight against it. Do not become complacent.\nStop torturing yourself\n“We suffer not from the events in our lives, but from our judgment about them.” — Epictetus\nPerhaps our suffering is mostly self-inflicted. When difficulties arise, we sometimes take it personally. It’s important to take accountability for actions that cause suffering, but you can do that without suffering.\nInstead of saying, “I lost my job because I’m lazy and stupid,” you can say, “I lost my job because I did not meet the requirements for it.” The difference between those two sentences is that one is reporting a judgment and the other is reporting a fact. We suffer less when we rationally map why things happen.\nCalling ourselves stupid for letting something happen does not solve the problem and makes us feel worse. Shit usually happens purely because shit happens. Taking it personally makes it harder to actively solve the problem. Recognizing that it is not 100% our fault can give us the courage to act.\nUse your resources\n“Prudent people look beyond the incident itself and seek to form the habit of putting it to good use. On the occasion of an accidental event, don’t just react in a haphazard fashion: remember to turn inward and ask what resources you have for dealing with it. Dig deeply. You possess strengths you might not realize you have. Find the right one. Use it.” – Epictetus\nWe enter fight or flight mode when it gets tough. However, the good thing about being humans is that we have the ability to be rational.\nDon’t go into survival mode. Take a breath and remember you have the opportunity to outwardly show your virtue. Not everything needs a reaction. Moreover, not everything needs an immediate reaction.\nWhile persevering is active, you can still take time to decide what to do. You do not need to react immediately unless it’s life or death. Let it stew.\n10 Best Stoic Quotes on Perseverance\n“We are more often frightened than hurt, and we suffer more in imagination than in reality.” — Seneca\n“In the meantime, cling tooth and nail to the following rule: not to give in to adversity, not to trust prosperity, and always take full note of fortune’s habit of behaving just as she pleases. Whatever you have been expecting for some time comes as less of a shock.” — Seneca\n“I judge you unfortunate because you have never lived through misfortune. You have passed through life without an opponent— no one can ever know what you are capable of, not even you.” — Seneca\n“Ask, ‘Why is this so unbearable? Why can’t I endure it?’ You’ll be embarrassed to answer.” – Marcus Aurelius\n“People are not disturbed by things, but by the views they take of them.” – Epictetus\n“You must build up your life action by action, and be content if each one achieves its goal as far as possible–and no one can keep you from this. But there will be some external obstacle! Perhaps, but no obstacle to acting with justice, self-control, and wisdom. But what if some other area of my action is thwarted? Well, gladly accept the obstacle for what it is and shift your attention to what is given, and another action will immediately take its place, one that better fits the life you are building.”- Marcus Aurelius\n“You don’t have to turn this into something. It doesn’t have to upset you.” – Marcus Aurelius\n“To live a good life: We have the potential for it. If we learn to be indifferent to what makes no difference.” – Marcus Aurelius\n“To make the best of what is in our power, and take the rest as it occurs.” – Epictetus\nThe Best Books About Perseverance\nThe Obstacle is the Way by Ryan Holiday\nThat One Should Disdain Hardships: The Teachings of a Roman Stoic by Musonius Rufus\nGrit: The Power of Passion and Perseverance by Angela Duckworth\nKeep Going by Austin Kleon\nAntifragile: Things That Gain from Disorder by Nassim Nicholas Taleb", "summary": "But here you are. What are you looking at?. To what goal are you straining?. You possess strengths you might not realize you have.", "categories": ["メンタル・哲学", "業務改善・介護テック"], "is_new": false, "title_ja": "忍耐力: 継続するための 7 つのストイックなレッスン", "summary_ja": "しかし、ここにあなたがいます。何を見てるんですか？。どの目標に向かって頑張っていますか？あなたには、自分でも気づいていないかもしれない強みがあります。"}];
const CAT_META  = {"介護保険・制度": {"color": "#2563EB", "icon": "📋"}, "医療・健康": {"color": "#DC2626", "icon": "🏥"}, "福祉・社会保障": {"color": "#059669", "icon": "🤝"}, "施設運営・経営": {"color": "#D97706", "icon": "🏢"}, "人材育成・HR": {"color": "#7C3AED", "icon": "👥"}, "業務改善・介護テック": {"color": "#0891B2", "icon": "💡"}, "組織・心理": {"color": "#EA580C", "icon": "🧠"}, "海外エイジテック": {"color": "#0D9488", "icon": "🔬"}, "AIツール・生産性": {"color": "#6D28D9", "icon": "⚡"}, "メンタル・哲学": {"color": "#BE185D", "icon": "🌿"}};
const DEFAULT_CLR = '#6b7280';

// ── State ────────────────────────────────────────────────────────
let state = { period:'all', cat:'all', lang:'all', sort:'date', search:'', newOnly:false };

// ── Utils ────────────────────────────────────────────────────────
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseDate(s) {
  if (!s) return new Date(0);
  return new Date(s.replace(' ','T') + (s.length===10?'T00:00:00+09:00':'+09:00'));
}

function ageBucket(d) {
  const h = (Date.now() - parseDate(d)) / 3.6e6;
  if (h < 48) return 'new';
  if (h < 168) return 'week';
  return 'old';
}

function ageBadgeHtml(dateStr) {
  const d = parseDate(dateStr);
  const h = (Date.now() - d) / 3.6e6;
  let label, cls;
  if (h < 24)       { label='今日';            cls='age-new';  }
  else if (h < 48)  { label='昨日';            cls='age-new';  }
  else if (h < 168) { label=Math.floor(h/24)+'日前'; cls='age-week'; }
  else              { label=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); cls='age-old'; }
  return `<span class="age-badge ${cls}">${label}</span>`;
}

function catBadgesHtml(cats) {
  return (cats||[]).map(c => {
    const m = CAT_META[c] || {color:DEFAULT_CLR,icon:'📰'};
    const clr = m.color;
    return `<span class="cat-badge" style="background:${clr}18;color:${clr};border:1px solid ${clr}35">` +
           `${m.icon} ${esc(c)}</span>`;
  }).join('');
}

// ── Card builder ─────────────────────────────────────────────────
function buildCard(a) {
  const displaySummary = (a.lang==='en' && a.summary_ja) ? a.summary_ja : (a.summary||'');
  const displayTitle   = (a.lang==='en' && a.title_ja)   ? a.title_ja   : (a.title||'');
  const isEn = a.lang === 'en';

  const langBadge  = isEn
    ? '<span class="lang-badge lang-en">EN</span>'
    : '<span class="lang-badge lang-ja">JP</span>';
  const transBadge = isEn ? '<span class="trans-badge">🌐 翻訳</span>' : '';
  const newBadge   = a.is_new ? '<span class="is-new-badge">NEW</span>' : '';

  const summaryBlock = displaySummary.trim().length > 30
    ? `<p class="card-summary">${esc(displaySummary)}</p>`
    : `<p class="card-summary-empty">要約を取得できませんでした</p>`;

  const publishedDate = (a.published||'').slice(0,10);

  return `<article class="article-card"
  data-cats="${esc(JSON.stringify(a.categories||[]))}"
  data-lang="${a.lang||'ja'}"
  data-date="${a.published||''}"
  data-isnew="${a.is_new ? '1' : '0'}"
  data-source="${esc(a.source||'')}"
  data-search="${esc(((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase())}">

  <div class="card-band">
    <div class="card-cats">${catBadgesHtml(a.categories)}</div>
    <div class="card-meta">
      ${newBadge}
      ${ageBadgeHtml(a.published)}
      ${transBadge}
      ${langBadge}
    </div>
  </div>

  <div class="card-body">
    ${summaryBlock}
  </div>

  <div class="card-footer">
    <div class="card-footer-left">
      <div class="card-source">
        <span>${esc(a.source)}</span>
        <span class="card-source-dot">·</span>
        <span>${publishedDate}</span>
      </div>
      <a class="card-title" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
        ${esc(displayTitle)}
      </a>
    </div>
    <a class="read-btn" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" aria-label="記事を読む">
      記事を読む
      <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </a>
  </div>
</article>`;
}

// ── Filter ───────────────────────────────────────────────────────
function filterArticles() {
  const now = Date.now();
  return ARTICLES.filter(a => {
    if (state.newOnly && !a.is_new) return false;
    if (state.period !== 'all') {
      const h = (now - parseDate(a.published)) / 3.6e6;
      if (state.period==='today' && h>48)  return false;
      if (state.period==='week'  && h>168) return false;
      if (state.period==='month' && h>720) return false;
    }
    if (state.cat  !== 'all' && !(a.categories||[]).includes(state.cat)) return false;
    if (state.lang !== 'all' && a.lang !== state.lang) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const hay = ((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (state.sort==='date') return parseDate(b.published)-parseDate(a.published);
    const ca=(a.categories||[''])[0]||'', cb=(b.categories||[''])[0]||'';
    return ca!==cb ? ca.localeCompare(cb,'ja') : parseDate(b.published)-parseDate(a.published);
  });
}

// ── Section header ───────────────────────────────────────────────
function sectionHeader(catName, count) {
  const m = CAT_META[catName] || {color:DEFAULT_CLR, icon:'📰'};
  return `<div class="section-header">
    <span class="section-icon">${m.icon}</span>
    <span class="section-name" style="color:${m.color}">${esc(catName)}</span>
    <span class="section-count">${count}件</span>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const filtered = filterArticles();
  const container = document.getElementById('articlesContainer');
  const empty = document.getElementById('emptyState');
  document.getElementById('visibleCount').textContent = filtered.length;

  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    renderSidebar(filtered);
    return;
  }
  empty.style.display = 'none';

  if (state.sort==='cat' && state.cat==='all') {
    const groups = {};
    const ORDER = Object.keys(CAT_META);
    filtered.forEach(a => {
      const c = (a.categories||[])[0] || '未分類';
      (groups[c]=groups[c]||[]).push(a);
    });
    let html='';
    ORDER.forEach(c => {
      if (groups[c]?.length) html += sectionHeader(c,groups[c].length)+groups[c].map(buildCard).join('');
    });
    if (groups['未分類']?.length) html += sectionHeader('未分類',groups['未分類'].length)+groups['未分類'].map(buildCard).join('');
    container.innerHTML = html;
  } else {
    container.innerHTML = filtered.map(buildCard).join('');
  }

  renderSidebar(filtered);
}

// ── Sidebar render ───────────────────────────────────────────────
function renderSidebar(filtered) {
  const catCounts={}, srcCounts={};
  filtered.forEach(a => {
    (a.categories||[]).forEach(c=>{ catCounts[c]=(catCounts[c]||0)+1; });
    srcCounts[a.source]=(srcCounts[a.source]||0)+1;
  });

  // Categories
  const sidebarCats = document.getElementById('sidebarCats');
  let html = `<button class="sidebar-item ${state.cat==='all'?'active':''}" data-scat="all">
    <span class="sidebar-item-label">すべて</span>
    <span class="sidebar-count">${filtered.length}</span>
  </button>`;
  Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).forEach(([cat,cnt]) => {
    const m = CAT_META[cat]||{icon:'📰'};
    html += `<button class="sidebar-item ${state.cat===cat?'active':''}" data-scat="${esc(cat)}">
      <span class="sidebar-item-label">${m.icon} ${esc(cat)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarCats.innerHTML = html;

  // Sources
  const sidebarSrc = document.getElementById('sidebarSources');
  let srcHtml='';
  Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([src,cnt]) => {
    srcHtml += `<button class="sidebar-item" data-ssrc="${esc(src)}">
      <span class="sidebar-item-label" style="font-size:.8rem">${esc(src)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarSrc.innerHTML = srcHtml;

  // Sidebar category click
  sidebarCats.querySelectorAll('[data-scat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.scat;
      document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
      const chip = document.querySelector(`.cat-chip[data-cat="${CSS.escape(btn.dataset.scat)}"]`);
      if (chip) chip.classList.add('active'); else {
        const allChip = document.querySelector('.cat-chip[data-cat="all"]');
        if (allChip) allChip.classList.add('active');
      }
      render();
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Stats
  const newCnt = ARTICLES.filter(a=>a.is_new).length;
  document.getElementById('statTotal').textContent = ARTICLES.length;
  document.getElementById('statJa').textContent    = ARTICLES.filter(a=>a.lang==='ja').length;
  document.getElementById('statEn').textContent    = ARTICLES.filter(a=>a.lang==='en').length;
  document.getElementById('statNew').textContent   = newCnt;

  // Build category chips
  const wrap = document.getElementById('catChips');
  Object.entries(CAT_META).forEach(([name, m]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip';
    btn.dataset.cat = name;
    btn.textContent = m.icon + ' ' + name;
    wrap.appendChild(btn);
  });

  // Period tabs
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.period = btn.dataset.period;
      render();
    });
  });

  // Category chips
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.cat-chip');
    if (!btn) return;
    document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.cat = btn.dataset.cat;
    render();
  });

  // New-only toggle
  const newToggle = document.getElementById('newToggle');
  newToggle.addEventListener('click', () => {
    state.newOnly = !state.newOnly;
    newToggle.classList.toggle('active', state.newOnly);
    newToggle.setAttribute('aria-pressed', String(state.newOnly));
    render();
  });

  // Controls
  document.getElementById('langFilter').addEventListener('change', e=>{ state.lang=e.target.value; render(); });
  document.getElementById('sortBy').addEventListener('change',     e=>{ state.sort=e.target.value; render(); });
  document.getElementById('searchInput').addEventListener('input', e=>{ state.search=e.target.value.trim(); render(); });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
