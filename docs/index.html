ngs that can happen if somebody else tells my Claude Code what to do. I still mostly run Claude Code in YOLO mode and feel incredibly guilty about it. What’s the advice within Anthropic for safely running Claude Code?\nCat: Why not auto mode?\nSimon: I am starting to use auto mode, but I don’t understand it enough to get how safe it is. As of maybe three weeks ago, I’m defaulting to auto mode.\nCat: Broadly within Anthropic, almost every single person uses auto mode. It is the best way to do long-running work in Claude Code while being safe. We’ve done extensive bashing. We have thousands of evals. We’ve commissioned many red teamers to create adversarial environments in order to trick Claude Code into doing bad actions, and we’ve mitigated every single issue that they found. We’re going to publish some evals in the coming weeks, but we’ve pretty much mitigated every attack.\nSimon: That is a big claim.\nCat: We’ll share the evals for it so folks can assess, but we’ve been extremely diligent about identifying all the ways in which Claude might mess up and then updating auto mode to counter it. It doesn’t catch 100% of things — that would be way too strong a claim. But for the main categories of risks that we’re concerned about, like prompt injection and data exfiltration, the risks are far lower than the average human reviewer.\nI am very much looking forward to learning more about their evals and approach to verifying auto mode.\nThariq: A little on how auto mode works — it’s useful to build this mental model. Whenever Claude is doing a turn, or a bash call, there’s a Sonnet classifier that is judging the tool call and also the context of the conversation — your instruction. There are some things around permissions that are dependent on your request: you don’t want to give git push permissions all the time, but if you say “push this to GitHub,” you want it to do it — and if you say “don’t push,” you want it to deny it. Auto mode will do that. That particular thing happens to me a lot, where Claude tried to do something because it’s very helpful and proactive, and auto mode saw “don’t do this” and surfaced it. So it’s good at the dynamic permissions that you yourself give inside the prompt, which I think is really important. It also works well with our sandboxing infrastructure, because sandboxing is one of those things where there are so many different edge cases that it’s hard for us to deterministically follow them. We have a sandbox, and when something needs to escape the sandbox — like a network request — auto mode can look at that request and ask: does this make sense? — and allow it.\nSimon: I hadn’t realized auto mode is interacting with the networking sandbox as well.\nCat: It interacts with any permission prompt the user would otherwise see.\nSimon: How old is auto mode? As a feature I had access to, it’s only a couple of months old, right?\n(It was first made available to the public on March 24th.)\nCat: We’ve been using it within Anthropic since January, so we’ve been hardening it for quite a while. Anthropic is extremely focused on safety and security, and we’ve been working broadly across our alignment and safeguards teams to enable the rollout internally, build out these evals, and make auto mode even more robust before sharing it with the world.\nThariq: This is also the reason Claude Tag is so good — Claude Tag uses auto mode. I’ve heard a lot of build-versus-buy questions about a Slackbot, and I’m like: please, you probably shouldn’t build your own AI Slackbot. There are so many attack vectors. You have a feedback channel that users can post feedback into, and now your bot is reading it. The work we’ve put in with auto mode — and we have a general Swiss cheese defense for security; we also RL against this stuff — I think this is really what makes Claude Tag work. It works seamlessly with your permissions, and you don’t want to be prompt injected in your Slack.\nAre there more security things in the pipeline beyond auto mode?\nSimon: Are there any more security things in the pipeline that go beyond auto mode?\nThariq: I think we’re very secure. With Claude Tag you can provision your own credentials for Claude, so it doesn’t need to act on your behalf — you can have Claude as an identity, and that also makes it easier to audit and inspect what Claude is doing.\nSimon: Because Claude Tag is influenced by anyone who can talk to it — it’s got a much wider pool of people telling it what to do.\nThariq: That’s right. And of course we have probes as well with Fable, which is a downstream effect of our safety and research work. I think this is the moment where you see Anthropic being an AI safety company really paying off: we really want Claude to be able to run in an aligned way over long periods of time, and auto mode has to be basically flawless for this to work — it’s all downstream of our being an AI safety company.\nCat: We also launched trusted devices for the remote control users out there who want to be safer. And for all of our remote environments, we support credential injection. If you want Claude Code to be able to access Datadog, but you don’t want Claude Code itself to hold the Datadog credential, you can set up our identity and credential management system so that the Datadog credentials are only usable by the agent but not accessible by the agent — we insert them on the fly when the agent tries to make a Datadog request.\nI really like that credential injection pattern, where Claude Code can access an API via a proxy and that proxy both audits the request and injects the relevant API key—so Claude can access authenticated endpoints without having access to the API credentials itself.\nHow has the past year and a half changed how you think about your own craft?\nThariq talked about a sense of grief brought on by Fable-class models in his keynote in the morning, and we dived further into that as part of our conversation. I’ve been calling this Deep Blue.\nSimon: Let’s talk a little bit about the human element. A lot of people are feeling a sense of loss now that so much of what they considered to be their role in building software is being subsumed by the models. How do you think about that? How has the past year and a half changed the way you think about your own craft and the value that you add?\nThariq: Cat and Boris are such good reminders that you have to be more ambitious. They’re always like: we’re growing so fast, we have to be on the edge, we have to do the best work we can. That’s a constant reminder for me — any time I’m slow on something, I’m like, okay, can I do it faster? Can I be more ambitious here? And oftentimes the answer is Claude, because Claude is getting better as you go — the last time I tried this, it was with the previous model. On your point about loss: I think this is real. If you’re only trying to do the same work you were doing before LLMs, and now it’s a prompt, it is, I think, kind of a sad feeling. And the way you offset that is by being more ambitious. I think Jared is such a good example — he hand-wrote all of the Zig code in his Oakland apartment in about a year, barely left his house, and had so much fun doing that. Now I see him rewrite all of Bun into Rust and he’s having so much fun doing that — it’s so much more ambitious, and that’s how he offsets it. Generally it’s asking how do I do the bigger thing and do more — I think success is fun. It’s changing your ambition.\n“The way you offset that is by being more ambitious” neatly captures where I’ve landed on this issue myself as well.\nSimon: And Cat, what does that look like from a product management perspective?\nCat: I feel like the product role just changes every single month. All the PMs on our team are this mix of engineer, designer, PM — most of them actually used to be full-time engineers. For us it really means plugging in whenever there’s any kind of gap. If we have an idea and we didn’t inspire any engineer to go build it, then we should just build it, put it into a notebook, and inspire people to take it to production. If the designs look a little off, let’s take a page that’s similar, do a first-pass design, and tag in someone who’s very detail-oriented to fill in the gaps. Or if we notice that our team and product adoption is bigger within the company, and more people need to know what’s coming down the pipe for Claude Code, Claude Tag, and Cowork — let’s automate figuring out our whole launch calendar, let’s automate getting those status updates asynchronously so we’re not bugging people, and make sure our updates in our internal announce channels are fully detailed and to the point. For us it’s very much understanding what the gap is right now between a great idea and getting something to our customers, and how do we automate it as much as possible.\nThis reflects something I’ve noticed: when you can produce code so much faster, time spent blocked awaiting a decision from someone else becomes a much more notable bottleneck. Engineers who can make product decisions can move a whole lot faster, and the cost of getting one of those decisions wrong is much less prohibitive.\nWhat’s a moment when Claude has surprised you?\nSimon: What’s a moment when Claude has surprised you? When the model did something you didn’t think it would be able to do?\nThariq: I’ve posted a lot about Claude video editing, but most recently I gave a talk at the ACM Agentic conference, and I asked, \"Hey guys, do you have the edited video? I’d love to post it and share it with my comms team.\" They said, \"Oh, it’s taking so long.\" So I asked for the raw files. They sent me the video of me talking on stage, the video of the deck, and the audio file, and said, \"Good luck.\" I gave this to Claude, along with my HTML deck, and said, \"Hey, can you just edit this together?“ And what it does is honestly incredible — I’m ready to ship it. It transcribes the entire video. It notices that sometimes the video of my deck is a little weird — there’s a popup of an auto-update in the middle — and it goes, ”Oh, I probably shouldn’t use the video of your deck. What I’m going to do is slice it up, figure out which slide you’re on, and use the HTML source instead.\" So it displays the HTML source. Then it’s got video of me, but I’m only taking up a small part of the stage, so it’s cropping dynamically to where I am on the stage — and I’m pacing, so it’s tracking me as I pace. And it’s transcribing what I’m saying.\nSimon: This was Fable, right?\nThariq: This was Fable, yeah. It was a good prompt, but it was a one-shot prompt. Then I asked it to add some interesting animations and graphics, and I was just blown away. It does ffmpeg, it does Remotion.\nHere’s Thariq’s video on how he used Fable to edit Fable’s own launch video, and here’s that launch video.\nWhat can’t it do yet?\nI’m embarrased to admit that I’ve been finding it quite hard to come up with tasks that frontier models like Fable 5 and GPT-5.6 are unable to accomplish.\nCat still doesn’t rate its UX design skills:\nSimon: What can’t it do? What are the things where you’re still disappointed — where you’re waiting for Claude Fable 6 to figure it out for you?\nCat: I want it to have better design and UX taste. It’s now at the point where if I write out a prompt with a detailed spec of how I want a feature to behave, it will usually behave that way. But the paddings might be off, or the interface just isn’t delightful yet. It leans on existing best practices for how apps are designed, but for frontier AI products, there are so many new interaction experiences that we have yet to design.\nSimon: There’s an Opus aesthetic — you can look at something and go, “Yeah, that was designed by Opus.” It’d be good if we could move beyond that.\nCat: Yeah. I’m very excited for future models to hopefully be interaction design thought partners.\nThariq: What can’t it do? I would love to see it interact more with the real world. Can it solve science? Can it orchestrate the experiments? There’s some amount of coding that goes into that, but there’s also this other taste of the broader world that it needs.\nWhich parts of Anthropic’s culture should other companies steal?\nI figured this would make a great closing question:\nSimon: Which parts of Anthropic’s company culture do you think uniquely help Anthropic be productive with these tools, that other companies should steal? What are the cultural hacks people should be adopting from you?\nCat: I’ll share one for Claude Tag. Claude Tag works best when you have it in a public channel, and when most of your channels are public. Claude Tag is able to search across all public channels to get as much context as possible to give you the highest-accuracy answer — and it’s only able to do this if it has access to everything.\nThariq: I mentioned this in my keynote, but it’s so important to me I want to re-emphasize it. The co-founders say we don’t negotiate against ourselves, and I think this is really important. You can imagine trade-offs in your head and talk yourself out of doing something ambitious — or you can just try to do the ambitious thing. We’re so often asking: what if we just did it? Is this a real trade-off or not? And if so, why — where’s the proof that it’s a real trade-off, and not just something that sounds reasonable? Make the trade-offs show themselves to you. Be as ambitious as you can.\nWhat’s your favorite absurd thing you’ve built with Claude, just because you could?\nI couldn’t resist throwing in this one as well.\nSimon: What’s one of your favorite absurd things that you’ve built with Claude, just because you could build it?\nThariq: I’m working on a 2D Street Fighter fighting game with me as a character — and my friends as well. It uses Claude Code to prompt Gemini — and honestly the Seedance model is pretty good — to make video animations. It works great; it’s so good at prompting, and it can verify the frames to check whether an animation was good.\nSimon: Is this Street Fighter 2-level 2D sprites you’re generating?\nThariq: Yeah, exactly — 2D sprites. The animation looks amazing. And it can also figure out hitboxes — it can be like, “Oh, your fist is here, I’ll draw the JSON hitbox.” It’s incredible.\nCat: Mine is much more simple. I’m a big rock climber and a lot of my friends climb, so we have this little app we built with Claude Code where we log all the projects we’re working on. We also go outdoors together a lot, so we have Claude do all this research with workflows. Workflows is amazing — we brand it as a coding tool, but it’s amazing for doing deep research for travel. I also plan our team offsites, and it’s good at finding venues that can fit all of us. I use workflows to research all the climbing destinations we might want to go to, and what has direct flights from where all of us are located. It goes to Mountain Project and finds all the climbs at our grade level. It finds the Airbnb. And I don’t like hiking, so I care a lot about it having a very short approach — very short walking distance from where the car parks to where the rock actually is — and it filters for this. With existing apps I have to manually click through Mountain Project, but with this I just put in all of our preferences and it’s a custom app for us.\nSimon: So you’re basically vibe coding Jira for mountain climbing.\nCat: Exactly.\nAudience: Any plans for eval-building tools and agent observability?\nWe had a few minutes at the end for questions from the audience.\nAudience: Do you have any near-term plans to build more eval tools for us to build eval datasets, and more observability tools to monitor the performance of agents and workflows?\nCat: We’ve considered building eval tools, but I think the limiting factor actually tends to be that it takes a long time for customers to build really high-quality evals. So I think the tooling is less of the constraint, and more the skill set of how you build a great eval. That’s an area where we’re excited to both invest internally and hopefully share some best practices externally.\nAudience: How is memory designed today — and would you move from files to a data store?\nAudience (Sai): I’m interested in the memory and the multiplayer. How is memory being designed today? I assume it’s around files. And second, have you thought about an orthogonal direction where you would actually need a data store for these memories, instead of files, to scale it better?\nThariq: Right now for Claude Tag the memory is channel-specific. Every Claude in that channel has a shared memory, and the instances have a session — but the session can contribute back to main memory. We do a lot of memory research, and it can be kind of unintuitive what the right way to do memory is. We’re always running memory experiments. How it works right now in Claude Tag is a markdown file per channel.\nMore recent articles\n- Kimi K3, and what we can still learn from the pelican benchmark - 16th July 2026\n- The new GPT-5.6 family: Luna, Terra, Sol - 9th July 2026", "summary": "Do you have an example of a feature which surprised you?. I’ll have Claude Tag do it. How do you think about that?. Be as ambitious as you can.", "categories": ["AIツール・生産性", "業務改善・介護テック"], "is_new": true, "title_ja": "Claude Code チームの Cat と Thariq との炉端チャット", "summary_ja": "驚いた機能の例はありますか?クロード・タグにやってもらいます。それについてどう思いますか?できるだけ野心的になりましょう。"}, {"title": "The AI Slot Machine Effect: Why Generative Feeds Disrupt Deep Work And How to Reclaim Focus", "url": "https://www.artificialintelligence-news.com/news/the-ai-slot-machine-effect-why-generative-feeds-disrupt-deep-work-and-how-to-reclaim-focus/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-07-21 21:50", "description": "You open a generative AI tool expecting a quick boost. Ten minutes later, you’re still there, refining a prompt for the fourth time. The task you started with has drifted off to the side somewhere. Sound familiar? Knowledge workers in 2026 are running into this more and more. It makes sense once you look at […] The post The AI Slot Machine Effect: Why Generative Feeds Disrupt Deep Work And How to Reclaim Focus appeared first on AI News .", "content": "You open a generative AI tool expecting a quick boost. Ten minutes later, you’re still there, refining a prompt for the fourth time. The task you started with has drifted off to the side somewhere.\nSound familiar? Knowledge workers in 2026 are running into this more and more. It makes sense once you look at how these tools are built. They’re designed for efficiency, sure. But they’re also designed to keep you in the room. Those two goals don’t always play nice together.\nDemanding cognitive tasks need stretches of uninterrupted thought, not constant back and forth with a chatbot that always has one more suggestion. That’s not just distracting in the obvious sense. It’s baked into the interface on purpose. These systems reward you for sticking around, not for finishing up and closing the tab.\nGenerative Interfaces Reward Engagement Over Closure\nLet’s be honest, most modern AI platforms care a great deal about how long you stay logged in. That’s not a conspiracy theory. It’s just the business model.\nRecommendation logic and conversational flows lean toward responses that feel a little useful, or emotionally satisfying, because that keeps you typing another message. A 2026 review examining AI deployment in digital media described these platforms as being “mathematically optimized to maximize ‘time on site,'” noting that emotionally resonant content tends to beat plain, straightforward material. Generative tools turn that dial up, since they can produce tailored variations instantly and at almost no cost.\nWhat you end up with is something close to a variable reward loop, the kind attention researchers have studied for years around slot machines and social feeds. Every refined response gives just enough of a win to make staying worthwhile. Not a huge win. Just enough.\nThat’s the trap. The cognitive toll builds quietly while you feel productive. Before long, the block of time you’d set aside for deep work has been nibbled down to nothing.\nWhen those loops start chewing into concentration, professionals draw lines in the sand. A dependable site blocker helps here, setting firm guardrails around distracting tabs and feeds so the uninterrupted stretches high quality work requires don’t get quietly whittled away.\nProductivity Figures Hide Real World Attention Friction\nOn paper, the numbers look great. In certain domains, anyway.\nAnalyses published in MIT Technology Review this year pointed to roughly 14 percent gains in customer service and 26 percent in software development. Returns get thinner fast in judgment-heavy work, the kind that leans on nuance rather than repeatable steps.\nZoom out to the organizational level and the picture gets murkier. The Stanford AI Index for 2026 shows adoption sitting at 88 percent, with industry responsible for most frontier models released the year before. Impressive, at least on the surface.\nReal world deployment tracking tells a different story, though. Coverage in The New York Times pointed to studies where these tools “didn’t reduce work, they consistently intensified it,” creating more workload rather than freeing anyone up. Not exactly the narrative you’d expect from the headlines.\nThat gap between conference announcements and what actually happens on a Tuesday afternoon in an open office keeps shaping how teams weigh AI’s real value.\nClear Signals That Generative Loops Are Fragmenting Focus\nYou don’t need a research team to notice this happening. A few signs tend to show up again and again.\nOpening an AI chat for a thirty second clarification, only to find yourself six exchanges deep. Timelines stretching because every output needs a couple more rounds of correction before it’s usable. Notifications and fresh suggestions creeping in and derailing whatever train of thought you were riding.\nThen there’s the exhaustion. Finishing a session feeling wiped out, even though barely any real synthesis happened. And colleagues mentioning the same scattered feeling in meetings, like it’s suddenly a shared experience across the whole floor.\nNone of these signs are dramatic alone. Together, they paint a clear picture of design incentives favoring continued interaction over clean completion.\nThe Iterative Reality of Collaborative AI Use\nEarly expectations painted a picture of seamless automation, the kind where you ask once and get exactly what you need.\nReality is messier. Enterprise usage patterns show people spending a surprising chunk of their day querying, correcting and re-querying, tweaking outputs bit by bit until they’re finally usable. Early narratives promised full workplace automation, the kind that would hand back hours of your day. What’s actually happening looks pretty different.\nRecent data shows workers spending real, measurable time manually refining what these systems hand them. An analysis of Anthropic’s enterprise usage metrics makes this pretty clear. Collaborative AI, in practice, involves constant, disruptive micro-iterations, the kind that quietly drain cognitive energy long before anyone notices the drain.\nIt’s not nothing, this back and forth. But it keeps people tethered to the tool in a way that fragments the longer stretches of thinking harder problems actually demand.\nThis mirrors attention economy mechanics already observed across other digital platforms, just wearing a different outfit. Every response that invites one more tweak adds a little cognitive drag. String enough of those together across a workday and the toll adds up fast, particularly for anyone doing work that requires holding multiple threads in their head at once.\nProtecting Focus in an AI Driven Workplace\nThe teams handling this well aren’t leaving attention to chance. They treat it as an actual resource, something to budget and protect rather than assume.\nThat usually means batching AI assisted tasks into set windows, putting firm limits on session length and keeping core deep work hours fenced off from ambient digital noise. Coverage from Harvard Business Review on adoption trends backs this up, noting that efficiency gains at one level of an organization often create coordination headaches somewhere else. That only strengthens the case for deliberate boundaries.\nNone of this makes the technology itself the enemy. The same generative capabilities that can splinter your attention are also genuinely great at speeding up targeted subtasks, provided you’re setting the pace instead of letting the feed set it for you.\nAs adoption keeps climbing through the rest of 2026, the advantage will land with people who bother to design their own cognitive environment instead of accepting whatever rhythm the tools default to.\nSo, where does your attention actually go on a normal day? Worth tracking for a week, just to see. A handful of well placed guardrails, paired with tools that respect your time, can keep AI in its lane, helpful, targeted and quiet when it needs to be.", "summary": "You open a generative AI tool expecting a quick boost. It makes sense once you look at how these tools are built. But they’re also designed to keep you in the room. Not exactly the narrative you’d expect from the headlines.", "categories": ["業務改善・介護テック", "AIツール・生産性"], "is_new": true, "title_ja": "AI スロット マシンの影響: ジェネレーティブ フィードが深い作業を中断する理由と集中力を取り戻す方法", "summary_ja": "素早いブーストを期待して生成 AI ツールを開きます。これらのツールがどのように構築されているかを見れば、それが理解できます。しかし、それらはあなたを部屋に留めておくためにも設計されています。見出しから期待されるような物語とはまったく異なります。"}, {"title": "政府、家事支援の国家資格を新設　成長戦略を閣議決定　介護現場からは戸惑いや疑問の声も", "url": "https://www.joint-kaigo.com/articles/47552/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-21 18:49", "description": "政府は21日、高市早苗政権で初めて策定した成長戦略（日本成長戦略）を閣議決定した。【Joint編集部】 現役世代が介護や子育てで仕事を辞めざるを得ない状況に追い込まれるのを防ぐため、家事支援サービスの国家資格を新たに創設 […]", "content": "政府、家事支援の国家資格を新設 成長戦略を閣議決定 介護現場からは戸惑いや疑問の声も\n政府は21日、高市早苗政権で初めて策定した成長戦略（日本成長戦略）を閣議決定した。【Joint編集部】\n現役世代が介護や子育てで仕事を辞めざるを得ない状況に追い込まれるのを防ぐため、家事支援サービスの国家資格を新たに創設する構想を盛り込んだ。来年秋を目途に第1回の国家試験を実施できるよう、関係審議会での議論や試験問題の作成、試行試験の実施など必要な準備を進める方針を打ち出した。\n介護や子育てによる離職を減らし、新たな成長戦略の重点分野などを支える労働力の確保につなげる狙いがある。\n親族の介護などを理由とする離職は、年間およそ11万人。今なお増加傾向にあり、ビジネスケアラーを支える対策の強化は急務だ。\n政府は今回の成長戦略に、技能検定の枠組みで複数等級の国家資格を新設すると明記。家事支援サービスの品質の向上と信頼性の確保を図り、その普及・浸透につなげたい考えを示した。\nあわせて、家事支援サービスの利用促進に向けて「税制措置を含む新たな支援策を検討する」とも書き込んだ。\nこうした政府の方針に対し、介護現場の関係者の受け止めは複雑だ。期待と懸念が交錯し、戸惑いや疑問の声も上がっている。\n全国の介護職員らで組織する日本介護クラフトユニオン（NCCU）の村上久美子副会長は、「新たな国家資格の創設自体は否定しない」としつつ、「介護離職の主因は家事支援の不足ではなく、直接的なケアの不足とそれに伴う家族の過重負担だ。離職を防ぐ施策としては実効性を欠く」と指摘。「既存のヘルパーの処遇改善や人材確保など、在宅介護の基盤強化を優先すべき」と主張した。\nまた、「全額自費の家事支援サービスを使えるのは、経済的にゆとりのある世帯だけ。多くの世帯は十分に使えない懸念がある」と問題を提起。「要介護1、2の生活援助などを介護給付から外す制度改正につながる恐れもあり、今後の動きを警戒すべき」と述べた。\n一方、在宅介護の保険外サービスなどを展開するイチロウ株式会社の水野友喜代表取締役は、「新たな国家資格の創設を歓迎する。質が担保された保険外サービスを社会に浸透させる追い風になる」との認識を示した。\nそのうえで、「現時点では懸念点も多い。例えば、既存の初任者研修との違い、担う業務の範囲、役割分担などが曖昧なままでは、利用者にも働き手にも混乱を与える。事業者にとっては、各資格の格付けや給与水準の高低なども分かりにくい」と指摘。「何より重要なのは、保険内・外の相互補完的で調和のとれた共存だ。制度の歪みや矛盾、関係者の分断などを生まないよう、全体像の丁寧な整理と設計を求めたい」と述べた。", "summary": "政府、家事支援の国家資格を新設 成長戦略を閣議決定 介護現場からは戸惑いや疑問の声も\n政府は21日、高市早苗政権で初めて策定した成長戦略（日本成長戦略）を閣議決定した。介護や子育てによる離職を減らし、新たな成長戦略の重点分野などを支える労働力の確保につなげる狙いがある。親族の介護などを理由とする離職は、年間およそ11万人。一方、在宅介護の保険外サービスなどを展開するイチロウ株式会社の水野友喜代表取締役は、「新たな国家資格の創設を歓迎する。", "categories": ["人材育成・HR", "福祉・社会保障"], "is_new": true}, {"title": "障害福祉報酬、来年度改定で適正化か　政府「費用急伸への対応を検討」　骨太方針に明記", "url": "https://www.joint-kaigo.com/articles/47523/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-21 16:12", "description": "政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】 今後の社会保障制度の改革をめぐって、来年度の障害福祉サービス報酬改定に向けた議論の方向性も示した。 足元で […]", "content": "政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】\n今後の社会保障制度の改革をめぐって、来年度の障害福祉サービス報酬改定に向けた議論の方向性も示した。\n足元で費用が急激に増加していることを踏まえ、必要な対策を検討していくと明記した。障害福祉の分野に特化した厳しい書きぶりで、報酬の適正化も視野に検討を進めるものとみられる。\n政府は今回の「骨太の方針」で、障害福祉の現場を支える職員の賃上げに引き続き取り組む構えをみせ、「他職種と遜色のない処遇改善の実現を図る」と書き込んだ。\n一方で、「費用の急伸への対応を含め、サービスの質の確保・向上と制度の持続可能性の確保のためのあり方を検討する」との方針を明示した。\n障害福祉の分野では近年、一部のサービスで営利法人などによる事業所・施設の開設が急増しており、費用の大幅な増加やサービスの質の低下を問題視する声が関係者から上がっている。\n政府は今回、こうした声を「骨太の方針」に反映させた格好だ。今後、具体策をめぐる議論を今秋から今年末にかけて本格化させる計画で、報酬の適正化にどこまで踏み込むかが大きな焦点となる。", "summary": "政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】\n今後の社会保障制度の改革をめぐって、来年度の障害福祉サービス報酬改定に向けた議論の方向性も示した。一方で、「費用の急伸への対応を含め、サービスの質の確保・向上と制度の持続可能性の確保のためのあり方を検討する」との方針を明示した。政府は今回、こうした声を「骨太の方針」に反映させた格好だ。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": true}, {"title": "介護報酬改定、来年度も賃上げ策が柱　政府、骨太方針に「多職種と遜色のない処遇改善の実現」を明記", "url": "https://www.joint-kaigo.com/articles/47518/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-21 15:19", "description": "政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】 今後の社会保障制度の改革をめぐり、来年度の介護報酬改定の基本的な考え方も打ち出している。 「多職種と遜色の […]", "content": "2026年7月21日\n介護報酬改定、来年度も賃上げ策が柱 政府、骨太方針に「多職種と遜色のない処遇改善の実現」を明記\n政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】\n今後の社会保障制度の改革をめぐり、来年度の介護報酬改定の基本的な考え方も打ち出している。\n「多職種と遜色のない処遇改善の実現を図る」と明記。必要な人材の確保・定着に向けて、引き続き介護従事者の賃上げを施策の柱に位置付ける意向を明確にした。\n政府はあわせて、「物価の変動に適切に対応する」とも書き込んだ。目下のインフレ基調、サービス提供コストの膨張を考慮した措置をとる構えをみせている。\nより具体的な議論は、今秋から今年末にかけて本格的に進めていく計画。介護従事者の賃上げや事業所・施設の支援策で十分な規模の手を打てるのか、政府の実行力が試されることになりそうだ。\nこのほか、政府は介護費のいたずらな膨張を防ぐ施策の必要性も指摘。「現役世代の保険料の上昇を止め、引き下げていくことを目指す」との方針を掲げた。", "summary": "2026年7月21日\n介護報酬改定、来年度も賃上げ策が柱 政府、骨太方針に「多職種と遜色のない処遇改善の実現」を明記\n政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】\n今後の社会保障制度の改革をめぐり、来年度の介護報酬改定の基本的な考え方も打ち出している。「多職種と遜色のない処遇改善の実現を図る」と明記。このほか、政府は介護費のいたずらな膨張を防ぐ施策の必要性も指摘。", "categories": ["人材育成・HR", "介護保険・制度"], "is_new": true}, {"title": "政府、骨太方針を閣議決定　現役世代の保険料引き下げ明記　医療・介護の改革を推進", "url": "https://www.joint-kaigo.com/articles/47510/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-21 14:31", "description": "政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】 医療や介護など社会保障の分野では、「現役世代の保険料率の上昇を止め、引き下げていくことを目指す」と明記した […]", "content": "2026年7月21日\n政府、骨太方針を閣議決定 現役世代の保険料引き下げ明記 医療・介護の改革を推進\n政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】\n医療や介護など社会保障の分野では、「現役世代の保険料率の上昇を止め、引き下げていくことを目指す」と明記した。国民所得に占める保険料負担率（社会保障負担率）の目標の設定を検討する意向も示した。\n誰もが必要な給付を受けられる環境の整備を進めつつ、膨らみ続ける医療費の抑制など歳出改革に努める姿勢を示した格好。各制度の持続可能性の確保、現役世代の手取りの増加などにつなげる狙いがある。今後の医療や介護の制度改正・報酬改定などに大きな影響を与えそうだ。\n政府は今回の「骨太の方針」で、とりわけ医療分野の改革に多くの紙幅を割いた。\n例えば、70歳以上の高齢者が病院などで支払う窓口負担の引き上げに言及した。低所得者への影響に配慮しながら、「原則3割となっている現役世代との間で、年齢によらない真に公平な応能負担を実現する観点から見直す」との考えを打ち出している。\n一方、介護保険の利用者の自己負担をめぐっては、従来の政府の説明より踏み込んだ書き方はしていない。2割負担の対象者の拡大を検討し、「今年度中に結論を得る」と改めて記している。", "summary": "2026年7月21日\n政府、骨太方針を閣議決定 現役世代の保険料引き下げ明記 医療・介護の改革を推進\n政府は21日、今年度の「骨太の方針（経済財政運営と改革の基本方針2026）」を閣議決定した。【Joint編集部】\n医療や介護など社会保障の分野では、「現役世代の保険料率の上昇を止め、引き下げていくことを目指す」と明記した。国民所得に占める保険料負担率（社会保障負担率）の目標の設定を検討する意向も示した。政府は今回の「骨太の方針」で、とりわけ医療分野の改革に多くの紙幅を割いた。", "categories": ["介護保険・制度", "医療・健康"], "is_new": true}, {"title": "過ち語り継ぐ覚悟　虐待事件が変えた組織風土（愛光園・愛知） - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45692", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-21 10:00", "description": "元職員による利用者への虐待が発覚した愛知県の社会福祉法人愛光園（日髙啓治理事長）が組織改革を進めている。事件後に幹部職員の発案で再生プロジェクトを立ち上げ、虐待防止の仕組みを抜本的に見直し、外部の目を入れる体制を構築した。小さな違和感でもためらわずに共有し、組織全体で支援の方向性を議論する風土が根付きつつある。 青天の霹靂 事件の発覚は２０２０年１２月。同年７月まで臨時職員として知的障害者のグループホームで働いていた４０代男性が、利用者の腹部を蹴り重傷を負わせたとして逮捕された。 「まさに青天の霹靂だった」。当時、副理事長だった日髙理事長は振り返る。事前に警察から連絡はあったものの、詳しい内容は知らされなかった。 日髙理事長には真面目な職員という印象が強く、信じられなかった。しかし、その後の捜査で暴行が事実と判明した。 法人は２１年１月、弁護士らによる第三者検証委員会を設置。理事長交代や役職者の処分なども進めた。そんな中、「自ら組織的要因を振り返らなければ再生はない」という声が管理職から上がった。同年６月、１５人程度のプロジェクトを立ち上げ議論を重ねた。 その結果、事件の背景の一つに、", "content": "過ち語り継ぐ覚悟 虐待事件が変えた組織風土（愛光園・愛知）\n2026年07月21日 福祉新聞編集部元職員による利用者への虐待が発覚した愛知県の社会福祉法人愛光園（日髙啓治理事長）が組織改革を進めている。事件後に幹部職員の発案で再生プロジェクトを立ち上げ、虐待防止の仕組みを抜本的に見直し、外部の目を入れる体制を構築した。小さな違和感でもためらわずに共有し、組織全体で支援の方向性を議論する風土が根付きつつある。\n青天の霹靂\n事件の発覚は２０２０年１２月。同年７月まで臨時職員として知的障害者のグループホームで働いていた４０代男性が、利用者の腹部を蹴り重傷を負わせたとして逮捕された。\n「まさに青天の霹靂だった」。当時、副理事長だった日髙理事長は振り返る。事前に警察から連絡はあったものの、詳しい内容は知らされなかった。\n日髙理事長には真面目な職員という印象が強く、信じられなかった。しかし、その後の捜査で暴行が事実と判明した。\n法人は２１年１月、弁護士らによる第三者検証委員会を設置。理事長交代や役職者の処分なども進めた。そんな中、「自ら組織的要因を振り返らなければ再生はない」という声が管理職から上がった。同年６月、１５人程度のプロジェクトを立ち上げ議論を重ねた。\nその結果、事件の背景の一つに、歴史ある法人としてのおごりがあったと結論付けた。簡単に権利侵害してしまいがちな立場にあるという認識も薄かった。\n法人本部の機能不全もあった。事件前にも元職員が担当する利用者が救急搬送されていたが、虐待を疑わなかった。\nこうした反省を踏まえ、虐待防止体制を刷新した。\n虐待防止指針と法人共通のフローチャートを整備、小さな違和感でも２４時間以内に自治体に報告する仕組みを徹底。各事業所に、利用者や他事業所の管理者も加わる虐待防止委員会を設置した。\nさらに、２カ月ごとに全事業所を横断する虐待防止推進会議を開催し、事業所ごとの不適切事案やセルフチェックリストの結果を共有。参加するのは各事業所のマネジャークラスだ。ファシリテーターを務める東千恵子療育・相談グループ長は「研修だけで虐待は防げない。現場をつなぐ人材の成長こそが要だ」と力を込める。\nささいな変化逃さぬ\n「今回の事案を共有してください」\n６月下旬、東グループ長の呼び掛けで虐待防止会議が始まった。興奮した利用者をなだめようと、職員が頭の上に手を置いた事案。別の職員が「嫌そうな表情だった」と伝えたことから自ら申し出たが、自治体の調査で虐待は不認定だった。\n会議では職員から「感覚過敏はないのか」「利用者には自尊心もある」などの意見が相次いだ。アドバイザーとして参加している全国権利擁護支援ネットワークの今井友乃事務局長は「親のような態度で支援する例はよくある」と指摘。「利用者のささいな表情の変化に気付くのは良いこと」とフォローした。\n通報件数は増加\nこうした体制を構築した結果、法人による自治体への虐待通報件数は事件前より増え、年７件程度に上る。\nしかし、日髙理事長は「虐待の認定件数は別だが、通報件数の増加を恥じることはない」と言い切る。この姿勢に自治体も理解を示しており、最悪の事態を繰り返さないための協力関係は強いという。\nその上で「風通しの良い組織に向けて、決めたことを粛々と積み重ねることが重要だ。今後も事件が風化しないよう、法人内で語り継いでいく」と決意を語った。\n愛光園 １９６５年、創設者の皿井寿子氏が愛知県大府市で、重い障害のあるこどもを対象にした通園施設を開設したのが始まり。当時、牧場を経営していた日髙理事長の祖父が土地を提供した縁で、３代目の理事長に就任した。現在、知多半島の北部でグループホーム１７カ所や老人保健施設などを運営している。職員数は４６０人。", "summary": "当時、副理事長だった日髙理事長は振り返る。事件前にも元職員が担当する利用者が救急搬送されていたが、虐待を疑わなかった。こうした反省を踏まえ、虐待防止体制を刷新した。各事業所に、利用者や他事業所の管理者も加わる虐待防止委員会を設置した。", "categories": ["施設運営・経営", "人材育成・HR"], "is_new": true}, {"title": "Movers and Shakers: Trinity Health PACE Welcomes Medical Leader; Ingleside Community Takes Co-Leader Approach", "url": "https://seniorhousingnews.com/2026/07/20/movers-and-shakers-trinity-health-pace-welcomes-medical-leader-ingleside-community-takes-co-leader-approach/", "source": "Senior Housing News", "lang": "en", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-21 06:16", "description": "Movers & Shakers is brought to you by the Senior Housing News Job Board. Browse and apply to management and executive senior living jobs and positions from leading professional firms serving the industry. Employers can post single jobs, purchase job packages or our premium subscription that includes unlimited job posts and editorial coverage for one […] The post Movers and Shakers: Trinity Health PACE Welcomes Medical Leader; Ingleside Community Takes Co-Leader Approach appeared first on Senior ", "content": "Movers & Shakers is brought to you by the Senior Housing News Job Board. Browse and apply to management and executive senior living jobs and positions from leading professional firms serving the industry. Employers can post single jobs, purchase job packages or our premium subscription that includes unlimited job posts and editorial coverage for one year. Visit SHN Jobs today.\nTrinity Health PACE announces chief medical officer\nTrinity Health PACE has appointed Rachel Liebman as its new chief medical officer.\nIn this role, Liebman will “provide clinical leadership across Trinity Health PACE, helping advance high-quality, person-centered care that enables older adults to live safely and independently in their communities,” according to a press release.\nLiebman brings more than 16 years of experience to the position. She previously served as medical director of clinical operations and performance for InnovAge, where she led clinical quality and operational initiatives across the organization. She also previously served as medical director at Capital Health LIFE, the release states.\nIngleside life plan community appoints co-executive directors\nCraig Turner and Chris Coronado have been appointed as the co-executive directors of Westminster at Lake Ridge, an Ingleside life plan community in northern Virginia.\nIn this shared leadership model, Turner and Coronado will work collaboratively to lead the community while focusing on their respective areas of expertise, a press release states.\nTurner brings “extensive experience in resident engagement and community operations,” while Coronado’s background includes “healthcare operations, clinical services, finance and infrastructure management,” according to the release.\nNew executive director takes the reigns at Artis community\nArtis Senior Living has named Diane Mandracchia as the executive director for Artis Senior Living of Chestnut Ridge.\nIn this role, Mandracchia will oversee all care, operations and programming.\nShe brings over 20 years of experience to the position, 15 of which has been spent as an executive director. Most recently, Mandracchia served as the executive director of Chelsea at Greenburgh in White Plains, New York. She also served as executive director for The Bristal Assisted Living at White Plains, according to a press release.", "summary": "She also previously served as medical director at Capital Health LIFE, the release states. New executive director takes the reigns at Artis community\nArtis Senior Living has named Diane Mandracchia as the executive director for Artis Senior Living of Chestnut Ridge. She brings over 20 years of experience to the position, 15 of which has been spent as an executive director. She also served as executive director for The Bristal Assisted Living at White Plains, according to a press release.", "categories": ["医療・健康", "業務改善・介護テック"], "is_new": true, "title_ja": "動かす者と揺るがす者: Trinity Health PACE が医療リーダーを歓迎します。 Ingleside コミュニティは共同リーダーのアプローチを採用", "summary_ja": "彼女は以前、Capital Health LIFE のメディカルディレクターも務めていたとリリースに記載されています。新しいエグゼクティブ ディレクターが Artis コミュニティの統治に就任\nアルティス・シニア・リビングは、チェスナット・リッジのアーティス・シニア・リビングのエグゼクティブ・ディレクターにダイアン・マンドラキアを任命しました。彼女は 20 年以上の経験をこの職にもたらし、そのうち 15 年は常務取締役として費やされました。プレスリリースによると、彼女はホワイト・プレーンズのブリスタル・アシスタンス・リビングのエグゼクティブ・ディレクターも務めた。"}, {"title": "超党派でひきこもり支援議員連盟が発足　「地域間格差なくす」 - 福祉新聞Web", "url": "https://fukushishimbun.com/seiji/45689", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-20 10:00", "description": "超党派による「ひきこもり支援推進議員連盟」（下村博文会長）が１３日、設立総会を開いた。自民党の引きこもり議連が２０２４年に引きこもり支援基本法の法案骨子まで作ったが、下村会長は制定には党派を超えた力が必要と判断した。 同日の総会で下村会長は「引きこもりの人に役割や出番を持ってもらうことがとても重要だが、そのための取り組みは自治体間の格差が大きい」と話し、格差是正が基本法の柱になるとした。 議連の呼び掛け人は自民、維新の議員のほか中道改革連合、国民民主、チームみらいの議員計１３人。同日までに趣旨に賛同して加入した議員は呼び掛け人を含め３９人。 ２３年３月の内閣府の推計によると、１５～６４歳の国民の約２％に当たる約１４６万人が引きこもり状態にある。ＫＨＪ全国ひきこもり家族会連合会（日花睦子共同代表、東京）によると、引きこもりの人の年齢は年々上がり、２５年の調査では平均で約３７歳。 同日の総会でＫＨＪは改めて基本法の制定を要望。このほか、ひきこもり未来創造リレーション（山本洋見代表、同）、ＳＨＩＰ（池上正樹共同代表、同）、共同生活型自立支援機構（川又直理事長、富山）がそれぞれ意見表明した。 ", "content": "超党派でひきこもり支援議員連盟が発足 「地域間格差なくす」\n2026年07月20日 福祉新聞編集部超党派による「ひきこもり支援推進議員連盟」（下村博文会長）が１３日、設立総会を開いた。自民党の引きこもり議連が２０２４年に引きこもり支援基本法の法案骨子まで作ったが、下村会長は制定には党派を超えた力が必要と判断した。\n同日の総会で下村会長は「引きこもりの人に役割や出番を持ってもらうことがとても重要だが、そのための取り組みは自治体間の格差が大きい」と話し、格差是正が基本法の柱になるとした。\n議連の呼び掛け人は自民、維新の議員のほか中道改革連合、国民民主、チームみらいの議員計１３人。同日までに趣旨に賛同して加入した議員は呼び掛け人を含め３９人。\n２３年３月の内閣府の推計によると、１５～６４歳の国民の約２％に当たる約１４６万人が引きこもり状態にある。ＫＨＪ全国ひきこもり家族会連合会（日花睦子共同代表、東京）によると、引きこもりの人の年齢は年々上がり、２５年の調査では平均で約３７歳。\n同日の総会でＫＨＪは改めて基本法の制定を要望。このほか、ひきこもり未来創造リレーション（山本洋見代表、同）、ＳＨＩＰ（池上正樹共同代表、同）、共同生活型自立支援機構（川又直理事長、富山）がそれぞれ意見表明した。", "summary": "超党派でひきこもり支援議員連盟が発足 「地域間格差なくす」\n2026年07月20日 福祉新聞編集部超党派による「ひきこもり支援推進議員連盟」（下村博文会長）が１３日、設立総会を開いた。自民党の引きこもり議連が２０２４年に引きこもり支援基本法の法案骨子まで作ったが、下村会長は制定には党派を超えた力が必要と判断した。同日の総会で下村会長は「引きこもりの人に役割や出番を持ってもらうことがとても重要だが、そのための取り組みは自治体間の格差が大きい」と話し、格差是正が基本法の柱になるとした。ＫＨＪ全国ひきこもり家族会連合会（日花睦子共同代表、東京）によると、引きこもりの人の年齢は年々上がり、２５年の調査では平均で約３７歳。", "categories": ["福祉・社会保障"], "is_new": true}, {"title": "生活指導教諭の養成大学を〈コラム一草一味〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/issoichimi/45686", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-19 10:00", "description": "バンクミケルセン記念財団 理事長 千葉忠夫 デンマークには２種類の教育大学がある。一つは読み書きそろばんを教える教員を養成する大学、もう一つは生活指導教諭を養成する大学だ。日本には生活指導教諭を養成する大学はなく、いずれの大学、高校を出ても、福祉施設に就職すれば生活指導員となれる。 生活指導教諭のことをデンマークではぺダゴーと呼ぶ。語源は民主主義発祥の地ギリシャで、こどもを導く者という意味だ。このペダゴーの職種が定着しているのは、デンマークをはじめとする幸福度世界ランキング上位の北欧諸国である。 住みよい国、幸せな国は社会福祉国家であり、民主主義を理解し、身に付けた国民が築いている。住みよい幸せな国づくりには国民教育が一番重要である。 日本の国民教育は知的水準を上げ、学力向上に力を入れる競争原理の教育だ。人間は２本の足で立つ。一本の足には知識を身に付け、他方には情緒、自立心、社会性を身に付けることでしっかりと立ち、真っ直ぐと道を歩めるのだ。 新聞をにぎわすのは強盗、殺人、詐欺などで、正しい道を歩めないような教育を受けているゆえんではないか。高等教育を受けた若い母親がわが子を虐待するなど", "content": "生活指導教諭の養成大学を〈コラム一草一味〉\n2026年07月19日 福祉新聞編集部バンクミケルセン記念財団 理事長 千葉忠夫\nデンマークには２種類の教育大学がある。一つは読み書きそろばんを教える教員を養成する大学、もう一つは生活指導教諭を養成する大学だ。日本には生活指導教諭を養成する大学はなく、いずれの大学、高校を出ても、福祉施設に就職すれば生活指導員となれる。\n生活指導教諭のことをデンマークではぺダゴーと呼ぶ。語源は民主主義発祥の地ギリシャで、こどもを導く者という意味だ。このペダゴーの職種が定着しているのは、デンマークをはじめとする幸福度世界ランキング上位の北欧諸国である。\n住みよい国、幸せな国は社会福祉国家であり、民主主義を理解し、身に付けた国民が築いている。住みよい幸せな国づくりには国民教育が一番重要である。\n日本の国民教育は知的水準を上げ、学力向上に力を入れる競争原理の教育だ。人間は２本の足で立つ。一本の足には知識を身に付け、他方には情緒、自立心、社会性を身に付けることでしっかりと立ち、真っ直ぐと道を歩めるのだ。\n新聞をにぎわすのは強盗、殺人、詐欺などで、正しい道を歩めないような教育を受けているゆえんではないか。高等教育を受けた若い母親がわが子を虐待するなど、あってはならないことが頻繁に起きていることは嘆かわしい限りである。\n要するにわが国の教育は、２本の足で立てる人間教育をしていないからである。幼児の時からペダゴーにしっかりと導かれれば、三つ子の魂百までが実現し、さらには学童保育で勤務するペダゴーから知的以外の情緒的、社会的な自律心を学ぶことは国民教育に欠かせないことだと思う。\nまた、障害者施設勤務職員も生活指導教諭の有資格者がなるので、津久井やまゆり園のような事件は起こり得ない。\nデンマークの生活指導教諭の教育は３年半で、最初の１年は一般共通科目を受ける。後半は（１）保育園・幼稚園勤務（２）学童保育勤務（３）社会福祉施設勤務――に専攻が分かれるが全教育期間中の３分の１は関係施設実習に重きを置いている。\n日本にも生活指導教諭養成大学の新設を望む。", "summary": "日本には生活指導教諭を養成する大学はなく、いずれの大学、高校を出ても、福祉施設に就職すれば生活指導員となれる。生活指導教諭のことをデンマークではぺダゴーと呼ぶ。要するにわが国の教育は、２本の足で立てる人間教育をしていないからである。日本にも生活指導教諭養成大学の新設を望む。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "【高瀬比左子】人手不足より深刻な「当事者不足」　AIが解けない「正解」と介護職に問われる役割", "url": "https://www.joint-kaigo.com/articles/47501/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-18 13:20", "description": "◆ 教育と介護に共通する、根っこの課題 人手不足。担い手不足。価値観の多様化。教育現場と介護現場は、まったく別の世界のように見えて、実は驚くほど似た課題を抱えています。【高瀬比左子】 教育の世界では今、「子どもたちに何を […]", "content": "【高瀬比左子】人手不足より深刻な「当事者不足」 AIが解けない「正解」と介護職に問われる役割\n◆ 教育と介護に共通する、根っこの課題\n人手不足。担い手不足。価値観の多様化。教育現場と介護現場は、まったく別の世界のように見えて、実は驚くほど似た課題を抱えています。【高瀬比左子】\n教育の世界では今、「子どもたちに何を教えるか」だけでなく、「自ら考え、判断し、行動できる力をどう育むか」が問われています。介護現場でも、同じ問いが生まれています。職員に何を教えるか。利用者に何を提供するか。それだけでは、もう解決できない課題が増えているのです。\n今、本当に求められているのは、考える力、対話する力、そして自分ごととして関わる力をどう育てるかではないかと感じています。\n◆ 人手不足の先に見えてきた、もう一つの風景\n介護業界では長年、人材不足が最大の課題として語られてきました。処遇改善、ICT活用、外国人材の受け入れ、どれも重要な取り組みです。\nただ、私は介護カフェの活動を通じて、少し違う風景も見てきました。\n職員数は足りているはずなのに、現場に活気がなく、みんなが受け身になっている組織。一方で、人手が足りない中でも、職員同士が支え合い、利用者や地域住民まで巻き込みながら、前向きな取り組みを次々に生み出している組織。\nその違いは、どこにあるのでしょうか。\nもちろん人数だけで語れる話ではありません。ただ一つ確かなのは、「人がいること」と「人が主体的に関わっていること」は、まったく別だということ。人数では測れない組織の力が、確かに存在するのです。\n◆「正解」が通用しなくなった時代\nかつては、経験豊富な先輩が答えを持っていました。教師が正解を教え、子どもたちはそれを覚える。管理者やベテラン職員が答えを持ち、後輩はそれを学ぶ。長らく、その構図で回ってきました。\nでも今、家族の形も、生き方も、働き方も多様化しています。高齢者一人ひとりの暮らしも、当然ながら違います。こうすれば正しい、という一つの答えでは、もう対応できません。\n介護現場でも、同じ介護度だから同じ支援でいい、という時代ではなくなりました。その人が何を大切にしてきたのか。どんな人生を歩んできたのか。これからどう暮らしたいのか。そこに向き合わなければ、本当の意味での個別ケアは実現できません。\n教育も介護も、「正解を覚えること」より「一緒に考えること」が求められる時代に入っています。\n◆ 良かれと思って、私たちが奪っているもの\n介護職には、優しい人が本当に多い。けれど、その優しさが時に、相手の力を奪ってしまうことがあります。\n利用者ができることまで、つい手伝ってしまう。後輩が考える前に、答えを教えてしまう。失敗しないように、先回りしてしまう。決して悪意ではなく、むしろ善意から生まれる行動です。\nでもその結果として、自分で考える機会、挑戦する機会が、失われていくことがあります。教育の世界でも、「教えすぎることが主体性を育てにくくする」という議論が続いています。\n介護の世界も、同じではないでしょうか。支援とは何か。ケアとは何か。それは、相手の代わりに生きることではなく、その人が自分らしく生きることを支えることのはずです。\nこれは利用者に対してだけの話ではありません。職員育成も同じです。管理者が答えを持ち続ける組織では、職員はいつしか指示を待つようになります。\n一方で、あなたはどう考える？と問いかけられる組織では、職員は少しずつ「当事者」に変わっていきます。働きがいが生まれるのは、実はその瞬間なのかもしれません。\n◆ AI時代だからこそ、介護職に求められること\n近年、AIの進化には目を見張るものがあります。情報を調べる、文章をまとめる、記録をつくる、スケジュールを管理する。こうした業務は、今後ますますAIが担うようになるでしょう。\n介護現場も例外ではありません。ケア記録の作成支援、アセスメントの補助、見守りシステム。業務効率化は、これからさらに進んでいきます。\nただ、AIには決してできないことがあります。\nその人の思いに寄り添うこと。言葉にならない不安を感じ取ること。表情の変化から心の揺れを察すること。対話を通して、本人すら気づいていない願いを引き出すこと。そして何より、「あなたはどうしたいですか」と問い続けること。\n介護カフェで多くの方と対話をしてきて、いつも感じることがあります。人は、答えをもらったから元気になるのではありません。自分の思いを話し、誰かに受け止められ、自分なりの答えにたどり着いたときに、前に進む力が湧いてくるのです。\nこれからの介護職は、単に介助技術を提供する人ではなくなっていくでしょう。人生の伴走者として、その人の意思や希望を引き出し、共に支える存在へ。役割そのものが変わっていくのだと思います。\n◆「してあげる介護」から「共につくる介護」へ\n介護現場では、「利用者主体」という言葉がよく使われます。でも、本当に利用者主体になれているでしょうか。\n私たちは知らず知らずのうちに、「こうした方がいいですよ」「その方が安全ですよ」と、自分たちの正しさを差し出してしまうことがあります。\n安全は大切です。専門性も必要です。でも、それだけでは人は幸せにはなれません。人が幸せを感じるのは、自分で選び、自分で決め、自分で生きていると実感できるときだからです。\nこれからの介護に必要なのは、「してあげる介護」ではなく、「共につくる介護」。私はそう考えています。\n何か力になりたい、地域とつながりたい、高齢者と関わりたい、そんな思いを持つ人は、地域の中に決して少なくありません。それなのに、私たちはいつの間にか、介護は専門職が担うものと、線を引いてしまってはいないでしょうか。\n利用者も、当事者。家族も、当事者。職員も、当事者。そして地域住民も、当事者。みんなで暮らしを支え合う関係性が、今、切実に求められています。\n◆ 人材不足の、その本質\n介護業界では、人材不足が深刻化しています。でも本当に足りないのは、「人数」だけなのでしょうか。私は最近、足りないのは、もしかしたら「当事者」なのではないか、と感じています。\n誰かがやってくれる。誰かが決めてくれる。誰かが解決してくれる。そんな空気が広がっていけば、どれだけ人を増やしても、課題は決して解決しません。\n反対に、一人ひとりが当事者として考え、関わり、行動する組織には、自然と活力が生まれます。働きがいも生まれます。そして何より、利用者の暮らしそのものが豊かになっていきます。\n教育現場が今、「教えること」から「育てること」へと軸足を移し始めているように、介護現場もまた、「支えること」から「その人の力を引き出すこと」へと進化していく時期に来ているのかもしれません。\n◆ ケアの未来を、誰と、どうつくるか\nAIが発達し、効率化が進む時代だからこそ、人にしかできない価値が改めて問われています。\nそれは、知識を伝えることでも、答えを与えることでもありません。人の可能性を信じ、対話を通して力を引き出すこと。その人らしい人生を共に考えること。\n介護の仕事は、誰かの人生を支える仕事です。そして同時に、その人自身が「人生の主人公」であり続けられるよう支える仕事でもあります。\n人材不足の時代だから、私たちは「支える人」を増やすだけでなく、「関わる人」「当事者」を増やしていく必要があるのではないでしょうか。\n介護の未来は、専門職だけでつくるものではありません。一人ひとりが誰かを気にかけ、支え合い、共に生きる社会。その当事者を、一人でも多く増やしていくこと。それが、これからの介護に求められる、最も大切な役割なのかもしれません。", "summary": "介護現場でも、同じ問いが生まれています。ただ、AIには決してできないことがあります。それは、知識を伝えることでも、答えを与えることでもありません。その当事者を、一人でも多く増やしていくこと。", "categories": ["人材育成・HR", "組織・心理"], "is_new": false}, {"title": "防災庁設置法が成立　災害対策の司令塔に - 福祉新聞Web", "url": "https://fukushishimbun.com/bosai/45683", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-18 10:00", "description": "災害対応の司令塔となる防災庁の設置法と関係法の整備法が１３日、参議院本会議で可決、成立した。首相を組織の長とし、事務を総括する防災大臣を置く。防災に関する基本方針の策定や、大規模災害に対処するための企画立案・総合調整を担当するほか、省庁への勧告権を持つ。施行は一部を除いて年内の政令で定める日。 政府は現在の防災部門を改組して予算や人員体制を強化する。２２０人の内閣府防災を１・６倍の３５２人体制に増やす。地方機関の「防災局」も置く。民間を含む人材の育成にも取り組む。防災大学の設置を検討する。 基本法に理念追加「良好な生活環境」 防災庁設置に伴う関係法の一つ、災害対策基本法には基本理念を２点追加した。 一つは災害リスクの事前評価だ。災害が国民生活に及ぼす影響を調査し予測する。もう一つは被災者援護の留意点で、「すべての被災者がその被災地にかかわらず、できる限り、良好な生活環境をあまねく享受できるようにすること」とした。 避難生活のストレスなどによる災害関連死を防ぐことを意識して「生活」という文言を条文に盛り込んだ。避難所だけでなく、在宅避難の人や車中泊する人も念頭に置いた。 ＤＷＡＴは機能強", "content": "防災庁設置法が成立 災害対策の司令塔に\n2026年07月18日 福祉新聞編集部災害対応の司令塔となる防災庁の設置法と関係法の整備法が１３日、参議院本会議で可決、成立した。首相を組織の長とし、事務を総括する防災大臣を置く。防災に関する基本方針の策定や、大規模災害に対処するための企画立案・総合調整を担当するほか、省庁への勧告権を持つ。施行は一部を除いて年内の政令で定める日。\n政府は現在の防災部門を改組して予算や人員体制を強化する。２２０人の内閣府防災を１・６倍の３５２人体制に増やす。地方機関の「防災局」も置く。民間を含む人材の育成にも取り組む。防災大学の設置を検討する。\n基本法に理念追加「良好な生活環境」\n防災庁設置に伴う関係法の一つ、災害対策基本法には基本理念を２点追加した。\n一つは災害リスクの事前評価だ。災害が国民生活に及ぼす影響を調査し予測する。もう一つは被災者援護の留意点で、「すべての被災者がその被災地にかかわらず、できる限り、良好な生活環境をあまねく享受できるようにすること」とした。\n避難生活のストレスなどによる災害関連死を防ぐことを意識して「生活」という文言を条文に盛り込んだ。避難所だけでなく、在宅避難の人や車中泊する人も念頭に置いた。\nＤＷＡＴは機能強化\n参院では特に障害者の避難生活の問題が論点となった。付帯決議では、防災庁が障害当事者の参画のもとで防災施策を検討すること、事前防災の取り組みに障害当事者の参画を促すことを求めた。\n災害関連死防止に関連し、介護福祉士ら専門職による災害派遣福祉チーム（ＤＷＡＴ）を強化するよう求める意見も相次いだ。高市早苗首相も６月２６日の委員会でＤＷＡＴの重要性を答弁した。\nＤＷＡＴの登録者は全国で約１万１０００人。発災時は被災自治体からの派遣要請を受け、１チーム約５人が５日間ほど避難所などで活動する。\n障害者らの福祉ニーズを把握し、生活機能の低下を防ぎながら安定した生活に移るよう支える。６月に成立した改正社会福祉法により、今後は国が研修と登録事務を担う。\n神奈川県は能登半島地震での派遣実績を踏まえ、平時から要配慮者へのアセスメントを模擬訓練する必要があると判断。６月２４日、１都５県で合同訓練を行った。", "summary": "首相を組織の長とし、事務を総括する防災大臣を置く。基本法に理念追加「良好な生活環境」\n防災庁設置に伴う関係法の一つ、災害対策基本法には基本理念を２点追加した。災害が国民生活に及ぼす影響を調査し予測する。付帯決議では、防災庁が障害当事者の参画のもとで防災施策を検討すること、事前防災の取り組みに障害当事者の参画を促すことを求めた。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "全ての訪問看護師の賃上げを　看護協会など3団体、来年度の介護報酬改定へ国に要望書", "url": "https://www.joint-kaigo.com/articles/47491/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-17 11:58", "description": "日本看護協会は16日、日本訪問看護財団、全国訪問看護事業協会とともに、来年度の介護報酬改定に向けた要望書を厚生労働省へ提出したと発表した。【Joint編集部】 全ての訪問看護師の賃上げを最重要のテーマに掲げ、国に確実な対 […]", "content": "日本看護協会は16日、日本訪問看護財団、全国訪問看護事業協会とともに、来年度の介護報酬改定に向けた要望書を厚生労働省へ提出したと発表した。【Joint編集部】\n全ての訪問看護師の賃上げを最重要のテーマに掲げ、国に確実な対応を求めた。\n高齢化などで在宅医療のニーズが急増する一方、訪問看護の現場は深刻な人材不足に直面している。\n背景にあるのが待遇面の課題だ。平均年齢が高い訪問看護師だが、その給与水準は病院より低い。こうした待遇差が、地域の訪問看護事業所から他セクターへの人材流出を招く要因となっている。\n経営の足元も揺らいでいる。昨年度の国の調査結果によると、赤字の訪問看護事業所の割合は38.2%（2024年度決算）にのぼっている。\n日本看護協会など3団体は今回、全ての訪問看護師の賃上げとあわせて、訪問看護事業所の介護報酬の引き上げを要請。日本看護協会の秋山智弥会長は、厚労省の黒田秀郎老健局長に対し、「在宅医療を支える訪問看護を持続可能なものとするためには、処遇改善とそのための原資を確保することが喫緊の課題」と働きかけた。", "summary": "日本看護協会は16日、日本訪問看護財団、全国訪問看護事業協会とともに、来年度の介護報酬改定に向けた要望書を厚生労働省へ提出したと発表した。平均年齢が高い訪問看護師だが、その給与水準は病院より低い。昨年度の国の調査結果によると、赤字の訪問看護事業所の割合は38.2%（2024年度決算）にのぼっている。日本看護協会など3団体は今回、全ての訪問看護師の賃上げとあわせて、訪問看護事業所の介護報酬の引き上げを要請。", "categories": ["医療・健康", "介護保険・制度"], "is_new": false}, {"title": "保育公定価格の自治体間格差是正を　大都市近隣５県の知事らが黄川田大臣に要望 - 福祉新聞Web", "url": "https://fukushishimbun.com/series07/45672", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-17 10:00", "description": "保育公定価格の地域区分見直しに当たり、給与水準の高い隣接の大都市に保育士が流出する悩みを持つ奈良、埼玉、千葉、和歌山、佐賀の５県の知事らは１日、内閣府を訪れ、隣接する自治体間で公定価格に大きな差が生じないよう黄川田仁志こども政策担当大臣に要望書を手渡した。 保育公定価格における地域区分の見直しに向け、こども家庭庁は２０２４年人事院勧告に準拠しつつ、隣接する県外の市町村との格差拡大を是正する新たな補正ルールを検討する方針を示している。 要望書では、地域区分の見直しについて、国家公務員の地域手当に準拠するという従来の考え方から脱却することを求めた。特に県外の隣接市町村との格差については、都道府県域を越えた広域的な区分を考慮して是正を図ることなどを提案した。 このほか、長時間開所による変則的なシフト勤務や、多様な背景を持つこどもへの対応など勤務実態に即した公定価格を定めることも要請。自治体の財政力によって保育に地域格差が生じないよう、保育士の人材確保・定着に向けた取り組みの強化も要望した。 福祉新聞Web", "content": "保育公定価格の自治体間格差是正を 大都市近隣５県の知事らが黄川田大臣に要望\n2026年07月17日 福祉新聞編集部保育公定価格の地域区分見直しに当たり、給与水準の高い隣接の大都市に保育士が流出する悩みを持つ奈良、埼玉、千葉、和歌山、佐賀の５県の知事らは１日、内閣府を訪れ、隣接する自治体間で公定価格に大きな差が生じないよう黄川田仁志こども政策担当大臣に要望書を手渡した。\n保育公定価格における地域区分の見直しに向け、こども家庭庁は２０２４年人事院勧告に準拠しつつ、隣接する県外の市町村との格差拡大を是正する新たな補正ルールを検討する方針を示している。\n要望書では、地域区分の見直しについて、国家公務員の地域手当に準拠するという従来の考え方から脱却することを求めた。特に県外の隣接市町村との格差については、都道府県域を越えた広域的な区分を考慮して是正を図ることなどを提案した。\nこのほか、長時間開所による変則的なシフト勤務や、多様な背景を持つこどもへの対応など勤務実態に即した公定価格を定めることも要請。自治体の財政力によって保育に地域格差が生じないよう、保育士の人材確保・定着に向けた取り組みの強化も要望した。", "summary": "保育公定価格の自治体間格差是正を 大都市近隣５県の知事らが黄川田大臣に要望\n2026年07月17日 福祉新聞編集部保育公定価格の地域区分見直しに当たり、給与水準の高い隣接の大都市に保育士が流出する悩みを持つ奈良、埼玉、千葉、和歌山、佐賀の５県の知事らは１日、内閣府を訪れ、隣接する自治体間で公定価格に大きな差が生じないよう黄川田仁志こども政策担当大臣に要望書を手渡した。保育公定価格における地域区分の見直しに向け、こども家庭庁は２０２４年人事院勧告に準拠しつつ、隣接する県外の市町村との格差拡大を是正する新たな補正ルールを検討する方針を示している。要望書では、地域区分の見直しについて、国家公務員の地域手当に準拠するという従来の考え方から脱却することを求めた。自治体の財政力によって保育に地域格差が生じないよう、保育士の人材確保・定着に向けた取り組みの強化も要望した。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "介護・福祉職員の退職金共済、厚労省が多くの論点　「1年で退職金」は廃止か　支給増大で曲がり角", "url": "https://www.joint-kaigo.com/articles/47469/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-16 19:38", "description": "介護や障害福祉、保育などを担う社会福祉法人の職員の退職金制度（退職手当共済制度）が、いま大きな曲がり角を迎えている。【Joint編集部】 厚生労働省は16日の検討会で、今後の見直しに向けて多岐にわたる論点を提示。支給額の […]", "content": "介護・福祉職員の退職金共済、厚労省が多くの論点 「1年で退職金」は廃止か 支給増大で曲がり角\n介護や障害福祉、保育などを担う社会福祉法人の職員の退職金制度（退職手当共済制度）が、いま大きな曲がり角を迎えている。【Joint編集部】\n厚生労働省は16日の検討会で、今後の見直しに向けて多岐にわたる論点を提示。支給額の急増に対応すべく、法人の負担軽減など制度の持続性を確保する方策を検討していく考えを示した。\nこれから2040年頃にかけて退職者の人数がピーク期に入るため、このままでは法人が支払う掛金の大幅な増加が避けられない ーー 。これが厳しい現実だ。\n足元では準備金の取り崩しなどでやりくりしているが、それも来年度末には底をつく見通し。2028年度以降を見据え、職員の退職金を守りつつ法人の経営悪化を防ぐ手立てを講じなければならない。\n厚労省は具体的な方策として、\n● 収支のバランスをとる期間（現行5年）の長期化\n● 毎年の掛金のバラツキ回避、引き上げ幅の一定化\n● 退職金を受け取れる最低勤続年数（現行1年）の延長\n● 退職直前の給与をもとに退職金を計算するルールの見直し\n● 退職金の計算に使う給与の上限（現行36万円）の引き上げ\nなどを俎上に載せる。この日の検討会では、多くの委員がこうした議論の方向性に理解を示した。\n退職金の支給額自体を引き下げることに対しては、「処遇改善、人材確保に逆行する」といった反対意見が根強い。できるだけ現行の支給水準を維持し、掛金の引き上げも抑制して法人が安定的に経営を続けられるよう、業界団体からは新たな公費の投入を求める声が上がっている。こうした要請がどこまで届くのか、財源のあり方も含めて今後の大きな焦点となる。\n厚労省は今秋に検討会の取りまとめを行う予定。それを審議会（社会保障審議会・福祉部会）に報告し、退職金制度の見直しに向けた協議を詰めていく計画だ。具体的な方策の内容によっては、法改正に至る可能性がある。", "summary": "介護・福祉職員の退職金共済、厚労省が多くの論点 「1年で退職金」は廃止か 支給増大で曲がり角\n介護や障害福祉、保育などを担う社会福祉法人の職員の退職金制度（退職手当共済制度）が、いま大きな曲がり角を迎えている。厚労省は具体的な方策として、\n● 収支のバランスをとる期間（現行5年）の長期化\n● 毎年の掛金のバラツキ回避、引き上げ幅の一定化\n● 退職金を受け取れる最低勤続年数（現行1年）の延長\n● 退職直前の給与をもとに退職金を計算するルールの見直し\n● 退職金の計算に使う給与の上限（現行36万円）の引き上げ\nなどを俎上に載せる。退職金の支給額自体を引き下げることに対しては、「処遇改善、人材確保に逆行する」といった反対意見が根強い。それを審議会（社会保障審議会・福祉部会）に報告し、退職金制度の見直しに向けた協議を詰めていく計画だ。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "処遇改善まだ実現せず　福祉専門職議連・田村会長「私たちの使命」 - 福祉新聞Web", "url": "https://fukushishimbun.com/seiji/45669", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-16 10:00", "description": "福祉の国家資格を持つ人を支える超党派の「地域共生社会推進に向けての福祉専門職支援議員連盟」（田村憲久会長）の総会が１日、参議院議員会館で開かれた。田村会長は「福祉職の処遇改善はまだ実現できていない。これは我々の大きなミッション（使命）だ」とあいさつした。 同日は４団体が要望を述べた。処遇改善について日本精神保健福祉士協会の洗成子常務理事は、精神保健福祉士の平均年収が約４０４万円（２０２０年調査）で、看護師やリハビリ専門職よりも低い現状を報告した。また、精神保健福祉士がメンタルヘルスに課題を抱えた人に、早い段階から関わることがその人の回復に寄与し、結果として社会保障費を抑えると説明。「処遇改善はコストではなく投資だ」と訴えた。 日本介護福祉士会は、介護施設での虐待や身体拘束をなくすために、介護福祉士を中心としたリーダーを配置するよう提案。その体制を組んだ施設を次期介護報酬改定で評価するよう求めた。 日本医療ソーシャルワーカー協会は医療機関における社会福祉士の必置を要望。日本社会福祉士会は改正社会福祉法に規定された「地域権利擁護相談支援センター」に、より多くの社会福祉士を配置するよう求めた", "content": "処遇改善まだ実現せず 福祉専門職議連・田村会長「私たちの使命」\n2026年07月16日 福祉新聞編集部福祉の国家資格を持つ人を支える超党派の「地域共生社会推進に向けての福祉専門職支援議員連盟」（田村憲久会長）の総会が１日、参議院議員会館で開かれた。田村会長は「福祉職の処遇改善はまだ実現できていない。これは我々の大きなミッション（使命）だ」とあいさつした。\n同日は４団体が要望を述べた。処遇改善について日本精神保健福祉士協会の洗成子常務理事は、精神保健福祉士の平均年収が約４０４万円（２０２０年調査）で、看護師やリハビリ専門職よりも低い現状を報告した。また、精神保健福祉士がメンタルヘルスに課題を抱えた人に、早い段階から関わることがその人の回復に寄与し、結果として社会保障費を抑えると説明。「処遇改善はコストではなく投資だ」と訴えた。\n日本介護福祉士会は、介護施設での虐待や身体拘束をなくすために、介護福祉士を中心としたリーダーを配置するよう提案。その体制を組んだ施設を次期介護報酬改定で評価するよう求めた。\n日本医療ソーシャルワーカー協会は医療機関における社会福祉士の必置を要望。日本社会福祉士会は改正社会福祉法に規定された「地域権利擁護相談支援センター」に、より多くの社会福祉士を配置するよう求めた。\n同議連は１９年６月に発足。災害時に社会福祉士、精神保健福祉士、介護福祉士が活躍できる環境づくりを発足当初から主導した。その結果、災害救助法に福祉サービスが位置付けられたと田村会長はみている。", "summary": "田村会長は「福祉職の処遇改善はまだ実現できていない。日本介護福祉士会は、介護施設での虐待や身体拘束をなくすために、介護福祉士を中心としたリーダーを配置するよう提案。日本社会福祉士会は改正社会福祉法に規定された「地域権利擁護相談支援センター」に、より多くの社会福祉士を配置するよう求めた。災害時に社会福祉士、精神保健福祉士、介護福祉士が活躍できる環境づくりを発足当初から主導した。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "ケアマネの再研修、廃止で大幅スリム化へ　厚労省　一部は復職後の受講も可に", "url": "https://www.joint-kaigo.com/articles/47458/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-15 22:04", "description": "厚生労働省は15日、ケアマネジャー資格の更新制の廃止に伴って既存の再研修を刷新する構想について、時間数を現行から大幅に削減する方針を明示した。【Joint編集部】 既存の再研修は廃止し、カリキュラムをスリム化したうえで作 […]", "content": "厚生労働省は15日、ケアマネジャー資格の更新制の廃止に伴って既存の再研修を刷新する構想について、時間数を現行から大幅に削減する方針を明示した。【Joint編集部】\n既存の再研修は廃止し、カリキュラムをスリム化したうえで作り直す。一部を復職後に受けられるようにすることも検討する。\n自治体の担当者に介護保険の重要施策を説明する会議（全国介護保険担当課長会議）で明らかにした。ケアマネジャーの確保、復職しやすい環境の整備が狙い。\n厚労省は新たな研修の目的を、離職後の制度の変更点など必要な知識のアップデートに特化させる。オンライン・オンデマンドの柔軟な受講を可能とし、「円滑な復職のための簡素な研修」とする考えだ。\n6月19日に成立した改正法をめぐる国会審議で、厚労省は現行の再研修の廃止に踏み切る意向を示していた。今後は関係団体や有識者の意見を踏まえて詳細を詰め、年内を目途に具体的な見直しの方向性を示す計画だ。", "summary": "厚生労働省は15日、ケアマネジャー資格の更新制の廃止に伴って既存の再研修を刷新する構想について、時間数を現行から大幅に削減する方針を明示した。【Joint編集部】\n既存の再研修は廃止し、カリキュラムをスリム化したうえで作り直す。一部を復職後に受けられるようにすることも検討する。6月19日に成立した改正法をめぐる国会審議で、厚労省は現行の再研修の廃止に踏み切る意向を示していた。", "categories": ["人材育成・HR", "介護保険・制度"], "is_new": false}, {"title": "ケアマネ新類型「登録施設介護支援」、既存の居宅は新規指定の手続き不要　厚労省が経過措置", "url": "https://www.joint-kaigo.com/articles/47447/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-15 19:53", "description": "住宅型有料老人ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」について、厚生労働省は、既存の居宅介護支援事業所が指定を円滑に受けられるように経過措置を設ける方針だ。【Joint編集部】 当面の間、居宅 […]", "content": "住宅型有料老人ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」について、厚生労働省は、既存の居宅介護支援事業所が指定を円滑に受けられるように経過措置を設ける方針だ。【Joint編集部】\n当面の間、居宅介護支援の指定を受けている事業所を「登録施設介護支援」の事業所とみなす取り扱いとする。既存の居宅介護支援事業所であれば、制度の施行からしばらくは新類型の新規指定を受けるための申請手続きは不要で、自動的に“2枚看板”となれる（例外規定もあり）。\n厚労省は15日、自治体の担当者に介護保険の重要施策を説明する会議（全国介護保険担当課長会議）でアナウンスした。\nこの「登録施設介護支援」は、6月19日に成立した改正法に基づいて創設されるケアマネジメントの新たなサービス類型。厚労省は改正法の附則に、既存の居宅介護支援事業所が住宅型ホームの入居者の支援を継続しやすいように、こうした経過措置の適用を盛り込んでいた経緯がある。\n居宅介護支援の指定が失効・取り消し、または効力停止となった事業所は、「登録施設介護支援」の指定も同様の取り扱いとなる。居宅介護支援としての指定がなく、新たに「登録施設介護支援」の新規指定を受ける事業所は申請手続きが必要だ。", "summary": "住宅型有料老人ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」について、厚生労働省は、既存の居宅介護支援事業所が指定を円滑に受けられるように経過措置を設ける方針だ。【Joint編集部】\n当面の間、居宅介護支援の指定を受けている事業所を「登録施設介護支援」の事業所とみなす取り扱いとする。居宅介護支援の指定が失効・取り消し、または効力停止となった事業所は、「登録施設介護支援」の指定も同様の取り扱いとなる。居宅介護支援としての指定がなく、新たに「登録施設介護支援」の新規指定を受ける事業所は申請手続きが必要だ。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "進む要介護者の単身化、3割超が1人暮らし　75歳以上の「老老介護」も増加　厚労省調査", "url": "https://www.joint-kaigo.com/articles/47435/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-15 14:14", "description": "厚生労働省は15日、昨年（2025年）の「国民生活基礎調査」の結果を新たに公表した。【Joint編集部】 在宅で生活する要支援者・要介護者がいる世帯のうち、1人暮らしの「単独世帯」が33.2%に増加した。 また、75歳以 […]", "content": "2026年7月15日\n進む要介護者の単身化、3割超が1人暮らし 75歳以上の「老老介護」も増加 厚労省調査\n厚生労働省は15日、昨年（2025年）の「国民生活基礎調査」の結果を新たに公表した。【Joint編集部】\n在宅で生活する要支援者・要介護者がいる世帯のうち、1人暮らしの「単独世帯」が33.2%に増加した。\nまた、75歳以上の高齢者同士で支え合う「老老介護」の割合も37.1%に上昇した。今後、地域の介護サービスや生活支援サービスのニーズが一段と拡大しそうだ。\n要介護者らがいる世帯の構造をみると、最多は「核家族世帯」の40.2%。次いで「単独世帯」が33.2%、「3世代世帯」が9.0%だった。「3世代世帯」が減少の一途をたどる一方で、1人暮らしの要介護者らは着実に増え続けている。\n要介護者らと同居する主な介護者の年齢をみると、両者がともに65歳以上のケースは61.9%、75歳以上のケースは37.1%となっていた。\n団塊の世代が75歳を超えるなど、高齢化の進展が最大の要因。要介護者らの単身化や老老介護の深化は、介護サービスを前線で支えるホームヘルパーやケアマネジャーなどの負担増にもつながる動きで、在宅の支援体制の強化が急務となっている。", "summary": "【Joint編集部】\n在宅で生活する要支援者・要介護者がいる世帯のうち、1人暮らしの「単独世帯」が33.2%に増加した。要介護者らがいる世帯の構造をみると、最多は「核家族世帯」の40.2%。次いで「単独世帯」が33.2%、「3世代世帯」が9.0%だった。要介護者らと同居する主な介護者の年齢をみると、両者がともに65歳以上のケースは61.9%、75歳以上のケースは37.1%となっていた。", "categories": ["介護保険・制度", "福祉・社会保障"], "is_new": false}, {"title": "静岡で保育のお仕事フェア　就職後のミスマッチ防ぐ機会に - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45666", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-15 10:00", "description": "静岡県と県社会福祉協議会は４日、静岡市の常葉大で「保育のお仕事フェア」を開催した。保育所や認定こども園、児童養護施設などを運営する５０法人が出展。学生ら２６０人が訪れ、職員の話に耳を傾けた。 催しでは最初に法人による１分間のプレゼンテーションの時間を設けた。そろいのＴシャツを着た若手職員らが壇上で、研修制度や福利厚生など法人の特徴をアピール。その後の個別相談会では、学生らが各法人のブースを１５分ずつ最大５カ所回った。 出展した社会福祉法人聖隷福祉事業団は保育所や認定こども園を１０カ所運営しており、毎年保育職だけで約２０人を採用している。今回７人の学生がブースを訪れた。同法人人事企画部の安間聖課長補佐は「結婚後に別地域の保育所へ異動でき、発達支援などにも関われるのが法人の強み。今後園の見学などにつながってくれれば」と話した。 催しは県社協のしずおか保育士・保育所支援センターが毎年企画しており、養成校を会場とした開催は今回で３回目。参加者は増加傾向にあることから約１００法人が出展を希望したが、会場の都合で半数を断った。 県社協の阪本真由美さんは「お祭りのような楽しい雰囲気の中で、学生に保育", "content": "静岡で保育のお仕事フェア 就職後のミスマッチ防ぐ機会に\n2026年07月15日 福祉新聞編集部静岡県と県社会福祉協議会は４日、静岡市の常葉大で「保育のお仕事フェア」を開催した。保育所や認定こども園、児童養護施設などを運営する５０法人が出展。学生ら２６０人が訪れ、職員の話に耳を傾けた。\n催しでは最初に法人による１分間のプレゼンテーションの時間を設けた。そろいのＴシャツを着た若手職員らが壇上で、研修制度や福利厚生など法人の特徴をアピール。その後の個別相談会では、学生らが各法人のブースを１５分ずつ最大５カ所回った。\n出展した社会福祉法人聖隷福祉事業団は保育所や認定こども園を１０カ所運営しており、毎年保育職だけで約２０人を採用している。今回７人の学生がブースを訪れた。同法人人事企画部の安間聖課長補佐は「結婚後に別地域の保育所へ異動でき、発達支援などにも関われるのが法人の強み。今後園の見学などにつながってくれれば」と話した。\n催しは県社協のしずおか保育士・保育所支援センターが毎年企画しており、養成校を会場とした開催は今回で３回目。参加者は増加傾向にあることから約１００法人が出展を希望したが、会場の都合で半数を断った。\n県社協の阪本真由美さんは「お祭りのような楽しい雰囲気の中で、学生に保育の仕事の魅力を知ってもらうのが狙い。法人に対しても他法人の様子を知り、意識改革につながる機会になれば」と話す。\n常葉大の鈴木久美子教授によると、就職活動で福利厚生などを重視する学生は少なくないが、実際は保育観を語れる園が支持される傾向にあるという。鈴木教授は「さまざまな保育所と出会うことで、仮に就職後にミスマッチがあっても他業界ではなく、再び保育業界で働いてもらえれば」と期待を寄せた。", "summary": "静岡で保育のお仕事フェア 就職後のミスマッチ防ぐ機会に\n2026年07月15日 福祉新聞編集部静岡県と県社会福祉協議会は４日、静岡市の常葉大で「保育のお仕事フェア」を開催した。保育所や認定こども園、児童養護施設などを運営する５０法人が出展。出展した社会福祉法人聖隷福祉事業団は保育所や認定こども園を１０カ所運営しており、毎年保育職だけで約２０人を採用している。法人に対しても他法人の様子を知り、意識改革につながる機会になれば」と話す。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "How To Deal With Regret ( 3 Stoic Strategies to Live Free)", "url": "https://dailystoic.com/how-to-deal-with-regret-3-stoic-strategies-to-live-free/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-08-24 01:48", "description": "What Is Regret? “Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic After a long day at work and terrible traffic, […] The post How To Deal With Regret ( 3 Stoic Strategies to Live Free) appeared first on Daily Stoic .", "content": "What Is Regret?\n“Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic\nAfter a long day at work and terrible traffic, you finally make it home. The stress has taken its toll, and you’re exhausted, bored, and frustrated with the day’s events all at once. You walk into your kitchen to find a heaping pile of dishes–something you asked your spouse to take care of this morning! Yet, they’re relaxing in front of the TV as if nothing’s wrong.\nYou feel the anger rising up, and unable to control yourself, you yell at your spouse. You don’t hold back. You’re out to make a point, to prove that what happened is a really big deal.\nYour spouse is frightened and embarrassed. They’re worried–you’ve never yelled at them like this before. They were going to do the dishes later, but you never gave them that opportunity. The day’s been long for them too, yet you didn’t care. They just wanted to have a nice night with you, but now that’s ruined.\nLater that night, you finally start to understand what losing your temper has cost you. You know you shouldn’t have said what you said. You should have been more considerate. You should have acted differently–you regret your choices.\nMaybe for you it wasn’t a pile of dishes that set you off. Maybe it was your kids using markers on the wall. Or your boss dumping that report on you before your vacation. Regardless of the scenario, we’ve all lost it at some point, and we’ve all felt the pang of regret.\nThe Stoics would define regret as the moment when past events consume our present lives. When we dwell over things we have no control over. When we resist our fate. Marcus Aurelius argued that we must be “satisfied with what [we] have, and accept the present–all of it.” Regret is the contrary–when we’re not satisfied with what we have, when we reject what we’ve been given.\nSeneca said “we often suffer more in imagination than in reality.” He was saying that regret is no more than an emotion of our imagination. We believe that had we said something (or held our tongue), had we acted differently, the outcome would have been different.\nMarcus Aurelius carried a similar mindset, and provided a solution to this problem. “External things are not the problem. It is your assessment of them. Which you can erase right now.”\nLet’s take another look at that “fight” you had with your spouse. Your regrets are not about the actual dishes or your spouse–it’s about your perception of expectations. You expected your spouse to have the dishes done when you got home. So you believe it should have been different, and had it been different, you would be better off.\nSo does that mean it’s your spouse’s fault? Maybe for leaving the dishes in the sink. But certainly not for your overreaction. And definitely not for the regret you felt later that night. Regret is an internal problem, to be both diagnosed and treated by ourselves. We must learn to look past these “self-focused emotions” and master our feelings of regret. This post aims to help you understand your emotions, use the past to your advantage, and conquer your biggest regrets.\nWhy Do I Feel Regret?\n“Life is very short and anxious for those who forget the past, neglect the present, and fear the future” – Seneca\nWe’ve all told ourselves, “no regrets.” There are countless memes, inspirational quotes, and videos reminding us online. Poets, singers, painters, and writers have been creating art about it for millenia. We’ve practically been conditioned to live by it.\nBut no matter how many times we read about it, sing along to a song about it, or tell ourselves not to, we all have something we regret. We all have that nagging feeling that comes back to us. That hits us exactly when we thought we forgot about that time, that place, those people. It comes back at the very worst time. It sucks. It hurts.\nThe power of regret is not to be understated. Bestselling author and founder of the American Regret Project Daniel Pink found that 82 percent of Americans experience regret at least occasionally. Pink describes regret as “an indispensable emotion,” yet also claims it can be “a positive instrument for improving your life.”\nIf we truly want to improve our life, we can’t run away from these negative feelings. We can’t hide them. But should we just accept this despair? Should we just come to terms living with regret?\nThis is what the great writer Samuel Johnson must have been wondering near the end of 1775. With 1776 on the horizon, Johnson wrote in his diary:\n“When I look back on resolutions of improvement and amendment which have year after year been made and broken, either by negligence, forgetfulness, vicious idleness, casual interruption, or morbid infirmity; when I find that so much of my life has been stolen unprofitably away, and that I can descry by retrospection scarcely a few single days properly and vigorously employed, why do I yet try to resolve again? I try because reformation is necessary and despair is criminal.”\nJohnson came to terms with his past, but not with his regret. He chose to reflect upon his hardships in order to better himself, to avoid making those same mistakes in the future. He chose to fight regret–not to wallow in it.\nIf there’s one thing we can learn from Johnson, it must be that experiencing regret is inevitable–but our actions and our mindset are not. Thus, the question is not ‘Why do I feel regret?’, but rather ‘How do I deal with it?’ ‘How do I move on?’ ‘How can I make myself better because of this?’ In order to answer these questions, the Stoics practiced the following strategies to help them build their mental toughness and resilience–starting with examining what they controlled.\nFocus On What You Control\n“Every event has two handles, one by which it can be carried, and one by which it can’t. If your brother does you wrong, don’t grab it by his wronging, because this is the handle incapable of lifting it. Instead, use the other—that he is your brother, that you were raised together, and then you will have hold of the handle that carries.” – Epictetus\nOne of the most important practices in Stoic philosophy, which was introduced by Epictetus, is determining what we control and what we don’t. What we have power over and what we don’t. What we can change and what we can’t.\nThere are two ways in which we can look at the past–two handles we can grab, to use Epictetus’ quote. The first handle forces us to perceive the past as an inevitable experience, destined to wrong and hurt us from the beginning. The opposite handle, however, allows us to extract the good parts, and use our experiences to benefit ourselves.\nIn looking at past decisions, we must grab them by the latter handle. We must understand that what happened, happened. We must see that we can’t change the past, no matter how much it hurt us or someone else. So what good does regret do?\nAbsolutely nothing, as Holocaust survivor and author Dr. Edith Eger explained to Ryan Holiday on an episode of The Daily Stoic Podcast. Ryan was discussing a relationship he regretted messing up, and Dr. Eger offered him one gift that would solve the guilt right then. “I give you a sentence,” she said, “One sentence—if I knew then what I know now, I would have done things differently.” That’s the end of that, she said. “Guilt is in the past, and the one thing you cannot change is the past.”\nAs a society we’ve become disillusioned by the idea of what we control. We all believe we have some control over the outcome of whatever we encounter. We all believe that if we keep thinking about what happened, somehow we’ll be able to change what happened.\nYet, we must come to terms with the fact that some things simply can’t be changed. We must understand that some things are in our control and some that aren’t. Say, if you regret getting a haircut, you’re in control. You can style it, cover it, or just wait for it to grow out again–you command your situation. But if you regret cursing out your boss before quitting your job, you’re not in control–you can’t take back your words.\nAs Marcus Aurelius wrote to himself—and by extension, to us:\n“Remind yourself that past and future have no power over you. Only the present—and even that can be minimized. Just mark off its limits. And if your mind tries to claim that it can’t hold out against that…well, then, heap shame upon it.”\nThe past is done. We can’t linger in our insecurities. We can’t ponder over our regrets. We must learn that what happened is out of our control now–we must let go.\n“Letting go is a necessary, if sometimes heart-wrenching gateway to genuine transformation,” is how the always-zen basketball coach Phil Jackson put it. The Stoics called it the “art of acquiescence”—the giving up and the assenting of whatever things are so that they can be what they are to become.\nIn one way, regret is just wishing things went the way we wanted them to. But by letting things become what they must, we are less likely to regret what we’ve done. In accepting that some things are simply out of our control, we are less likely to wish for a different outcome.\nThe past is something we can’t control anymore. We can’t change what we said, what we did, or how we felt.\nWe can, however, control the present. We control how we grow from our experiences. We control how we respond to adversity. We control how we can use our regret to our advantage.\nWe control how we act right now. We must.\nTo learn more on this topic, check out “You Control How You Play”, where Ryan speaks to the Cleveland Browns about the importance of perspective, staying motivated, and knowing what they control.\nLove Your Fate\n“A blazing fire makes flame and brightness out of everything that is thrown into it.” – Marcus Aurelius\nAfter we sort out what we control, we must find how to respond–regardless if we control what’s happening or not. We must determine how we handle ourselves. We must determine how we overcome obstacles. We must determine how to move forward.\nIn the first book of his Discourses, Epictetus envisions himself being executed by Roman guards, his life out of his control. In a display of tranquility and wisdom, he lays out his thoughts:\n“I must die. But must I die bawling? I must be put in chains–but moaning and groaning too? I must be exiled; but is there anything to keep me from going with a smile, calm and self-composed.”\nThough the term was first coined by German philosopher Friedrich Nietzsche, the practice of amor fati–loving your fate–dates back to Epictetus and the Stoics. Often by means of reflection and meditation, the Stoics would use this practice to settle past trauma and help them achieve a greater sense of inner peace. “The Fates guide the person who accepts them,” Cleanthes said, “and hinder the person who resists them.”\nAmor fati is more than just understanding what happens to us. It’s understanding that our perception doesn’t always have to be negative. It’s understanding that accepting the present circumstances will make us better. It’s understanding that we must be grateful for the cloudy weather sometimes–and that there’s always a way through the storm.\nWe all face hardships. We all get stuck in traffic. We all deal with slow WiFi, or bad cell service, right when we need to send that important message. As rational people, we tend to think that these hardships were made specifically for us. That the world is out to get us. That we can’t win.\nBut this couldn’t be farther from the truth. Everybody goes through obstacles. Everybody gets tripped up sometimes. As we talked about in the first section, we can’t control some things in life. And these hardships, no matter how hard we try, will always be out of our control.\nWhen we accept what happens to us, after understanding that certain things— particularly bad things—are outside our control, we are left with this: loving whatever happens to us and facing it with unfailing cheerfulness and strength. As bestselling author Robert Greene (48 Laws of Power, Mastery) put it, we need to, “accept the fact that all events occur for a reason, and that it is within your capacity to see this reason as positive.”\nMarcus Aurelius portrays this concept perfectly in Meditations through the image of an artisans shop:\n“There are thorns on the path, then keep away! Enough said. Why ponder the existence of nuisance? Such thinking would make you a laughing-stock to the true student of Nature, just as a carpenter or cobbler would laugh if you pointed out the sawdust and chips on the floors of their shops. Yet while those shopkeepers have dustbins for disposal, Nature has no need of them.”\nWhy get tripped up by the thorns? Why ponder over the sawdust on your floor? It’s simply part of nature! As long as you have the capability to see them, you have the capability to move past them.\nIn practicing amor fati, we’re also less likely to have regrets in the future. By embracing the challenges that lay ahead of us, we’re less likely to regret the decisions we make to conquer them – regardless of the outcome. We’re able to tackle the future with confidence, conviction, courage, and so much more.\nAmor fati is more than just a mindset–it’s a way of life. Incorporating amor fati into your life will take time, effort, and sacrifices that probably won’t feel comfortable. But we must. We must move past this existential angst. We must move forward, away from our regret, and towards our future.\nLove what’s happened to you. Love who you’ve become, and how much you’ve changed. Love your fate–amor fati.\nCarry this reminder with you every day with our amor fati medallion from the Daily Stoic Store. Carry this in your pocket as a reminder to treat each and every moment–no matter how challenging–as something to be embraced, not avoided.\nLook Ahead\n“We should project our thoughts ahead of us at every turn and have in mind every possible eventuality instead of only the usual course of action.” – Seneca\nBefore Ryan Holiday gets on stage for a big speech, he runs through everything that could go wrong: trouble with the microphone, the clicker not advancing a slide, the audience not reacting as anticipated. He is able to see potential problems before they arise, and come up with solutions before anything actually happens. He is able to prevent himself from being overwhelmed if a problem arises by being prepared.\n“Rehearse them in your mind: exile, torture, war, shipwreck,” Seneca said. “All the terms of our human lot should be before our eyes.”\nThis practice, called premeditatio malorum, is one of the oldest and most common practices in Stoic philosophy. It literally means the “premeditation of evils.” The Stoics used this practice to help them prepare for life’s inevitable hardships, and remain calm and confident in turbulent times.\nThe world isn’t fair. We all know this. We don’t always get what is ours, even if we’ve earned it. We don’t always win, even if we play hard.\nBut we can’t be surprised when we don’t win. If it comes as a constant surprise each and every time something unexpected occurs, you’re not only going to be miserable whenever you attempt something big, you’re going to have a much harder time accepting it and moving on to attempts two, three, and four. You’re going to have a much harder time living in the present instead of lingering in the past. You’re going to have a much harder time trusting your instincts–and fighting regret.\nThere’s perhaps no better personification of premeditatio malorum than the great Booker T. Washington. Washington ran a school with 1,500 students, all while advising politicians and activists and traveling across the country to give speeches. But how? How did he maintain this lifestyle, and with such striking success?\n“When I begin my work in the morning, I expect to have a successful and pleasant day of it, but at the same time I prepare myself to hear that one of our school buildings is on fire, or has burned, or that some disagreeable accident had occurred, or that someone has abused me in a public address or a printed article, for something that I have done or omitted to do, or or something that he had heard that I had said—probably something I had never thought of saying.”\nHe envisioned the worst possible things that could happen to him throughout his day. Not only envisioned, but he expected them to happen. In doing this, Washington was more prepared for the hardships of the day. A canceled train couldn’t be as bad as his school burning down. Being late to dinner couldn’t be as bad as someone verbally abusing him in public.\nIn preparing himself for challenges, Washington was simultaneously preparing himself for regret. Since he saw his fears right in front of him, and anticipated them happening, he was less scared of the outcomes of his choices–and he was less likely to regret them.\nIn the same manner, Epictetus used this to help him foresee all of the dangers that came with a seemingly easy decision–bathing:\n“If you are going to bathe, represent to yourself the incidents usual in the bath—some persons pouring out, others pushing in, others scolding, others pilfering…. For thus, if any impediment arises in bathing, you will be able to say, “It was not only to bathe that I desired, but to keep my will in harmony with nature; and I shall not keep it thus if I am out of humor at things that happen.”\nPracticing premeditatio malorum allows us to be more prepared for life’s inevitable setbacks. Though it may be hard to admit, everything will not go our way. We might not get that job that we want. We might not win that game. But we will be ready for any obstacles that cross our path.\nWe’ll know that we made the right decision – and we won’t regret our choices.\nIf you want to hear Ryan talk more about this topic, check out The Stoic Secret Of Facing Failure To Achieve Success: Premeditatio Malorum on the Daily Stoic YouTube Channel.\n10 Best Stoic Quotes on Regret\n“Then remind yourself that past and future have no power over you. Only the present – and even that can be minimized.” – Marcus Aurelius, from Meditations\n“He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has.” – Epictetus, from Fragments\n“External things are not the problem. It is your assessment of them. Which you can erase right now.” – Marcus Aurelius, from Meditations\n“Give yourself a gift, the present moment.” – Marcus Aurelius, from Meditations\n“The man who has anticipated the coming of troubles takes away their power when they arrive.”- Seneca, from Consolation to Marcia\n“To shrug it all off and wipe it clean—every annoyance and distraction—and reach utter stillness. Child’s play.” — Marcus Aurelius, from Meditations\n“Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic\n“When we are no longer able to change a situation, we are challenged to change ourselves.” – Viktor Frankl\n“There is only one way to happiness and that is to cease worrying about things which are beyond the power of our will.” – Epictetus, from Discourses\n“Do not spoil what you have by desiring what you have not; remember that what you now have was once among the only things you hoped for.” – Epicurus\nAdditional Resources\nPodcasts:\nHolocaust Survivor Dr. Edith Eger on the Gift of Forgiveness\nKate Courtney, Karen Duffy, Meg Mason, and Susan Cain on Using Stoicism to Endure Life’s Obstacles\nYou can subscribe to the Daily Stoic Podcast here, and our podcast YouTube channel here.\nDaily Stoic Meditations:\n“We Almost Always Regret This”\n“The Question To Ask When You Mess Up”\nTo sign up for one free email per day inspired by Stoic philosophy, click here.\nRyan Holiday’s RSS newsletter:\n24 Things I Wish I Had Done Sooner (or my biggest regrets), from ryanholiday.net\n40 Ways To Live A Full Life (And Leave Nothing On The Table) By Age 30, from ryanholiday.net\nTo receive more of Ryan’s “insider” emails, subscribe here. Twice each month, Ryan writes a longer-than-normal essay on various topics, including wealth, philosophy, parenting, and living the good life. Join over 170,000 subscribers today!\nDaily Stoic Store:\nPremeditatio Malorum Medallion\nTo find other Stoic reminders, jewelry, books, courses and more, you can visit the Daily Stoic store here.", "summary": "You know
