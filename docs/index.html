ument now accepts a path to a Python file in addition to accepting a string full of Python code. It can also now be specified multiple times. (#659)- Breaking change: Type detection is now the default behavior for the\ninsert\nandupsert\nCLI commands when importing CSV or TSV data. Previously all columns were treated asTEXT\nunless the--detect-types\nflag was passed. Use the new--no-detect-types\nflag to restore the old behavior. TheSQLITE_UTILS_DETECT_TYPES\nenvironment variable has been removed. (#679)\nTry it out\nYou can install the new RC like this:\npip install sqlite-utils==4.0rc1\nOr try the CLI version directly with uvx\nlike this:\nuvx --with sqlite-utils==4.0rc1 sqlite-utils --help\nCome chat with us about it in the sqlite-utils Discord channel, or file any bugs in GitHub Issues.", "summary": "sqlite-utils 4.0rc1 adds migrations and nested transactions\n21st June 2026\nsqlite-utils is my combined Python library and CLI tool for working with SQLite databases. I released sqlite-utils 4.0rc1, the first release candidate for sqlite-utils v4. For 4.0a0:\n- Upsert operations now use SQLite’s\nINSERT . (#646)\nsqlite-utils tui\nis now provided by the sqlite-utils-tui plugin.", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false, "title_ja": "sqlite-utils 4.0rc1 は移行とネストされたトランザクションを追加します", "summary_ja": "sqlite-utils 4.0rc1 は移行とネストされたトランザクションを追加します\n2026 年 6 月 21 日\nsqlite-utils は、SQLite データベースを操作するための Python ライブラリと CLI ツールを組み合わせたものです。 sqlite-utils v4 の最初のリリース候補である sqlite-utils 4.0rc1 をリリースしました。 4.0a0の場合:\n- Upsert 操作で SQLite が使用されるようになりました。\nを挿入します。 (#646)\nsqlite-utils tui\nは sqlite-utils-tui プラグインによって提供されるようになりました。"}, {"title": "Datasette Apps: Host custom HTML applications inside Datasette", "url": "https://simonwillison.net/2026/Jun/18/datasette-apps/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-19 08:58", "description": "Today we launched a new plugin for Datasette, datasette-apps , with this launch announcement post on the Datasette project blog. That post has the what , but I'm going to expand on that a little bit here to provide the why . The TL;DR Datasette Apps are self-contained HTML+JavaScript applications that run in a tightly constrained <iframe> sandbox hosted on your Datasette application. They can use JavaScript to run read-only SQL queries against data in Datasette, and can run write queries too if ", "content": "Datasette Apps: Host custom HTML applications inside Datasette\n18th June 2026\nToday we launched a new plugin for Datasette, datasette-apps, with this launch announcement post on the Datasette project blog. That post has the what, but I’m going to expand on that a little bit here to provide the why.\nThe TL;DR\nDatasette Apps are self-contained HTML+JavaScript applications that run in a tightly constrained <iframe>\nsandbox hosted on your Datasette application. They can use JavaScript to run read-only SQL queries against data in Datasette, and can run write queries too if you configure them with some stored queries.\nHere’s a very simple example and a more complex custom timeline example—the latter looks like this:\nApps are allowed to run JavaScript and render HTML and CSS. They are limited in terms of access—the <iframe sandbox=\"allow-scripts allow-forms\">\nthey run in prevents them from accessing cookies or localStorage and they also have an injected CSP header (thanks to this research) which prevents them from making HTTP requests to outside hosts, preventing a malicious or buggy app from exfiltrating private data.\nDatasette Apps started out as my attempt at building a Claude Artifacts mechanism for Datasette Agent, but I quickly realised that the sandboxed pattern is interesting for way more than just adding custom apps in a chat interface and promoted it to its own top-level concept within the Datasette ecosystem.\nThey’re also a fun way to turn my multi-year experiment in vibe-coded HTML tools into a core feature of my main project!\nYou can try out Datasette Apps by signing in with GitHub to the agent.datasette.io demo instance.\nWhy build this?\nSince the very first release, Datasette has offered a flexible backend for creating custom HTML apps via its JSON API.\nOne of my earliest Datasette projects was an internal search engine for documentation when I worked at Eventbrite—it worked by importing documents from different systems into SQLite on a cron and then serving them through a Datasette instance with a custom HTML+JavaScript search interface that directly queried the Datasette API.\nI had client-side JavaScript constructing SQL queries, which originally was intended as an engineering joke but turned out to be a really productive way of iterating on the app!\nThat project, combined with my experience building my HTML tools collection and my experiments with Claude Artifacts, has convinced me that adding a Datasette-style backend to a self-contained HTML frontend is an astonishingly powerful combination.\nImagine how much more useful Claude Artifacts could be if they had access to a persistent relational database. That’s what I’m building with Datasette Apps!\nNeat ideas in Datasette Apps\nHere are a few of the ideas and patterns I’ve figured out building this which I think have staying power.\n<iframe sandbox=\"allow-scripts\" srcdoc=\"...\">\n+ <meta http-equiv=\"Content-Security-Policy\" content=\"default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:;\">\nThis is the magic combination that makes Datasette Apps feasible in the first place. I need to run untrusted HTML and JavaScript on a highly sensitive domain—an authenticated Datasette instance can contain all sorts of private data. The sandbox=\nattribute lets me run that untrusted code in a way that cannot interact with the parent application—it can’t read the DOM, or access cookies, or steal secrets from localStorage\n. It can however use fetch()\nand friends to load content (or exfiltrate data) from other domains. But... it turns out if you start an HTML page with a <meta http-equiv=\"Content-Security-Policy\">\nheader you can set additional policies that lock down access to other domains. I was worried that malicious JavaScript would be able to update or remove that header but it turns out that doesn’t work—once set, the CSP policy is immutable for the content of that frame.\nLocked down APIs with postMessage()\nand MessageChannel()\nHaving locked down those iframes to the point that they couldn’t do anything interesting at all, the challenge was to open them back again such that they could run an allow-list of operations, starting with read-only SQL queries against specified databases.\nI built the first version of this with postMessage()\n, which allows a child iframe to send messages to the parent window. I created a simple protocol for requesting that the parent run a SQL query—the parent could then verify it was against an allow-listed database before executing it.\nOne of the LLM tools, I think it was GPT-5.5, suggested that postMessage()\non its own can be exploited if the iframe somehow loads additional code from an untrusted domain. I don’t think that applies to Datasette Apps, but I also believe in defense in depth, so I had GPT-5.5 help me port to a MessageChannel() based transport instead.\nMessageChannel()\nhas the advantage that if a page navigates to somewhere else the channel closes automatically, removing any chance of executing commands sent from an untrusted external page.\nVisible logs, for queries and errors\nIf you navigate to the timeline demo and search for the string usercontent\nyou’ll pull in some search results that embed images from the user-images.githubusercontent.com\ndomain. This domain is not in the CSP allow-list, so it trips an error.\nThose errors are captured and transmitted back to the parent frame, where they can be displayed in a useful error log. This is meant to make hacking on apps more productive by surfacing otherwise-invisible problems.\nI built an experiment demonstrating that you can even turn this into a one-click-to-allow mechanism for building the CSP allow-list based on what breaks, but I haven’t integrated that idea into datasette-apps\njust yet.\nSQL queries are also visibly logged—scroll to the bottom of the timeline page to see that in action.\nStored queries for write operations\nI want apps to be able to conditionally write to the database, but this is an even more dangerous proposition than SQL reads!\nMy solution involves Datasette’s stored queries feature, rebranded from “canned queries” and given a major upgrade in the recent Datasette 1.0a31—work that was directly inspired by Datasette Apps.\nUsers can create a stored write query that performs an insert or update, then allow-list that specific query for an app to use. Usage from code inside an app looks like this:\nconst result = await datasette.storedQuery(\"todos\", \"add_todo\", {\ntitle: \"Buy milk\",\ndue_date: \"2026-06-20\",\npriority: \"high\",\ncompleted: false\n});\nI’m only just beginning to explore the possibilities this unlocks myself, but my goal is to support full read-write applications built safely as Datasette Apps.\nCopy and paste a prompt to build an app\nThe Datasette Apps plugin has no dependency on LLMs at all, but these self-contained apps are the perfect shape to be written by a modern LLM.\nThe create app form includes a copyable prompt at the end. This prompt has everything a model needs to know to build a new app, including the schema of any selected databases.\nThis means you can click “copy”, paste it into ChatGPT or Claude or Gemini, tell it what you need, and there’s a good chance the model will spit out the code necessary to build the app.\nIf you have Datasette Agent installed your AI assistant will also gain tools to both create new apps and edit existing ones, Claude Artifacts style.\nBuilt with so much AI assistance\nDatasette Apps started life back in April as datasette-agent-artifacts, a plugin I have since renamed to datasette-agent-edit\nkeeping only its editing tools. I built that as one of the first plugins for Datasette Agent, to help get the plugin hooks into the right shape. That first prototype was mainly built using Claude Opus 4.6 in Claude Code.\nWhen I switched track to Datasette Apps I started with a plan constructed using Codex Desktop and GPT-5.5 xhigh, based on extensive dialog and feeding in both datasette-agent-artifacts\nand other prototypes I had built.\nMost of the work that followed stuck with Codex, but in the few short days that we had access to Claude Fable 5 I had it run a security evaluation of the product (an ability that would get it banned by the US government shortly afterwards) and it found a very real problem.\nI was allowing users to allow-list CSP hosts for their apps, but Fable pointed out the following attack:\n- A less privileged user with\ncreate-app\npermission creates an app that queries SQLite for all available tables and selects and exfiltrates all of the data to a host they had allow-listed via CSP. - They then trick an administrator user with access to private data into visiting their app.\n- ... and the app can now run queries as that user and steal their private data!\nThat’s clearly unacceptable. I fixed it by restricting the ability to allow-list any domain to a new apps-set-csp\npermission, which is intended just for trusted staff. Site administrators can also configure Datasette with a list of allowed_csp_origins\n, which regular users can then select. This means you can do things like allow cdnjs.cloudflare.com\nand your users will be able to build apps that load extra JavaScript libraries from the cdnjs CDN.\nI’ve reviewed Datasette Apps extremely closely, especially the security-adjacent parts of it. The critical sandbox and CSP configuration are based on multiple AI-assisted prototypes and tests.\nIt’s looking good so far\nI’m really pleased with this initial release.\nDatasette is growing beyond its origins as an application for serving read-only data into a much richer ecosystem of tools for doing useful things with that data once it has been collected.\nDatasette’s roots are in data journalism. I’ve always been interested in the question of what comes next after a journalist gets their hands on a giant dump of data about the world. Datasette supports exploring and publishing it. Datasette Agent adds interrogating it with AI assistance. Now Datasette Apps expands that to building custom interfaces and visualizations to help unlock the stories that are hidden within.", "summary": "Datasette Apps: Host custom HTML applications inside Datasette\n18th June 2026\nToday we launched a new plugin for Datasette, datasette-apps, with this launch announcement post on the Datasette project blog. You can try out Datasette Apps by signing in with GitHub to the agent.datasette.io demo instance. That’s what I’m building with Datasette Apps!. Datasette’s roots are in data journalism.", "categories": ["業務改善・介護テック"], "is_new": false, "title_ja": "データセット アプリ: データセット内でカスタム HTML アプリケーションをホストします。", "summary_ja": "データセット アプリ: データセット内でカスタム HTML アプリケーションをホストします。\n2026 年 6 月 18 日\n本日、Datasette の新しいプラグインである datasette-apps をリリースし、Datasette プロジェクト ブログにこの発表の投稿を掲載しました。 GitHub を使用して Agent.datasette.io デモ インスタンスにサインインすることで、Datasette Apps を試すことができます。それが私が Datasett Apps で構築しているものです。 Datasette のルーツはデータ ジャーナリズムにあります。"}, {"title": "GLM-5.2 is probably the most powerful text-only open weights LLM", "url": "https://simonwillison.net/2026/Jun/17/glm-52/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-18 08:58", "description": "Chinese AI lab Z.ai released GLM-5.2 to their coding plan subscribers on June 13th, and then yesterday (June 16th) released the full open weights under an MIT license. Similar in size to their previous GLM-5 and GLM-5.1 releases this is a 753B parameter, 1.51TB monster - with 40 active parameters (Mixture of Experts). GLM-5.2 is a text input only model - Z.ai have a separate vision family most recently represented by GLM-5V-Turbo , but that one isn't open weights. GLM-5.2 has a 1 million token c", "content": "GLM-5.2 is probably the most powerful text-only open weights LLM\n17th June 2026\nChinese AI lab Z.ai released GLM-5.2 to their coding plan subscribers on June 13th, and then yesterday (June 16th) released the full open weights under an MIT license. Similar in size to their previous GLM-5 and GLM-5.1 releases this is a 753B parameter, 1.51TB monster—with 40 active parameters (Mixture of Experts). GLM-5.2 is a text input only model—Z.ai have a separate vision family most recently represented by GLM-5V-Turbo, but that one isn’t open weights. GLM-5.2 has a 1 million token context window, up from GLM-5.1’s 200,000.\nThe buzz around this model is strong.\nArtificial Analysis, who run one of the most widely respected independent benchmarks: GLM-5.2 is the new leading open weights model on the Artificial Analysis Intelligence Index.\nGLM-5.2 is the leading open weights model on the Intelligence Index v4.1. At 51, it leads MiniMax-M3 (44), DeepSeek V4 Pro (max, 44) and Kimi K2.6 (43)\nThey did however find it to be quite token-hungry:\nGLM-5.2 uses more output tokens per task than other leading open weights models: the model uses 43k output tokens per Intelligence Index task, up from GLM-5.1 (26k) and above MiniMax-M3 (24k), Kimi K2.6 (35k) and DeepSeek V4 Pro (max, 37k)\nThe model is also now ranked 2nd on the Code Arena WebDev leaderboard, behind only Claude Fable 5. That leaderboard measures “front-end web development tasks, including agentic coding workflows”. I’m impressed to see it rank so highly given the lack of image input, which I had incorrectly assumed was a key part of building a truly great frontend coding model.\nI’ve been trying it out via OpenRouter, which has it from 9 different providers, almost all of which are charging $1.40/million for input and $4.40/million for output. For comparison, GPT-5.5 is $5/$30 and Claude Opus 4.5-4.8 is $5/$25.\nExcellent pelican, disappointing opossum\nGLM-5.1 gave me one of my favorite pelicans and my all time favorite opossum (for the prompt “Generate an SVG of a NORTH VIRGINIA OPOSSUM ON AN E-SCOOTER”.) Interestingly, in both of those cases the model chose to return SVG wrapped in an HTML document that added additional animations using CSS.\nLet’s try GLM-5.2. For “Generate an SVG of a pelican riding a bicycle” I got this:\nIt’s a self-contained fully animated SVG, and the animations aren’t broken! Often I’ll see eyes falling off or wheels rotating independently of the bicycle but here everything works great. It’s a very nice vector illustration of a pelican too. Very impressive.\nSadly, the NORTH VIRGINIA OPOSSUM ON AN E-SCOOTER did not come out nearly as well:\nThis is such a step down from GLM-5.1! As a reminder, that possum looked like this:\n5.2 didn’t even try to animate it.\nMore recent articles\n- Porting the Moebius 0.2B image inpainting model to run in the browser with Claude Code - 22nd June 2026\n- sqlite-utils 4.0rc1 adds migrations and nested transactions - 21st June 2026\n- Datasette Apps: Host custom HTML applications inside Datasette - 18th June 2026", "summary": "GLM-5.2 is a text input only model—Z.ai have a separate vision family most recently represented by GLM-5V-Turbo, but that one isn’t open weights. GLM-5.2 has a 1 million token context window, up from GLM-5.1’s 200,000. GLM-5.2 is the leading open weights model on the Intelligence Index v4.1. Let’s try GLM-5.2.", "categories": ["業務改善・介護テック", "AIツール・生産性"], "is_new": false, "title_ja": "GLM-5.2 はおそらく最も強力なテキスト専用オープンウェイト LLM です", "summary_ja": "GLM-5.2 はテキスト入力専用モデルです。Z.ai には、最近では GLM-5V-Turbo に代表される別のビジョン ファミリがありますが、これはオープンウェイトではありません。 GLM-5.2 には、GLM-5.1 の 200,000 トークン コンテキスト ウィンドウから増加した 100 万トークン コンテキスト ウィンドウがあります。 GLM-5.2 は、Intelligence Index v4.1 の主要なオープン ウェイト モデルです。 GLM-5.2を試してみましょう。"}, {"title": "Publishing WASM wheels to PyPI for use with Pyodide", "url": "https://simonwillison.net/2026/Jun/13/publishing-wasm-wheels/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-14 08:55", "description": "The Pyodide 314.0 release announcement (via Hacker News ) includes news I've been looking forward to for a long time: You can now publish Python packages built for Pyodide (or any Python runtime compatible with the PyEmscripten platform defined in PEP 783 ) directly to PyPI and install them at runtime. Previously, the Pyodide maintainers had to maintain, build, and host over 300 packages ourselves. This created a significant burden on our maintainers and became a major bottleneck for the communi", "content": "Publishing WASM wheels to PyPI for use with Pyodide\n13th June 2026\nThe Pyodide 314.0 release announcement (via Hacker News) includes news I’ve been looking forward to for a long time:\nYou can now publish Python packages built for Pyodide (or any Python runtime compatible with the PyEmscripten platform defined in PEP 783) directly to PyPI and install them at runtime.\nPreviously, the Pyodide maintainers had to maintain, build, and host over 300 packages ourselves. This created a significant burden on our maintainers and became a major bottleneck for the community, as every new package required manual review.\nMoving forward, package maintainers can simply build and publish Pyodide wheels to PyPI, just as they do for native wheels on Linux, macOS, or Windows.\nHere’s the PR to PyPI itself supporting this, which landed on April 21st.\nI adore Pyodide, and have been frustrated in the past by this limitation. It’s possible to compile C or Rust extensions to WASM in a wheel file, but before now there was no easy way to distribute them.\nThanks to the efforts of a whole lot of people, that’s now been fixed!\nTrying it out with luau-wasm\nI decided to celebrate by finding something I could package. I have quite a few experimental Pyodide projects lying around, but the best fit for this looked to be my Luau WebAssembly research spike from 9th March.\nLuau is a “small, fast, and embeddable programming language based on Lua with a gradual type system”, developed by Roblox and released under an MIT license.\nIt’s written in C++. I already knew it was possible to compile it to WebAssembly and get it running inside of Pyodide, so I set Codex + GPT-5.5 xhigh the task of packaging my experiment up and publishing it to PyPI using GitHub Actions.\nIt took some iteration, but here’s the result: luau-wasm is a brand new PyPI package which publishes a 276KB luau_wasm-0.1a0-cp314-cp314-pyemscripten_2026_0_wasm32.whl\nfile which can be used in Pyodide like this:\nimport micropip await micropip.install(\"luau-wasm\") import luau_wasm print(luau_wasm.execute(r''' local animals = {\"fox\", \"owl\", \"frog\", \"rabbit\"} table.sort(animals, function(a, b) return #a < #b end) for i, name in animals do print(i .. \". \" .. name .. \" (\" .. #name .. \")\") end '''))\nYou can run that code in the Pyodide REPL demo to see it in action.\nThe GitHub repo for luau-wasm includes all of the build and deploy scripts (using the latest cibuildwheel) and also deploys an HTML demo page which loads Pyodide, installs luau-wasm\nand provides an interface for trying it out: https://simonw.github.io/luau-wasm/\nHow many packages are using this so far?\nI was curious to see how many packages are currently publishing wheels for this platform.\nAfter some tinkering with ChatGPT I got to this BigQuery SQL which I ran against PyPI’s public dataset on BigQuery. Here’s the raw JSON of query results and here’s a SQLite SQL query in Datasette Lite which dedupes packages by most recent upload date.\nIf the query is right, there are currently 28 PyPI packages publishing with the new pyemscripten_202*_wasm32\ntags:\nluau-wasm, uuid7-rs, cmm-16bit, pyOpenTTDAdmin, imgui-bundle, numbertoolkit, bashkit, geoarrow-rust-core, arro3-io, arro3-core, arro3-compute, onnx, powerfit-em, tcod, chonkie-core, tokie, robotraconteur, pydantic_core, yaml-rs, cadquery-ocp-novtk-OCP.wasm, uuid_utils, base64_utils, pycdfpp, lib3mf-OCP.wasm, typst, toml-rs, onnx-weekly, dummy-pyodide-ext-test\nHere’s hoping we see a whole lot more of those showing up over the coming months and years.\nMore recent articles\n- Porting the Moebius 0.2B image inpainting model to run in the browser with Claude Code - 22nd June 2026\n- sqlite-utils 4.0rc1 adds migrations and nested transactions - 21st June 2026\n- Datasette Apps: Host custom HTML applications inside Datasette - 18th June 2026", "summary": "Publishing WASM wheels to PyPI for use with Pyodide\n13th June 2026\nThe Pyodide 314.0 release announcement (via Hacker News) includes news I’ve been looking forward to for a long time:\nYou can now publish Python packages built for Pyodide (or any Python runtime compatible with the PyEmscripten platform defined in PEP 783) directly to PyPI and install them at runtime. Previously, the Pyodide maintainers had to maintain, build, and host over 300 packages ourselves. Trying it out with luau-wasm\nI decided to celebrate by finding something I could package. The GitHub repo for luau-wasm includes all of the build and deploy scripts (using the latest cibuildwheel) and also deploys an HTML demo page which loads Pyodide, installs luau-wasm\nand provides an interface for trying it out: https://simonw.github.io/luau-wasm/\nHow many packages are using this so far?.", "categories": ["業務改善・介護テック", "福祉・社会保障"], "is_new": false, "title_ja": "Pyodide で使用するために WASM ホイールを PyPI に公開する", "summary_ja": "Pyodide で使用するために WASM ホイールを PyPI に公開する\n2026 年 6 月 13 日\nPyodide 314.0 のリリース発表 (Hacker News 経由) には、私が長い間楽しみにしていたニュースが含まれています。\nPyodide (または PEP 783 で定義されている PyEmscripten プラットフォームと互換性のある Python ランタイム) 用に構築された Python パッケージを PyPI に直接公開し、実行時にインストールできるようになりました。以前は、Pyodide のメンテナは 300 を超えるパッケージを自分たちで保守、構築、ホストする必要がありました。 luau-wasm で試してみる\n何かパッケージできるものを見つけてお祝いすることにしました。 luau-wasm の GitHub リポジトリには、すべてのビルドおよびデプロイ スクリプト (最新の cibuildwheel を使用) が含まれており、Pyodide をロードして luau-wasm をインストールする HTML デモ ページもデプロイされます。\nそれを試すためのインターフェイスを提供します: https://simonw.github.io/luau-wasm/\nこれまでにこれを使用しているパッケージが何個ありますか?"}];
const CAT_META  = {"介護保険・制度": {"color": "#2563EB", "icon": "📋"}, "医療・健康": {"color": "#DC2626", "icon": "🏥"}, "福祉・社会保障": {"color": "#059669", "icon": "🤝"}, "施設運営・経営": {"color": "#D97706", "icon": "🏢"}, "人材育成・HR": {"color": "#7C3AED", "icon": "👥"}, "業務改善・介護テック": {"color": "#0891B2", "icon": "💡"}, "組織・心理": {"color": "#EA580C", "icon": "🧠"}, "海外エイジテック": {"color": "#0D9488", "icon": "🔬"}, "AIツール・生産性": {"color": "#6D28D9", "icon": "⚡"}, "メンタル・哲学": {"color": "#BE185D", "icon": "🌿"}};
const DEFAULT_CLR = '#6b7280';

// ── State ────────────────────────────────────────────────────────
let state = { period:'all', cat:'all', lang:'all', sort:'date', search:'', newOnly:false };

// ── Utils ────────────────────────────────────────────────────────
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseDate(s) {
  if (!s) return new Date(0);
  return new Date(s.replace(' ','T') + (s.length===10?'T00:00:00+09:00':'+09:00'));
}

function ageBucket(d) {
  const h = (Date.now() - parseDate(d)) / 3.6e6;
  if (h < 48) return 'new';
  if (h < 168) return 'week';
  return 'old';
}

function ageBadgeHtml(dateStr) {
  const d = parseDate(dateStr);
  const h = (Date.now() - d) / 3.6e6;
  let label, cls;
  if (h < 24)       { label='今日';            cls='age-new';  }
  else if (h < 48)  { label='昨日';            cls='age-new';  }
  else if (h < 168) { label=Math.floor(h/24)+'日前'; cls='age-week'; }
  else              { label=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); cls='age-old'; }
  return `<span class="age-badge ${cls}">${label}</span>`;
}

function catBadgesHtml(cats) {
  return (cats||[]).map(c => {
    const m = CAT_META[c] || {color:DEFAULT_CLR,icon:'📰'};
    const clr = m.color;
    return `<span class="cat-badge" style="background:${clr}18;color:${clr};border:1px solid ${clr}35">` +
           `${m.icon} ${esc(c)}</span>`;
  }).join('');
}

// ── Card builder ─────────────────────────────────────────────────
function buildCard(a) {
  const displaySummary = (a.lang==='en' && a.summary_ja) ? a.summary_ja : (a.summary||'');
  const displayTitle   = (a.lang==='en' && a.title_ja)   ? a.title_ja   : (a.title||'');
  const isEn = a.lang === 'en';

  const langBadge  = isEn
    ? '<span class="lang-badge lang-en">EN</span>'
    : '<span class="lang-badge lang-ja">JP</span>';
  const transBadge = isEn ? '<span class="trans-badge">🌐 翻訳</span>' : '';
  const newBadge   = a.is_new ? '<span class="is-new-badge">NEW</span>' : '';

  const summaryBlock = displaySummary.trim().length > 30
    ? `<p class="card-summary">${esc(displaySummary)}</p>`
    : `<p class="card-summary-empty">要約を取得できませんでした</p>`;

  const publishedDate = (a.published||'').slice(0,10);

  return `<article class="article-card"
  data-cats="${esc(JSON.stringify(a.categories||[]))}"
  data-lang="${a.lang||'ja'}"
  data-date="${a.published||''}"
  data-isnew="${a.is_new ? '1' : '0'}"
  data-source="${esc(a.source||'')}"
  data-search="${esc(((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase())}">

  <div class="card-band">
    <div class="card-cats">${catBadgesHtml(a.categories)}</div>
    <div class="card-meta">
      ${newBadge}
      ${ageBadgeHtml(a.published)}
      ${transBadge}
      ${langBadge}
    </div>
  </div>

  <div class="card-body">
    ${summaryBlock}
  </div>

  <div class="card-footer">
    <div class="card-footer-left">
      <div class="card-source">
        <span>${esc(a.source)}</span>
        <span class="card-source-dot">·</span>
        <span>${publishedDate}</span>
      </div>
      <a class="card-title" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
        ${esc(displayTitle)}
      </a>
    </div>
    <a class="read-btn" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" aria-label="記事を読む">
      記事を読む
      <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </a>
  </div>
</article>`;
}

// ── Filter ───────────────────────────────────────────────────────
function filterArticles() {
  const now = Date.now();
  return ARTICLES.filter(a => {
    if (state.newOnly && !a.is_new) return false;
    if (state.period !== 'all') {
      const h = (now - parseDate(a.published)) / 3.6e6;
      if (state.period==='today' && h>48)  return false;
      if (state.period==='week'  && h>168) return false;
      if (state.period==='month' && h>720) return false;
    }
    if (state.cat  !== 'all' && !(a.categories||[]).includes(state.cat)) return false;
    if (state.lang !== 'all' && a.lang !== state.lang) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const hay = ((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (state.sort==='date') return parseDate(b.published)-parseDate(a.published);
    const ca=(a.categories||[''])[0]||'', cb=(b.categories||[''])[0]||'';
    return ca!==cb ? ca.localeCompare(cb,'ja') : parseDate(b.published)-parseDate(a.published);
  });
}

// ── Section header ───────────────────────────────────────────────
function sectionHeader(catName, count) {
  const m = CAT_META[catName] || {color:DEFAULT_CLR, icon:'📰'};
  return `<div class="section-header">
    <span class="section-icon">${m.icon}</span>
    <span class="section-name" style="color:${m.color}">${esc(catName)}</span>
    <span class="section-count">${count}件</span>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const filtered = filterArticles();
  const container = document.getElementById('articlesContainer');
  const empty = document.getElementById('emptyState');
  document.getElementById('visibleCount').textContent = filtered.length;

  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    renderSidebar(filtered);
    return;
  }
  empty.style.display = 'none';

  if (state.sort==='cat' && state.cat==='all') {
    const groups = {};
    const ORDER = Object.keys(CAT_META);
    filtered.forEach(a => {
      const c = (a.categories||[])[0] || '未分類';
      (groups[c]=groups[c]||[]).push(a);
    });
    let html='';
    ORDER.forEach(c => {
      if (groups[c]?.length) html += sectionHeader(c,groups[c].length)+groups[c].map(buildCard).join('');
    });
    if (groups['未分類']?.length) html += sectionHeader('未分類',groups['未分類'].length)+groups['未分類'].map(buildCard).join('');
    container.innerHTML = html;
  } else {
    container.innerHTML = filtered.map(buildCard).join('');
  }

  renderSidebar(filtered);
}

// ── Sidebar render ───────────────────────────────────────────────
function renderSidebar(filtered) {
  const catCounts={}, srcCounts={};
  filtered.forEach(a => {
    (a.categories||[]).forEach(c=>{ catCounts[c]=(catCounts[c]||0)+1; });
    srcCounts[a.source]=(srcCounts[a.source]||0)+1;
  });

  // Categories
  const sidebarCats = document.getElementById('sidebarCats');
  let html = `<button class="sidebar-item ${state.cat==='all'?'active':''}" data-scat="all">
    <span class="sidebar-item-label">すべて</span>
    <span class="sidebar-count">${filtered.length}</span>
  </button>`;
  Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).forEach(([cat,cnt]) => {
    const m = CAT_META[cat]||{icon:'📰'};
    html += `<button class="sidebar-item ${state.cat===cat?'active':''}" data-scat="${esc(cat)}">
      <span class="sidebar-item-label">${m.icon} ${esc(cat)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarCats.innerHTML = html;

  // Sources
  const sidebarSrc = document.getElementById('sidebarSources');
  let srcHtml='';
  Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([src,cnt]) => {
    srcHtml += `<button class="sidebar-item" data-ssrc="${esc(src)}">
      <span class="sidebar-item-label" style="font-size:.8rem">${esc(src)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarSrc.innerHTML = srcHtml;

  // Sidebar category click
  sidebarCats.querySelectorAll('[data-scat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.scat;
      document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
      const chip = document.querySelector(`.cat-chip[data-cat="${CSS.escape(btn.dataset.scat)}"]`);
      if (chip) chip.classList.add('active'); else {
        const allChip = document.querySelector('.cat-chip[data-cat="all"]');
        if (allChip) allChip.classList.add('active');
      }
      render();
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Stats
  const newCnt = ARTICLES.filter(a=>a.is_new).length;
  document.getElementById('statTotal').textContent = ARTICLES.length;
  document.getElementById('statJa').textContent    = ARTICLES.filter(a=>a.lang==='ja').length;
  document.getElementById('statEn').textContent    = ARTICLES.filter(a=>a.lang==='en').length;
  document.getElementById('statNew').textContent   = newCnt;

  // Build category chips
  const wrap = document.getElementById('catChips');
  Object.entries(CAT_META).forEach(([name, m]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip';
    btn.dataset.cat = name;
    btn.textContent = m.icon + ' ' + name;
    wrap.appendChild(btn);
  });

  // Period tabs
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.period = btn.dataset.period;
      render();
    });
  });

  // Category chips
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.cat-chip');
    if (!btn) return;
    document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.cat = btn.dataset.cat;
    render();
  });

  // New-only toggle
  const newToggle = document.getElementById('newToggle');
  newToggle.addEventListener('click', () => {
    state.newOnly = !state.newOnly;
    newToggle.classList.toggle('active', state.newOnly);
    newToggle.setAttribute('aria-pressed', String(state.newOnly));
    render();
  });

  // Controls
  document.getElementById('langFilter').addEventListener('change', e=>{ state.lang=e.target.value; render(); });
  document.getElementById('sortBy').addEventListener('change',     e=>{ state.sort=e.target.value; render(); });
  document.getElementById('searchInput').addEventListener('input', e=>{ state.search=e.target.value.trim(); render(); });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
