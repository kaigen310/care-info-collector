 you shouldn’t have said what you said. You should have acted differently–you regret your choices. Say, if you regret getting a haircut, you’re in control. Love what’s happened to you.", "categories": ["メンタル・哲学", "業務改善・介護テック"], "is_new": false, "title_ja": "後悔にどう対処するか (自由に生きるための 3 つのストイックな戦略)", "summary_ja": "あなたは自分が言ったことを言うべきではなかったと知っています。別の行動を取るべきだった――自分の選択を後悔している。たとえば、散髪したことを後悔しても、それは自分で決めることができます。あなたに起こったことを愛してください。"}, {"title": "What Does It Mean To Be Wealthy?", "url": "https://dailystoic.com/what-does-it-mean-to-be-wealthy/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-08-01 02:13", "description": "“These individuals have riches just as we say that we ‘have a fever,’ when really the fever has us.” — Seneca We all know those people who have lots of money, and yet, they are miserable. On the flip side, we all know people who live happy and fulfilled lives despite not having lots of money. […] The post What Does It Mean To Be Wealthy? appeared first on Daily Stoic .", "content": "“These individuals have riches just as we say that we ‘have a fever,’ when really the fever has us.” — Seneca\nWe all know those people who have lots of money, and yet, they are miserable. On the flip side, we all know people who live happy and fulfilled lives despite not having lots of money.\nMoney, the Stoics said, is not an indicator of wealth.\nThe slave turned teacher Epictetus liked to tell his students of a man who had been offered a lucrative job by the emperor Augustus. “I told him not to touch it,” Epictetus told his students.\nBut, the man told Epictetus, I will make a lot of money.\nYes, Epictetus said, “for little in return.”\nBut, the man said, a lot of people will learn my name.\n“Ok,” Epictetus said, “are you planning to be there every time someone utters your name?”\nBut, the man said, my name will outlive me.\n“So will a rock you carve your name into,” Epictetus said.\nBut, the man said, I will get to wear a gold crown.\n“And they will put a crown made of roses on you for your funeral,” Epictetus said. “You will look even more elegant in that.”\nThe man saw the sum of money, but he didn’t see that a sum of money is a poor indication of value. As Epictetus liked to ask his students,\n“What decides whether a sum of money is good? The money is not going to tell you.”\nIt’s not going to tell you about all you have to give up in exchange for that money. It’s not going to tell you that you might be happier in a job that offers less money. It’s not going to tell you about all the losses that come with the gain.\nWe will. We created this guide—rooted in the experiences and writings of the Stoics—to give you a time-tested playbook to help you learn how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life. This post is going to cover the high level ideas. If you really want to get serious about living what the Stoics called the good life, we suggest checking out our course The Wealthy Stoic: A Daily Stoic Guide To Being Rich, Free, and Happy, a 9-week course designed to equip you with the tools, mindsets, and habits of the wealthiest Stoics in history.\nThis is a long post. It should be saved and revisited. It can be read straight through or if you prefer, feel free to jump around…\nHOW DID THE STOICS VIEW WEALTH?\nMoney Doesn’t Make You Rich\nLook at any millionaire, Seneca tells Lucilius in one of his letters, they are some of the poorest people in Rome. Money has made them obsess over public opinion. Money has control of their schedules and their decisions. Money has put them in the center of a circle of sycophants and grifters. Money has escalated their tastes and expectations beyond quenching.\n“These individuals,” Seneca writes, “have riches just as we say that we ‘have a fever,’ when really the fever has us.” It’s a sad sight, he says.\nWhat’s sadder is that the look-at-any-millionaire experiment still works today—a lot of rich people in this world live very poor lives. They’re rarely not thinking about money. About how to acquire more and of it, about what they can trade of their life in exchange for it, about who they know who has more of it than they do. These poor souls know they have a lot of money, but what they don’t understand is that, really, money has a lot of them.\n“Money never made a man rich,” Seneca adds, “Do you ask the reason for this? He who possesses more begins to be able to possess still more.” This is a universal human battle. It doesn’t really matter the number in your bank account, it is hard to turn off the brain’s desire for more. Until you can turn it off, until you have a sense for what is enough, you are poorer than the poorest people in Rome.\n“[H]e who has enough,” Seneca writes, “has attained that which never fell to the rich man’s lot—a stopping-point.”\nTo learn more on this topic, check out Ryan’s interview with Morgan Housel on the Daily Stoic podcast.\nTHREE STOIC PRACTICES THAT CAN LEAD TO A WEALTHIER LIFESTYLE\nDefine What Wealth Means To You\n“It never ceases to amaze me: we all love ourselves more than other people, but care more about their opinion than our own.” — Marcus Aurelius\nIf Ramit Sethi didn’t beat us to it, we might have named the Daily Stoic Wealth Course, “The Rich Life.”\nRamit is the bestselling author of I Will Teach You To Be Rich and host of the I Will Teach You To Be Rich podcast (one of Ryan’s favorite podcasts), and of the Netflix series How to Get Rich. His work focuses on how to help people live what he calls “The Rich Life.”\nThe title is a bit misleading because he doesn’t use “rich” solely in a monetary wealth way. It’s more an all-encompassing philosophy about living a good life. Ramit talks and writes about entrepreneurship, spending, investing, social skills, fitness, psychology, productivity, and on and on—all these interconnected components that go into living well.\nKey to Ramit’s work is the idea that the definition of The Rich Life varies from person to person. When we interviewed him a while back, he gave this example:\nI have a friend who always has fresh flowers throughout her tiny New York apartment. They look amazing. When I asked her how she keeps up and maintains all these fresh flowers, despite her busy full-time job, she told me that she spends the equivalent of a cable bill every month to surround herself with beautiful, artisanal flowers that are delivered to her house every week. Every week…on “just” flowers!\nThis is the idea of living a Rich Life: If you love how flowers look and make you feel in your home, you don’t “save” buying flowers only for special occasions. You make sure you have them around you all the time.\nRamit, on the other hand, doesn’t really care about flowers. So his Rich Life looks different. His definition of a rich life, he says, is never having to step into a Home Depot.\nThe point is, everyone’s different. Therefore, everyone’s definition of wealth is different. We live in a world that constantly bombards us with messages about what a rich life is supposed to look like. We see pictures of lavish vacations, designer clothing, expensive cars, and luxurious homes. We are told that having more money, more possessions, and more status is the key to happiness and fulfillment.\nBut the truth is the Rich Life means something different for everyone. What makes one person feel rich may not do the same for another.\nThis is why it’s essential to figure out your definition of the Rich Life.\nWatch Ryan Holiday discuss some of the key Stoic concepts of wealth in The Stoics Guide To Becoming Wealthy on the Daily Stoic YouTube channel.\nKnow What Enough Is\n“If you don’t regard what you have as enough, you will never be happy even if you rule the entire world.” – Seneca\nSeneca said this is what it means to be poor: wanting more than you have.\nConsider, Seneca says, the person who has or wants the nicest stuff—the furniture with gold trim, the silverware made by ancient artists, a team of butlers, jewelry from every part of the globe. “Though he should pile up all of these,” Seneca writes, “never will they satisfy his insatiable mind…This is not a thirst, but a sickness. And it is not merely money or food that leads to this result; the same nature is to be found in every desire that derives, not from need, but from vice: all that you pile up to satisfy it will not terminate but advance desire.”\nThat’s the irony of material riches. It’s a series of moving goal posts. You think having X will be sufficient only to find that 2x is better and that 3x is preferable still.\n“Prosperity is a restless thing: it troubles itself,” Seneca says elsewhere. Or rather, it propels itself.\nSee if you can find one millionaire who isn’t trying to become a billionaire. See if you can find one billionaire who doesn’t check the Forbes list every year and glare jealously at the names above them.\nThat’s what getting rich does to us. It rarely gives us a sense of “enough.” Instead, it gives us a sense of how much more there could be.\nNeedless to say this is a path to bankruptcy, mentally and emotionally if not financially. It’s a hedonic treadmill that eventually breaks down…or breaks the person frantically running atop it.\nThe Stoics would try to caution us from ever getting on, or to get off while we still can.\nThere is a story Ryan Holiday writes about in Stillness is the Key. Kurt Vonnegut and Joseph Heller, the authors of Slaughterhouse Five and Catch-22, respectively, were once at a fancy party in New York. As they stood in the home of some billionaire, Vonnegut needled his friend.\n“Joe,” he said, “how does it feel that our host only yesterday may have made more money than your novel has earned in its entire history?”\n“I’ve got something he can never have,” Heller replied.\n“And what on earth could that be?” Vonnegut asked.\n“The knowledge that I’ve got enough.”\nKnowing what is enough. Living in a place of fullness rather than of craving. That, the Stoics would say, is a wealthy person. That is someone whose life is one of abundance.\nPractice Poverty\n“Set aside a certain number of days, during which you shall be content with the scantiest and cheapest fare, with coarse and rough dress, saying to yourself the while: ‘Is this the condition that I feared?’” — Seneca\nWhen Benjamin Franklin was 18 years old, he asked his father for a loan to start a printing business. His father refused to help, so Franklin saved and eventually founded The Pennsylvania Gazette.\nThe business chugged along for a while, but eventually ran into financial troubles, at which point Franklin received a lucrative offer from a customer who wanted to publish a piece in the Gazette.\nFranklin, whose first son had just been born, would have greatly benefited from the money. But the customer’s piece, as Franklin described it, was not only completely misaligned with his principles, it was “scurrilous and defamatory.”\nFranklin lost sleep deciding what to do. It seemed irresponsible to say no. He had a family to take care of. He was afraid that if the business failed he would be poor, they would be poor. Franklin was terrified of poverty. With all that at stake, with all those emotions roiling inside him, why not bite the bullet and just publish the piece?\nTo figure out if he should accept the money, Franklin tried something new by doing something with ancient roots. He channeled his inner Seneca and decided to live like a poor person, to test whether poverty was really the burden he feared it to be. For a few days, he restricted his diet to just bread and water and for a few nights, he wrapped himself in a coat and slept on the floor.\n“From this regimen,” he said, “I feel no inconvenience whatever. Finding I can live in this manner, I have formed a determination never to prostitute my press to the purposes of corruption and abuse of this kind for the sake of gaining a more comfortable subsistence.”\nIsn’t that why many of us do the things we do, take the jobs we take, make the sacrifices we make?\nIt’s why Seneca stood beside Nero for so long. It’s why people continue to work on Wall Street despite being miserable. It’s why people become lawyers despite having no interest in the law. It’s why people take jobs in the incoming administration despite not voting for the president.\nFor the sake of gaining (or holding onto) a more comfortable subsistence, we take jobs we don’t like, we put up with people we don’t like, and we do things we know aren’t right.\nThat is not a rich life. That is not the life of a Wealthy Stoic.\nWhen we interviewed Tim Ferriss, he told us that once a month, he does a three-day fast “to simply expose myself to the rather, often unfamiliar, sensation of real hunger.” Then he mentioned his friend, a wealthy CEO, who schedules a week every quarter where he sleeps on the floor in his living room, limits his spending to $15 for the week, and survives on instant coffee and instant oatmeal. With the reminder that he can thrive on very little, his decision making improves—he doesn’t do things out of fear. “At the end of such an experiment,” Tim said, “people will very often be in a better mental state, feel more content than they did beforehand. It’s very freeing.”\nBut do not misunderstand, Tim is not saying these people no longer care about anything or that they no longer have grand ambitions. To the contrary, many of the people he’s talking about who have run this poverty experiment are elite performers at the top of their industry or sport or craft who only got better, stronger, happier, richer as a result.\nFor The Wealthy Stoic, as Seneca wrote, “Freedom is the prize we are working for.” The freedom to decide what you do most days. The freedom to do what you think is right. The freedom to spend time with who you want to spend time with. The freedom to pursue the things you are interested in. The freedom to leave a job that makes you miserable.\nThe freedom that comes, Seneca wrote, after you “learn how far poverty is from being a burden.”\nWHAT ARE SOME OF THE BEST STOIC QUOTES ON WEALTH?\n“It is not the man who has too little, but the man who craves more, that is poor.” – Seneca\n“Any man, who does not think that what he has is more than ample, is an unhappy man, even if he is the master of the whole world. ” – Seneca\n“At last, then, away with all these treacherous goods! They look better for those who hope for them than to those who have attained them.” -Seneca\n“Anything at all: the applause of the crowd, high office, wealth, or self-indulgence. All of them might seem to be compatible with it—for a while. But suddenly they control us and sweep us away.” – Marcus Aurelius,\n“Wealth consists not in having great possessions, but in having few wants.” – Epictetus\nWHERE CAN I LEARN MORE ABOUT STOICISM AND WEALTH?\nIf you enjoyed these principles and want to incorporate them more into your life, check out….\nThere Is Nothing Special About MoneyWho Owns Who?\nThe Psychology of Money by Morgan Housel\nI Will Teach You To Be Rich by Ramit Sethi\nIf you want to take a deeper dive into Stoicism’s foundational concepts and daily practices how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life, check out The Wealthy Stoic: A Daily Stoic Guide To Being Rich, Free, and Happy!\nIt’s a 9-week course designed to equip you with the tools, mindsets, and habits of the wealthiest Stoics in history.\nThis is not a get-rich-quick kind of a thing.\nThis is not a hustle culture-esque course.\nIt’s the exact opposite. It’s about what Stoicism’s foundational concepts and daily practices were designed to teach us: how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life.\nIf that is the kind of life you want, the Stoics can show you the way.\n“And if you can’t stop prizing a lot of other things? Then you’ll never be free—free, independent, imperturbable. Because you’ll always be envious and jealous, afraid that people might come and take it all away from you.” — Marcus Aurelius", "summary": "The money is not going to tell you.”\nIt’s not going to tell you about all you have to give up in exchange for that money. You make sure you have them around you all the time. That is not a rich life. If that is the kind of life you want, the Stoics can show you the way.", "categories": ["業務改善・介護テック", "メンタル・哲学"], "is_new": false, "title_ja": "裕福であるとはどういう意味ですか?", "summary_ja": "お金が教えてくれるわけではありません。」\nそのお金と引き換えに放棄しなければならないすべてについては説明しません。常にあなたの周りにそれらを置いておくようにしてください。それは豊かな人生ではありません。それがあなたが望むような人生であるなら、ストア派がその道を示してくれるでしょう。"}, {"title": "Perseverance: 7 Stoic Lessons on How To Keep Going", "url": "https://dailystoic.com/perseverance/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-05-10 03:50", "description": "“To be like the rock that the waves keep crashing over. It stands unmoved and the raging of the sea falls still around it.” — Marcus Aurelius The question of why and how we are supposed to live has been contemplated for centuries. Absurdist Albert Camus wrote that life is like the Sisyphean task of […] The post Perseverance: 7 Stoic Lessons on How To Keep Going appeared first on Daily Stoic .", "content": "“To be like the rock that the waves keep crashing over. It stands unmoved and the raging of the sea falls still around it.” — Marcus Aurelius\nThe question of why and how we are supposed to live has been contemplated for centuries. Absurdist Albert Camus wrote that life is like the Sisyphean task of pushing a boulder up a mountain for all of eternity. Existence itself, in other words, is persevering. Camus writes, “One must imagine Sisyphus happy.” So, how do we persevere well? How do we persevere happily?\nThankfully, we can look to the Stoics. The Stoics not only wrote about how to persevere, they used Stoicism to persevere in the face of plagues, exiles, imprisonment, and wars.\nThis post is just a small sample of the kind of lessons, ideas, and stories we write about in our daily email newsletter. Every morning, we send a short (~500 word) email inspired by Marcus Aurelius, Seneca, Epictetus, and more. Each email will help you cultivate strength, insight, and wisdom to live your best life.\nJoin over 600,000 people who start their day off with the philosophy that has guided some of history’s greatest men and women.\nDrawing on the timeless wisdom of the Stoics, we created this guide to give you a time-tested playbook to help you persevere. This is a long post. It should be saved and revisited. It can be read straight through or if you prefer, feel free to click the links below to navigate to a specific section\nWhat Does It Mean To Persevere?\n7 Stoic lessons on how to keep going\n10 Best Stoic Quotes on Perseverance\nThe Best Books About Perseverance\nWhat does it mean to persevere?\n“Ask, ‘Why is this so unbearable? Why can’t I endure it?’ You’ll be embarrassed to answer.” — Marcus Aurelius\nJames Stockdale was held captive in Hanoi, North Vietnam. He was sent to a war camp that was famous for its brutal treatment of prisoners.\nWhat got him through more than 7 years of imprisonment?\nStoicism.\nStoicism not only helped Stockdale get through his imprisonment, but it helped him refrain from betraying himself and his country. He was able to internally uphold his moral code. He accepted the fact that he could not control his external circumstances. Instead, he mastered his internal dialogue and feelings.\nThat is persevering. It’s not simply “getting through it.” It’s getting through it while still maintaining your morality and humanity. Stoicism does not breed apathy, but strength.\nHow do we persevere?\n7 Stoic Lessons on How to Keep Going\nAccept your fate\n“Do not seek for things to happen the way you want them to; rather, wish that what happens happen the way it happens: then you will be happy.” – Epictetus\nAs mentioned before, hardship allows you to show your true character. So, embrace hardship. Amor Fati. Love your fate. Embrace every single moment, even moments of hell.\nThe chance of us existing is small, but here we are. The chances of that particular sperm fertilizing that particular egg were small. But here you are. You have already beaten seemingly insurmountable odds. Your existence is rare and beautiful. So, even our suffering is rare and beautiful.\nAccepting your fate does not mean you’re necessarily okay with bad things happening to you. It means you are accepting that struggling is a part of existing. We can use this to persevere because this gives us the courage to act. Loving and appreciating every minute shows us that we are not helpless. We are just experiencing what it means to exist.\nDon’t complain\n“Everything that happens is either endurable or not. If it’s endurable, then endure it. Stop complaining. If it’s unendurable… then stop complaining. Your destruction will mean its end as well. Just remember: you can endure anything your mind can make endurable, by treating it as in your interest to do so. In your interest, or in your nature.” — Marcus Aurelius\nEither you persevere or you don’t. Regardless, complaining does not necessarily tip the odds in your favor. Yes, feel emotions. Yes, confide in people. But do not tell yourself you will fail. Do not tell anyone else you will fail. Don’t tell anyone that this specific struggle will be the end of you.\nComplaining, in fact, makes it harder to endure. Marcus argues that you can endure anything by thinking it’s endurable. If you allow yourself to complain, you’re defeating yourself.\nYou may be able to get through something by complaining. But, that will not leave your good nature intact. To exercise virtue in the face of adversity, we must have control over our own minds.\nRealize it’s not the end of the world\n“Never say of anything, ‘I have lost it’ but, ‘I have returned it.’ Is your child dead? It is returned…Is your estate taken away? Well, and is not that likewise returned? ‘But he who took it away is a bad man.’ What difference is it to you who the giver assigns to take it back?” — Epictetus\nWay harsh, but there’s still a lesson here. Epictetus urges us to not take things personally. Things are not taken from you, but returned. After all, the entire universe existed before us and will exist after us.\nLikewise, we existed before our current struggle and will exist after it.\nIn the final episode of Bojack Horseman, Bojack says, “Life’s a bitch and then you die, right?” Diane responds, “Sometimes. Sometimes life’s a bitch and then you keep living.” We live despite and in spite of how much life sucks. Life won’t always be suffering, but life is contingent on suffering. When we lose an opportunity, a loved one, or when life is just bad, the best thing to do is live virtuously no matter what.\nThis difficulty will end. You will end. We can only control our response to that.\nDon’t just sit there and take it\n“Putting things off is the biggest waste of life: it snatches away each day as it comes, and denies us the present by promising the future. The greatest obstacle to living is expectancy, which hangs upon tomorrow and loses today. You are arranging what lies in Fortune’s control, and abandoning what lies in yours. What are you looking at? To what goal are you straining? The whole future lies in uncertainty: live immediately.” — Seneca\nSeneca is reminding us that we have some control over our lives. By putting off action, we are allowing our suffering to have full control.\nBy working towards ending our suffering, we are regaining control. Persevering is active. We don’t persevere by shutting down until it’s over.\nWe persevere by responding rationally to our hardships. We persevere by determining the most virtuous course of action. Persevere immediately.\nDemand better, don’t just want better\n“How long are you going to wait before you demand the best for yourself and in no instance bypass the discriminations of reason? You have been given the principles that you ought to endorse, and you have endorsed them. What kind of teacher, then, are you still waiting for in order to refer your self-improvement to him? You are no longer a boy but a full-grown man. If you are careless and lazy now and keep putting things off and always deferring the day after which you will attend to yourself, you will not notice that you are making no progress but you will live and die as someone quite ordinary.” — Epictetus\nWhen we are struggling, we may want to give up on ourselves. We may settle. We may get used to things being okay and give up on striving for a good life. This is unacceptable.\nLike we said, you can either persevere or stop. Either way, we are dying at some point. As Epictetus says, we can die ordinary if we choose to not persevere. Everything ends at some point, but there is power in the choice to persevere. A hardship can either end because we act to make it end or we die. We have some control over when our suffering ends.\nWe must demand that we get through this hardship. Clean your room a little. Ask for better treatment. Advocate for yourself and take care of yourself. We cannot get used to suffering. We can accept the existence of suffering, but we still have to fight against it. Do not become complacent.\nStop torturing yourself\n“We suffer not from the events in our lives, but from our judgment about them.” — Epictetus\nPerhaps our suffering is mostly self-inflicted. When difficulties arise, we sometimes take it personally. It’s important to take accountability for actions that cause suffering, but you can do that without suffering.\nInstead of saying, “I lost my job because I’m lazy and stupid,” you can say, “I lost my job because I did not meet the requirements for it.” The difference between those two sentences is that one is reporting a judgment and the other is reporting a fact. We suffer less when we rationally map why things happen.\nCalling ourselves stupid for letting something happen does not solve the problem and makes us feel worse. Shit usually happens purely because shit happens. Taking it personally makes it harder to actively solve the problem. Recognizing that it is not 100% our fault can give us the courage to act.\nUse your resources\n“Prudent people look beyond the incident itself and seek to form the habit of putting it to good use. On the occasion of an accidental event, don’t just react in a haphazard fashion: remember to turn inward and ask what resources you have for dealing with it. Dig deeply. You possess strengths you might not realize you have. Find the right one. Use it.” – Epictetus\nWe enter fight or flight mode when it gets tough. However, the good thing about being humans is that we have the ability to be rational.\nDon’t go into survival mode. Take a breath and remember you have the opportunity to outwardly show your virtue. Not everything needs a reaction. Moreover, not everything needs an immediate reaction.\nWhile persevering is active, you can still take time to decide what to do. You do not need to react immediately unless it’s life or death. Let it stew.\n10 Best Stoic Quotes on Perseverance\n“We are more often frightened than hurt, and we suffer more in imagination than in reality.” — Seneca\n“In the meantime, cling tooth and nail to the following rule: not to give in to adversity, not to trust prosperity, and always take full note of fortune’s habit of behaving just as she pleases. Whatever you have been expecting for some time comes as less of a shock.” — Seneca\n“I judge you unfortunate because you have never lived through misfortune. You have passed through life without an opponent— no one can ever know what you are capable of, not even you.” — Seneca\n“Ask, ‘Why is this so unbearable? Why can’t I endure it?’ You’ll be embarrassed to answer.” – Marcus Aurelius\n“People are not disturbed by things, but by the views they take of them.” – Epictetus\n“You must build up your life action by action, and be content if each one achieves its goal as far as possible–and no one can keep you from this. But there will be some external obstacle! Perhaps, but no obstacle to acting with justice, self-control, and wisdom. But what if some other area of my action is thwarted? Well, gladly accept the obstacle for what it is and shift your attention to what is given, and another action will immediately take its place, one that better fits the life you are building.”- Marcus Aurelius\n“You don’t have to turn this into something. It doesn’t have to upset you.” – Marcus Aurelius\n“To live a good life: We have the potential for it. If we learn to be indifferent to what makes no difference.” – Marcus Aurelius\n“To make the best of what is in our power, and take the rest as it occurs.” – Epictetus\nThe Best Books About Perseverance\nThe Obstacle is the Way by Ryan Holiday\nThat One Should Disdain Hardships: The Teachings of a Roman Stoic by Musonius Rufus\nGrit: The Power of Passion and Perseverance by Angela Duckworth\nKeep Going by Austin Kleon\nAntifragile: Things That Gain from Disorder by Nassim Nicholas Taleb", "summary": "But here you are. What are you looking at?. To what goal are you straining?. You possess strengths you might not realize you have.", "categories": ["メンタル・哲学", "業務改善・介護テック"], "is_new": false, "title_ja": "忍耐力: 継続するための 7 つのストイックなレッスン", "summary_ja": "しかし、ここにあなたがいます。何を見てるんですか？。どの目標に向かって頑張っていますか？あなたには、自分でも気づいていないかもしれない強みがあります。"}];

const DEFAULT_CLR = '#6b7280';

// ── State ────────────────────────────────────────────────────────
let state = { period:'all', cat:'all', lang:'all', sort:'date', search:'', newOnly:false };

// ── Utils ────────────────────────────────────────────────────────
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseDate(s) {
  if (!s) return new Date(0);
  return new Date(s.replace(' ','T') + (s.length===10?'T00:00:00+09:00':'+09:00'));
}

function ageBucket(d) {
  const h = (Date.now() - parseDate(d)) / 3.6e6;
  if (h < 48) return 'new';
  if (h < 168) return 'week';
  return 'old';
}

function ageBadgeHtml(dateStr) {
  const d = parseDate(dateStr);
  const h = (Date.now() - d) / 3.6e6;
  let label, cls;
  if (h < 24)       { label='今日';            cls='age-new';  }
  else if (h < 48)  { label='昨日';            cls='age-new';  }
  else if (h < 168) { label=Math.floor(h/24)+'日前'; cls='age-week'; }
  else              { label=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); cls='age-old'; }
  return `<span class="age-badge ${cls}">${label}</span>`;
}

function catBadgesHtml(cats) {
  return (cats||[]).map(c => {
    const m = CAT_META[c] || {color:DEFAULT_CLR,icon:'📰'};
    const clr = m.color;
    return `<span class="cat-badge" style="background:${clr}18;color:${clr};border:1px solid ${clr}35">` +
           `${m.icon} ${esc(c)}</span>`;
  }).join('');
}

      記事を読む
      <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </a>
  </div>
</article>`;
}

// ── Filter ───────────────────────────────────────────────────────
function filterArticles() {
  const now = Date.now();
  return ARTICLES.filter(a => {
    if (state.newOnly && !a.is_new) return false;
    if (state.period !== 'all') {
      const h = (now - parseDate(a.published)) / 3.6e6;
      if (state.period==='today' && h>48)  return false;
      if (state.period==='week'  && h>168) return false;
      if (state.period==='month' && h>720) return false;
    }
    if (state.cat  !== 'all' && !(a.categories||[]).includes(state.cat)) return false;
    if (state.lang !== 'all' && a.lang !== state.lang) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const hay = ((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (state.sort==='date') return parseDate(b.published)-parseDate(a.published);
    const ca=(a.categories||[''])[0]||'', cb=(b.categories||[''])[0]||'';
    return ca!==cb ? ca.localeCompare(cb,'ja') : parseDate(b.published)-parseDate(a.published);
  });
}

// ── Section header ───────────────────────────────────────────────
function sectionHeader(catName, count) {
  const m = CAT_META[catName] || {color:DEFAULT_CLR, icon:'📰'};
  return `<div class="section-header">
    <span class="section-icon">${m.icon}</span>
    <span class="section-name" style="color:${m.color}">${esc(catName)}</span>
    <span class="section-count">${count}件</span>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const filtered = filterArticles();
  const container = document.getElementById('articlesContainer');
  const empty = document.getElementById('emptyState');
  document.getElementById('visibleCount').textContent = filtered.length;

  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    renderSidebar(filtered);
    return;
  }
  empty.style.display = 'none';

  if (state.sort==='cat' && state.cat==='all') {
    const groups = {};
    const ORDER = Object.keys(CAT_META);
    filtered.forEach(a => {
      const c = (a.categories||[])[0] || '未分類';
      (groups[c]=groups[c]||[]).push(a);
    });
    let html='';
    ORDER.forEach(c => {
      if (groups[c]?.length) html += sectionHeader(c,groups[c].length)+groups[c].map(buildCard).join('');
    });
    if (groups['未分類']?.length) html += sectionHeader('未分類',groups['未分類'].length)+groups['未分類'].map(buildCard).join('');
    container.innerHTML = html;
  } else {
    container.innerHTML = filtered.map(buildCard).join('');
  }

  renderSidebar(filtered);
}

// ── Sidebar render ───────────────────────────────────────────────
function renderSidebar(filtered) {
  const catCounts={}, srcCounts={};
  filtered.forEach(a => {
    (a.categories||[]).forEach(c=>{ catCounts[c]=(catCounts[c]||0)+1; });
    srcCounts[a.source]=(srcCounts[a.source]||0)+1;
  });

  // Categories
  const sidebarCats = document.getElementById('sidebarCats');
  let html = `<button class="sidebar-item ${state.cat==='all'?'active':''}" data-scat="all">
    <span class="sidebar-item-label">すべて</span>
    <span class="sidebar-count">${filtered.length}</span>
  </button>`;
  Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).forEach(([cat,cnt]) => {
    const m = CAT_META[cat]||{icon:'📰'};
    html += `<button class="sidebar-item ${state.cat===cat?'active':''}" data-scat="${esc(cat)}">
      <span class="sidebar-item-label">${m.icon} ${esc(cat)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarCats.innerHTML = html;

  // Sources
  const sidebarSrc = document.getElementById('sidebarSources');
  let srcHtml='';
  Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([src,cnt]) => {
    srcHtml += `<button class="sidebar-item" data-ssrc="${esc(src)}">
      <span class="sidebar-item-label" style="font-size:.8rem">${esc(src)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarSrc.innerHTML = srcHtml;

  // Sidebar category click
  sidebarCats.querySelectorAll('[data-scat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.scat;
      document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
      const chip = document.querySelector(`.cat-chip[data-cat="${CSS.escape(btn.dataset.scat)}"]`);
      if (chip) chip.classList.add('active'); else {
        const allChip = document.querySelector('.cat-chip[data-cat="all"]');
        if (allChip) allChip.classList.add('active');
      }
      render();
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Stats
  const newCnt = ARTICLES.filter(a=>a.is_new).length;
  document.getElementById('statTotal').textContent = ARTICLES.length;
  document.getElementById('statJa').textContent    = ARTICLES.filter(a=>a.lang==='ja').length;
  document.getElementById('statEn').textContent    = ARTICLES.filter(a=>a.lang==='en').length;
  document.getElementById('statNew').textContent   = newCnt;

  // Build category chips
  const wrap = document.getElementById('catChips');
  Object.entries(CAT_META).forEach(([name, m]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip';
    btn.dataset.cat = name;
    btn.textContent = m.icon + ' ' + name;
    wrap.appendChild(btn);
  });

  // Period tabs
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.period = btn.dataset.period;
      render();
    });
  });

  // Category chips
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.cat-chip');
    if (!btn) return;
    document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.cat = btn.dataset.cat;
    render();
  });

  // New-only toggle
  const newToggle = document.getElementById('newToggle');
  newToggle.addEventListener('click', () => {
    state.newOnly = !state.newOnly;
    newToggle.classList.toggle('active', state.newOnly);
    newToggle.setAttribute('aria-pressed', String(state.newOnly));
    render();
  });

  // Controls
  document.getElementById('langFilter').addEventListener('change', e=>{ state.lang=e.target.value; render(); });
  document.getElementById('sortBy').addEventListener('change',     e=>{ state.sort=e.target.value; render(); });
  document.getElementById('searchInput').addEventListener('input', e=>{ state.search=e.target.value.trim(); render(); });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
