or i in range(3)], pk=\"id\") db[\"t\"].delete_where(\"id = ?\", [0]) # conn.in_transaction is now True db[\"t\"].insert({\"id\": 50}) db[\"u\"].insert({\"a\": 1}) db.close() # Reopen: rows are [0, 1, 2] — the delete, row 50, AND table u are all gone.\nThat’s a really bad bug! Very glad I didn’t ship that, although at least it would have been a bug I could fix in a 4.0.1 point release, not a design flaw that would force a 5.0.\nOver the course of 37 prompts, 34 commits and +1,321 -190 code changes over 30 separate files, we worked through the entire set of feedback in turn, making several other design improvements along the way.\nA weird thing about coding agents is that harder tasks like this one actually provide more opportunity to do other things at the same time, since the agent sometimes needs 10-15 minutes to churn away on a new task. I went out to enjoy the Half Moon Bay 4th of July parade, occasionally checking in and prompting the next step for Fable from my phone.\nFull details in the PR and this shared transcript. I switched to my laptop for the final review, which I conducted through GitHub’s PR interface.\nThe most significant changes relate to transaction handling, which was the signature new feature in the earlier RC. The new RC now includes comprehensive documentation on the new transaction model, the intro to which I’ll quote here in full:\nEvery method in this library that writes to the database—\ninsert()\n,upsert()\n,update()\n,delete()\n,delete_where()\n,transform()\n,create_table()\n,create_index()\n,enable_fts()\nand the rest—runs inside its own transaction and commits it before returning. Your changes are saved to disk as soon as the method call finishes:db = Database(\"data.db\") db.table(\"news\").insert({\"headline\": \"Dog wins award\"}) # The new row is already saved - no commit() requiredThe same applies to raw SQL executed with db.execute()—a write statement is committed as soon as it has run.\nYou never need to call\ncommit()\n, and you do not need to close the database to persist your changes. There are exactly two situations where you need to think about transactions:\nYou want to group several write operations together, so they either all succeed or all fail—use db.atomic().\nYou are managing a transaction yourself with\ndb.begin()\n, in which case nothing is committed until you commit—the library will never commit a transaction you opened.\nIn reviewing Fable’s documentation—I find that reviewing the documentation edits first is an excellent way to build an initial understanding of what has changed—I spotted this detail:\ndb.atomic()\nand the automatic per-method transactions are designed for connections in Python’s default transaction handling mode. Connections created with the Python 3.12+sqlite3.connect(..., autocommit=True)\norautocommit=False\noptions are not supported, becausecommit()\nandrollback()\nbehave differently on those connections.\nI admit I hadn’t thought about how sqlite-utils\nwould react to the more recent autocommit setting, added in Python 3.12. It turns out “behave differently on those connections” equated to almost the entire test suite failing, so I worked with the model to ensure that this difference would not break how the library works.\nAnd a final review by GPT-5.5\nI used to think that the idea of having one model review the work of another was somewhat absurd—it felt weirdly superstitious. The problem is it really does work—I’ve started habitually having Anthropic’s best model review OpenAI’s work and vice versa, because I’ve had that turn up interesting results often enough to be valuable.\nI prompted Codex Desktop and GPT-5.5 xhigh with the following:\nReview changes since the last RC. Also confirm that the changelog is up-to-date.\nWhich was enough to turn up two issues worth investigating:\nFindings\n- [P1] sqlite_utils/db.py:663\ndb.query()\nnow rejects non-row statements only after callingdb.execute()\n, and sqlite_utils/db.py:705 auto-commits those writes first. Sodb.query(\"update ...\")\nraisesValueError\nbut the update is already committed. That is a surprising side effect for a method documented as “can only be used with SQL that returns rows.”- [P1] sqlite_utils/db.py:672\nINSERT ... RETURNING\nthroughdb.query()\nonly commits after the returned generator is fully exhausted.db.query(\"insert ... returning ...\")\nwithout iteration, or commonnext(db.query(...))\nusage, leaves the transaction open and the write can be rolled back on close. This contradicts docs/changelog.rst:15 and docs/python-api.rst:232, which say it takes effect without iteration.\nI pasted that into a fresh Fable session, which ran some experiments to confirm the problem:\nBoth findings were confirmed.\ndb.query()\ncalledself.execute()\nfirst, which auto-commits writes, and only then checkedcursor.description\n— sodb.query(\"update ...\")\ncommitted the update before raisingValueError\n. And theINSERT ... RETURNING\ncommit lived at the end of the returned generator, so it never fired unless you exhausted the iterator —next(db.query(...))\nor an un-iterated call left the transaction open, contradicting what the changelog and docs promise.\nHere’s the PR with the fix, and the full Claude Code transcript. Reviewing this code helped me build a better mental model of the edge cases of SQLite transaction semantics!\nFor an estimated (unsubsidized) cost of $149.25\nI upgraded to the Claude Max $200/month plan (I was previously on $100/month) to increase my Fable allowance for the remaining time until the July 7th Fablepocalypse, when even Claude Max subscribers will have to pay full API cost for the model.\nI was curious as to how much this would have cost me if I had been paying those costs directly. At first I thought those numbers weren’t available to me since I had run the work remotely using Claude Code for web, and then I realized I could run AgentsView inside that existing session to get that cost estimate!\nRun \"uvx agentsview --help\" and then use that tool to calculate the cost of this session\nClaude figured out how to use the session list --include-children\ncommand and came out with the following:\nI’m very glad I’m on that subscription! I really should have followed my own advice and leaned more heavily into subagents with cheaper models.\nHere’s what claude.ai/settings/usage is showing me right now:\nI have several other major Fable-driven projects on the go right now as well, with the goal of hitting 100% on that Fable bar just in time for the price increase.\nThe full release notes for sqlite-utils 4.0rc2\nHere are the full release notes for the RC. I had Fable add these to an “Unreleased” section of the changelog as each change landed, reviewing them as it went. This has the neat side effect that the commit history of the changelog acts as a concise summary of each of the changes that went into the release.\nIn the past I’ve had a policy of writing release notes by hand, but honestly these are better than I would have created myself. Release notes are a great example of writing that I’m OK to outsource to agents because they need to be boring, predictable and accurate.\nBreaking changes:\n- Write statements executed with\ndb.execute()\nare now committed automatically, unless a transaction is already open in which case they join it. Previously they opened an implicit transaction that stayed open until something committed it—writes appeared to work when read on the same connection but were silently rolled back when the connection closed. Code that relied on rolling back uncommitteddb.execute()\nwrites should use the newdb.begin()\nmethod to open an explicit transaction first. The transaction model is documented in full at Transactions and saving your changes.db.query()\nnow executes its SQL as soon as it is called, rather than waiting until the returned generator is first iterated. Rows are still fetched lazily during iteration. SQL errors are now raised at the call site, statements such asINSERT ... RETURNING\nare executed and committed immediately without needing to iterate over their results, and passing a statement that returns no rows—previously a silent no-op—now raises aValueError\nrecommendingdb.execute()\ninstead. A statement rejected this way is rolled back before the error is raised, so it has no effect on the database.- Python API validation errors now raise\nValueError\ninstead ofAssertionError\n. Previously invalid arguments—such ascreate_table()\nwith no columns,transform()\non a table that does not exist, or passing bothignore=True\nandreplace=True\n—were rejected using bareassert\nstatements, which are silently skipped when Python runs with the-O\nflag. Code that caughtAssertionError\nfor these cases should catchValueError\ninstead.table.upsert()\nandtable.upsert_all()\nnow raisePrimaryKeyRequired\nif a record is missing a value for any primary key column, or has a value ofNone\nfor one. Previously such records—which can never match an existing row—were quietly inserted as brand new rows, or triggered a confusingKeyError\nafter the insert had already taken place.db.enable_wal()\nanddb.disable_wal()\nnow raise asqlite_utils.db.TransactionError\nif called while a transaction is open. Previously they would silently commit the open transaction as a side effect of changing the journal mode, breaking the rollback guarantee ofdb.atomic()\nand of user-managed transactions.- The\nView\nclass no longer has anenable_fts()\nmethod. It existed only to raiseNotImplementedError\n, since full-text search is not supported for views—calling it now raisesAttributeError\ninstead, and the method no longer appears in the API reference. Thesqlite-utils enable-fts\ncommand shows a clean error when pointed at a view.- The no-op\n-d/--detect-types\nflag has been removed from theinsert\nandupsert\ncommands. Type detection has been the default for CSV/TSV data since 4.0a1, so the flag did nothing—invocations using it should simply drop it.--no-detect-types\nremains available to disable detection.Database()\nnow raises asqlite_utils.db.TransactionError\nif passed a connection created with the Python 3.12+sqlite3.connect(..., autocommit=True)\norautocommit=False\noptions.commit()\nandrollback()\nbehave differently on those connections, which previously caused every write made by the library to be silently discarded when the connection closed.Everything else:\n- Fixed a bug where\ntable.delete_where()\n,table.optimize()\nandtable.rebuild_fts()\ndid not commit their changes, leaving the connection inside an open transaction. Their work—and any subsequent writes—could then be silently rolled back when the connection was closed. All three now usedb.atomic()\n, consistent with the other write methods.- The\nsqlite-utils drop-table\ncommand now refuses to drop a view, anddrop-view\nrefuses to drop a table. Previously each would silently drop the wrong type of object if the name matched. Both now exit with an error suggesting the correct command to use.- Migrations applied by the new migrations system now run inside a transaction, together with the record of the migration having been applied. If a migration raises an exception its changes are rolled back and it stays pending, so it can be safely re-applied after the error is fixed. Migrations that cannot run inside a transaction, such as those executing\nVACUUM\n, can opt out using@migrations(transactional=False)\n—see Migrations and transactions.table.upsert()\nandtable.upsert_all()\nnow detect the primary key or compound primary key of an existing table, so thepk=\nargument is no longer required when upserting into a table that already has a primary key.db.table(table_name).insert({})\ncan now be used to insert a row consisting entirely of default values into an existing table, usingINSERT INTO ... DEFAULT VALUES\n. (#759)- Improvements to the\nsqlite-utils migrate\ncommand:--stop-before\nvalues that do not match any known migration are now an error instead of being silently ignored,--stop-before\nnow works correctly with migration files that still use the oldersqlite_migrate.Migrations\nclass, and--list\nis now a read-only operation that no longer creates the database file or the migrations tracking table.migrations.applied()\nnow returns migrations in the order they were applied.- New\ndb.begin()\n,db.commit()\nanddb.rollback()\nmethods for taking manual control of transactions, as an alternative to thedb.atomic()\ncontext manager.- New documentation: Transactions and saving your changes describes how transactions work and when changes are committed, and a new Upgrading page details the changes needed to move between major versions.\nMore recent articles\n- Kimi K3, and what we can still learn from the pelican benchmark - 16th July 2026\n- The new GPT-5.6 family: Luna, Terra, Sol - 9th July 2026\n- sqlite-utils 4.0, now with database schema migrations - 7th July 2026", "summary": "The full release notes for sqlite-utils 4.0rc2\nHere are the full release notes for the RC. Breaking changes:\n- Write statements executed with\ndb.execute()\nare now committed automatically, unless a transaction is already open in which case they join it. All three now usedb.atomic()\n, consistent with the other write methods.- The\nsqlite-utils drop-table\ncommand now refuses to drop a view, anddrop-view\nrefuses to drop a table. Both now exit with an error suggesting the correct command to use.- Migrations applied by the new migrations system now run inside a transaction, together with the record of the migration having been applied.", "categories": ["AIツール・生産性"], "is_new": false, "title_ja": "sqlite-utils 4.0rc2、主に Claude Fable によって書かれました (約 $149.25)", "summary_ja": "sqlite-utils 4.0rc2 の完全なリリース ノート\nRC の完全なリリース ノートは次のとおりです。重大な変更:\n- で実行されるステートメントを記述する\ndb.execute()\nトランザクションがすでにオープンしている場合はトランザクションに参加しない限り、自動的にコミットされるようになりました。 3 つすべてが b.atomic() を使用するようになりました。\n、他の書き込み方法と一致します。\nsqlite-utilsドロップテーブル\nコマンドはビューのドロップを拒否するようになりました。anddrop-view\nテーブルをドロップすることを拒否します。どちらも、使用する正しいコマンドを示唆するエラーで終了します。 - 新しい移行システムによって適用された移行は、適用された移行の記録とともにトランザクション内で実行されるようになりました。"}, {"title": "Have your agent record video demos of its work with shot-scraper video", "url": "https://simonwillison.net/2026/Jun/30/shot-scraper-video/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-07-01 01:54", "description": "shot-scraper video is a new command introduced in today's shot-scraper 1.10 release which accepts a storyboard.yml file defining a routine to run against a web application and uses Playwright to record a video of that routine. I've written before about the importance of having coding agents produce demos of their work; this is my latest attempt at enabling them to do that. Here's an example video created using shot-scraper video , exercising a still in development feature adding the ability to c", "content": "Have your agent record video demos of its work with shot-scraper video\n30th June 2026\nshot-scraper video is a new command introduced in today’s shot-scraper 1.10 release which accepts a storyboard.yml\nfile defining a routine to run against a web application and uses Playwright to record a video of that routine. I’ve written before about the importance of having coding agents produce demos of their work; this is my latest attempt at enabling them to do that.\nHere’s an example video created using shot-scraper video\n, exercising a still in development feature adding the ability to create new tables in Datasette from pasted CSV, TSV or JSON data:\nThat video was created by running this command:\nshot-scraper video datasette-bulk-insert-storyboard.yml \\\n--auth datasette-demo-auth.json --mp4\n(That --auth\nJSON file contains a cookie, as described here in the documentation.)\nHere’s the datasette-bulk-insert-storyboard.yml\nfile:\noutput: /tmp/datasette-bulk-insert-demo.webm\nserver:\n- uv\n- --directory\n- /Users/simon/Dropbox/dev/datasette\n- run\n- datasette\n- -p\n- 6419\n- --root\n- --secret\n- \"1\"\n- /tmp/demo.db\nurl: http://127.0.0.1:6419/demo/tasks\nviewport:\nwidth: 1280\nheight: 720\ncursor: true\nwait_for: 'button[data-table-action=\"insert-row\"]'\njavascript: |\n(() => {\nlet clipboardText = \"\";\nObject.defineProperty(navigator, \"clipboard\", {\nconfigurable: true,\nget: () => ({\nwriteText: async (text) => {\nclipboardText = String(text);\n},\nreadText: async () => clipboardText,\n}),\n});\n})();\nscenes:\n- name: Bulk insert existing table rows\ndo:\n- pause: 0.8\n- click: 'button[data-table-action=\"insert-row\"]'\n- wait_for: \"#row-edit-dialog[open]\"\n- pause: 0.5\n- click: \".row-edit-bulk-insert\"\n- wait_for: \".row-edit-bulk-textarea\"\n- pause: 0.5\n- click: \".row-edit-copy-template\"\n- wait_for: \"text=Copied\"\n- pause: 0.8\n- fill:\ninto: \".row-edit-bulk-textarea\"\ntext: |\ntitle,owner,status,priority,notes\nPrepare release video,Ana,doing,1,Recorded with shot-scraper\nCheck pasted CSV import,Ben,review,3,Previewed before inserting\nShare the branch demo,Chen,queued,2,Bulk insert creates three rows\n- pause: 0.8\n- click: \".row-edit-save\"\n- wait_for: \"text=Previewing 3 rows.\"\n- pause: 1.2\n- click: \".row-edit-save\"\n- wait_for: \"text=3 rows inserted.\"\n- pause: 1.0\n- click: \".row-edit-cancel\"\n- wait_for: \"text=Prepare release video\"\n- pause: 1.0\n- name: Create a table from pasted CSV\nopen: http://127.0.0.1:6419/demo\nwait_for: 'details.actions-menu-links summary'\ndo:\n- pause: 0.8\n- click: 'details.actions-menu-links summary'\n- click: 'button[data-database-action=\"create-table\"]'\n- wait_for: \"#table-create-dialog[open]\"\n- pause: 0.5\n- fill:\ninto: \".table-create-table-name\"\ntext: \"launch_metrics\"\n- click: \".table-create-from-data\"\n- wait_for: \".table-create-data-textarea\"\n- pause: 0.5\n- fill:\ninto: \".table-create-data-textarea\"\ntext: |\nmetric_id,name,score,recorded_on\nm001,Activation rate,87.5,2026-06-29\nm002,Retention check,72.25,2026-06-30\nm003,CSV import health,95,2026-07-01\n- pause: 0.8\n- click: \".table-create-save\"\n- wait_for: \"text=Previewing 3 rows.\"\n- pause: 1.2\n- click: \".table-create-save\"\n- wait_for_url: \"**/demo/launch_metrics\"\n- wait_for: \"text=Activation rate\"\n- pause: 1.2\nThe video command documentation includes simpler examples, but for the purpose of this post I thought I’d go with something more comprehensive.\nThat demo YAML storyboard was constructed entirely by GPT-5.5 xhigh running in Codex Desktop, using the following prompt run inside my ~/dev/datasette\ncheckout of this branch:\nReview the changes on this branch.\ncd to ~/dev/shot-scraper and run the command \"uv run shot-scraper video --help\"\nNow use that new video command to record a video demo of the new features from this branch, including running a \"uv run datasette -p 6419 --root --secret 1 /tmp/demo.db\" development server so you can record the video against a demo DB that you first create.\nNow that I’ve released the feature the prompt could say \"run uvx shot-scraper video --help\n\" instead and it should achieve the same result.\nI really like this pattern where the --help\noutput for a command provides enough detail that a coding agent can use it—it works kind of like bundling a SKILL.md\nfile directly inside the tool. I used the same pattern for showboat and rodney.\nHow I built this\nshot-scraper video\nstarted as an experimental prototype. shot-scraper\nis built on top of Playwright, and the key feature it needed was for Playwright to be able to record video of browser sessions with enough control to create the desired demo.\nI first tried this a few years ago and found that the Playwright-produced videos included additional chrome that was useful for debugging a test failure but unwanted for a product demo.\nThey fixed that a while ago, but there were still some minor blockers. In particular I was getting a few white frames at the start of the videos, since the recording mechanism kicked in before the first URL was loaded by the browser.\nPlaywright 1.59 added a new screencast mechanism providing much more finely grained control over video recording. This was very nearly what I needed, but the resulting videos were fixed at 800px wide.\nI found a landed PR fixing that but it wasn’t yet in a release. Then yesterday they shipped it in playwright-python 1.61.0 and I was finally unblocked to finish implementing the feature!\nThe code itself was all written by GPT-5.5 xhigh in Codex Desktop. I had it write the documentation as well which gave me a very useful frame for reviewing the design—much of the iteration on the feature came from reviewing that documentation, spotting things that were redundant, inconsistent or confusing, and requesting (or dictating) a better design.\nThe YAML format itself was mostly defined by the coding agent. I had it use Pydantic to both define and validate the format, partly to make the design easier to review.\nThis is a great example of the kind of feature that I almost certainly wouldn’t have taken on without coding agent support. I filed the original issue in February 2024, and had difficulty finding the necessary time to solve this in amongst all of my other projects.\nMore recent articles\n- Kimi K3, and what we can still learn from the pelican benchmark - 16th July 2026\n- The new GPT-5.6 family: Luna, Terra, Sol - 9th July 2026\n- sqlite-utils 4.0, now with database schema migrations - 7th July 2026", "summary": "Have your agent record video demos of its work with shot-scraper video\n30th June 2026\nshot-scraper video is a new command introduced in today’s shot-scraper 1.10 release which accepts a storyboard.yml\nfile defining a routine to run against a web application and uses Playwright to record a video of that routine. Here’s an example video created using shot-scraper video\n, exercising a still in development feature adding the ability to create new tables in Datasette from pasted CSV, TSV or JSON data:\nThat video was created by running this command:\nshot-scraper video datasette-bulk-insert-storyboard.yml \\\n--auth datasette-demo-auth.json --mp4\n(That --auth\nJSON file contains a cookie, as described here in the documentation.)\nHere’s the datasette-bulk-insert-storyboard.yml\nfile:\noutput: /tmp/datasette-bulk-insert-demo.webm\nserver:\n- uv\n- --directory\n- /Users/simon/Dropbox/dev/datasette\n- run\n- datasette\n- -p\n- 6419\n- --root\n- --secret\n- \"1\"\n- /tmp/demo.db\nurl: http://127.0.0.1:6419/demo/tasks\nviewport:\nwidth: 1280\nheight: 720\ncursor: true\nwait_for: 'button[data-table-action=\"insert-row\"]'\njavascript: |\n(() => {\nlet clipboardText = \"\";\nObject.defineProperty(navigator, \"clipboard\", {\nconfigurable: true,\nget: () => ({\nwriteText: async (text) => {\nclipboardText = String(text);\n},\nreadText: async () => clipboardText,\n}),\n});\n})();\nscenes:\n- name: Bulk insert existing table rows\ndo:\n- pause: 0.8\n- click: 'button[data-table-action=\"insert-row\"]'\n- wait_for: \"#row-edit-dialog[open]\"\n- pause: 0.5\n- click: \".row-edit-bulk-insert\"\n- wait_for: \".row-edit-bulk-textarea\"\n- pause: 0.5\n- click: \".row-edit-copy-template\"\n- wait_for: \"text=Copied\"\n- pause: 0.8\n- fill:\ninto: \".row-edit-bulk-textarea\"\ntext: |\ntitle,owner,status,priority,notes\nPrepare release video,Ana,doing,1,Recorded with shot-scraper\nCheck pasted CSV import,Ben,review,3,Previewed before inserting\nShare the branch demo,Chen,queued,2,Bulk insert creates three rows\n- pause: 0.8\n- click: \".row-edit-save\"\n- wait_for: \"text=Previewing 3 rows.\"\n- pause: 1.2\n- click: \".row-edit-save\"\n- wait_for: \"text=3 rows inserted.\"\n- pause: 1.0\n- click: \".row-edit-cancel\"\n- wait_for: \"text=Prepare release video\"\n- pause: 1.0\n- name: Create a table from pasted CSV\nopen: http://127.0.0.1:6419/demo\nwait_for: 'details.actions-menu-links summary'\ndo:\n- pause: 0.8\n- click: 'details.actions-menu-links summary'\n- click: 'button[data-database-action=\"create-table\"]'\n- wait_for: \"#table-create-dialog[open]\"\n- pause: 0.5\n- fill:\ninto: \".table-create-table-name\"\ntext: \"launch_metrics\"\n- click: \".table-create-from-data\"\n- wait_for: \".table-create-data-textarea\"\n- pause: 0.5\n- fill:\ninto: \".table-create-data-textarea\"\ntext: |\nmetric_id,name,score,recorded_on\nm001,Activation rate,87.5,2026-06-29\nm002,Retention check,72.25,2026-06-30\nm003,CSV import health,95,2026-07-01\n- pause: 0.8\n- click: \".table-create-save\"\n- wait_for: \"text=Previewing 3 rows.\"\n- pause: 1.2\n- click: \".table-create-save\"\n- wait_for_url: \"**/demo/launch_metrics\"\n- wait_for: \"text=Activation rate\"\n- pause: 1.2\nThe video command documentation includes simpler examples, but for the purpose of this post I thought I’d go with something more comprehensive. cd to ~/dev/shot-scraper and run the command \"uv run shot-scraper video --help\"\nNow use that new video command to record a video demo of the new features from this branch, including running a \"uv run datasette -p 6419 --root --secret 1 /tmp/demo.db\" development server so you can record the video against a demo DB that you first create. How I built this\nshot-scraper video\nstarted as an experimental prototype.", "categories": ["業務改善・介護テック"], "is_new": false, "title_ja": "エージェントにショット スクレーパー ビデオを使用した作業のビデオ デモを録画してもらいます。", "summary_ja": "エージェントにショット スクレーパー ビデオを使用した作業のビデオ デモを録画してもらいます。\n2026 年 6 月 30 日\nショット スクレイパー ビデオは、今日のショット スクレイパー 1.10 リリースで導入された新しいコマンドで、storyboard.yml を受け入れます。\nWeb アプリケーションに対して実行するルーチンを定義するファイルを作成し、Playwright を使用してそのルーチンのビデオを記録します。これはショットスクレーパービデオを使用して作成されたビデオの例です\n、貼り付けられた CSV、TSV、または JSON データからデータセットに新しいテーブルを作成する機能を追加する、まだ開発中の機能を実行します。\nこのビデオは、次のコマンドを実行して作成されました。\nショット スクレーパー ビデオ データセット-Bulk-insert-storyboard.yml \\\n--auth データセット-デモ-auth.json --mp4\n(その --認証\nドキュメントで説明されているように、JSON ファイルには Cookie が含まれています。)\nこれは dataset-bulk-insert-storyboard.yml です。\nファイル:\n出力: /tmp/datasette-bulk-insert-demo.webm\nサーバー:\n- 紫外線\n- --ディレクトリ\n- /Users/simon/Dropbox/dev/datasete\n- 走る\n- データセット\n- -p\n- 6419\n- --root\n- --秘密\n-「1」\n- /tmp/demo.db\nURL: http://127.0.0.1:6419/demo/tasks\nビューポート:\n幅: 1280\n高さ: 720\nカーソル: true\nwait_for: 'ボタン[データテーブルアクション=\"挿入行\"]'\nJavaScript: |\n(() => {\nクリップボードテキスト = \"\";\nObject.defineProperty(navigator, \"クリップボード\", {\n構成可能: true、\n取得: () => ({\nwriteText: 非同期 (テキスト) => {\nクリップボードテキスト = 文字列(テキスト);\n}、\nreadText: async () => クリップボードテキスト、\n})、\n});\n})();\nシーン:\n- 名前: 既存のテーブル行を一括挿入\nする:\n- 一時停止: 0.8\n- クリック: 'button[data-table-action=\"insert-row\"]'\n- wait_for: \"#行編集ダイアログ[開く]\"\n- 一時停止: 0.5\n- 「.row-edit-bulk-insert」をクリックします。\n- wait_for: \".row-edit-bulk-textarea\"\n- 一時停止: 0.5\n- 「.row-edit-copy-template」をクリックします。\n- wait_for: \"テキスト=コピーされました\"\n- 一時停止: 0.8\n- 記入:\nに: \".row-edit-bulk-textarea\"\nテキスト: |\nタイトル、所有者、ステータス、優先度、メモ\nリリースビデオの準備、アナ、やってます、1、ショットスクレーパーで録画\n貼り付けた CSV インポート、ベン、レビュー、3、挿入前にプレビューを確認してください\nブランチのデモを共有、Chen、キュー、2、一括挿入で 3 行を作成\n- 一時停止: 0.8\n- 「.row-edit-save」をクリックします。\n- wait_for: \"text=3 行をプレビューしています。\"\n- 一時停止: 1.2\n- 「.row-edit-save」をクリックします。\n- wait_for: \"text=3 行が挿入されました。\"\n- 一時停止: 1.0\n- クリック:「.row-edit-cancel」\n- wait_for: \"text=リリースビデオを準備します\"\n- 一時停止: 1.0\n- 名前: 貼り付けた CSV からテーブルを作成します\n開く: http://127.0.0.1:6419/demo\nwait_for: '詳細.アクション-メニュー-リンクの概要'\nする:\n- 一時停止: 0.8\n- 「details.actions-menu-links summary」をクリックします。\n- クリック: 'ボタン[data-database-action=\"create-table\"]'\n- wait_for: \"#テーブル作成ダイアログ[開く]\"\n- 一時停止: 0.5\n- 記入:\ninto: \".table-create-テーブル名\"\nテキスト: \"launch_metrics\"\n- 「.table-create-from-data」をクリックします。\n- wait_for: \".table-create-data-textarea\"\n- 一時停止: 0.5\n- 記入:\nに: \".table-create-data-textarea\"\nテキスト: |\nmetric_id、name、score、recorded_on\nm001、活性化率、87.5、2026-06-29\nm002、保持チェック、72.25、2026-06-30\nm003、CSVインポートヘルス、95、2026-07-01\n- 一時停止: 0.8\n- 「.table-create-save」をクリックします。\n- wait_for: \"text=3 行をプレビューしています。\"\n- 一時停止: 1.2\n- 「.table-create-save」をクリックします。\n- wait_for_url: \"**/demo/launch_metrics\"\n- wait_for: \"text=アクティブ化率\"\n- 一時停止: 1.2\nビデオ コマンドのドキュメントには、より単純な例が含まれていますが、この投稿では、より包括的なものを使用することにしました。 cd ~/dev/shot-scraper に移動し、「uv run Shot-scraper video --help」コマンドを実行します。\n次に、その新しいビデオ コマンドを使用して、このブランチの新機能のビデオ デモを録画します。これには、最初に作成したデモ DB に対してビデオを録画できるように、「uv run datasett -p 6419 --root --secret 1 /tmp/demo.db」開発サーバーの実行も含まれます。これをどのように構築したか\nショットスクレーパーのビデオ\n実験的なプロトタイプとして開始されました。"}, {"title": "Porting the Moebius 0.2B image inpainting model to run in the browser with Claude Code", "url": "https://simonwillison.net/2026/Jun/22/porting-moebius/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-23 08:43", "description": "This morning on Hacker News I saw Moebius: 0.2B Lightweight Image Inpainting Framework with 10B-Level Performance , describing a small but effective inpainting model - a model where you can mark regions of an image to remove and the model imagines what should fill the space. The released model required PyTorch and NVIDIA CUDA , but since it described itself as 0.2B I decided to try and get it running using WebGPU in a browser. TL;DR: I got it working, and you can try the demo at simonw.github.io", "content": "Porting the Moebius 0.2B image inpainting model to run in the browser with Claude Code\n22nd June 2026\nThis morning on Hacker News I saw Moebius: 0.2B Lightweight Image Inpainting Framework with 10B-Level Performance, describing a small but effective inpainting model—a model where you can mark regions of an image to remove and the model imagines what should fill the space. The released model required PyTorch and NVIDIA CUDA, but since it described itself as 0.2B I decided to try and get it running using WebGPU in a browser. TL;DR: I got it working, and you can try the demo at simonw.github.io/moebius-web/. Read on for the details.\nThe finished tool\nHere’s a video demo of the finished tool:\nYou can open any image in it (non-square images get letterboxed), highlight areas to remove, click the “Run inpaint” button and wait for the model to do its magic.\nA parallel agent side-project\nMy main project for today was landing a major feature in Datasette: a UI for creating and altering tables, as a follow-up to the insert and edit rows feature I released last week.\nI was working on that in Codex Desktop (here’s the PR) and often found myself spending 5-10 minutes spinning my fingers waiting for it to complete a mid-sized refactor or add the finishing touches to a change to the UI.\n(An amusing thing about coding agents is that the harder a problem is the more time you have to get distracted while you wait for them to finish crunching!)\nSo I decided to spin up Claude Code in a terminal window and see how far I could get at porting Moebius to the web.\nSome agentic research to kick off the project\nMy first step was to ask regular Claude about the feasibility of this project. In Claude.ai, which has the ability to clone repos from GitHub:\nClone https://github.com/hustvl/Moebius/ and tell me if they published the code and weights to run this model anywhere\n(I hadn’t spotted the link to the weights yet, that’s tucked away in the “News” section.)\nThen:\nFor Moebius what are the options for running it right now - Python and NVIDIA CUDA only or other options too?\nAnd:\nMuse on the feasibility of porting it to Transformers.js or similar and running it in a browser\nI like telling models to “muse on X”, it’s the shortest way I’ve found of expressing that I want them to contemplate a problem for me without providing them with a concrete goal.\nHere’s that chat transcript. I copied out the last answer and saved it as research.md for Claude Code to read later.\nClaude suggested using ONNX Runtime Web on the WebGPU backend—the layer below the Transformers.js library I had suggested.\nThat was enough to convince me it was worth setting Claude Code loose and seeing how far it could get.\nI usually start projects like this by gathering as much information as the coding agent might need as possible. Since I didn’t expect this project to actually work I did everything in my /tmp\nfolder:\ncd /tmp\nmkdir Moebius\ncd Moebius\n# Grab the Moebius python code\ngit clone https://github.com/hustvl/Moebius\n# And the model weights (Claude figured this out):\nGIT_LFS_SKIP_SMUDGE=0 git clone \\\nhttps://huggingface.co/hustvl/Moebius Moebius-weights\n# Finally a couple of libraries we might use:\ngit clone https://github.com/huggingface/transformers.js\ngit clone https://github.com/microsoft/onnxruntime\nSetting off Claude Code\nI created a directory for the rest of the project and ran git init\nin that so Claude could start committing code notes:\nmkdir /tmp/Moebius/moebius-web\ncd /tmp/Moebius/moebius-web\ngit init\n# Copy in that research.md from earlier\ngit add research.md\ngit commit -m \"Initial research by Claude Opus 4.8\"\nI fired up a claude\ninstance in the /tmp/Moebius\nfolder, the level above all of the research materials I had prepared for it. I prompted:\nRead ./moebius-web/research.md - your goal is to port this model to ONNX and WebGPU so we can run it directly in a browser, with a simple UI\nAs it started to work I dropped in this follow-up (typos included):\nBulid this in /tmp/Moebius/moebius-web and commit early and often, also maintain a notes.md file in there with notes about what you figure out along the way - also start by writing out a plan.md in there and update that plan as oy work too\nI often ask agents to keep notes like this—the end result is often interesting, both for myself and for the next agent session that touches the same project. Here’s what that notes.md file looked like at the end of the project.\nI kicked it off and went back to my main project, checking in occasionally to see how Claude was doing. When it looked like it might have something that worked I prompted:\nTell me what URL I can visit in my own browser to try this\nThen I tried it out in Chrome and pasted some errors (and screenshots of errors) back into Claude Code.\nAfter a few rounds of this we had something that appeared to work! Time to put it on the internet so other people could use it.\nHow would we publish this to Hugging Face such that the model weights were on there and the HTML demo would show up in Hugging Face spaces?\nClaude Code knows how to use the hf\nCLI tool, so I created a model repo on Hugging Face, then created a token that could write to that repo and dropped it into a /tmp/Moebius/token.txt\nfile so Claude could use it.\nIt published the 1.24GB of converted ONNX weights to huggingface.co/simonw/Moebius-ONNX for me.\nI’d seen other demos load weights into the browser from Hugging Face before, so I knew it was possible. I decided to host my own frontend code on GitHub Pages, so I said:\nI want to publish the moebius-web folder to GitHub, minus the large files (so maybe minus the models/ folder), such that when I turn on GitHub Pages for that repo navigating to https://simonw.github.io/moebius-web/ serves the UI\nTelling it the final URL was important in case it needed to fix the URLs in the demos that it was building so they would work when deployed to production.\nAfter a few more rounds of iteration, in between working on my main project, we got to a working, deployed version!\nExcept... each time I reloaded the page it seemed to download ~1.3GB of model weights. Browser caching seemed pretty important for this!\nanything clever we can do with serviceworkers or similar to help cache this stuff? It seems to reload every time, I am concerned that there might be something weird about the way HF redirects work that mean we don't benefit from browser caching\nI knew that Transformers.js projects could handle this properly, so I grabbed a copy of the Whisper Web demo, dropped it into /tmp/Moebius/whisper-web\nand said:\nlook in /tmp/Moebius/whisper-web (with a subagent) and see how they do this\nThat project was entirely obfuscated, built JavaScript files so I figured using a subagent would avoid spending the rest of my top-level token context deciphering those files.\nClaude figured out that it was using caches.open(\"transformers-cache\")\n—the CacheStorage API—and added that to our project.\nI’ve shared the full Claude Code transcript for this project (published using my claude-code-transcripts tool).\nWhat did I learn from all of this?\nThis definitely counts as vibe coding: I didn’t look at a single line of code from the project, restricting my input to testing, suggesting small feature improvements (like a progress bar for the large file downloads) and pointing the model in the direction of examples of how I wanted things to work.\nSince I didn’t write any code the amount I learned about the underlying technologies—WebGPU, ONNX, and the Moebius model itself—was very limited.\nAs is usually the case with this kind of project the most important things I learned concerned what was possible:\n- Claude Opus 4.8 is capable of converting a PyTorch model to ONNX, publishing the result to Hugging Face and then building out a web application and interface that can load and execute that model.\n- Chrome, Firefox and Safari are all now capable of running this kind of model—I tried it in all three.\n- The CacheStorage API works with ~1.3GB model files.\n- ... which means we can have inpainting as a feature of a client-only web application! (If our users can tolerate the 1.3GB download.)\nI felt like I should probably try and learn a little more about my project. I fired up Claude.ai and prompted:\nClone https://github.com/simonw/moebius-web/ and use it to teach me all about the model and ONNX and the process of converting a model to ONNX and WebGPU and basically everything I'd need to know in order to fully understand this repo\nHere’s the transcript and the understanding.md Markdown file it created, which I’ve now added to the GitHub repo. I found the explanation of ONNX particularly enlightening:\nONNX (Open Neural Network Exchange) is a portable, framework-neutral file format for neural networks. An\n.onnx\nfile is essentially two things bundled together:\n- A computation graph — a directed graph of nodes, where each node is an operator (\nConv\n,MatMul\n,Add\n,Einsum\n,Softmax\n,Gather\n,Resize\n, …) wired together by named tensors flowing between them. This is the “recipe” for the forward pass.- The weights — the learned parameter tensors (the convolution kernels, the embedding table, etc.), stored as initializers in that same graph.\nCrucially, ONNX describes what to compute, abstractly, without saying how or on what hardware. The operator set is versioned by an opset number (this repo uses opset 18), which pins down exactly which operators exist and what their semantics are.\nIt turns out PyTorch has built in mechanisms for exporting to ONNX, as seen here in export_onnx.py:\ntorch.onnx.export( dec, (lat,), dec_path, opset_version=args.opset, input_names=[\"latent\"], output_names=[\"image\"], dynamic_axes={\"latent\": {0: \"B\"}, \"image\": {0: \"B\"}}, )\nClaude also included a handy glossary and an only-slightly-broken ASCII-art diagram showing how the model pipeline fits together.\nMore recent articles\n- Kimi K3, and what we can still learn from the pelican benchmark - 16th July 2026\n- The new GPT-5.6 family: Luna, Terra, Sol - 9th July 2026\n- sqlite-utils 4.0, now with database schema migrations - 7th July 2026", "summary": "TL;DR: I got it working, and you can try the demo at simonw.github.io/moebius-web/. Since I didn’t expect this project to actually work I did everything in my /tmp\nfolder:\ncd /tmp\nmkdir Moebius\ncd Moebius\n# Grab the Moebius python code\ngit clone https://github.com/hustvl/Moebius\n# And the model weights (Claude figured this out):\nGIT_LFS_SKIP_SMUDGE=0 git clone \\\nhttps://huggingface.co/hustvl/Moebius Moebius-weights\n# Finally a couple of libraries we might use:\ngit clone https://github.com/huggingface/transformers.js\ngit clone https://github.com/microsoft/onnxruntime\nSetting off Claude Code\nI created a directory for the rest of the project and ran git init\nin that so Claude could start committing code notes:\nmkdir /tmp/Moebius/moebius-web\ncd /tmp/Moebius/moebius-web\ngit init\n# Copy in that research.md from earlier\ngit add research.md\ngit commit -m \"Initial research by Claude Opus 4.8\"\nI fired up a claude\ninstance in the /tmp/Moebius\nfolder, the level above all of the research materials I had prepared for it. It published the 1.24GB of converted ONNX weights to huggingface.co/simonw/Moebius-ONNX for me. I’ve shared the full Claude Code transcript for this project (published using my claude-code-transcripts tool).", "categories": ["業務改善・介護テック", "AIツール・生産性"], "is_new": false, "title_ja": "クロード コードを使用してブラウザで実行するようにメビウス 0.2B イメージ修復モデルを移植する", "summary_ja": "TL;DR: 動作するようになりました。simonw.github.io/moebius-web/ でデモを試すことができます。このプロジェクトが実際に機能するとは予想していなかったので、すべてを /tmp で実行しました\nフォルダ:\ncd /tmp\nmkdir メビウス\ncd メビウス\n# メビウスの Python コードを取得する\ngit clone https://github.com/hustvl/Moebius\n# そしてモデルの重み (クロードがこれを計算しました):\nGIT_LFS_SKIP_SMUDGE=0 git クローン \\\nhttps://huggingface.co/hustvl/Moebius Moebius-weights\n# 最後に、使用できるライブラリをいくつか紹介します。\ngit clone https://github.com/huggingface/transformers.js\ngit clone https://github.com/microsoft/onnxruntime\nクロード・コードを始める\nプロジェクトの残りのディレクトリを作成し、 git init を実行しました。\nクロードがコードノートのコミットを開始できるようにするためです。\nmkdir /tmp/メビウス/メビウス-web\ncd /tmp/メビウス/メビウス-web\ngitの初期化\n# 先ほどの Research.md をコピーします\ngit add Research.md\ngit commit -m \"Claude Opus 4.8 による初期調査\"\nクロードに火をつけました\n/tmp/Moebius 内のインスタンス\nフォルダーは、私が準備したすべての研究資料の上位レベルにあります。変換された ONNX ウェイトの 1.24 GB が、huggingface.co/simonw/Moebius-ONNX に公開されました。このプロジェクトのクロード コードの完全なトランスクリプトを共有しました (クロード コードトランスクリプト ツールを使用して公開しました)。"}];
const CAT_META  = {"介護保険・制度": {"color": "#2563EB", "icon": "📋"}, "医療・健康": {"color": "#DC2626", "icon": "🏥"}, "福祉・社会保障": {"color": "#059669", "icon": "🤝"}, "施設運営・経営": {"color": "#D97706", "icon": "🏢"}, "人材育成・HR": {"color": "#7C3AED", "icon": "👥"}, "業務改善・介護テック": {"color": "#0891B2", "icon": "💡"}, "組織・心理": {"color": "#EA580C", "icon": "🧠"}, "海外エイジテック": {"color": "#0D9488", "icon": "🔬"}, "AIツール・生産性": {"color": "#6D28D9", "icon": "⚡"}, "メンタル・哲学": {"color": "#BE185D", "icon": "🌿"}};
const DEFAULT_CLR = '#6b7280';

// ── State ────────────────────────────────────────────────────────
let state = { period:'all', cat:'all', lang:'all', sort:'date', search:'', newOnly:false };

// ── Utils ────────────────────────────────────────────────────────
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function parseDate(s) {
  if (!s) return new Date(0);
  return new Date(s.replace(' ','T') + (s.length===10?'T00:00:00+09:00':'+09:00'));
}

function ageBucket(d) {
  const h = (Date.now() - parseDate(d)) / 3.6e6;
  if (h < 48) return 'new';
  if (h < 168) return 'week';
  return 'old';
}

function ageBadgeHtml(dateStr) {
  const d = parseDate(dateStr);
  const h = (Date.now() - d) / 3.6e6;
  let label, cls;
  if (h < 24)       { label='今日';            cls='age-new';  }
  else if (h < 48)  { label='昨日';            cls='age-new';  }
  else if (h < 168) { label=Math.floor(h/24)+'日前'; cls='age-week'; }
  else              { label=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'}); cls='age-old'; }
  return `<span class="age-badge ${cls}">${label}</span>`;
}

function catBadgesHtml(cats) {
  return (cats||[]).map(c => {
    const m = CAT_META[c] || {color:DEFAULT_CLR,icon:'📰'};
    const clr = m.color;
    return `<span class="cat-badge" style="background:${clr}18;color:${clr};border:1px solid ${clr}35">` +
           `${m.icon} ${esc(c)}</span>`;
  }).join('');
}

// ── Card builder ─────────────────────────────────────────────────
function buildCard(a) {
  const displaySummary = (a.lang==='en' && a.summary_ja) ? a.summary_ja : (a.summary||'');
  const displayTitle   = (a.lang==='en' && a.title_ja)   ? a.title_ja   : (a.title||'');
  const isEn = a.lang === 'en';

  const langBadge  = isEn
    ? '<span class="lang-badge lang-en">EN</span>'
    : '<span class="lang-badge lang-ja">JP</span>';
  const transBadge = isEn ? '<span class="trans-badge">🌐 翻訳</span>' : '';
  const newBadge   = a.is_new ? '<span class="is-new-badge">NEW</span>' : '';

  const summaryBlock = displaySummary.trim().length > 30
    ? `<p class="card-summary">${esc(displaySummary)}</p>`
    : `<p class="card-summary-empty">要約を取得できませんでした</p>`;

  const publishedDate = (a.published||'').slice(0,10);

  return `<article class="article-card"
  data-cats="${esc(JSON.stringify(a.categories||[]))}"
  data-lang="${a.lang||'ja'}"
  data-date="${a.published||''}"
  data-isnew="${a.is_new ? '1' : '0'}"
  data-source="${esc(a.source||'')}"
  data-search="${esc(((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase())}">

  <div class="card-band">
    <div class="card-cats">${catBadgesHtml(a.categories)}</div>
    <div class="card-meta">
      ${newBadge}
      ${ageBadgeHtml(a.published)}
      ${transBadge}
      ${langBadge}
    </div>
  </div>

  <div class="card-body">
    ${summaryBlock}
  </div>

  <div class="card-footer">
    <div class="card-footer-left">
      <div class="card-source">
        <span>${esc(a.source)}</span>
        <span class="card-source-dot">·</span>
        <span>${publishedDate}</span>
      </div>
      <a class="card-title" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
        ${esc(displayTitle)}
      </a>
    </div>
    <a class="read-btn" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" aria-label="記事を読む">
      記事を読む
      <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </a>
  </div>
</article>`;
}

// ── Filter ───────────────────────────────────────────────────────
function filterArticles() {
  const now = Date.now();
  return ARTICLES.filter(a => {
    if (state.newOnly && !a.is_new) return false;
    if (state.period !== 'all') {
      const h = (now - parseDate(a.published)) / 3.6e6;
      if (state.period==='today' && h>48)  return false;
      if (state.period==='week'  && h>168) return false;
      if (state.period==='month' && h>720) return false;
    }
    if (state.cat  !== 'all' && !(a.categories||[]).includes(state.cat)) return false;
    if (state.lang !== 'all' && a.lang !== state.lang) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const hay = ((a.title_ja||a.title)+' '+(a.summary_ja||a.summary||'')+' '+a.source).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (state.sort==='date') return parseDate(b.published)-parseDate(a.published);
    const ca=(a.categories||[''])[0]||'', cb=(b.categories||[''])[0]||'';
    return ca!==cb ? ca.localeCompare(cb,'ja') : parseDate(b.published)-parseDate(a.published);
  });
}

// ── Section header ───────────────────────────────────────────────
function sectionHeader(catName, count) {
  const m = CAT_META[catName] || {color:DEFAULT_CLR, icon:'📰'};
  return `<div class="section-header">
    <span class="section-icon">${m.icon}</span>
    <span class="section-name" style="color:${m.color}">${esc(catName)}</span>
    <span class="section-count">${count}件</span>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const filtered = filterArticles();
  const container = document.getElementById('articlesContainer');
  const empty = document.getElementById('emptyState');
  document.getElementById('visibleCount').textContent = filtered.length;

  if (!filtered.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    renderSidebar(filtered);
    return;
  }
  empty.style.display = 'none';

  if (state.sort==='cat' && state.cat==='all') {
    const groups = {};
    const ORDER = Object.keys(CAT_META);
    filtered.forEach(a => {
      const c = (a.categories||[])[0] || '未分類';
      (groups[c]=groups[c]||[]).push(a);
    });
    let html='';
    ORDER.forEach(c => {
      if (groups[c]?.length) html += sectionHeader(c,groups[c].length)+groups[c].map(buildCard).join('');
    });
    if (groups['未分類']?.length) html += sectionHeader('未分類',groups['未分類'].length)+groups['未分類'].map(buildCard).join('');
    container.innerHTML = html;
  } else {
    container.innerHTML = filtered.map(buildCard).join('');
  }

  renderSidebar(filtered);
}

// ── Sidebar render ───────────────────────────────────────────────
function renderSidebar(filtered) {
  const catCounts={}, srcCounts={};
  filtered.forEach(a => {
    (a.categories||[]).forEach(c=>{ catCounts[c]=(catCounts[c]||0)+1; });
    srcCounts[a.source]=(srcCounts[a.source]||0)+1;
  });

  // Categories
  const sidebarCats = document.getElementById('sidebarCats');
  let html = `<button class="sidebar-item ${state.cat==='all'?'active':''}" data-scat="all">
    <span class="sidebar-item-label">すべて</span>
    <span class="sidebar-count">${filtered.length}</span>
  </button>`;
  Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).forEach(([cat,cnt]) => {
    const m = CAT_META[cat]||{icon:'📰'};
    html += `<button class="sidebar-item ${state.cat===cat?'active':''}" data-scat="${esc(cat)}">
      <span class="sidebar-item-label">${m.icon} ${esc(cat)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarCats.innerHTML = html;

  // Sources
  const sidebarSrc = document.getElementById('sidebarSources');
  let srcHtml='';
  Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([src,cnt]) => {
    srcHtml += `<button class="sidebar-item" data-ssrc="${esc(src)}">
      <span class="sidebar-item-label" style="font-size:.8rem">${esc(src)}</span>
      <span class="sidebar-count">${cnt}</span>
    </button>`;
  });
  sidebarSrc.innerHTML = srcHtml;

  // Sidebar category click
  sidebarCats.querySelectorAll('[data-scat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.scat;
      document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
      const chip = document.querySelector(`.cat-chip[data-cat="${CSS.escape(btn.dataset.scat)}"]`);
      if (chip) chip.classList.add('active'); else {
        const allChip = document.querySelector('.cat-chip[data-cat="all"]');
        if (allChip) allChip.classList.add('active');
      }
      render();
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────
function init() {
  // Stats
  const newCnt = ARTICLES.filter(a=>a.is_new).length;
  document.getElementById('statTotal').textContent = ARTICLES.length;
  document.getElementById('statJa').textContent    = ARTICLES.filter(a=>a.lang==='ja').length;
  document.getElementById('statEn').textContent    = ARTICLES.filter(a=>a.lang==='en').length;
  document.getElementById('statNew').textContent   = newCnt;

  // Build category chips
  const wrap = document.getElementById('catChips');
  Object.entries(CAT_META).forEach(([name, m]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip';
    btn.dataset.cat = name;
    btn.textContent = m.icon + ' ' + name;
    wrap.appendChild(btn);
  });

  // Period tabs
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.period = btn.dataset.period;
      render();
    });
  });

  // Category chips
  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.cat-chip');
    if (!btn) return;
    document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.cat = btn.dataset.cat;
    render();
  });

  // New-only toggle
  const newToggle = document.getElementById('newToggle');
  newToggle.addEventListener('click', () => {
    state.newOnly = !state.newOnly;
    newToggle.classList.toggle('active', state.newOnly);
    newToggle.setAttribute('aria-pressed', String(state.newOnly));
    render();
  });

  // Controls
  document.getElementById('langFilter').addEventListener('change', e=>{ state.lang=e.target.value; render(); });
  document.getElementById('sortBy').addEventListener('change',     e=>{ state.sort=e.target.value; render(); });
  document.getElementById('searchInput').addEventListener('input', e=>{ state.search=e.target.value.trim(); render(); });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
