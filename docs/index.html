// ── Data ─────────────────────────────────────────────────────────
const ARTICLES = [{"title": "3-prong approach delivers modern model for integrated community care", "url": "https://www.mcknights.com/marketplace/marketplace-experts/3-prong-approach-delivers-modern-model-for-integrated-community-care/", "source": "McKnight's Long-Term Care News", "lang": "en", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-17 02:24", "description": "Hillview Health Care Center Campus in La Crosse County, WI, has been a community cornerstone of long-term care services for decades. However, over time the underutilized 120,000‑square‑foot facility faced building wear and tear, leading to rehabilitation needs and costly repairs. Additionally, there was a growing need within the campus for community-based memory care services as…", "content": "Hillview Health Care Center Campus in La Crosse County, WI, has been a community cornerstone of long-term care services for decades. However, over time the underutilized 120,000‑square‑foot facility faced building wear and tear, leading to rehabilitation needs and costly repairs.\nAdditionally, there was a growing need within the campus for community-based memory care services as a more suitable care setting for many existing residents.\nOutside of the facility, there were several unmet community needs, such as intergenerational daycare and supportive housing.\nInstead of pursuing separate construction projects to meet skilled nursing demand, behavioral health services, intergenerational programming and transitional housing, county leaders adopted an ambitious vision: Transform this single building into a fully integrated community hub.\nA program developed around community need\nThe right‑sizing of Hillview’s skilled nursing facility was the center point of the transformation. The redesign creates a more dignified and personalized care environment, a key aspect in modernizing the campus. The former 113 double‑occupancy room institutional model was being reimagined into 36 private rooms.\nIn addition to the SNF, the county’s renovation project establishes a 39‑bed Community‑Based Residential Facility (CBRF) known as The Evergreens, which contains a specialized four‑bed Crisis Stabilization Unit. Increasing behavioral health needs made this component a high priority.\nRather than simply creating additional rooms, the design team ensured that the CBRF spaces were purpose‑built — complete with a secure but calming environment, appropriate safety features, and layouts that support both resident autonomy and staff oversight.\nThe Intergenerational Day Center adds another profound layer. Designed for both children and adults, it includes dedicated outdoor spaces, its own safe entrance and flexible activity zones. These features allow children and older adults to relate naturally throughout the day, fostering shared enjoyment and connection.\nMeanwhile, the addition of ten supportive transitional housing apartments gives short‑term stability for individuals on a journey to independence, all with direct access to essential services within the same building.\nCollaboration as the base\nFulfilling a project of this scope required collaboration well beyond typical design and construction needs. County leadership, healthcare administrators, long‑term care committees, design teams, behavioral health partners, engineers, contractors and community organizations such as the YWCA all played pivotal roles. More than 150 design and coordination meetings were conducted to align expectations, refine the operational plan and resolve challenges.\nFrom the beginning, Hillview’s leaders emphasized that building decisions needed to follow operational needs. Facility assessments recognized which components could be revitalized, which required replacement, and which needed full revisioning. This reflective analysis ensured the renovated spaces fully and accurately supported the programs being delivered.\nNavigating regulatory requirements was another major challenge. The CBRF was obliged to meet new‑construction standards even though it was located inside an existing building. Consistent communication and close collaboration with state authorities, paired with creative design solutions, allowed the county to achieve compliance without conceding the integrity of the integrated vision.\nThe whole is greater than its parts\nThe power of the Hillview project lies in how its components work together. Intergenerational interactions enhance daily life for seniors offering uplifting moments and renewing purpose.\nOperational efficiencies have developed as staff, kitchens, therapy areas and maintenance services support multiple programs under one roof. Joint resources, from community rooms to courtyards, create a vibrant, activity‑filled environment. In many ways, Hillview functions as a little community within a larger one, where residents, families, day visitors and staff contribute to the cadence of daily life.\n“We recognized that long-term care was rapidly evolving, and many of our current customers were choosing more affordable, home-like care options that were not yet available on our campus,” says Kelly Kramer, Campus Administrator for the Hillview Health Care Campus. “The Evergreens allows us to meet that need and complete the full continuum of care on the Hillview Campus. By introducing The Evergreens and resizing our nursing home, we were able to staff both areas appropriately while also creating modern, comfortable, and home-like environments — enhancing the experience for both residents and employees.”\nA framework for the future\nThe Hillview Health Care Center redevelopment demonstrates what’s possible when innovation, collaboration and community needs line up. This complex project came to fruition because of strong leadership and a willingness to rethink long‑held assumptions about service delivery. It offers a three-prong model for other mission-driven organizations and counties: Design for the needs of today and tomorrow, reuse what you have, and foster partnerships that make transformative ideas possible.\nJulie Heiberger is a senior project architect and the senior living market leader at Hoffman Planning, Design & Construction, Inc. With more than 25 years of experience in the planning and design of senior living communities, Julie focuses on creating sustainable, resident-centered environments that support evolving care models and operational needs. Julie currently sits on the Board of Directors for the Society for the Advancement of Gerontological Environments (SAGE).\nJon Rynish is a senior project architect with Hoffman and a Leadership in Energy and Environmental Design (LEED) accredited professional. A graduate of the University of Wisconsin-Milwaukee with a Bachelor of Science in Architectural Studies, Jon has more than 15 years of experience in the design profession. He has collaborated on numerous senior care facility projects for a variety of clients, specifically those for religious congregations, county providers and non-profit senior living providers.\nTerry Ellenbecker is Hoffman’s director of field operations, who also serves as a senior project manager. With nearly 40 years of experience in the construction industry, Terry’s diverse project expertise includes senior living, corporate and professional, health care, and women’s religious facilities. A graduate of North Central Technical College with an Associate degree in Architectural Design, Terry serves as the conduit between Hoffman and the client to ensure they have a comprehensive facility upon completion.\nThe opinions expressed in McKnight’s Long-Term Care News guest submissions are the author’s and are not necessarily those of McKnight’s Long-Term Care News or its editors.\nHave a column idea? See our submission guidelines here.", "summary": "Hillview Health Care Center Campus in La Crosse County, WI, has been a community cornerstone of long-term care services for decades. Additionally, there was a growing need within the campus for community-based memory care services as a more suitable care setting for many existing residents. “We recognized that long-term care was rapidly evolving, and many of our current customers were choosing more affordable, home-like care options that were not yet available on our campus,” says Kelly Kramer, Campus Administrator for the Hillview Health Care Campus. “The Evergreens allows us to meet that need and complete the full continuum of care on the Hillview Campus.", "categories": ["施設運営・経営", "医療・健康"], "is_new": true, "title_ja": "3 つの側面からなるアプローチにより、地域統合ケアの最新モデルを実現", "summary_ja": "ウィスコンシン州ラクロス郡にあるヒルビュー ヘルス ケア センター キャンパスは、何十年にもわたって長期ケア サービスの地域社会の基盤となってきました。さらに、キャンパス内では、多くの既存居住者にとってより適切なケア環境として、地域ベースの記憶ケア サービスに対するニーズが高まっていました。ヒルビュー ヘルスケア キャンパスのキャンパス管理者であるケリー クレイマー氏は、「長期ケアが急速に進化しており、現在の顧客の多くが、まだキャンパスでは利用できない、より手頃な価格の家庭的なケアのオプションを選択していることを認識していました」と述べています。 「エバーグリーンのおかげで、そのニーズに応え、ヒルビュー キャンパスでの完全な継続的ケアを完了することができます。"}, {"title": "Examining Google DeepMind’s AI bioresilience push", "url": "https://www.artificialintelligence-news.com/news/examining-google-deepmind-ai-bioresilience-push/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-07-17 01:48", "description": "Google DeepMind and Isomorphic Labs outlined a bioresilience program to curb AI misuse in biology while aiding outbreak response. The two organisations published an update on a joint initiative that began quietly and has now built out more than 15 partnerships with government bodies, biosecurity organisations, and research groups over the past 12 months. The […] The post Examining Google DeepMind’s AI bioresilience push appeared first on AI News .", "content": "Google DeepMind and Isomorphic Labs outlined a bioresilience program to curb AI misuse in biology while aiding outbreak response.\nThe two organisations published an update on a joint initiative that began quietly and has now built out more than 15 partnerships with government bodies, biosecurity organisations, and research groups over the past 12 months.\nThe disclosure arrives with a specific framing problem attached. Frontier models such as Gemini carry an increasingly detailed grasp of biology, and DeepMind acknowledges that pairing these systems with specialised biology models, agents like its Antigravity platform, and third-party databases will only sharpen that capability further.\nHowever, the same knowledge that helps a researcher map a vaccine target could, in principle, help a threat actor close gaps in their own understanding. DeepMind and Isomorphic describe this as a dual mandate: enable the scientific advances frontier AI makes possible, while keeping those same tools out of the hands of people who’d misuse them.\nThe program sits on three pillars, according to the companies: preventing misuse, detecting outbreaks faster, and responding once an outbreak or attack is underway.\nThe 15-plus partnerships built over the last year touch all three, though the update gives limited detail on which organisations are involved beyond a handful of named collaborators, including Lawrence Livermore National Laboratory, the UK AI Security Institute, CEPI, and the Francis Crick Institute.\nDeepMind says it intends to widen these relationships over the next six to twelve months, with attention turning to threat intelligence, evaluation methods for AI agents, and jailbreak mitigations. It’s also coordinating with the Frontier Model Forum on questions such as how to handle riskier categories of training data, virology datasets being the example given.\nLocking down Gemini without blocking legitimate science\nThe prevention work rests on threat modelling designed to identify which actors are most likely to attempt misuse and what bottlenecks currently stop them. DeepMind says it uses a mix of expert red-teaming and randomised controlled trials to judge whether Gemini could help someone clear those bottlenecks.\nPost-training methods are meant to teach the model to refuse harmful queries while avoiding what the company calls over-refusal of legitimate science questions, a balance that’s proven difficult across the industry generally, not just for DeepMind. Classifiers and probes are deployed to flag risky activity in real time, and the company says it runs targeted log analysis to catch more subtle misuse patterns that automated filters might miss.\nNone of these mitigations is described as solved. DeepMind frames them as an ongoing process rather than a finished system, which matters for any enterprise or government body evaluating whether to rely on the safeguards as currently configured. A classifier tuned against known jailbreak patterns in a controlled evaluation doesn’t guarantee equivalent performance against novel attack methods surfacing in live use, and the company doesn’t claim otherwise.\nThe DNA synthesis screening problem\nOne of the more concrete risks under exploration involves DNA synthesis. Companies within the International Gene Synthesis Consortium currently screen orders against lists of known harmful pathogens and toxins, paired with screening algorithms. DeepMind states plainly that this approach is starting to fray, because AI can now help design DNA sequences with similar function to a dangerous pathogen without matching its sequence closely enough to trigger existing screens.\nThe proposed fix borrows from DeepMind’s existing watermarking system, SynthID, which the company says has become an industry standard for marking AI-generated images and text. Adapting it to biological sequences is presented as exploratory work, not a shipped product.\nA longer-term goal, described as an open technical challenge rather than something close to resolved, involves screening that predicts whether a novel DNA sequence is likely toxic or pathogenic based on its function, regardless of whether it resembles anything in existing databases.\nCheaper sequencing as the detection layer\nDetection depends on metagenomic sequencing, which characterises every microorganism in a sample rather than checking for a shortlist of known pathogens the way traditional diagnostics do. The limiting factor is cost, and scaling the approach to the regions where outbreaks are most likely to originate requires that cost to fall considerably.\nDeepMind points to a collaboration between Google and Pacific Biosciences that used its AlphaEvolve coding agent to improve sequencing accuracy as one data point toward that goal. The company says it’s now looking at further opportunities – from optimising the algorithms that process sequencing data, through to informing hardware design – and separately exploring whether AlphaGenome could help characterise pathogens directly from sequence data.\nThese remain research collaborations rather than field-deployed systems, and the distance between a sequencing accuracy gain in a controlled pipeline and a functioning early-warning network across wastewater and transit hubs in low-resource settings is not small.\nAlphaFold’s publication record and the countermeasure gap\nThe response pillar leans on the medical countermeasure gap that leaves many known pathogens without a licensed diagnostic, vaccine, or treatment. DeepMind cites more than 10,000 publications on infectious disease that have referenced AlphaFold over five years, covering work on tuberculosis and malaria transmission and target mapping for threats including Mpox and Nipah.\nThe newest addition to that record is a partnership with Lawrence Livermore’s bioresilience program, which plans to use AlphaFold 3 for broad-spectrum antibody design work, including a pan-filovirus antibody effort. DeepMind says it will keep adding protein structures and complexes to the AlphaFold Protein Structure Database this year, prioritising targets relevant to countermeasure development.\nAccess to newer agent systems, including Co-Scientist, is being extended to selected researchers, among them scientists in the US Department of Energy’s National Laboratories working under the Genesis Mission.\nIsomorphic Labs has gone a step further, setting up a dedicated unit intended to deploy its drug design engine quickly during a novel outbreak, working alongside government and national research bodies such as Lawrence Livermore, the UK AI Security Institute, CEPI, and the Francis Crick Institute. The company also pledged $7 million to Health for Human Potential, a Philanthropy Asia Alliance programme, for infectious disease research across Asia.\nDeepMind’s recommendations to US policymakers map directly onto its three pillars and lean on specific pending legislation:\n- On prevention, it backs a federal frontier AI safety framework, the AI-Ready Bio-Data Standards Act (H.R. 7907), mandatory DNA synthesis screening through the Biosecurity Modernization and Innovation Act (S. 3741), and the SCALE Biology Act (H.R. 8981).\n- On detection, it wants metagenomic sequencing expanded across transit hubs and dense population centres, supported by the America’s Living Library Act (S. 4023) and additional DARPA and HHS funding for early-warning research.\n- On response, it calls for the Web of Biological Data Act (H.R. 9307 / S. 4770) and investment in manufacturing capacity kept “warm-based” and ready for rapid activation, alongside pre-established clinical trial networks and faster regulatory pathways.\nNone of that legislation is enacted, and the gap between a company’s policy wishlist and a functioning federal biosecurity framework is where the real test of this program will play out over the next 6-12 months.\nSee also: Neko Health raises $700 million to expand AI body scans in the US\nWant to learn more about AI and big data from industry leaders? Check out AI & Big Data Expo taking place in Amsterdam, California, and London. The comprehensive event is part of TechEx and is co-located with other leading technology events including the Cyber Security & Cloud Expo. Click here for more information.\nAI News is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars here.", "summary": "Google DeepMind and Isomorphic Labs outlined a bioresilience program to curb AI misuse in biology while aiding outbreak response. The company says it’s now looking at further opportunities – from optimising the algorithms that process sequencing data, through to informing hardware design – and separately exploring whether AlphaGenome could help characterise pathogens directly from sequence data. 3741), and the SCALE Biology Act (H.R. - On response, it calls for the Web of Biological Data Act (H.R.", "categories": ["業務改善・介護テック", "メンタル・哲学"], "is_new": true, "title_ja": "Google DeepMind の AI バイオレジリエンス推進の検証", "summary_ja": "Google DeepMind と Isomorphic Labs は、アウトブレイクへの対応を支援しながら生物学における AI の悪用を抑制するためのバイオレジリエンス プログラムの概要を発表しました。同社は現在、配列データを処理するアルゴリズムの最適化からハードウェア設計の情報提供まで、さらなる機会を検討しており、AlphaGenome が配列データから直接病原体を特徴付けるのに役立つかどうかを個別に検討していると述べた。 3741)、および SCALE Biology Act (H.R. - これに応じて、Web of Biological Data Act (H.R."}, {"title": "‘It Made a Huge Difference’: Why Good Billing Drives Great Care", "url": "https://seniorhousingnews.com/2026/07/16/it-made-a-huge-difference-why-good-billing-drives-great-care/", "source": "Senior Housing News", "lang": "en", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-16 23:22", "description": "The call came on a Thursday, late in the month. A family member of a Traditions Management resident had an update about rent. “Don’t worry about pulling the ACH,” the family member said. “I will take care of this now.” The ability for family members to have more control over billing and payments through ALIS […] The post ‘It Made a Huge Difference’: Why Good Billing Drives Great Care appeared first on Senior Housing News .", "content": "The call came on a Thursday, late in the month. A family member of a Traditions Management resident had an update about rent.\n“Don’t worry about pulling the ACH,” the family member said. “I will take care of this now.”\nThe ability for family members to have more control over billing and payments through ALIS Pay has been a major benefit for the Carmel, Indiana-based Traditions, and not just for the bottom line. There is an emotional benefit for family members who know that they can take control of payments.\nAnd if the emotional benefit for families is strong, the benefit for residents is momentous. Because of Traditions’ work with ALIS Pay from ALIS, residents are increasingly involved in managing their own billing. The team at Traditions has seen the difference it makes for them.\n“You hear residents say, ‘I can’t even pick up my own laundry now,’ or that they’ve lost the ability to drive. That’s the big one,” says Kris Peters, Director of Revenue Cycle at Traditions Management. “So having that last bit of hold on the finances is a huge deal.”\nGiving residents and family members more control over billing is a business win. It’s also uniquely tied to the experience that residents have in senior living. Better billing is better care.\nHere’s why.\nBilling Without the Bottleneck: How Traditions Scaled with ALIS\nThe year was 2018, and Traditions was ready for the next phase of its business.\nThough the operator had just nine communities and was still working on QuickBooks, their growth was imminent, and they recognized that their current account software needed to be revisited.\n“We definitely needed to have more streamlined platforms in place, and ALIS was the one that we chose,” Peters says. “It definitely made a huge difference in how we bill at the end of the month — and throughout the month for that matter.”\nWhat ALIS Pay delivered for Traditions was an integrated payment system with zero friction. Payments such as rent go from each resident’s bank account through ALIS Pay and directly to the operator’s bank — or banks, as is so often the case. Operators using multiple banks across their portfolio often feel as if they just have one bank, because everything under ALIS runs seamlessly with no manual reconciliation required.\nOperators can use ALIS Pay to process ACH payments, credit card payments or physical checks. For residents, relevant payment information is pushed to ALIS Connect, the family engagement portal where residents and their loved ones can manage payments, communication and health information.\nFor Traditions, the billing experience under ALIS instantly improved, transforming a manual process into a streamlined technological one. The system automatically generates and distributes every invoice and helps Traditions ensure that they are capturing all revenue by care level.\nWith the integrated billing and care plans, operators can have data-backed conversations with families and can see if residents are being under- or over-billed for care plans. When communities use nurse-call systems, they can track planned vs. unplanned care more accurately.\nALIS Pay touches nearly every part of the Traditions operation. Their kitchen uses ALIS for billing on food and equipment deliveries. The clinical team uses ALIS for billing for care plans and ADLs. The sales department uses ALIS for billing room leases. In short, everyone at Traditions interacts with ALIS. The system creates consistency across Traditions’ entire portfolio, including with its REIT owners, who lean on ALIS for compliance.\n“We’re using ALIS to the fullest,” Peters says.\nInside the Numbers of Integrated Payments: How Traditions Gives Residents More Independence with ALIS\nThere’s a longstanding aphorism in senior living: Your biggest competitor isn’t another operator. It’s a prospect’s own lifelong home.\nWhen people prepare to move into a senior community, they are relinquishing control over their lives. That’s a big part of what makes so many Traditions residents go all-in on the ALIS system: they regain their control.\n“A lot of our seniors are very tech-savvy,” Peters says. “So to be able to go in and pay their invoices via ALIS Connect, that’s been a huge thing.”\nWhat ALIS has unlocked for Traditions is a better relationship between residents and their own families. The portal from ALIS gives residents and families what they want: control for residents, peace of mind for families. Peters recalls a resident who would always pay by check, but sometimes forgot to do so. Because she was set up on the ALIS portal with her family, she was covered.\n“When she wants to go in and make the payment, she can, but the kids are still involved,” Peters says. “They can still make sure that Mom is making those payments timely, and that Mom is not accidentally writing out a $10,000 check. She said that she was very excited about ALIS Connect. I know the families are as well.”\nThe data backs it up. In May of 2026, Kris and the staff at Traditions processed over 3,300 payments. A process that used to take 90 seconds per resident can now take 90 seconds per community — a huge time savings for back-office staff.\nThat kind of resident empowerment brings more than clean, efficient billing. It creates happy, satisfied residents. And it’s been part of the strategic planning at Traditions that helps the company succeed when taking over communities, such as one business case where occupancy rose over four years from 56% to 95%.\nIn the end, billing not only helps with the operations, but it helps families understand what’s going on and how that translates to the cost of care. With ALIS, everything fits together.\n“It saved so much time,” Peters says. “And it was accurate. Our billing process just changed dramatically.”\nThis Views article is sponsored by ALIS. To learn more, visit https://www.go-alis.com/.", "summary": "Because of Traditions’ work with ALIS Pay from ALIS, residents are increasingly involved in managing their own billing. In short, everyone at Traditions interacts with ALIS. “We’re using ALIS to the fullest,” Peters says. With ALIS, everything fits together.", "categories": ["施設運営・経営", "業務改善・介護テック"], "is_new": true, "title_ja": "「大きな違いを生んだ」: 適切な請求が優れたケアを促進する理由", "summary_ja": "Traditions と ALIS の ALIS Pay の連携により、住民はますます自分自身の請求管理に関与するようになりました。つまり、Traditions の全員が ALIS と対話します。 「私たちは ALIS を最大限に活用しています」と Peters 氏は言います。 ALIS を使用すると、すべてがうまくいきます。"}, {"title": "介護・福祉職員の退職金共済、厚労省が多くの論点　「1年で退職金」は廃止か　支給増大で曲がり角", "url": "https://www.joint-kaigo.com/articles/47469/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-16 19:38", "description": "介護や障害福祉、保育などを担う社会福祉法人の職員の退職金制度（退職手当共済制度）が、いま大きな曲がり角を迎えている。【Joint編集部】 厚生労働省は16日の検討会で、今後の見直しに向けて多岐にわたる論点を提示。支給額の […]", "content": "介護・福祉職員の退職金共済、厚労省が多くの論点 「1年で退職金」は廃止か 支給増大で曲がり角\n介護や障害福祉、保育などを担う社会福祉法人の職員の退職金制度（退職手当共済制度）が、いま大きな曲がり角を迎えている。【Joint編集部】\n厚生労働省は16日の検討会で、今後の見直しに向けて多岐にわたる論点を提示。支給額の急増に対応すべく、法人の負担軽減など制度の持続性を確保する方策を検討していく考えを示した。\nこれから2040年頃にかけて退職者の人数がピーク期に入るため、このままでは法人が支払う掛金の大幅な増加が避けられない ーー 。これが厳しい現実だ。\n足元では準備金の取り崩しなどでやりくりしているが、それも来年度末には底をつく見通し。2028年度以降を見据え、職員の退職金を守りつつ法人の経営悪化を防ぐ手立てを講じなければならない。\n厚労省は具体的な方策として、\n● 収支のバランスをとる期間（現行5年）の長期化\n● 毎年の掛金のバラツキ回避、引き上げ幅の一定化\n● 退職金を受け取れる最低勤続年数（現行1年）の延長\n● 退職直前の給与をもとに退職金を計算するルールの見直し\n● 退職金の計算に使う給与の上限（現行36万円）の引き上げ\nなどを俎上に載せる。この日の検討会では、多くの委員がこうした議論の方向性に理解を示した。\n退職金の支給額自体を引き下げることに対しては、「処遇改善、人材確保に逆行する」といった反対意見が根強い。できるだけ現行の支給水準を維持し、掛金の引き上げも抑制して法人が安定的に経営を続けられるよう、業界団体からは新たな公費の投入を求める声が上がっている。こうした要請がどこまで届くのか、財源のあり方も含めて今後の大きな焦点となる。\n厚労省は今秋に検討会の取りまとめを行う予定。それを審議会（社会保障審議会・福祉部会）に報告し、退職金制度の見直しに向けた協議を詰めていく計画だ。具体的な方策の内容によっては、法改正に至る可能性がある。", "summary": "介護・福祉職員の退職金共済、厚労省が多くの論点 「1年で退職金」は廃止か 支給増大で曲がり角\n介護や障害福祉、保育などを担う社会福祉法人の職員の退職金制度（退職手当共済制度）が、いま大きな曲がり角を迎えている。厚労省は具体的な方策として、\n● 収支のバランスをとる期間（現行5年）の長期化\n● 毎年の掛金のバラツキ回避、引き上げ幅の一定化\n● 退職金を受け取れる最低勤続年数（現行1年）の延長\n● 退職直前の給与をもとに退職金を計算するルールの見直し\n● 退職金の計算に使う給与の上限（現行36万円）の引き上げ\nなどを俎上に載せる。退職金の支給額自体を引き下げることに対しては、「処遇改善、人材確保に逆行する」といった反対意見が根強い。それを審議会（社会保障審議会・福祉部会）に報告し、退職金制度の見直しに向けた協議を詰めていく計画だ。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": true}, {"title": "Neko Health raises $700 million to expand AI body scans in the US", "url": "https://www.artificialintelligence-news.com/news/neko-health-700m-ai-body-scans-us/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-07-16 18:00", "description": "Neko Health has raised $700 million to expand its AI body scans in the United States, starting with a clinic in New York. The company’s preventive screening service combines medical imaging, blood tests, proprietary sensors, and clinician review. The Series C round was led by Lightspeed Venture Partners and co-led by O.G. Venture Partners. Existing […] The post Neko Health raises $700 million to expand AI body scans in the US appeared first on AI News .", "content": "Neko Health has raised $700 million to expand its AI body scans in the United States, starting with a clinic in New York. The company’s preventive screening service combines medical imaging, blood tests, proprietary sensors, and clinician review.\nThe Series C round was led by Lightspeed Venture Partners and co-led by O.G. Venture Partners. Existing investors Atomico, General Catalyst, and Lakestar participated, alongside new backers including Liberty City Ventures, Positive Sum, and BDT & MSD.\nDavid Ofer of O.G. Venture Partners will join Neko’s board, subject to regulatory approval.\nThe latest round brings Neko’s disclosed funding since 2023 to more than $1 billion. The company raised $65 million in a Series A round in 2023 and another $260 million in January 2025.\nThe round also included investments from Meta chief executive Mark Zuckerberg and Priscilla Chan, former tennis player Maria Sharapova, musician will.i.am, and former footballer Thierry Henry. Existing individual investors include Reddit co-founder Alexis Ohanian and actor Zoë Saldaña.\nHow Neko Health’s AI body scans work\nNeko operates clinics that combine full-body scans, blood tests, artificial intelligence, and custom-built medical equipment. The service screens customers for potential signs of conditions including skin cancer, cardiovascular disease, and diabetes.\nThe company describes the service as a 60-minute, non-invasive, and radiation-free health assessment. It uses proprietary sensors and blood analysis to examine skin conditions, blood abnormalities, pre-diabetes indicators, and risk factors associated with metabolic syndrome, stroke, and heart attack.\nThe scan also includes an electrocardiogram, arterial measurements, body-composition analysis, and more than 2,000 high-resolution images used to map a customer’s skin. Blood samples are processed at the clinic, allowing the results to be reviewed during the same visit.\nResults are discussed during an in-person consultation with a medical professional.\nMany of the measurements, including blood pressure, blood glucose, cholesterol, electrocardiogram data, and skin assessments, are already available through conventional healthcare services. Neko’s model combines them with proprietary imaging, automated data collection, on-site blood processing, and a clinician consultation in one appointment.\nThe company’s public clinical materials reviewed for this article do not include a comparative study showing whether this combined approach improves clinical outcomes or cost-effectiveness compared with established preventive-care pathways.\nNeko said the funding will support the opening of clinics in New York and other US cities. It has not identified the additional locations or provided a detailed expansion schedule.\nA waitlist for the New York clinic is open on the company’s website. Neko has not disclosed how much its US scans will cost.\nThe company currently operates eight clinics across the UK and Sweden, including two in Stockholm, one each in Manchester and Birmingham, and four in London: Marylebone, Spitalfields, Covent Garden, and Victoria.\nA scan costs £299 in the UK and 2,750 Swedish kronor in Sweden, equivalent to about $400 and $285.\nNeko said it has completed 100,000 scans since launching its service in 2023. More than 350,000 people have registered for a scan or joined its waitlists.\nAccording to the company, 75% of customers book and prepay for another scan at the end of their appointment.\nThe repeat-booking model allows clinicians to compare measurements and skin images over time. Public information reviewed for this article does not include evidence establishing whether annual screening is the appropriate interval for every age or risk group.\nFounded in 2018 by Spotify co-founder Daniel Ek and chief executive Hjalmar Nilsonne, Neko operated largely outside public view until launching its service in 2023.\nNilsonne said part of the new capital will fund further research and development into preventive screening technology.\nNeko recently added body-composition measurements and clinician reviews of wearable-device data across its clinics. It has also introduced updated versions of its Derma, Echo, and Spectrum medical devices, which collect information relating to skin, heart function, and circulation.\nThe company said the newer equipment captures a larger volume of health data and automates more parts of the scanning process. It plans to deploy the devices across its clinics in the coming months.\nThe clinic-based model requires proprietary equipment, blood-processing capacity, medical personnel, and specialist review for some findings. Neko said its seven-room Covent Garden clinic was designed to support tens of thousands of scans annually, but it has not disclosed capacity or staffing figures for its planned US locations.\nUS regulation and access\nFDA records show that two of Neko’s internally developed devices received clearance through the agency’s 510(k) pathway in May 2026. Derma-2 was cleared as an adjunctive telethermographic system, while Spectrum-2 was cleared as a tissue-saturation oximeter used in cardiovascular measurements.\nThe clearances apply to the specified devices and their intended uses, rather than to the complete Neko Health Scan as a single FDA-approved screening service.\nNeko describes its US clinics as preventive health and wellness providers rather than full-service medical practices. Its privacy notice advises customers to continue seeing their existing clinicians for diagnoses and treatment, including for conditions identified through a Neko scan.\nThe company says specialist clinicians, including dermatologists and cardiologists, review findings that require further examination. Follow-up appointments, referral letters, and introductions to outside specialists are included when recommended by a Neko clinician.\nNeko’s US clinics do not currently participate in health insurance plans, and the company says most of its services are not covered by a payer. Customers are therefore expected to pay directly for the initial assessment.\nThe company has not disclosed what customers would pay for diagnostic tests or treatment delivered by external healthcare providers. It has also not announced its US price or whether employers, insurers, or other organisations will subsidise access to the service.\nQuestions over clinical evidence\nPublicly available information reviewed for this article does not include a completed peer-reviewed study validating the full screening service. A study registered on ClinicalTrials.gov is evaluating the suitability of Neko’s multimodal skin-imaging technology for screening and diagnostic-support applications, including skin cancer and Raynaud’s phenomenon.\nThe trial remains an ongoing evaluation and does not establish the clinical performance of the complete Neko Health Scan.\nNeko’s public materials reviewed for this article do not disclose how often its scans produce false-positive findings, how many customers undergo additional procedures, or how many flagged abnormalities are later considered clinically unimportant.\nThe company’s US privacy notice identifies an AI dictation system used to summarise medical records, questionnaires, scan data, and clinical conversations, and to draft reports. Neko says clinicians review reports produced using the system.\nPublic information does not provide a complete breakdown of which scan measurements or classifications rely on AI, conventional software, or direct clinical assessment. It also does not state that AI independently diagnoses the conditions covered by the service.\nThe FDA clearances for individual devices do not establish the performance of every algorithm used to combine or interpret the resulting data. Public materials reviewed for this article do not include detailed real-world performance figures for each AI system used in the screening process.\nNeko’s reported health-outcome data is based on 1,469 customers who completed a second scan approximately one year after their first. The company said the group recorded improvements in blood pressure, cholesterol, and blood sugar, while body weight remained broadly stable.\nThe scans in the analysis were conducted at Neko’s Stockholm clinics. The company divided the results into a general group, a healthy group, and groups covering customers with hypertension, pre-diabetes, or diabetes.\nNeko said the analysis was not a scientific study and did not include a control group. Customers could have started treatment or changed their behaviour between appointments, so the figures do not establish that the scans caused the reported improvements.\nThe analysis only covered customers who returned for a second privately purchased scan. Neko did not publish demographic information showing how that group compares with its wider customer base or the general population.\nThe company did not disclose its valuation following the latest round. The Financial Times, citing unnamed sources, reported that Neko is now valued at about $7 billion.\n(Photo by Wonderlane)\nSee also: NHS AI blood test could reduce invasive womb cancer checks\nWant to learn more about AI and big data from industry leaders? Check out AI & Big Data Expo taking place in Amsterdam, California, and London. The comprehensive event is part of TechEx and is co-located with other leading technology events, click here for more information.\nAI News is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars here.", "summary": "How Neko Health’s AI body scans work\nNeko operates clinics that combine full-body scans, blood tests, artificial intelligence, and custom-built medical equipment. Neko has not disclosed how much its US scans will cost. Neko said it has completed 100,000 scans since launching its service in 2023. The scans in the analysis were conducted at Neko’s Stockholm clinics.", "categories": ["業務改善・介護テック", "医療・健康"], "is_new": true, "title_ja": "ネコヘルス、米国でAIボディスキャンを拡大するために7億ドルを調達", "summary_ja": "Neo Health の AI ボディスキャンの仕組み\nネコは、全身スキャン、血液検査、人工知能、特注の医療機器を組み合わせたクリニックを運営しています。ネコは米国でのスキャンにどれくらいの費用がかかるか明らかにしていない。ネコ社は、2023年にサービスを開始して以来、10万件のスキャンを完了したと述べた。分析におけるスキャンは、ストックホルムにあるネコ社のクリニックで実施された。"}, {"title": "処遇改善まだ実現せず　福祉専門職議連・田村会長「私たちの使命」 - 福祉新聞Web", "url": "https://fukushishimbun.com/seiji/45669", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-16 10:00", "description": "福祉の国家資格を持つ人を支える超党派の「地域共生社会推進に向けての福祉専門職支援議員連盟」（田村憲久会長）の総会が１日、参議院議員会館で開かれた。田村会長は「福祉職の処遇改善はまだ実現できていない。これは我々の大きなミッション（使命）だ」とあいさつした。 同日は４団体が要望を述べた。処遇改善について日本精神保健福祉士協会の洗成子常務理事は、精神保健福祉士の平均年収が約４０４万円（２０２０年調査）で、看護師やリハビリ専門職よりも低い現状を報告した。また、精神保健福祉士がメンタルヘルスに課題を抱えた人に、早い段階から関わることがその人の回復に寄与し、結果として社会保障費を抑えると説明。「処遇改善はコストではなく投資だ」と訴えた。 日本介護福祉士会は、介護施設での虐待や身体拘束をなくすために、介護福祉士を中心としたリーダーを配置するよう提案。その体制を組んだ施設を次期介護報酬改定で評価するよう求めた。 日本医療ソーシャルワーカー協会は医療機関における社会福祉士の必置を要望。日本社会福祉士会は改正社会福祉法に規定された「地域権利擁護相談支援センター」に、より多くの社会福祉士を配置するよう求めた", "content": "処遇改善まだ実現せず 福祉専門職議連・田村会長「私たちの使命」\n2026年07月16日 福祉新聞編集部福祉の国家資格を持つ人を支える超党派の「地域共生社会推進に向けての福祉専門職支援議員連盟」（田村憲久会長）の総会が１日、参議院議員会館で開かれた。田村会長は「福祉職の処遇改善はまだ実現できていない。これは我々の大きなミッション（使命）だ」とあいさつした。\n同日は４団体が要望を述べた。処遇改善について日本精神保健福祉士協会の洗成子常務理事は、精神保健福祉士の平均年収が約４０４万円（２０２０年調査）で、看護師やリハビリ専門職よりも低い現状を報告した。また、精神保健福祉士がメンタルヘルスに課題を抱えた人に、早い段階から関わることがその人の回復に寄与し、結果として社会保障費を抑えると説明。「処遇改善はコストではなく投資だ」と訴えた。\n日本介護福祉士会は、介護施設での虐待や身体拘束をなくすために、介護福祉士を中心としたリーダーを配置するよう提案。その体制を組んだ施設を次期介護報酬改定で評価するよう求めた。\n日本医療ソーシャルワーカー協会は医療機関における社会福祉士の必置を要望。日本社会福祉士会は改正社会福祉法に規定された「地域権利擁護相談支援センター」に、より多くの社会福祉士を配置するよう求めた。\n同議連は１９年６月に発足。災害時に社会福祉士、精神保健福祉士、介護福祉士が活躍できる環境づくりを発足当初から主導した。その結果、災害救助法に福祉サービスが位置付けられたと田村会長はみている。", "summary": "田村会長は「福祉職の処遇改善はまだ実現できていない。日本介護福祉士会は、介護施設での虐待や身体拘束をなくすために、介護福祉士を中心としたリーダーを配置するよう提案。日本社会福祉士会は改正社会福祉法に規定された「地域権利擁護相談支援センター」に、より多くの社会福祉士を配置するよう求めた。災害時に社会福祉士、精神保健福祉士、介護福祉士が活躍できる環境づくりを発足当初から主導した。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": true}, {"title": "Reducing risk, raising care: Smarter liability management in senior living", "url": "https://www.mcknightsseniorliving.com/home/columns/marketplace-columns/reducing-risk-raising-care-smarter-liability-management-in-senior-living/", "source": "McKnight's Senior Living", "lang": "en", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-16 08:00", "description": "Senior living communities face significant professional liability challenges, but many risks can be substantially reduced with structured processes, strong communication and consistent documentation.", "content": "Senior living communities face a uniquely complex professional liability landscape.\nResidents are older, often medically fragile, and may require varying levels of physical, emotional and cognitive support. At the same time, staffing shortages, increasing health needs and heightened regulatory expectations have created new pressures on operators.\nAgainst this backdrop, even highly capable and well‑run communities can experience elevated exposure to professional liability claims.\nYet many of the most significant risks can be meaningfully reduced with practical steps that strengthen clinical consistency, communication and resident-centered care.\nThe following best practices, which are based on insights from Liberty Mutual’s decades long experience helping healthcare companies mitigate and manage the complex risks they face, can help senior living leaders lower liability risk while enhancing the overall safety and experience of residents and their families.\nImprove accuracy and consistency of resident assessments\nThorough, accurate assessments at intake — and routine reassessments thereafter — are among the strongest defenses against liability risk. Care plans that do not accurately reflect a resident’s fall or elopement risk, cognitive status or need for assistance with activities of daily living can increase both incident probability and claim severity.\nCommunities can mitigate this risk by:\n- Creating person-centered care plans\n- Performing root cause analysis to prevent incident recurrence and tracking incidents through the quality committee.\n- Re-assessing after any significant change in condition or hospitalization\n- Embedding assessment reviews into shift‑change huddles and interdisciplinary team meetings\nWhen assessment processes are strong and consistent, communities can better anticipate resident needs, tailor care plans and reduce deviation from expected care pathways.\nEnhance falls prevention protocols\nFalls remain one of the top drivers of professional liability claims in senior living. They often involve residents with dementia, mobility limitations or changing health conditions — all factors that require community‑wide vigilance.\nEffective practices include:\n- Establishing individualized fall-prevention strategies based on assessment findings\n- Routinely checking that assistive devices, bed alarms and call lights are functioning\n- Using hourly rounding protocols with a focus on the “4 Ps”: pain, positioning, personal needs, and possessions\n- Implementing environmental controls such as adequate lighting, non-slip flooring and removing trip hazards such as decorative rugs and clutter-free hallways\nThe most successful programs are those that combine clinical judgment, technology, environmental safety and staff awareness.\nStrengthen medication management systems\nMedication errors — wrong dose, wrong time, missed dose or incorrect medication — are another leading cause of professional liability exposure. Errors can be costly and harmful and frequently are preventable.\nCommunities can reduce these risks by:\n- Increasing oversight and monitoring medication administration in accordance with community policies\n- Ensuring medication reconciliation is performed at each shift change with two nurses acknowledging\n- Training staff members in recognizing side effects and monitoring changes in condition\n- Establishing that residents are appropriately assessed for self-administration of medications\nEven small improvements in accuracy and consistency can significantly reduce risk.\nImprove communication with residents and families\nBreakdowns in communication are central elements in many liability claims, even when clinical care meets expectations. Families want transparency, timely updates and clear explanations, particularly when a resident’s condition changes.\nBest practices include:\n- Conducting routine family communication rounds and ensuring that family members are included in care plan conferences\n- Clarifying expectations during admission about services provided and those outside scope\n- Implementing a communication and resolution program to improve transparency and enhance service recovery when incidents occur\n- Implementing a protocol for post‑incident or grievance communication that is empathetic, factual and timely\nStrong communication builds trust, reduces misunderstandings and often prevents issues from escalating into formal claims.\nInvest in ongoing staff training and competency validation\nHigh turnover, staffing shortages and growing resident health needs make competency‑based training even more important. Liability risk increases when staff members are not fully trained on equipment, community policies or resident‑specific needs.\nAt a minimum, training should focus on:\n- Abuse prevention\n- Falls prevention\n- Dementia care and behavioral health\n- Safe transfers and mobility assistance\n- Medication management\n- De-escalation and communication skills\nAnnual competencies, refreshers after incidents and mentoring for new staff members all help ensure consistent care delivery.\nConclusion\nSenior living communities face significant professional liability challenges, but many risks can be substantially reduced with structured processes, strong communication and consistent documentation.\nInsurers can be active partners in helping a community identify all the risks it faces and the best ways to mitigate and manage those exposures. They can provide access to specialized resources — from consultants reviewing clinical protocols to safety professionals evaluating workplace safety — that help prevent the issues and accidents that often result in litigation.\nBy focusing on the practical strategies outlined above, community leaders not only can lower liability exposure but also strengthen clinical quality, staff confidence and resident outcomes.\nDennis Cook is president and chief underwriting officer, specialty healthcare, global risk solutions, for Liberty Mutual Insurance.\nThe opinions expressed in each McKnight’s Senior Living marketplace column are those of the author and are not necessarily those of McKnight’s Senior Living.\nHave a column idea? See our submission guidelines here.", "summary": "Senior living communities face a uniquely complex professional liability landscape. Enhance falls prevention protocols\nFalls remain one of the top drivers of professional liability claims in senior living. Improve communication with residents and families\nBreakdowns in communication are central elements in many liability claims, even when clinical care meets expectations. Liability risk increases when staff members are not fully trained on equipment, community policies or resident‑specific needs.", "categories": ["医療・健康", "施設運営・経営"], "is_new": true, "title_ja": "リスクの軽減とケアの向上: 高齢者の生活におけるより賢明な賠償責任管理", "summary_ja": "高齢者コミュニティは、独特で複雑な専門職責任の状況に直面しています。転倒予防プロトコルを強化する\n転倒は依然として、高齢者の生活における職業上の賠償請求の最大の要因の 1 つです。入居者様やご家族とのコミュニケーション向上\nたとえ臨床ケアが期待に応えていたとしても、コミュニケーションの破綻は多くの賠償請求の中心的な要素となります。スタッフが設備、地域の方針、または居住者固有のニーズについて十分な訓練を受けていない場合、法的責任のリスクが高まります。"}, {"title": "New Minnesota Law Lets Assisted Living Communities Have Happy Hours, Sans Liquor License", "url": "https://seniorhousingnews.com/2026/07/15/new-minnesota-law-lets-assisted-living-communities-have-happy-hours-sans-liquor-license/", "source": "Senior Housing News", "lang": "en", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-16 06:31", "description": "It’s not uncommon for senior living communities to seek out liquor licenses so staff can organize happy hours or other boozy events for residents. A new law in Minnesota just made that process easier for operators in the state. Minnesota Gov. Tim Walz on Tuesday signed a bill dubbed the “Grandparents’ Happy Hour,” into law. […] The post New Minnesota Law Lets Assisted Living Communities Have Happy Hours, Sans Liquor License appeared first on Senior Housing News .", "content": "It’s not uncommon for senior living communities to seek out liquor licenses so staff can organize happy hours or other boozy events for residents. A new law in Minnesota just made that process easier for operators in the state.\nMinnesota Gov. Tim Walz on Tuesday signed a bill dubbed the “Grandparents’ Happy Hour,” into law. The bill in a nutshell makes it easier for assisted living and skilled nursing operators to sling alcohol inside their four walls for events like resident happy hours. The law is due to take effect Aug. 1.\nThe law gives extra leeway for assisted living communities and other kinds of senior housing to serve residents and guests alcohol as long as they notify the state and adhere to certain rules. Notably, it lets those companies serve alcohol in certain contexts without a liquor license. The new provision was part of an omnibus liquor license bill that also loosened alcohol restrictions for certain kinds of attractions like museums, golf courses and community centers.\nAn Amira active adult community in Champlin, Minnesota, was the catalyst behind the bill’s signing into law. The community previously sought to host happy hours but learned that it could not legally serve it without a liquor license. But there wasn’t a liquor license that applied to a senior living community, leaving it without options. The new law is aimed at correcting that issue.\n“You have earned the right to make your own choices,” Gov. Walz said, according to CBS News. “Government can get out of the way, allow people to make their choices and do this right.”\nIn the last two decades years, senior living operators have expanded their dining options for residents to include everything from cocktail classes and beer brewing clubs to rooftop breweries and glitzy bar spaces. Happy hours, once not common in senior living, are now hosted in communities across the country. Today, senior living residents commonly gulp down beer, wine and cocktails like French 75s and gin rickeys, usually at a venue in their own community.\nSenior living operators are continually raising the bar for beverages served within their four walls. For example, Pacific Retirement Services overhauled a ground-floor restaurant at its Mirabella at ASU community into an upscale wine venue that won Wine Spectator’s Award of Excellence in 2024 and 2025.\nResidents don’t just desire boozy drinks. They also are quaffing tonics, Italian sodas and other non-alcohol concoctions while sitting at the bar. For example, Phoenix Senior Living created a line of no-alcohol drinks for memory care residents such as a “nojito” that reimagines the popular drink, sans rum.", "summary": "It’s not uncommon for senior living communities to seek out liquor licenses so staff can organize happy hours or other boozy events for residents. But there wasn’t a liquor license that applied to a senior living community, leaving it without options. Happy hours, once not common in senior living, are now hosted in communities across the country. Senior living operators are continually raising the bar for beverages served within their four walls.", "categories": ["施設運営・経営", "業務改善・介護テック"], "is_new": true, "title_ja": "ミネソタ州の新しい法律で、酒類販売免許がなくても、生活支援コミュニティがハッピーアワーを過ごせるようになった", "summary_ja": "高齢者向けコミュニティでは、スタッフが住民向けのハッピーアワーやその他の酒類イベントを企画できるよう、酒類販売業の免許を取得することは珍しくありません。しかし、高齢者コミュニティに適用される酒類販売免許は存在せず、選択肢がなかった。かつては高齢者の生活では一般的ではなかったハッピーアワーが、現在では全国のコミュニティで開催されています。シニア向け住宅事業者は、四方の壁内で提供される飲料の水準を継続的に引き上げています。"}, {"title": "ケアマネの再研修、廃止で大幅スリム化へ　厚労省　一部は復職後の受講も可に", "url": "https://www.joint-kaigo.com/articles/47458/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-15 22:04", "description": "厚生労働省は15日、ケアマネジャー資格の更新制の廃止に伴って既存の再研修を刷新する構想について、時間数を現行から大幅に削減する方針を明示した。【Joint編集部】 既存の再研修は廃止し、カリキュラムをスリム化したうえで作 […]", "content": "厚生労働省は15日、ケアマネジャー資格の更新制の廃止に伴って既存の再研修を刷新する構想について、時間数を現行から大幅に削減する方針を明示した。【Joint編集部】\n既存の再研修は廃止し、カリキュラムをスリム化したうえで作り直す。一部を復職後に受けられるようにすることも検討する。\n自治体の担当者に介護保険の重要施策を説明する会議（全国介護保険担当課長会議）で明らかにした。ケアマネジャーの確保、復職しやすい環境の整備が狙い。\n厚労省は新たな研修の目的を、離職後の制度の変更点など必要な知識のアップデートに特化させる。オンライン・オンデマンドの柔軟な受講を可能とし、「円滑な復職のための簡素な研修」とする考えだ。\n6月19日に成立した改正法をめぐる国会審議で、厚労省は現行の再研修の廃止に踏み切る意向を示していた。今後は関係団体や有識者の意見を踏まえて詳細を詰め、年内を目途に具体的な見直しの方向性を示す計画だ。", "summary": "厚生労働省は15日、ケアマネジャー資格の更新制の廃止に伴って既存の再研修を刷新する構想について、時間数を現行から大幅に削減する方針を明示した。【Joint編集部】\n既存の再研修は廃止し、カリキュラムをスリム化したうえで作り直す。一部を復職後に受けられるようにすることも検討する。6月19日に成立した改正法をめぐる国会審議で、厚労省は現行の再研修の廃止に踏み切る意向を示していた。", "categories": ["人材育成・HR", "介護保険・制度"], "is_new": false}, {"title": "ケアマネ新類型「登録施設介護支援」、既存の居宅は新規指定の手続き不要　厚労省が経過措置", "url": "https://www.joint-kaigo.com/articles/47447/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-15 19:53", "description": "住宅型有料老人ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」について、厚生労働省は、既存の居宅介護支援事業所が指定を円滑に受けられるように経過措置を設ける方針だ。【Joint編集部】 当面の間、居宅 […]", "content": "住宅型有料老人ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」について、厚生労働省は、既存の居宅介護支援事業所が指定を円滑に受けられるように経過措置を設ける方針だ。【Joint編集部】\n当面の間、居宅介護支援の指定を受けている事業所を「登録施設介護支援」の事業所とみなす取り扱いとする。既存の居宅介護支援事業所であれば、制度の施行からしばらくは新類型の新規指定を受けるための申請手続きは不要で、自動的に“2枚看板”となれる（例外規定もあり）。\n厚労省は15日、自治体の担当者に介護保険の重要施策を説明する会議（全国介護保険担当課長会議）でアナウンスした。\nこの「登録施設介護支援」は、6月19日に成立した改正法に基づいて創設されるケアマネジメントの新たなサービス類型。厚労省は改正法の附則に、既存の居宅介護支援事業所が住宅型ホームの入居者の支援を継続しやすいように、こうした経過措置の適用を盛り込んでいた経緯がある。\n居宅介護支援の指定が失効・取り消し、または効力停止となった事業所は、「登録施設介護支援」の指定も同様の取り扱いとなる。居宅介護支援としての指定がなく、新たに「登録施設介護支援」の新規指定を受ける事業所は申請手続きが必要だ。", "summary": "住宅型有料老人ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」について、厚生労働省は、既存の居宅介護支援事業所が指定を円滑に受けられるように経過措置を設ける方針だ。【Joint編集部】\n当面の間、居宅介護支援の指定を受けている事業所を「登録施設介護支援」の事業所とみなす取り扱いとする。居宅介護支援の指定が失効・取り消し、または効力停止となった事業所は、「登録施設介護支援」の指定も同様の取り扱いとなる。居宅介護支援としての指定がなく、新たに「登録施設介護支援」の新規指定を受ける事業所は申請手続きが必要だ。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "Nokia’s AI-RAN platform: a radio comeback that runs on NVIDIA", "url": "https://www.artificialintelligence-news.com/news/nokia-ai-ran-platform-nvidia/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-07-15 17:30", "description": "Nokia’s AI-RAN platform arrived on July 15 with a claim worth examining: that it is the industry’s first. The vendor says the platform, built on its anyRAN software and NVIDIA’s Aerial system, will let operators pull far more capacity from the spectrum they already own, and it has framed the launch as one of the most significant […] The post Nokia’s AI-RAN platform: a radio comeback that runs on NVIDIA appeared first on AI News .", "content": "Nokia’s AI-RAN platform arrived on July 15 with a claim worth examining: that it is the industry’s first. The vendor says the platform, built on its anyRAN software and NVIDIA’s Aerial system, will let operators pull far more capacity from the spectrum they already own, and it has framed the launch as one of the most significant shifts in radio architecture in decades.\nThe technical pitch is straightforward. Nokia says the platform has already shown more than 20% spectral efficiency gains, and it is targeting 50% by 2027 and more than 100% by 2028, the point at which, on its own projection, operators could roughly double the capacity of existing spectrum. Those last two figures are targets, not results, and Nokia’s own timeline puts pilots at the end of this year and commercial availability in 2027.\nOperators would buy the capability through a software subscription rather than a hardware refresh, choosing from three deployment options: a GPU-powered plug-in card for existing AirScale sites, a standalone AI-RAN node, and a cloud-server build delivered through partners.\nA comeback for Nokia’s weakest business\nTo read the launch only as a product story is to miss why it matters to Nokia. Radio has been chief executive Justin Hotard’s hardest problem since he took over in 2025. At Nokia’s November capital markets day, he told investors the mobile business had not delivered acceptable returns, and he folded it into a new Mobile Infrastructure segment alongside further cost cuts.\nThe NVIDIA partnership, announced in October 2025 with a $1 billion investment from the chipmaker for roughly a 3% stake, sits at the centre of that repair job. By building on NVIDIA’s silicon and CUDA software rather than its own custom chips, Nokia can cut a slice of costly in-house R&D and redirect it toward software, the shift Hotard has described as moving away from a legacy hardware model.\nInvestors have rewarded the story. Nokia shares have re-rated sharply through 2026 on the strength of its AI and cloud momentum, and the AI-RAN launch landed days before its second-quarter results. Omdia, whose analyst Rémy Pascal is quoted in Nokia’s own announcement, has put the cumulative AI-RAN opportunity above $200 billion by 2030. The direction of travel is real. The open question is how much of it Nokia can claim as a lead.\nIs the Nokia AI-RAN platform really the first?\nHere, the “industry’s first” label needs care. In June, Ericsson began selling a commercial AI-in-RAN software subscription that it says delivers up to 20% higher downlink throughput and up to 10% better spectral efficiency across more than 15 live deployments, and, crucially, it runs on operators’ existing baseband silicon, with no GPU required. On availability, Ericsson is already in the market.\nNokia’s claim to a first rests on a narrower definition: a GPU-accelerated AI-RAN platform, a different architecture from AI features layered onto existing hardware. Both statements can hold at once, which is exactly why the framing deserves scrutiny rather than a straight repeat.\nThe divergence, though, runs deeper than timing.\nNokia has tied its radio roadmap to NVIDIA, and its chief technology officer, Pallavi Mahajan, has acknowledged that at least some of the Layer 1 software is bound to the underlying hardware. Ericsson has taken the opposite route by design, keeping its AI features silicon-independent to avoid that dependency.\nNokia points to merchant silicon from Marvell in its wider ecosystem and describes the platform as Open RAN-compliant, but the performance case it is selling, those spectral efficiency gains, currently runs through NVIDIA’s stack, for which no equivalent alternative exists today. The openness in the messaging and the NVIDIA dependency in the engineering are both features of the same launch.\nNone of this makes the strategy wrong. Outsourcing the silicon race to the industry’s dominant AI-chip supplier is a defensible answer to a business Nokia had struggled to fix on its own, and the subscription model gives radio the recurring revenue its hardware cycles never did.\nBut the platform is not yet commercial, its headline efficiency numbers are still two years out, and at least one major rival reached the market first by a different road. For Nokia, this is a comeback in motion, not one already won, and its trajectory now runs, for better or worse, through NVIDIA.\nSee also: AI-Native networks are no longer a 6G promise–MWC 2026 just proved it\nWant to learn more about AI and big data from industry leaders? Check out AI & Big Data Expo taking place in Amsterdam, California, and London. The comprehensive event is part of TechEx and is co-located with other leading technology events including the Cyber Security & Cloud Expo. Click here for more information.\nAI News is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars here.", "summary": "Nokia’s AI-RAN platform arrived on July 15 with a claim worth examining: that it is the industry’s first. A comeback for Nokia’s weakest business\nTo read the launch only as a product story is to miss why it matters to Nokia. Is the Nokia AI-RAN platform really the first?. Nokia’s claim to a first rests on a narrower definition: a GPU-accelerated AI-RAN platform, a different architecture from AI features layered onto existing hardware.", "categories": ["業務改善・介護テック"], "is_new": false, "title_ja": "Nokia の AI-RAN プラットフォーム: NVIDIA 上で動作するラジオの復活", "summary_ja": "Nokia の AI-RAN プラットフォームは、業界初であるという検討に値する主張とともに 7 月 15 日に発表されました。ノキアの最も弱いビジネスの復活\nこの発表を製品のストーリーとしてのみ理解すると、それが Nokia にとって重要な理由を見逃してしまいます。 Nokia AI-RAN プラットフォームは本当に最初のものですか? Nokia の最初の主張は、より狭い定義に基づいています。つまり、GPU で高速化された AI-RAN プラットフォームであり、既存のハードウェアに重ねられた AI 機能とは異なるアーキテクチャです。"}, {"title": "進む要介護者の単身化、3割超が1人暮らし　75歳以上の「老老介護」も増加　厚労省調査", "url": "https://www.joint-kaigo.com/articles/47435/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-15 14:14", "description": "厚生労働省は15日、昨年（2025年）の「国民生活基礎調査」の結果を新たに公表した。【Joint編集部】 在宅で生活する要支援者・要介護者がいる世帯のうち、1人暮らしの「単独世帯」が33.2%に増加した。 また、75歳以 […]", "content": "2026年7月15日\n進む要介護者の単身化、3割超が1人暮らし 75歳以上の「老老介護」も増加 厚労省調査\n厚生労働省は15日、昨年（2025年）の「国民生活基礎調査」の結果を新たに公表した。【Joint編集部】\n在宅で生活する要支援者・要介護者がいる世帯のうち、1人暮らしの「単独世帯」が33.2%に増加した。\nまた、75歳以上の高齢者同士で支え合う「老老介護」の割合も37.1%に上昇した。今後、地域の介護サービスや生活支援サービスのニーズが一段と拡大しそうだ。\n要介護者らがいる世帯の構造をみると、最多は「核家族世帯」の40.2%。次いで「単独世帯」が33.2%、「3世代世帯」が9.0%だった。「3世代世帯」が減少の一途をたどる一方で、1人暮らしの要介護者らは着実に増え続けている。\n要介護者らと同居する主な介護者の年齢をみると、両者がともに65歳以上のケースは61.9%、75歳以上のケースは37.1%となっていた。\n団塊の世代が75歳を超えるなど、高齢化の進展が最大の要因。要介護者らの単身化や老老介護の深化は、介護サービスを前線で支えるホームヘルパーやケアマネジャーなどの負担増にもつながる動きで、在宅の支援体制の強化が急務となっている。", "summary": "【Joint編集部】\n在宅で生活する要支援者・要介護者がいる世帯のうち、1人暮らしの「単独世帯」が33.2%に増加した。要介護者らがいる世帯の構造をみると、最多は「核家族世帯」の40.2%。次いで「単独世帯」が33.2%、「3世代世帯」が9.0%だった。要介護者らと同居する主な介護者の年齢をみると、両者がともに65歳以上のケースは61.9%、75歳以上のケースは37.1%となっていた。", "categories": ["介護保険・制度", "福祉・社会保障"], "is_new": false}, {"title": "静岡で保育のお仕事フェア　就職後のミスマッチ防ぐ機会に - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45666", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-15 10:00", "description": "静岡県と県社会福祉協議会は４日、静岡市の常葉大で「保育のお仕事フェア」を開催した。保育所や認定こども園、児童養護施設などを運営する５０法人が出展。学生ら２６０人が訪れ、職員の話に耳を傾けた。 催しでは最初に法人による１分間のプレゼンテーションの時間を設けた。そろいのＴシャツを着た若手職員らが壇上で、研修制度や福利厚生など法人の特徴をアピール。その後の個別相談会では、学生らが各法人のブースを１５分ずつ最大５カ所回った。 出展した社会福祉法人聖隷福祉事業団は保育所や認定こども園を１０カ所運営しており、毎年保育職だけで約２０人を採用している。今回７人の学生がブースを訪れた。同法人人事企画部の安間聖課長補佐は「結婚後に別地域の保育所へ異動でき、発達支援などにも関われるのが法人の強み。今後園の見学などにつながってくれれば」と話した。 催しは県社協のしずおか保育士・保育所支援センターが毎年企画しており、養成校を会場とした開催は今回で３回目。参加者は増加傾向にあることから約１００法人が出展を希望したが、会場の都合で半数を断った。 県社協の阪本真由美さんは「お祭りのような楽しい雰囲気の中で、学生に保育", "content": "静岡で保育のお仕事フェア 就職後のミスマッチ防ぐ機会に\n2026年07月15日 福祉新聞編集部静岡県と県社会福祉協議会は４日、静岡市の常葉大で「保育のお仕事フェア」を開催した。保育所や認定こども園、児童養護施設などを運営する５０法人が出展。学生ら２６０人が訪れ、職員の話に耳を傾けた。\n催しでは最初に法人による１分間のプレゼンテーションの時間を設けた。そろいのＴシャツを着た若手職員らが壇上で、研修制度や福利厚生など法人の特徴をアピール。その後の個別相談会では、学生らが各法人のブースを１５分ずつ最大５カ所回った。\n出展した社会福祉法人聖隷福祉事業団は保育所や認定こども園を１０カ所運営しており、毎年保育職だけで約２０人を採用している。今回７人の学生がブースを訪れた。同法人人事企画部の安間聖課長補佐は「結婚後に別地域の保育所へ異動でき、発達支援などにも関われるのが法人の強み。今後園の見学などにつながってくれれば」と話した。\n催しは県社協のしずおか保育士・保育所支援センターが毎年企画しており、養成校を会場とした開催は今回で３回目。参加者は増加傾向にあることから約１００法人が出展を希望したが、会場の都合で半数を断った。\n県社協の阪本真由美さんは「お祭りのような楽しい雰囲気の中で、学生に保育の仕事の魅力を知ってもらうのが狙い。法人に対しても他法人の様子を知り、意識改革につながる機会になれば」と話す。\n常葉大の鈴木久美子教授によると、就職活動で福利厚生などを重視する学生は少なくないが、実際は保育観を語れる園が支持される傾向にあるという。鈴木教授は「さまざまな保育所と出会うことで、仮に就職後にミスマッチがあっても他業界ではなく、再び保育業界で働いてもらえれば」と期待を寄せた。", "summary": "静岡で保育のお仕事フェア 就職後のミスマッチ防ぐ機会に\n2026年07月15日 福祉新聞編集部静岡県と県社会福祉協議会は４日、静岡市の常葉大で「保育のお仕事フェア」を開催した。保育所や認定こども園、児童養護施設などを運営する５０法人が出展。出展した社会福祉法人聖隷福祉事業団は保育所や認定こども園を１０カ所運営しており、毎年保育職だけで約２０人を採用している。法人に対しても他法人の様子を知り、意識改革につながる機会になれば」と話す。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "老健の初期加算（Ⅰ）、受け入れ元の対象病棟の範囲を明確化　厚労省　介護報酬改定Q&A発出", "url": "https://www.joint-kaigo.com/articles/47407/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-14 18:38", "description": "厚生労働省は14日、2024年度の介護報酬改定を解説するQ&Aの第18弾を発出した。【Joint編集部】 介護老人保健施設の「初期加算（Ⅰ）」について、受け入れ元の対象となる病棟の範囲を明確化した。介護保険最新情 […]", "content": "2026年7月14日\n老健の初期加算（Ⅰ）、受け入れ元の対象病棟の範囲を明確化 厚労省 介護報酬改定Q&A発出\n厚生労働省は14日、2024年度の介護報酬改定を解説するQ&Aの第18弾を発出した。【Joint編集部】\n介護老人保健施設の「初期加算（Ⅰ）」について、受け入れ元の対象となる病棟の範囲を明確化した。介護保険最新情報Vol.1524で現場の関係者に広く周知している。\n老健の「初期加算（Ⅰ）」は、2024年度の介護報酬改定で新たに設けられた上位区分。高齢者のADL低下などを防ぐ目的で、急性期の医療機関からの早期受け入れ（入院後30日以内）を60単位／日で評価するインセンティブだ。\nその算定要件では、入所者の受け入れ元が「急性期医療を担う医療機関の一般病棟」と定められている。厚労省は今回、今年度の診療報酬改定で新設された「急性期病院一般入院基本料」を算定する病棟も、これに含まれるとの解釈を明示した。\n今回のQ&Aではこのほか、訪問リハビリテーションの「診療未実施減算」について、要件となる医師の研修の取り扱いなどが解説されている。", "summary": "2026年7月14日\n老健の初期加算（Ⅰ）、受け入れ元の対象病棟の範囲を明確化 厚労省 介護報酬改定Q&A発出\n厚生労働省は14日、2024年度の介護報酬改定を解説するQ&Aの第18弾を発出した。【Joint編集部】\n介護老人保健施設の「初期加算（Ⅰ）」について、受け入れ元の対象となる病棟の範囲を明確化した。老健の「初期加算（Ⅰ）」は、2024年度の介護報酬改定で新たに設けられた上位区分。その算定要件では、入所者の受け入れ元が「急性期医療を担う医療機関の一般病棟」と定められている。", "categories": ["介護保険・制度", "施設運営・経営"], "is_new": false}, {"title": "介護施設の協力医療機関連携加算、会議頻度の運用ルール明示　厚労省がQ&A", "url": "https://www.joint-kaigo.com/articles/47392/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-14 11:48", "description": "厚生労働省は13日、介護施設などの「協力医療機関連携加算」に関する新たなQ&Aを公表した。【Joint編集部】 今年6月に緩和された協力医療機関との定期的な会議の開催頻度について、新規算定時や翌年度以降の具体的な […]", "content": "厚生労働省は13日、介護施設などの「協力医療機関連携加算」に関する新たなQ&Aを公表した。【Joint編集部】\n今年6月に緩和された協力医療機関との定期的な会議の開催頻度について、新規算定時や翌年度以降の具体的な運用ルールを明らかにした。介護保険最新情報Vol.1523で現場の関係者に広く周知した。\n厚労省はQ&Aで、「協力医療機関連携加算」の算定を新たに始める場合の取り扱いを説明。算定を始めた月から1年以内に、施設の体制など要件に応じた回数（＊）の会議が予定されていればよいと明記した。\n＊ 年3回以上、または年1回以上。\nあわせて、翌年度以降も継続して算定していく場合は、要件に応じた回数を年度ごとに開催していくよう求めた。\n「協力医療機関連携加算」は、2024年度の介護報酬改定で新設されたインセンティブ。その名の通り介護施設と医療機関の連携を後押しする仕掛けだが、会議を開催する負担が大きいといった声が現場の関係者からあがっていた経緯がある。\nこのため、厚労省は今年6月の算定分から、従来の「月1回以上」という開催頻度の要件を原則「年3回以上」へ変更。ICTの活用など必要な条件を満たせば、「年1回以上」の運用も認める大幅な緩和に踏み切っていた。", "summary": "厚生労働省は13日、介護施設などの「協力医療機関連携加算」に関する新たなQ&Aを公表した。厚労省はQ&Aで、「協力医療機関連携加算」の算定を新たに始める場合の取り扱いを説明。＊ 年3回以上、または年1回以上。「協力医療機関連携加算」は、2024年度の介護報酬改定で新設されたインセンティブ。", "categories": ["施設運営・経営", "医療・健康"], "is_new": false}, {"title": "大分の旧宿場町に農家レストランなど　福祉の力でにぎわい戻る〈博愛会〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45663", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-07-14 10:00", "description": "大分市の社会福祉法人博愛会（釘宮卓司理事長）は旧宿場町・久住宿にある空き家を改修し、４月に障害者と高齢者が働く農家レストラン「山田や」（就労継続支援Ｂ型）と甘味処「白丹屋」を開設した。過疎化で廃れていた久住町に福祉の力で新たな拠点を生み出し、かつてのにぎわいを取り戻している。 久住宿は江戸時代に豊後鶴崎（大分）と肥後熊本を結ぶ肥後街道の要衝として栄えたが、現在はその面影は薄れ、高齢化や人口減少が進んでいる。 そこで博愛会は「福祉は支えられるだけでなく、街を動かす力になる」と拠点整備に着手。国土交通省の補助金を受け、空き家を総工費約１億４０００万円かけて、おしゃれで人が集まりたくなる造りに改修した。 山田やは、障害者が作った米、地元の旬の野菜などを使い、定食など約１４種類のメニューを提供。地元のおばあちゃんが味付けするおばんざいは食べ放題だ。白丹屋は、街の造り酒屋の酒粕を使った酒まんじゅうと、地元で有名な大嶋キヌエさん（８７）の料理法を継承したぼたもちを提供している。 白丹屋には併設して無料で過ごせる「茶論自由堂」があり、こどもたちが集まったり、コワーキングスペースとして利用されたりして", "content": "大分の旧宿場町に農家レストランなど 福祉の力でにぎわい戻る〈博愛会〉\n2026年07月14日 福祉新聞編集部大分市の社会福祉法人博愛会（釘宮卓司理事長）は旧宿場町・久住宿にある空き家を改修し、４月に障害者と高齢者が働く農家レストラン「山田や」（就労継続支援Ｂ型）と甘味処「白丹屋」を開設した。過疎化で廃れていた久住町に福祉の力で新たな拠点を生み出し、かつてのにぎわいを取り戻している。\n久住宿は江戸時代に豊後鶴崎（大分）と肥後熊本を結ぶ肥後街道の要衝として栄えたが、現在はその面影は薄れ、高齢化や人口減少が進んでいる。\nそこで博愛会は「福祉は支えられるだけでなく、街を動かす力になる」と拠点整備に着手。国土交通省の補助金を受け、空き家を総工費約１億４０００万円かけて、おしゃれで人が集まりたくなる造りに改修した。\n山田やは、障害者が作った米、地元の旬の野菜などを使い、定食など約１４種類のメニューを提供。地元のおばあちゃんが味付けするおばんざいは食べ放題だ。白丹屋は、街の造り酒屋の酒粕を使った酒まんじゅうと、地元で有名な大嶋キヌエさん（８７）の料理法を継承したぼたもちを提供している。\n白丹屋には併設して無料で過ごせる「茶論自由堂」があり、こどもたちが集まったり、コワーキングスペースとして利用されたりしている。さらに駐車場、トイレも自由に利用できるため、観光客が立ち寄るなど、誰でも使える開かれた場所としてさまざまな交流が生まれている。\n開設から約３カ月。おばあちゃんの昔ながらの味付けと、おしゃれな造りなどが口コミで広がり、休日は２５０人近い人が訪れ、約２５万円の売り上げがある。\nここで働く障害者６人と８４～９２歳の高齢者６人は世代を超えて交わり、新たな働きがいにもつながっている。\n住民からも応援する声が届いており、釘宮謙悟副理事長は「町ににぎわいが戻ってきた。自法人だけではなく、地域全体が盛り上がってくれれば」と話している。", "summary": "大分の旧宿場町に農家レストランなど 福祉の力でにぎわい戻る〈博愛会〉\n2026年07月14日 福祉新聞編集部大分市の社会福祉法人博愛会（釘宮卓司理事長）は旧宿場町・久住宿にある空き家を改修し、４月に障害者と高齢者が働く農家レストラン「山田や」（就労継続支援Ｂ型）と甘味処「白丹屋」を開設した。過疎化で廃れていた久住町に福祉の力で新たな拠点を生み出し、かつてのにぎわいを取り戻している。白丹屋には併設して無料で過ごせる「茶論自由堂」があり、こどもたちが集まったり、コワーキングスペースとして利用されたりしている。自法人だけではなく、地域全体が盛り上がってくれれば」と話している。", "categories": ["福祉・社会保障"], "is_new": false}, {"title": "厚労省、障害者の「意思決定支援ガイドライン」を改訂へ　審議会で第2版案を提示", "url": "https://www.joint-kaigo.com/articles/47377/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-07-13 18:12", "description": "厚生労働省は10日の審議会（社会保障審議会・障害者部会）で、障害福祉サービスの提供にあたっての「意思決定支援ガイドライン」の改訂案（第2版案）を提示した。2017年の策定以来、およそ9年ぶりの見直しとなる。【Joint編 […]", "content": "厚生労働省は10日の審議会（社会保障審議会・障害者部会）で、障害福祉サービスの提供にあたっての「意思決定支援ガイドライン」の改訂案（第2版案）を提示した。2017年の策定以来、およそ9年ぶりの見直しとなる。【Joint編集部】\n改訂の契機の1つになったのは、国連の「障害者権利委員会」が2022年に出した総括所見だ。従来のガイドラインで使われていた「本人の最善の利益」という表現に対し、支援者が本人に代わって不適切な判断を下す代行決定につながる恐れがあるとの懸念が示されていた。\n厚労省はこれを踏まえ、今回の改訂案で「本人の最善の利益」に関する記載を削除。国連が提唱する「意思と選好に基づく最善の解釈」という概念に基づき、本人主体の理念を明示しながら意思決定支援を再定義した。\nまた、どのような障害があっても「本人に意思決定の能力があること」を前提とする姿勢を掲げたほか、意思決定支援のプロセスを「意思形成」「意思表明」「意思実現」の3段階で明確化した。障害特性に応じた合理的配慮や情報アクセシビリティ、ICTツールの活用に関する記載も新たに盛り込んだ。\n会合では委員から、ガイドラインの表現の平易化・精緻化や研修を通じた現場への浸透などを求める声が相次いだ。厚労省は今後、委員の意見を踏まえてガイドラインの内容、正式発出に向けた進め方などをさらに検討する意向を示した。", "summary": "厚生労働省は10日の審議会（社会保障審議会・障害者部会）で、障害福祉サービスの提供にあたっての「意思決定支援ガイドライン」の改訂案（第2版案）を提示した。厚労省はこれを踏まえ、今回の改訂案で「本人の最善の利益」に関する記載を削除。国連が提唱する「意思と選好に基づく最善の解釈」という概念に基づき、本人主体の理念を明示しながら意思決定支援を再定義した。また、どのような障害があっても「本人に意思決定の能力があること」を前提とする姿勢を掲げたほか、意思決定支援の
