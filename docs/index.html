準備について", "url": "https://www.joint-kaigo.com/articles/46938/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-25 12:05", "description": "日本版DBSともいわれるこども性暴力防止法。障害福祉、特に障害児福祉の現場では影響が大きい。このため、こども家庭庁参事官の吉田昌司氏から法律が制定された背景や概要、障害福祉の現場への影響、事業者が準備すべきことなどについ […]", "content": "日本版DBSともいわれるこども性暴力防止法。障害福祉、特に障害児福祉の現場では影響が大きい。このため、こども家庭庁参事官の吉田昌司氏から法律が制定された背景や概要、障害福祉の現場への影響、事業者が準備すべきことなどについて寄稿していただいた。今回は連載企画の2回目！\n■ 連載企画1回目の記事はこちら↓\n【日本版DBS】こども性暴力防止法、児発や放デイなど障害福祉の現場も義務・施行に向けて準備を\n文：こども家庭庁 支援局 参事官 こども性暴力防止担当 吉田昌司\n今年12月25日に施行するこども性暴力防止法は、こどもに対する性暴力のない社会の実現に向けた取り組みを進める、重要な一歩です。\n一方、主に教育・保育の現場に取り組みを求めるものであり、一定の事務負担があるところ。こども家庭庁としては、できるだけオンラインで手続きを完結させるなど工夫をしていますが、それを前提に、事業者の方々に手続き等の対応をしていただくこととなります。特に義務対象の事業者は、施行前の今のタイミングから準備を進めていただく必要があります。\n事業者向けチェックリスト（こども性暴力防止法の施行までに必要な対応）\n今回は、イギリスが先進的に取り組んできたDBS制度になぞらえて、「日本版DBS」と呼ばれている、再犯防止対策としての犯罪事実確認の内容とそれに関する手続き、事前にご準備いただきたい事項をご説明します。\n◆ 犯罪事実確認\n事業者は、こどもと接する業務の従事者について、雇入れや配置転換の際、過去の性犯罪歴の確認が必要となります。ここでいう性犯罪としては、不同意性交、盗撮、児童ポルノの所持、痴漢などが含まれます。小児に対する犯罪だけでなく、成人に対するものも含まれます。\n確認の対象は、管理者、児童指導員など報酬算定の対象として法令上規定されている職員については、一律対象です。正職員だけでなく、アルバイトやパートも含みます。また、事務職員、送迎バスの運転手など、こどもと接するかどうか、現場ごとに異なる職種は、業務実態を踏まえて、事業者が判断します。\nおおまかな流れは以下のとおりです。\n1）事業者からこども家庭庁に、従事者の性犯罪歴のチェック依頼をしてもらう。\n2）戸籍情報は従事者からこども家庭庁に対して提出してもらう。\n3）こども家庭庁から法務省に確認をします。\n4）法務省からこども家庭庁に回答がきます。\n5）返答された結果を踏まえ、こども家庭庁から事業者に対して、性犯罪歴の有無（「ある」「なし」）を回答します。特に犯歴がある場合には、事業者への連絡の前に、まずは従事者本人に回答内容を通知。従事者は事実と異なる場合は、訂正の要求が可能です。その後、事業者に回答をします。\nこのような手続きを経て、万が一、性犯罪歴がある場合には、その従事者がこどもと接することがないようにする（防止措置）ことが求められます。\n◆ 必要な対応\n実際の確認等の手続きは、基本的には、法の施行（12月25日）後、専用システム（こまもろうシステム）を通じて行いますが、現時点から事業者には以下の対応をお願いします。\nまず、従事者等への周知です。こどもへの性暴力をなくすために、まずは、こども性暴力防止法が施行されること、その中では従事者の方が、犯罪事実確認の対象となることについて、一人ひとりの方に理解していただくことが必要です。\n特に、犯罪事実確認の中で、従事者には、従事者アカウントを作成し、戸籍を提出してもらう必要があるため、この点はあらかじめ丁寧な説明をお願いします。なお、基本的には戸籍はマイナンバーカードを活用して取得いただくことを想定しています。\n次に、募集要項や就業規則の見直しなどです。内定者に犯罪事実確認を行い、性犯罪歴があることが分かった場合、性暴力のおそれがあるとの判断の下、内定取消しなどの対応（防止措置）をとる必要があります。\n内定取消しが有効と認められるためには、採用過程で性犯罪歴がないことを書面等で確認したり、内定取消事由をあらかじめ明示すること等の事前の確認・対応が必要となります。このため、募集要項・求人票の参考例などもお示ししており、これも活用しながら適切な対応をお願いします。\n募集要項・求人票参考例（Word／48KB）\n誓約書・内定通知書参考例（Word／41KB）\n就業規則参考例（Word／60KB）\n最後に、犯罪事実確認を進めるためには、専用システムへ事業者情報の登録が必要です。指定放課後等デイサービスや児童発達支援などの義務対象事業者については、本システムのアカウント登録をこども家庭庁で一括で行うこととしており（まとめ登録）、事業者情報を所轄庁（都道府県等）に登録することが必要です。\n例えば、都道府県がとりまとめ担当である障害児関係は、とりまとめ担当からこども家庭庁への提出期限を7月31日としていますので、事業者におかれてはそれ以前の定められた期限内の登録を必ずお願いします。\nここまで事業者に今から取り組んでいただきたい事項を整理してきました。一つひとつ動画などを確認しながら、取り組みを進めていただきたいと考えます。\n次回は、性暴力を日ごろから防止するために事業者に準備いただきたい事項を説明していきたいと思います。", "summary": "1）事業者からこども家庭庁に、従事者の性犯罪歴のチェック依頼をしてもらう。2）戸籍情報は従事者からこども家庭庁に対して提出してもらう。3）こども家庭庁から法務省に確認をします。4）法務省からこども家庭庁に回答がきます。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "済生会川口乳児院が建て替え完了　資材高騰でクラウドファンディングも活用 - 福祉新聞Web", "url": "https://fukushishimbun.com/yoiku/45578", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-25 10:00", "description": "社会福祉法人恩賜財団済生会の済生会川口乳児院（八木橋克美施設長、埼玉県川口市）の建て替えが完了し、８日に関係者を招いて落成式が開かれた。新施設では、これまでの大人数による集団生活型の養育から、小規模な養育体制に移行する。 同院は１９７９年に開設。定員は３０人。済生会川口総合病院が近くにあり、医療的ケア児も受け入れる。築４６年が経過する建物は外壁のはがれや雨漏りなどの不具合が生じていた。 加えて、より家庭に近い環境での社会的養育が求められているが、同院では１３人が１部屋で、医療的ケア児は４人１部屋で暮らし、浴室も一つしかない。老朽化と小規模な養育体制への移行は喫緊の課題となっており、現施設の近くに新たな建物を建てることにした。一方、資金面では厳しい状況に直面した。建築費は当初約７億円を見込んでいたが、資材高騰などを受けて約１０億円にまで膨らんだ。 補助金やＷＡＭ（福祉医療機構）からの融資に加え、インターネットを通じて資金を集めるクラウドファンディング（ＣＦ）にも着手して費用の一部を捻出した。ＣＦは２０２５年９月１６日～１２月１２日に実施し、８０７人から総額１６３６万円が寄せられた。 完成", "content": "済生会川口乳児院が建て替え完了 資材高騰でクラウドファンディングも活用\n2026年06月25日 福祉新聞編集部社会福祉法人恩賜財団済生会の済生会川口乳児院（八木橋克美施設長、埼玉県川口市）の建て替えが完了し、８日に関係者を招いて落成式が開かれた。新施設では、これまでの大人数による集団生活型の養育から、小規模な養育体制に移行する。\n同院は１９７９年に開設。定員は３０人。済生会川口総合病院が近くにあり、医療的ケア児も受け入れる。築４６年が経過する建物は外壁のはがれや雨漏りなどの不具合が生じていた。\n加えて、より家庭に近い環境での社会的養育が求められているが、同院では１３人が１部屋で、医療的ケア児は４人１部屋で暮らし、浴室も一つしかない。老朽化と小規模な養育体制への移行は喫緊の課題となっており、現施設の近くに新たな建物を建てることにした。一方、資金面では厳しい状況に直面した。建築費は当初約７億円を見込んでいたが、資材高騰などを受けて約１０億円にまで膨らんだ。\n補助金やＷＡＭ（福祉医療機構）からの融資に加え、インターネットを通じて資金を集めるクラウドファンディング（ＣＦ）にも着手して費用の一部を捻出した。ＣＦは２０２５年９月１６日～１２月１２日に実施し、８０７人から総額１６３６万円が寄せられた。\n完成した建物は４階建て。６ユニットあり、各ユニットで４～６人が生活。ユニットごとに浴室やキッチンも設置した。３階には地域交流室や心理室、親子訓練室、４階にはリハビリ遊具も置くプレイルームを備える。現施設で暮らす０～４歳児は７月中旬から新施設での生活が始まる予定だ。\n落成式には、恩賜財団済生会の炭谷茂理事長や大野元裕埼玉県知事、岡村ゆり子川口市長ら約４０人が出席。テープカットで新施設の完成を祝った。", "summary": "済生会川口乳児院が建て替え完了 資材高騰でクラウドファンディングも活用\n2026年06月25日 福祉新聞編集部社会福祉法人恩賜財団済生会の済生会川口乳児院（八木橋克美施設長、埼玉県川口市）の建て替えが完了し、８日に関係者を招いて落成式が開かれた。済生会川口総合病院が近くにあり、医療的ケア児も受け入れる。６ユニットあり、各ユニットで４～６人が生活。テープカットで新施設の完成を祝った。", "categories": ["施設運営・経営", "医療・健康"], "is_new": false}, {"title": "ケアプー普及加速　導入率が45.1%に急上昇　厚労省調べ", "url": "https://www.joint-kaigo.com/articles/46972/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-24 19:15", "description": "全国の訪問介護や通所介護、居宅介護支援といった在宅介護サービス事業所のケアプランデータ連携システムの導入率が、5月末時点で45.1%となったことが厚生労働省の調べで分かった。【Joint編集部】 今年に入って普及が一気に […]", "content": "2026年6月24日\nケアプー普及加速 導入率が45.1%に急上昇 厚労省調べ\n全国の訪問介護や通所介護、居宅介護支援といった在宅介護サービス事業所のケアプランデータ連携システムの導入率が、5月末時点で45.1%となったことが厚生労働省の調べで分かった。【Joint編集部】\n今年に入って普及が一気に進んだ。昨年度の補正予算、今年度の報酬改定による介護従事者の賃上げの要件に位置付けられたことが大きい。\n報酬改定が施行された今月以降、地域でケアプーの導入がさらに加速していくものとみられる。近く到達する50%の導入率も1つの通過点となりそうだ。\n※ 導入率＝全国のケアプー対象サービスの事業所に占める、有効なライセンスを保有する事業所の割合。\n厚労省によると、昨年度の補正予算が成立した昨年12月の導入率は10.2%だった。そこから5ヵ月ほどで4倍以上の水準に上昇した格好だ。\nケアプーは事業所間のケアプランなどのやり取りを、オンラインで安全に効率化するシステム。介護従事者の事務負担を軽減するツールで、活用する事業所が増えれば増えるほど利便性は向上していく。今後、新たに整備される「介護情報基盤」と統合される予定で、事業所にとっては運営上欠かせないインフラとなる。", "summary": "2026年6月24日\nケアプー普及加速 導入率が45.1%に急上昇 厚労省調べ\n全国の訪問介護や通所介護、居宅介護支援といった在宅介護サービス事業所のケアプランデータ連携システムの導入率が、5月末時点で45.1%となったことが厚生労働省の調べで分かった。※ 導入率＝全国のケアプー対象サービスの事業所に占める、有効なライセンスを保有する事業所の割合。厚労省によると、昨年度の補正予算が成立した昨年12月の導入率は10.2%だった。ケアプーは事業所間のケアプランなどのやり取りを、オンラインで安全に効率化するシステム。", "categories": ["介護保険・制度", "業務改善・介護テック"], "is_new": false}, {"title": "Samsung opens ChatGPT Enterprise and Codex access after AI restrictions", "url": "https://www.artificialintelligence-news.com/news/samsung-chatgpt-enterprise-codex-employee-ai-use/", "source": "AI News", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-06-24 19:00", "description": "Samsung Electronics is expanding employee access to ChatGPT Enterprise and Codex, giving staff wider use of AI tools for technical and non-technical work. According to OpenAI, the deployment covers all Samsung Electronics employees in Korea and all Device eXperience employees worldwide. The DX division includes smartphones, consumer electronics, and home appliances. Samsung plans to use […] The post Samsung opens ChatGPT Enterprise and Codex access after AI restrictions appeared first on AI News", "content": "Samsung Electronics is expanding employee access to ChatGPT Enterprise and Codex, giving staff wider use of AI tools for technical and non-technical work.\nAccording to OpenAI, the deployment covers all Samsung Electronics employees in Korea and all Device eXperience employees worldwide. The DX division includes smartphones, consumer electronics, and home appliances.\nSamsung plans to use the tools in software development, marketing, product development, manufacturing, and other business functions. The tools will support tasks such as information search, document drafting, idea development, data interpretation, and code-related work.\nSamsung revisits employee AI use\nThe rollout comes three years after Samsung restricted employee use of generative AI tools over data-security concerns. In 2023, the company limited the use of ChatGPT and similar tools after concerns that sensitive internal information had been uploaded to an external AI platform.\nThe new deployment gives employees access to ChatGPT Enterprise, which includes controls for data protection, user access, and security management. OpenAI said the enterprise version allows organisations to manage users, apply access controls, and use AI tools within internal security requirements.\nSamsung’s earlier restrictions applied to employee use of ChatGPT and similar generative AI tools. The new rollout gives employees access through an enterprise product with data protection and access controls.\nSamsung has not limited the deployment to a single business unit or technical group. OpenAI said the tools will be used across a broad range of functions, including technical and non-technical teams.\nOpenAI said ChatGPT can support knowledge-based tasks such as searching for information, analysing material, drafting documents, developing ideas, and interpreting data.\nCodex for technical and non-technical work\nCodex will be used for software-related tasks such as writing, reviewing, and debugging code. OpenAI said the tool is also being used for internal tools, websites, software prototypes, and automated workflows.\nOpenAI said Codex can also support non-technical teams in day-to-day work, including by helping employees create internal tools and automated workflows.\nOpenAI said Codex now has more than five million weekly users across technical and non-technical workflows. In Korea, weekly active users of Codex have grown nearly 800% since February 1, 2026, according to the company.\nHarrison Kim, general manager of OpenAI Korea, said the agreement is one of OpenAI’s largest enterprise deployments. He said Samsung is using AI across teams and functions rather than limiting it to specific departments.\nSamsung and OpenAI’s infrastructure links\nIn October 2025, Samsung said it would work with OpenAI as a strategic memory partner for the Stargate AI infrastructure initiative, with OpenAI’s memory demand projected to reach up to 900,000 DRAM wafers per month.\nSamsung SDS also entered a potential partnership with OpenAI to jointly develop AI data centres and provide enterprise AI services. Samsung said the agreement would allow Samsung SDS to provide consulting, deployment, and management services for businesses integrating OpenAI models into internal systems.\nSamsung SDS also signed a reseller partnership to offer OpenAI services in Korea. Under that arrangement, Samsung SDS said it would support Korean companies adopting ChatGPT Enterprise and other OpenAI services.\nReuters reported that Samsung Electronics and SK Hynix had signed letters of intent to supply memory chips for OpenAI’s Stargate project. The report said the two South Korean chipmakers together account for about 70% of the global DRAM market and nearly 80% of the high-bandwidth memory market.\nHigh-bandwidth memory supports fast data movement between memory and processors in AI systems. Reuters reported that OpenAI’s chip demand for Stargate may reach 900,000 wafers per month, citing South Korea’s presidential office.\nSamsung said its semiconductor businesses would support OpenAI’s demand with advanced memory solutions. The company also said its affiliates were exploring broader work with OpenAI in areas including data centres, enterprise services, and AI infrastructure.\nAI adoption and productivity\nDeloitte’s 2026 State of AI in the Enterprise report found that 66% of organisations reported productivity or efficiency gains from enterprise AI adoption. The same report found that 53% reported improved insights and decision-making.\nA Bpifrance survey reported by Reuters found that 77% of 534 French mid-sized company heads said their firms used generative AI, but only 17% of those using it reported time savings.\nSamsung has identified use cases across document work, information analysis, coding, product development, marketing, and manufacturing. The deployment gives employees access to ChatGPT Enterprise and Codex for those tasks under a company-wide agreement.\nOpenAI’s Korea partnerships\nOpenAI has also announced other partnerships in Korea. Seoul National University recently began providing ChatGPT Edu to 47,000 students, faculty, and staff.\nOpenAI has also worked with Kakao to bring ChatGPT responses into KakaoTalk group chats. The company said Korean organisations including LG Electronics, LG Uplus, LG CNS, GS E&C, Samsung SDS, TVING, Krafton, Toss, MUSINSA, Korea Zinc, Nexen Tire, and HanaTour are using ChatGPT Enterprise, OpenAI APIs, or Codex.\n(Photo by Zulfugar Karimov)\nSee also: Omio scales travel product development using OpenAI models\nWant to learn more about AI and big data from industry leaders? Check out AI & Big Data Expo taking place in Amsterdam, California, and London. The comprehensive event is part of TechEx and is co-located with other leading technology events, click here for more information.\nAI News is powered by TechForge Media. Explore other upcoming enterprise technology events and webinars here.", "summary": "Harrison Kim, general manager of OpenAI Korea, said the agreement is one of OpenAI’s largest enterprise deployments. Under that arrangement, Samsung SDS said it would support Korean companies adopting ChatGPT Enterprise and other OpenAI services. Samsung said its semiconductor businesses would support OpenAI’s demand with advanced memory solutions. OpenAI’s Korea partnerships\nOpenAI has also announced other partnerships in Korea.", "categories": ["業務改善・介護テック", "AIツール・生産性"], "is_new": false, "title_ja": "サムスン、AI 制限後に ChatGPT Enterprise と Codex へのアクセスを開始", "summary_ja": "OpenAI KoreaのゼネラルマネージャーであるHarrison Kim氏は、この契約はOpenAIの最大規模の企業展開の1つであると述べた。この取り決めに基づき、Samsung SDSはChatGPT Enterpriseやその他のOpenAIサービスを導入する韓国企業を支援すると述べた。サムスンは、自社の半導体事業が先進的なメモリソリューションでOpenAIの需要をサポートすると述べた。 OpenAIの韓国パートナーシップ\nOpenAIは韓国における他のパートナーシップも発表した。"}, {"title": "特養の診療、介護報酬と診療報酬をどう算定？　給付調整リーフレットを更新　厚労省", "url": "https://www.joint-kaigo.com/articles/46929/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-24 12:18", "description": "厚生労働省は23日、特別養護老人ホームでの医師の診療行為に対する介護報酬、診療報酬の給付調整について解説するリーフレットの改訂版を公表した。【Joint編集部】 介護保険最新情報Vol.1515として発出し、全国の関係者 […]", "content": "厚生労働省は23日、特別養護老人ホームでの医師の診療行為に対する介護報酬、診療報酬の給付調整について解説するリーフレットの改訂版を公表した。【Joint編集部】\n介護保険最新情報Vol.1515として発出し、全国の関係者へ広く周知した。\n特養で配置医師や外部医師が入所者を診る際に、介護報酬と診療報酬のどちらをどう算定すればいいのか ーー 。\nこのリーフレットは、そうした給付調整の正しいルールを現場へ浸透させるためのもの。誤解が生じやすい事例を分かりやすく整理し、医療と介護の円滑な連携を後押しする狙いがある。\n厚労省は今回、今年度の診療報酬改定で協力医療機関とのカンファレンスの頻度などが見直された（6月1日施行）ことを受けて、リーフレットの内容を更新した。\n例えば、入所者が急変した際に協力医療機関の医師（外部医師）が往診にあたり、「緊急往診加算」や「夜間・休日往診加算」などを算定するケース。ICTを活用した連携体制が平時から作られている場合をみると、診療情報などを共有するカンファレンスの開催頻度の要件が「年3回以上」から「年1回以上」へ改められている。\nリーフレットではこのほか、特養内で診療が完結するケース、配置医師の専門外の皮膚科を受診するケース、末期がんの看取りに対応するケースなどについても、給付調整の正確なルールが解説されている。", "summary": "厚生労働省は23日、特別養護老人ホームでの医師の診療行為に対する介護報酬、診療報酬の給付調整について解説するリーフレットの改訂版を公表した。特養で配置医師や外部医師が入所者を診る際に、介護報酬と診療報酬のどちらをどう算定すればいいのか ーー 。例えば、入所者が急変した際に協力医療機関の医師（外部医師）が往診にあたり、「緊急往診加算」や「夜間・休日往診加算」などを算定するケース。リーフレットではこのほか、特養内で診療が完結するケース、配置医師の専門外の皮膚科を受診するケース、末期がんの看取りに対応するケースなどについても、給付調整の正確なルールが解説されている。", "categories": ["医療・健康", "介護保険・制度"], "is_new": false}, {"title": "18歳の壁解消へ、生活介護の報酬拡充を　医療的ケア児者議連に要望 - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45575", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-24 10:00", "description": "超党派医療的ケア児者支援議員連盟（野田聖子会長）が１０日に衆議院第１議員会館で開かれた。２０２７年度障害報酬改定に向けてヒアリングを受けた全国重症心身障害児（者）を守る会などが、１８歳以後の医療的ケア者や重症心身障害者の地域での暮らしを支える生活介護について、安定的に事業運営できるよう報酬や加算の拡充を要望した。 学童期は特別支援学校の後、午後６時ごろまで放課後等デイサービスを利用できるが、成人すると生活介護などに移行する。しかし、生活介護は午後３時ごろ終わり、帰宅後の介護は親が担うしかなく、離職に追い込まれてしまう。一方、生活介護は放デイより報酬が低く、収入が半減するケースもあるため、事業者の受け入れが進まず、サービス不足が顕在化している。 こうした「１８歳の壁」の解消に向けて、事業者が生活介護を持続的に運営できるようにする要望が相次いだ。全国重症児者デイサービス・ネットワークは、児童期の医療的ケア判定スコアを生活介護で継続運用することや、常勤看護職員等配置加算の増額などを求めた。 障がい児及び医療的ケア児を育てる親の会は、親が仕事と育児を両立できるよう生活介護の提供時間延長を要望。", "content": "18歳の壁解消へ、生活介護の報酬拡充を 医療的ケア児者議連に要望\n2026年06月24日 福祉新聞編集部超党派医療的ケア児者支援議員連盟（野田聖子会長）が１０日に衆議院第１議員会館で開かれた。２０２７年度障害報酬改定に向けてヒアリングを受けた全国重症心身障害児（者）を守る会などが、１８歳以後の医療的ケア者や重症心身障害者の地域での暮らしを支える生活介護について、安定的に事業運営できるよう報酬や加算の拡充を要望した。\n学童期は特別支援学校の後、午後６時ごろまで放課後等デイサービスを利用できるが、成人すると生活介護などに移行する。しかし、生活介護は午後３時ごろ終わり、帰宅後の介護は親が担うしかなく、離職に追い込まれてしまう。一方、生活介護は放デイより報酬が低く、収入が半減するケースもあるため、事業者の受け入れが進まず、サービス不足が顕在化している。\nこうした「１８歳の壁」の解消に向けて、事業者が生活介護を持続的に運営できるようにする要望が相次いだ。全国重症児者デイサービス・ネットワークは、児童期の医療的ケア判定スコアを生活介護で継続運用することや、常勤看護職員等配置加算の増額などを求めた。\n障がい児及び医療的ケア児を育てる親の会は、親が仕事と育児を両立できるよう生活介護の提供時間延長を要望。守る会も同様の要望をしたほか、家族の共倒れを防ぐため短期入所の拡充や、特別支援学校卒業後どこにも通えない重症心身障害者に対する生涯学習の推進なども求めた。", "summary": "２０２７年度障害報酬改定に向けてヒアリングを受けた全国重症心身障害児（者）を守る会などが、１８歳以後の医療的ケア者や重症心身障害者の地域での暮らしを支える生活介護について、安定的に事業運営できるよう報酬や加算の拡充を要望した。学童期は特別支援学校の後、午後６時ごろまで放課後等デイサービスを利用できるが、成人すると生活介護などに移行する。こうした「１８歳の壁」の解消に向けて、事業者が生活介護を持続的に運営できるようにする要望が相次いだ。障がい児及び医療的ケア児を育てる親の会は、親が仕事と育児を両立できるよう生活介護の提供時間延長を要望。", "categories": ["福祉・社会保障", "医療・健康"], "is_new": false}, {"title": "今年度の国のLIFE研修会、全国3都市で開催　基礎編＋実践編　オンデマンド配信も", "url": "https://www.joint-kaigo.com/articles/46919/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-23 18:39", "description": "介護事業所・施設や自治体の職員らを対象とする今年度のLIFE（科学的介護情報システム）研修会を、国立長寿医療研究センターが開催する。【Joint編集部】 厚生労働省は23日、この研修会を周知する介護保険最新情報Vol.1 […]", "content": "2026年6月23日\n今年度の国のLIFE研修会、全国3都市で開催 基礎編＋実践編 オンデマンド配信も\n介護事業所・施設や自治体の職員らを対象とする今年度のLIFE（科学的介護情報システム）研修会を、国立長寿医療研究センターが開催する。【Joint編集部】\n厚生労働省は23日、この研修会を周知する介護保険最新情報Vol.1514を発出。LIFEの一層の有効活用につなげるべく、関係者へ広く参加を呼びかけた。\nこの研修会は、「基礎編」と「実践編」の2本立てで構成される。\n「基礎編」では、LIFEの概要や評価項目に関する基礎知識、フィードバックデータの読み解き方、介護計画の立案方法などを解説する。\n一方の「実践編」は、2024年度の介護報酬改定に伴う評価項目の追加点・変更点の解説などが柱。LIFEの有効活用の具体的な方法を、介護現場で活躍する講師が分かりやすく伝える講演なども予定されている。\n※ この研修会の内容は、昨年12月と今年1月に実施された内容と同じとなる。\n開催方式は、全国3都市での対面形式とオンデマンド配信のハイブリッドとなる。\n対面形式は9月から10月にかけて、秋田、広島、東京の各会場で実施される。参加費は無料で事前の登録が必要。\nまた、7月1日からはWebでのオンデマンド配信の視聴も可能となる。ただし、配信される動画は過去の年度に実施・撮影されたもので、今年度の対面形式とは内容が一部異なる点に留意が必要だ。\n参加の申し込みは、国立長寿医療研究センターの公式サイトから行える。", "summary": "2026年6月23日\n今年度の国のLIFE研修会、全国3都市で開催 基礎編＋実践編 オンデマンド配信も\n介護事業所・施設や自治体の職員らを対象とする今年度のLIFE（科学的介護情報システム）研修会を、国立長寿医療研究センターが開催する。この研修会は、「基礎編」と「実践編」の2本立てで構成される。※ この研修会の内容は、昨年12月と今年1月に実施された内容と同じとなる。開催方式は、全国3都市での対面形式とオンデマンド配信のハイブリッドとなる。", "categories": ["人材育成・HR", "介護保険・制度"], "is_new": false}, {"title": "介護施設の補足給付、所得区分の基準額変更へ　8月から見直し　省令・告示公布", "url": "https://www.joint-kaigo.com/articles/46904/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-06-23 12:20", "description": "今年8月から実施される介護施設の入所者の食費や居住費の見直しをめぐり、低所得者を対象とした補足給付の所得区分の基準額を改める省令・告示が22日に公布された。【Joint編集部】 厚生労働省は介護保険最新情報Vol.151 […]", "content": "今年8月から実施される介護施設の入所者の食費や居住費の見直しをめぐり、低所得者を対象とした補足給付の所得区分の基準額を改める省令・告示が22日に公布された。【Joint編集部】\n厚生労働省は介護保険最新情報Vol.1513を発出し、介護現場の関係者に広く周知した。5月29日に発出した介護保険最新情報Vol.1506で、「改正作業中」と説明していた見直しの内容が正式に決まった形だ。\n今回の基準変更は、補足給付の所得区分の「第2段階」と「第3段階①」の境界ラインが対象。年金収入などの基準額が、現行の「80.9万円」から「82.65万円」へ引き上げられる。見直しは8月から。高齢者の年金額の改定に基づく措置で、昨年の老齢基礎年金（満額）が80.9万円を超えたことなどを踏まえたものだ。\n厚労省はこのほか今年8月から、介護施設の「第3段階①」と「第3段階②」の入所者の食費、「第3段階②」の入所者の居住費について、負担限度額をそれぞれ引き上げることにしている。\n例えば食費は日額で30円〜60円、ひと月（30日）換算ではおよそ900円〜1800円の負担増となる。", "summary": "今年8月から実施される介護施設の入所者の食費や居住費の見直しをめぐり、低所得者を対象とした補足給付の所得区分の基準額を改める省令・告示が22日に公布された。今回の基準変更は、補足給付の所得区分の「第2段階」と「第3段階①」の境界ラインが対象。年金収入などの基準額が、現行の「80.9万円」から「82.65万円」へ引き上げられる。厚労省はこのほか今年8月から、介護施設の「第3段階①」と「第3段階②」の入所者の食費、「第3段階②」の入所者の居住費について、負担限度額をそれぞれ引き上げることにしている。", "categories": ["介護保険・制度", "施設運営・経営"], "is_new": false}, {"title": "こども家庭センター、全自治体の86％が設置　こども家庭庁調査で判明 - 福祉新聞Web", "url": "https://fukushishimbun.com/series07/45572", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-06-23 10:00", "description": "４月１日時点で全国１７４１市区町村のうち、１４９６自治体（８５．９％）がこども家庭センターを設置していたことが８日、こども家庭庁の調査で分かった。設置は進んでおり、昨年５月時点から２５６自治体（１４．７ポイント）増えた。未設置の２４５自治体のうち、９７自治体（３９．６％）が２０２６年度中に設置する予定。設置時期が「未定」なのは６６自治体（２６．９％）だった。 母子保健と児童福祉の両分野を一体的に運営し、子育て世帯を包括的に支援する同センターの設置は、児童福祉法改正により２４年４月から市町村の努力義務となっている。同庁は２６年度末までに全市町村での設置を目指している。 調査結果によると、全ての指定都市、中核市、特別区で設置が完了。町村での設置割合は町７９．４％、村５９．６％だった。同センターの数は１６８３カ所で、指定都市では複数設置しているケースもみられる。栃木、神奈川、富山、石川、福井、福岡、熊本の７県では全自治体が設置を済ませていた。 市町村における子育て家庭の包括的支援体制の強化に向け、同庁の児童虐待防止対策部会では同センターを中核に据え施策の方向性を審議している。 福祉新聞Web", "content": "こども家庭センター、全自治体の86％が設置 こども家庭庁調査で判明\n2026年06月23日 福祉新聞編集部４月１日時点で全国１７４１市区町村のうち、１４９６自治体（８５．９％）がこども家庭センターを設置していたことが８日、こども家庭庁の調査で分かった。設置は進んでおり、昨年５月時点から２５６自治体（１４．７ポイント）増えた。未設置の２４５自治体のうち、９７自治体（３９．６％）が２０２６年度中に設置する予定。設置時期が「未定」なのは６６自治体（２６．９％）だった。\n母子保健と児童福祉の両分野を一体的に運営し、子育て世帯を包括的に支援する同センターの設置は、
