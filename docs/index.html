 knowledge workers.\nAs I’ve discussed on this site at length, the models released in November 2025 elevated agents to being genuinely useful. We’ve had six months to get used to that idea now—it’s no wonder companies are beginning to spend real money on this technology.\nYou could argue that ChatGPT achieved product-market fit when it became the fastest-growing consumer app in history back in February 2023... but it certainly wasn’t making any actual money back then. Coding agents plus enterprise pricing marks the point when these companies start making very real revenue. Maybe even enough to start covering their costs!\nAnd they’re ramping up\nAs further evidence that enterprise agents represent product-market fit for these companies, consider their open job listings.\nOpenAI have 703 open jobs right now, of which I’d categorize 229 (32.6%) as relating to enterprise sales and support—account executives, “Go To Market”, “Forward Deployed Engineers” and the like.\nAnthropic have 390 open jobs, 105 (26.9%) of which look enterprisey to me.\nIt’s pleasingly ironic that these AI labs have picked a business model with such a heavy demand on human labor—enterprise sales contracts don’t close themselves without a whole lot of humans in the mix!\n(I ran this analysis by scraping their job sites with Claude Code, then having it use Datasette’s JSON API to pipe that data into Datasette Cloud where I used Datasette Agent for the analysis, exported here. Dogfood!)\nThe AI-failure stories around this are pretty thin\nI started digging into this in response to a growing volume of stories claiming that large companies were sounding the alarm because their AI usage costs had grown so large.\nThe most widely cited of these stories appear quite overblown to me.\nThe most discussed has been Uber, based on this report where CTO Praveen Neppalli Naga indicated that Uber had “maxed out its full year AI budget just a few months into 2026”, mostly thanks to Claude Code.\nGiven that Claude Code only got really good in November it’s entirely unsurprising to me that a budget set in 2025 may have failed to predict demand for that tool in 2026!\nThat Uber story was further fueled by comments made by Uber’s COO, Andrew Macdonald, on the Rapid Response podcast. I tracked down the segment and there really isn’t much there. Here’s what Andrew said:\nBut then you sometimes go and talk to your senior engineering leaders and you’re saying, OK, how many projects that were on the cutting room floor got moved above the line because of the productivity gains because 25% of our code commits were via Claude Code last quarter?\nThat link is not there yet, right? I think maybe implicitly there’s more that is getting shipped. But it’s very hard to draw a line between one of those stats and, OK, now we’re actually producing like 25% more useful consumer features, right? And that line is hard to draw.\n[...] And so if you’re not actually able to draw a direct line to how much useful features and functionality you’re shipping to your users, that trade becomes harder to justify.\nSomehow this fragment turned into headlines like Uber’s COO says it’s getting harder to justify the money spent on AI tokenmaxxing, because the market for stories about AI failures remains enormous.\nUpdate 29th May 2026: I edited the above quote to add that last paragraph ending in “becomes harder to justify” on the suggestion of Madison Mills—previously my quoted section stopped at “hard to draw”. Here’s the full unedited transcript from MacWhisper.\nThe other popular story around this is Microsoft starts canceling Claude Code licenses, ostensibly to encourage their engineers to dogfood their own Copilot CLI agent instead—but The Verge reporter Tom Warren says “sources tell me the decision is also a financial one”, triggered by the June 30th end of Microsoft’s financial year.\nI think both of these stories support my “product-market fit” hypothesis. The best advice I ever heard on pricing a product was that your customer should suck air through their teeth and then say yes. Uber’s budget overrun and Microsoft’s seat cancellations look like that effect playing out in practice.\nWe also know the labs are spending a lot\nThe big AI labs spend billions of dollars on both training and inference. Credible figures are hard to come by, but we did get one huge hint as to the figures involved from, oddly enough, the recent SpaceX S-1:\n[...] in May 2026, we entered into Cloud Services Agreements with Anthropic PBC (“Anthropic”), an AI research and development public benefit corporation, with respect to access to compute capacity across COLOSSUS and COLOSSUS II. Pursuant to these agreements, the customer has agreed to pay us $1.25 billion per month through May 2029 [...]\nThe Anthropic announcement said that this deal meant they could “increase our usage limits for Claude Code and the Claude API”, heavily implying that Colossus is being used for inference, not model training.\nAnthropic already have vast amounts of compute from other providers. The fact that they’re willing to spend $1.25 billion per month for extra capacity from just one of their vendors hints at how big these inference budgets have become.\nAPI revenue is becoming less important\nOver the past two years my impression has been that OpenAI made more of their income from subscription revenue while Anthropic made more from their API.\nAnthropic’s API revenue was historically quite dependent on a small number of large API customers—this VentureBeat story from August 2025 quotes “sources familiar with the matter” suggesting that just Cursor and GitHub Copilot were responsible for $1.2 billion of the company’s then-$4 billion revenue.\nToday Anthropic are rumored to hit $10.9 billion in the second quarter, potentially even operating at a profit for the first time.\nThis pivot-to-Enterprise suggests that the labs have realized that the real money lies in cutting out the middlemen. Anthropic’s Claude Code directly competes with Cursor and Copilot. No wonder Cursor are investing in their own models!\nApril is a new inflection point\nI’ve called November 2025 the November inflection point because that was when GPT-5.1 and Opus 4.5, combined with their respective coding agent harnesses, got good—good enough that we’ve spent the last six months adapting to agent systems that can reliably get useful work done.\nI think April 2026 is a new inflection point where the revenue implications of this have started to land, to the benefit of the frontier AI labs and with material impacts on the budgets of large companies.\nWe’ll know for sure how real this moment is when the S-1 documents for the upcoming Anthropic and OpenAI IPOs give us some real, audited numbers to get our teeth into.\nMore recent articles\n- Claude Opus 4.8: \"a modest but tangible improvement\" - 28th May 2026\n- Notes on Pope Leo XIV's encyclical on AI - 25th May 2026", "summary": "I think Anthropic and OpenAI have found product-market fit\n27th May 2026\nAnthropic are strongly rumored to be about to have their first profitable quarter. I think this is because OpenAI and Anthropic have both found product-market fit. All of which is to say that as of April 2026 the “Enterprise” cost for both OpenAI Codex and Anthropic Claude Code/Cowork is the same as the listed API price. Anthropic’s Claude Code directly competes with Cursor and Copilot.", "categories": ["業務改善・介護テック", "人材育成・HR"], "is_new": false, "title_ja": "Anthropic と OpenAI は製品と市場の適合性を見つけたと思います", "summary_ja": "Anthropic と OpenAI は製品と市場の適合性を見つけたと思います\n2026 年 5 月 27 日\nAnthropic は間もなく最初の利益を計上する四半期になると強く噂されています。これは、OpenAI と Anthropic が両方とも製品と市場の適合性を見つけたためだと思います。つまり、2026 年 4 月の時点で、OpenAI Codex と Anthropic Claude Code/Cowork の両方の「エンタープライズ」コストは、記載されている API 価格と同じであるということです。 Anthropic の Claude Code は、Cursor および Copilot と直接競合します。"}, {"title": "介護保険法の改正案、衆院を通過　過疎地でサービス基準を緩和　ケアマネ新類型の創設も", "url": "https://www.joint-kaigo.com/articles/46328/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-27 14:10", "description": "介護保険法、老人福祉法、社会福祉法などの改正案が衆議院を通過した。【Joint編集部】 26日の衆議院本会議で賛成多数で可決された。今国会で成立する見通し。審議の舞台は参議院へ移る。 この改正案には、来年度以降に実施され […]", "content": "2026年5月27日\n介護保険法の改正案、衆院を通過 過疎地でサービス基準を緩和 ケアマネ新類型の創設も\n介護保険法、老人福祉法、社会福祉法などの改正案が衆議院を通過した。【Joint編集部】\n26日の衆議院本会議で賛成多数で可決された。今国会で成立する見通し。審議の舞台は参議院へ移る。\nこの改正案には、来年度以降に実施されていく介護保険制度などの見直しの具体策が多く含まれている。\n中山間・人口減少地域を対象に、事業所の人員配置基準の緩和などを認める特例的なスキームを新設することが柱。介護ニーズの縮小や人手不足が加速する過疎地などでも、必要なサービスを提供し続けられる効率的な体制をつくることが狙いだ。\nこのほか、住宅型有料老人ホームの運営の健全化、入居者の安心・安全の確保に向けた規制の強化も改正案の目玉だ。\n政府は改正案に、中重度の要介護者らを受け入れる住宅型ホームを対象とした「登録制」の導入を盛り込んだ。また、住宅型ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」を創設する方針も明記している。", "summary": "2026年5月27日\n介護保険法の改正案、衆院を通過 過疎地でサービス基準を緩和 ケアマネ新類型の創設も\n介護保険法、老人福祉法、社会福祉法などの改正案が衆議院を通過した。この改正案には、来年度以降に実施されていく介護保険制度などの見直しの具体策が多く含まれている。政府は改正案に、中重度の要介護者らを受け入れる住宅型ホームを対象とした「登録制」の導入を盛り込んだ。また、住宅型ホームの入居者に特化したケアマネジメントの新類型「登録施設介護支援」を創設する方針も明記している。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "審査やり直しは同一認定医　厚労省が障害年金調書破棄問題で対応策 - 福祉新聞Web", "url": "https://fukushishimbun.com/series06/45385", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-27 14:00", "description": "障害年金について日本年金機構の職員が当初の認定医の認定調書を破棄し、別の認定医に審査を依頼し直していた問題を受けて、厚生労働省は４月３０日、審査を依頼し直す際は原則として、同じ認定医に依頼するなど今後の対応策を示した。対応策の実施状況について社会保障審議会年金事業管理部会がモニタリングする。 厚労省は同日、同機構職員ら３０５人のヒアリング結果も公表。記載誤りなどがあると認定医に確認が必要で、その認定医とスケジュールが合わないと処理期間（標準３カ月）を守るため、別の認定医に依頼せざるを得ないといった課題が挙げられた。組織内で判断困難事案が蓄積されず、認定医とのコミュニケーションを難しく感じるとの声もあった。 対応策では、やむを得ず別の認定医に依頼し直す場合は複数の認定医で審査し、当初の認定調書は保存しておく。審査を複数回行う場合は処理期間を４カ月に延ばす。判断困難事案はすべて認定審査委員会で判定し、認定審査委員会で審議した事案は事例集にして認定医で共有する。職員と認定医のやりとりなど審査業務のデジタル化も検討するとした。 厚労省は「審査のやり直し自体は違法ではないが、より丁寧に審査すると", "content": "審査やり直しは同一認定医 厚労省が障害年金調書破棄問題で対応策\n2026年05月27日 福祉新聞編集部障害年金について日本年金機構の職員が当初の認定医の認定調書を破棄し、別の認定医に審査を依頼し直していた問題を受けて、厚生労働省は４月３０日、審査を依頼し直す際は原則として、同じ認定医に依頼するなど今後の対応策を示した。対応策の実施状況について社会保障審議会年金事業管理部会がモニタリングする。\n厚労省は同日、同機構職員ら３０５人のヒアリング結果も公表。記載誤りなどがあると認定医に確認が必要で、その認定医とスケジュールが合わないと処理期間（標準３カ月）を守るため、別の認定医に依頼せざるを得ないといった課題が挙げられた。組織内で判断困難事案が蓄積されず、認定医とのコミュニケーションを難しく感じるとの声もあった。\n対応策では、やむを得ず別の認定医に依頼し直す場合は複数の認定医で審査し、当初の認定調書は保存しておく。審査を複数回行う場合は処理期間を４カ月に延ばす。判断困難事案はすべて認定審査委員会で判定し、認定審査委員会で審議した事案は事例集にして認定医で共有する。職員と認定医のやりとりなど審査業務のデジタル化も検討するとした。\n厚労省は「審査のやり直し自体は違法ではないが、より丁寧に審査するという観点から今回見直す」としている。", "summary": "審査やり直しは同一認定医 厚労省が障害年金調書破棄問題で対応策\n2026年05月27日 福祉新聞編集部障害年金について日本年金機構の職員が当初の認定医の認定調書を破棄し、別の認定医に審査を依頼し直していた問題を受けて、厚生労働省は４月３０日、審査を依頼し直す際は原則として、同じ認定医に依頼するなど今後の対応策を示した。対応策では、やむを得ず別の認定医に依頼し直す場合は複数の認定医で審査し、当初の認定調書は保存しておく。判断困難事案はすべて認定審査委員会で判定し、認定審査委員会で審議した事案は事例集にして認定医で共有する。職員と認定医のやりとりなど審査業務のデジタル化も検討するとした。", "categories": ["介護保険・制度", "福祉・社会保障"], "is_new": false}, {"title": "ケアマネ協会、ICT活用は「導入支援から活用支援へ転換を」　居宅介護支援の調査結果公表", "url": "https://www.joint-kaigo.com/articles/46320/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-27 11:34", "description": "日本介護支援専門員協会は27日、「居宅介護支援事業所におけるICT活用に関する実態調査」の結果を新たに公表した。これに基づき、各種のデバイスやツールを揃える「導入支援」の段階から、それを実際の業務にどう生かすかという「活 […]", "content": "2026年5月27日\nケアマネ協会、ICT活用は「導入支援から活用支援へ転換を」 居宅介護支援の調査結果公表\n日本介護支援専門員協会は27日、「居宅介護支援事業所におけるICT活用に関する実態調査」の結果を新たに公表した。これに基づき、各種のデバイスやツールを揃える「導入支援」の段階から、それを実際の業務にどう生かすかという「活用支援」の段階へ、推進策のフェーズを転換することを提言している。【Joint編集部】\n調査結果によると、ICTの導入で業務を効率化できたと実感しているケアマネジャーは少なくない。その一方で、「ケアマネジメントの質の向上」では44.7％、「人材不足への対応」では42.2％が「どちらともいえない」と回答。モバイル端末や介護ソフト、クラウド、生成AIなどの導入が、必ずしも十分な効果に直結していない現状が浮き彫りになった。\n協会の七種秀樹副会長は、「補助金を含め導入支援は整ってきている。今後はどう活用するかを伝えていくことが大事ではないか。ケアマネジメント全体を通じてICTをどれだけ利活用できるのか、有効な事例の共有やモデルの整理が必要」と指摘した。\nこの調査は、昨年12月から今年1月にかけて実施されたもの。居宅介護支援事業所で働く協会会員が対象で、1266人から回答を得ている。\nICTを導入する際の障壁としては、「職員のスキル不足（68.6％）」が最多だった。ただし、事業所の経営方針やマネジメント層の理解、DXの優先順位の置き方などが、有効活用の成否を分ける重要な要因だと分析されている。\n協会は今後、有効なモデルの提示やセミナーの開催など様々な取り組みを通じて、居宅介護支援事業所を後押しするICTの「活用支援」にも力を入れていく方針だ。", "summary": "2026年5月27日\nケアマネ協会、ICT活用は「導入支援から活用支援へ転換を」 居宅介護支援の調査結果公表\n日本介護支援専門員協会は27日、「居宅介護支援事業所におけるICT活用に関する実態調査」の結果を新たに公表した。協会の七種秀樹副会長は、「補助金を含め導入支援は整ってきている。居宅介護支援事業所で働く協会会員が対象で、1266人から回答を得ている。協会は今後、有効なモデルの提示やセミナーの開催など様々な取り組みを通じて、居宅介護支援事業所を後押しするICTの「活用支援」にも力を入れていく方針だ。", "categories": ["福祉・社会保障", "業務改善・介護テック"], "is_new": false}, {"title": "内密出産の費用、市が負担　実施計画の概要明らかに〈大阪・泉佐野市〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/fukushiippan/45382", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-27 10:00", "description": "親が育てられない乳児を匿名で預かる「赤ちゃんポスト」と、病院の担当者のみに身元を明かして出産する「内密出産」の導入を目指す大阪府泉佐野市は１１日、事業実施計画の概要を明らかにした。赤ちゃんポスト「赤ちゃんいのちのバトン」は出生後１カ月未満の新生児の受け入れを原則とするほか、内密出産にかかる費用は市が負担する方針。利用は市民に限定しないという。 熊本市の慈恵病院、東京都墨田区の賛育会病院が先行して取り組むが、自治体主導では初の試みだ。地方独立行政法人りんくう総合医療センターと連携し、今年度中の運用開始に向けて準備を進めている。 事業実施計画では同センターと市役所にそれぞれ相談室を設ける方針も示された。 同センターには「内密出産・赤ちゃんいのちのバトン相談室」（仮称）を設置する。２４時間体制も視野に保健師や看護師といった専門職を配置。市役所は「妊娠葛藤相談室」（仮称）で幅広く妊娠に関する相談に対応。同様に専門職の配置を見込む。 同市は今年３月末、大阪府へ事業実施計画を提出。相談室の人員配置や、乳児を受け入れた後の児童相談所との連携などについて、府と継続して協議を進めるという。 市は１億５０", "content": "内密出産の費用、市が負担 実施計画の概要明らかに〈大阪・泉佐野市〉\n2026年05月27日 福祉新聞編集部親が育てられない乳児を匿名で預かる「赤ちゃんポスト」と、病院の担当者のみに身元を明かして出産する「内密出産」の導入を目指す大阪府泉佐野市は１１日、事業実施計画の概要を明らかにした。赤ちゃんポスト「赤ちゃんいのちのバトン」は出生後１カ月未満の新生児の受け入れを原則とするほか、内密出産にかかる費用は市が負担する方針。利用は市民に限定しないという。\n熊本市の慈恵病院、東京都墨田区の賛育会病院が先行して取り組むが、自治体主導では初の試みだ。地方独立行政法人りんくう総合医療センターと連携し、今年度中の運用開始に向けて準備を進めている。\n事業実施計画では同センターと市役所にそれぞれ相談室を設ける方針も示された。\n同センターには「内密出産・赤ちゃんいのちのバトン相談室」（仮称）を設置する。２４時間体制も視野に保健師や看護師といった専門職を配置。市役所は「妊娠葛藤相談室」（仮称）で幅広く妊娠に関する相談に対応。同様に専門職の配置を見込む。\n同市は今年３月末、大阪府へ事業実施計画を提出。相談室の人員配置や、乳児を受け入れた後の児童相談所との連携などについて、府と継続して協議を進めるという。\n市は１億５０００万円を投じ、設置場所となる同センター内に乳児を受け入れるために必要なハード面の整備、改修を進める。\n経済的困窮などによりこどもを育てることが困難な妊産婦が、出産の前後で一時的に生活する「妊産婦シェルター」も今年度中、民家を借り上げて設置する計画だ。", "summary": "赤ちゃんポスト「赤ちゃんいのちのバトン」は出生後１カ月未満の新生児の受け入れを原則とするほか、内密出産にかかる費用は市が負担する方針。事業実施計画では同センターと市役所にそれぞれ相談室を設ける方針も示された。同センターには「内密出産・赤ちゃんいのちのバトン相談室」（仮称）を設置する。同市は今年３月末、大阪府へ事業実施計画を提出。", "categories": ["医療・健康", "福祉・社会保障"], "is_new": false}, {"title": "【日本版DBS】こども性暴力防止法、児発や放デイなど障害福祉の現場も義務・施行に向けて準備を", "url": "https://www.joint-kaigo.com/articles/46189/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-27 08:29", "description": "日本版DBSともいわれるこども性暴力防止法。障害福祉、特に障害児福祉の現場では影響が大きい。このため、こども家庭庁参事官の吉田昌司氏から法律が制定された背景や概要、障害福祉の現場への影響、事業者が準備すべきことなどについ […]", "content": "日本版DBSともいわれるこども性暴力防止法。障害福祉、特に障害児福祉の現場では影響が大きい。このため、こども家庭庁参事官の吉田昌司氏から法律が制定された背景や概要、障害福祉の現場への影響、事業者が準備すべきことなどについて寄稿していただいた。\n◆ こども性暴力防止法は今年12月25日に施行\n文：こども家庭庁 支援局 参事官 こども性暴力防止担当 吉田昌司\nこども性暴力防止法は一昨年6月に国会で成立（全会一致で成立）し、今年12月25日に施行されます。教育や保育の現場で、こどもを性暴力から守るための仕組みが動き出します。\nこどもへの性暴力は、心身に対して重大な影響を及ぼし、その影響は長期に及ぶことがあるものです。絶対許されないものですが、報道でもよく取り上げられるように、残念ながら発生している現状があります。このような状況を踏まえて法律が制定されました。\n◆ こどもを性暴力から守るために日ごろからの取り組みも重要\nこの法律の内容は、大きく2つにわかれます。1つは、日本版DBSと称して、報道されるように、こどもと接する業務に就く人の性犯罪前科の有無を確認して、前科があると業務に就くことができなくなるようにするものです。再犯防止対策であり、重要な取り組みです。\n一方、初犯が9割といったデータもある中で、それを防止する対策も重要となってきます。つまり、「従事者に対して性暴力を防ぐための研修を行う」「こどもが相談しやすい窓口などを設置し、広く周知する」「こどもの心身・行動に変化がないかを日常的に観察し、小さな変化やSOS信号を見逃さないようにする」などといった日ごろからこどもへの性暴力を防ぐための取り組みを、事業者の皆さんに各現場で実施いただくことです。\n◆ 公立・民間を問わず指定を受けた児童発達支援、放課後等デイサービスなどは義務対象\n法律の義務の対象は、障害者支援の関連でいえば、指定を受けた児童発達支援、放課後等デイサービス、居宅訪問型児童発達支援、保育所等訪問支援といった障害児通所支援事業、障害児入所施設です。これらは、公立・民間を問わずすべての事業所が義務の対象となります（＊）。\n義務対象の事業者は上記のような取り組みを実施することが求められます。また、管理者、児童指導員など報酬算定の対象として法令上規定されている職員については、必ず犯罪事実確認などの対象となります。\n＊ 居宅介護、同行援護、行動援護、短期入所又は重度障害者包括支援といった指定障害福祉サービス事業は、こども家庭庁に申請し、認定を受ければ、法律の対象になります。認定を受ければ「こまもろう」のマークが活用できるなど、ほかの事業者と差別化を図ることができるようになります。\n◆ 施行に向けて今から準備を\n施行に向け、法律の成立後、専門家や関係団体の皆さんと議論を進め、今年1月にはガイドラインを発出しました。\nまた、事業者には、従事者に対して研修を受講させることが義務付けられています。それに活用できるよう、4月には研修動画などがアップされています。この動画は、理解しておくことが望ましい標準的な内容を整理したものです。是非この機会に一度ご覧いただければ幸いです。\nこども性暴力防止法に関する研修動画（標準動画・従事者向け） – YouTube\nまた、こども家庭庁では施行に向けて事業者が活用できるチェックリストも用意しています。\n事業者向けチェックリスト（こども性暴力防止法の施行までに必要な対応）\n事業者の皆さんには、これらも活用して、今から、研修計画の策定や相談窓口の設置など準備を是非はじめていただきたいと考えています。次回以降、準備すべき具体的な事項などについてご紹介していきます。", "summary": "日本版DBSともいわれるこども性暴力防止法。◆ こども性暴力防止法は今年12月25日に施行\n文：こども家庭庁 支援局 参事官 こども性暴力防止担当 吉田昌司\nこども性暴力防止法は一昨年6月に国会で成立（全会一致で成立）し、今年12月25日に施行されます。教育や保育の現場で、こどもを性暴力から守るための仕組みが動き出します。こども性暴力防止法に関する研修動画（標準動画・従事者向け） – YouTube\nまた、こども家庭庁では施行に向けて事業者が活用できるチェックリストも用意しています。", "categories": ["福祉・社会保障", "施設運営・経営"], "is_new": false}, {"title": "LIFEのシステム移行作業、解説動画や操作マニュアル公開　厚労省", "url": "https://www.joint-kaigo.com/articles/46291/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-26 18:47", "description": "厚生労働省は22日、LIFE（科学的介護情報システム）の運営主体が国民健康保険中央会へ移管されたことに伴い、介護保険最新情報Vol.1504を発出した。【Joint編集部】 事業所・施設で必要な新システムへの移行作業につ […]", "content": "2026年5月26日\nLIFEのシステム移行作業、解説動画や操作マニュアル公開 厚労省\n厚生労働省は22日、LIFE（科学的介護情報システム）の運営主体が国民健康保険中央会へ移管されたことに伴い、介護保険最新情報Vol.1504を発出した。【Joint編集部】\n事業所・施設で必要な新システムへの移行作業について、新たに解説動画や操作マニュアルを公開。介護現場の関係者に広く周知した。\nLIFEは今月11日から国保中央会による運用が始まっており、事業所・施設は旧システムから新システムへの移行作業が必要。LIFE関連加算を引き続き算定するためには、これを7月31日までに完了させなければならない。\n厚労省は新たに公開した動画で、必要な移行作業のスケジュールや5月サービス提供分以降の加算の対応、ヘルプデスクに寄せられる主な質問への回答などを解説。あわせて操作マニュアルも公開した。\nなお、ヘルプデスクの問い合わせ窓口は移行作業の前後や時期によって異なるため、厚労省は注意を呼びかけている。", "summary": "2026年5月26日\nLIFEのシステム移行作業、解説動画や操作マニュアル公開 厚労省\n厚生労働省は22日、LIFE（科学的介護情報システム）の運営主体が国民健康保険中央会へ移管されたことに伴い、介護保険最新情報Vol.1504を発出した。【Joint編集部】\n事業所・施設で必要な新システムへの移行作業について、新たに解説動画や操作マニュアルを公開。LIFEは今月11日から国保中央会による運用が始まっており、事業所・施設は旧システムから新システムへの移行作業が必要。あわせて操作マニュアルも公開した。", "categories": ["業務改善・介護テック", "施設運営・経営"], "is_new": false}, {"title": "厚労省、来年度の介護報酬改定へ個別サービスの議論開始　小多機や認知症GH、厳しい経営環境に危機感", "url": "https://www.joint-kaigo.com/articles/46280/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-26 16:38", "description": "厚生労働省は25日、来年度の介護報酬改定に向けた協議を進める審議会（社会保障審議会・介護給付費分科会）を開催し、個別のサービス類型ごとの議論に着手した。【Joint編集部】 今回は小規模多機能、看護小規模多機能、認知症グ […]", "content": "2026年5月26日\n厚労省、来年度の介護報酬改定へ個別サービスの議論開始 小多機や認知症GH、厳しい経営環境に危機感\n厚生労働省は25日、来年度の介護報酬改定に向けた協議を進める審議会（社会保障審議会・介護給付費分科会）を開催し、個別のサービス類型ごとの議論に着手した。【Joint編集部】\n今回は小規模多機能、看護小規模多機能、認知症グループホームを俎上に載せた。共通の課題として深刻な人材難などをあげ、その中でサービスの提供体制をどう確保していくか、求められる役割・機能をどう発揮していくかを論点として提示した。\n意見交換では委員から、人手不足の加速など厳しい経営環境に対する危機感に基づき、職員の賃上げも見据えた報酬の底上げや適正配分を求める声があがった。また、夜間を含めた人材の有効活用、人員配置基準の見直し、医療ニーズに対応する事業所への評価などを求める意見も相次いだ。\nこのほか、人口減少に伴う地域密着型サービスの位置付けの再考、既存の各種加算の見直しを訴える声も続出するなど、対処すべき課題が山積している状況が改めて浮き彫りになった。\n今回の意見交換は、個別のサービス類型ごとに課題や論点を洗い出すことに重きを置いた“第1ラウンド”。厚労省は今後さらに議論を深め、来年度の介護報酬改定の具体策をめぐる検討を秋以降に本格化させる予定だ。", "summary": "2026年5月26日\n厚労省、来年度の介護報酬改定へ個別サービスの議論開始 小多機や認知症GH、厳しい経営環境に危機感\n厚生労働省は25日、来年度の介護報酬改定に向けた協議を進める審議会（社会保障審議会・介護給付費分科会）を開催し、個別のサービス類型ごとの議論に着手した。共通の課題として深刻な人材難などをあげ、その中でサービスの提供体制をどう確保していくか、求められる役割・機能をどう発揮していくかを論点として提示した。今回の意見交換は、個別のサービス類型ごとに課題や論点を洗い出すことに重きを置いた“第1ラウンド”。厚労省は今後さらに議論を深め、来年度の介護報酬改定の具体策をめぐる検討を秋以降に本格化させる予定だ。", "categories": ["介護保険・制度", "医療・健康"], "is_new": false}, {"title": "財務省の私大削減案に懸念　日本ソーシャルワーク教育学校連盟が緊急声明 - 福祉新聞Web", "url": "https://fukushishimbun.com/jinzai/45379", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-26 14:00", "description": "日本ソーシャルワーク教育学校連盟（ソ教連、中村和彦会長）は８日、財務省が提案している私立大学の削減案について懸念する緊急声明を発表した。福祉系大学の機械的な削減は地域を支える基盤が失われるとして、維持するための支援策などを要望。ソ教連は「福祉系大学を減らせば、適切なサービスを受けられない高齢者が続出する」と危機感を募らせている。 財務省は４月２３日に開いた財政制度等審議会の分科会で、２０２４年時点で６２４校ある私大の４割を４０年までに削減するよう提案した。 背景には１８歳人口の急減がある。２４年時点では１０９万人で、１９８９年より８９万人も減少。一方、私大数は８１３校と３１４校も増え、半数以上が定員割れとなっている。この結果、財務省は義務教育で学ぶ内容の授業をする大学もあると批判している。 これに対し、松本洋平文部科学大臣は４月２４日の会見で「機械的に判断するのではなく、分野や地域のリバランスを図りながら質の高い大学教育を実現することが重要」と説明。地域の福祉や医療、産業、インフラなどを支える人材と高等教育へのアクセスの確保を目指すべきとの考えを示した。 ソ教連の声明はこうした松本大臣", "content": "財務省の私大削減案に懸念 日本ソーシャルワーク教育学校連盟が緊急声明\n2026年05月26日 福祉新聞編集部日本ソーシャルワーク教育学校連盟（ソ教連、中村和彦会長）は８日、財務省が提案している私立大学の削減案について懸念する緊急声明を発表した。福祉系大学の機械的な削減は地域を支える基盤が失われるとして、維持するための支援策などを要望。ソ教連は「福祉系大学を減らせば、適切なサービスを受けられない高齢者が続出する」と危機感を募らせている。\n財務省は４月２３日に開いた財政制度等審議会の分科会で、２０２４年時点で６２４校ある私大の４割を４０年までに削減するよう提案した。\n背景には１８歳人口の急減がある。２４年時点では１０９万人で、１９８９年より８９万人も減少。一方、私大数は８１３校と３１４校も増え、半数以上が定員割れとなっている。この結果、財務省は義務教育で学ぶ内容の授業をする大学もあると批判している。\nこれに対し、松本洋平文部科学大臣は４月２４日の会見で「機械的に判断するのではなく、分野や地域のリバランスを図りながら質の高い大学教育を実現することが重要」と説明。地域の福祉や医療、産業、インフラなどを支える人材と高等教育へのアクセスの確保を目指すべきとの考えを示した。\nソ教連の声明はこうした松本大臣の見解について支持を表明した。福祉系大学の削減は単に一つの教育機関の減少だけでなく、地域を支える専門職養成の循環がなくなると訴えている。\nその上で声明は、機械的な縮減ではなく、専門職の養成機能や卒業生の地域定着、自治体と福祉現場の連携などを総合的に評価するよう要請。社会人学生の受け入れや大学間の連携などにより、地域に必要な福祉人材の養成機能を維持する支援策を求めた。\nまた今後、養成校だけでなく福祉事業者や社会福祉協議会、自治体などの意見を十分に聞くよう訴えている。\nソ教連は現在、社会福祉士や精神保健福祉士を養成する大学や専門学校など２４２校で構成。すでに少子化の影響で２０１７年の２８０校から２割減少している。会員校が送り出す卒業生は年１万８０００人以上に上る。\nソ教連は「一度なくした養成校を復活させるのは不可能に近い。これから国内の高齢者が増加するにもかかわらず、福祉系大学を減らせば、適切なサービスを受けられないケースが続出するのは間違いない」と話している。", "summary": "福祉系大学の機械的な削減は地域を支える基盤が失われるとして、維持するための支援策などを要望。ソ教連は「福祉系大学を減らせば、適切なサービスを受けられない高齢者が続出する」と危機感を募らせている。福祉系大学の削減は単に一つの教育機関の減少だけでなく、地域を支える専門職養成の循環がなくなると訴えている。ソ教連は現在、社会福祉士や精神保健福祉士を養成する大学や専門学校など２４２校で構成。", "categories": ["福祉・社会保障", "人材育成・HR"], "is_new": false}, {"title": "上野厚労相、リハビリ現場を視察　人材確保などの課題に「戦略的な政策を」", "url": "https://www.joint-kaigo.com/articles/46267/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-26 12:16", "description": "上野賢一郎厚生労働相は25日、リハビリテーションの現場の実態を把握するため、慶應義塾大学病院と初台リハビリテーション病院を視察した。【Joint編集部】 視察後に取材に応じた上野厚労相は、現場の課題解決に向けて「しっかり […]", "content": "上野賢一郎厚生労働相は25日、リハビリテーションの現場の実態を把握するため、慶應義塾大学病院と初台リハビリテーション病院を視察した。【Joint編集部】\n視察後に取材に応じた上野厚労相は、現場の課題解決に向けて「しっかりとした政策を戦略的に取ることができるよう努めていきたい」と意欲を示した。\n厚労省は今月19日、省内の関係部局を横断して政策を推進する「リハビリテーション統括調整室」を新設したばかり。ここを中心に医療や介護、予防などにまたがるリハビリテーション政策を国家戦略として推進する考えで、必要性に応じて制度改正も検討していく構えをみせている。\n上野厚労相は取材陣に対し、視察した両病院の職員らと行った意見交換の中で、リハビリテーション分野の人材確保や研修などの課題について話を聞いたと説明。患者や利用者がリハビリテーションを切れ目なく受けられる体制を構築することの重要性を、前線に立つ関係者から改めて指摘されたとも述べた。\nリハビリテーション専門職の賃上げについては、「他産業と遜色のない処遇改善を目指していく方針は今後も変わらない」と強調。報酬改定など現行の施策の効果を見極めつつ、「今後の対応をしっかり検討していかなければならない」との意向を示した。", "summary": "上野賢一郎厚生労働相は25日、リハビリテーションの現場の実態を把握するため、慶應義塾大学病院と初台リハビリテーション病院を視察した。厚労省は今月19日、省内の関係部局を横断して政策を推進する「リハビリテーション統括調整室」を新設したばかり。ここを中心に医療や介護、予防などにまたがるリハビリテーション政策を国家戦略として推進する考えで、必要性に応じて制度改正も検討していく構えをみせている。リハビリテーション専門職の賃上げについては、「他産業と遜色のない処遇改善を目指していく方針は今後も変わらない」と強調。", "categories": ["医療・健康", "人材育成・HR"], "is_new": false}, {"title": "介護の人員欠如減算、猶予特例を６月開始〈厚労省〉 - 福祉新聞Web", "url": "https://fukushishimbun.com/series05/45376", "source": "福祉新聞", "lang": "ja", "content_type": "care", "category_hint": "福祉・社会保障", "published": "2026-05-26 10:00", "description": "厚生労働省は８日、介護職員の配置基準を下回った際に適用される「人員基準欠如減算」を猶予する特例措置を６月から開始すると発表した。深刻な人材不足が続く介護現場への配慮が狙い。 現行制度では、特別養護老人ホームなどで介護職員やケアマネジャー、看護職員らの配置数が基準を下回った場合、翌月以降の介護給付費を原則３割減額する。制度創設時から設けられている仕組みだが、厚労省の審議会では「人材不足が深刻化する中、直ちに３割減算とするのは経営悪化につながりかねない」などとして、見直しを求める意見が出ていた。 特例では、職員や家族の突発的な体調不良など、やむを得ない事情で一時的に人員基準を満たせなくなった場合は年１回に限り、最長３カ月間、減算の適用を猶予する。 福祉人材センターやハローワークなどを通じて職員募集することや、事業所のウェブサイトで採用情報を公表することなどを条件とした。 特例の適用を受ける際は、人員基準を下回った月の翌月までに、所定様式に必要事項を記入し、報告時点で有効な求人票の写しを添付し、都道府県へ提出する必要がある。 福祉新聞Web", "content": "介護の人員欠如減算、猶予特例を６月開始〈厚労省〉\n2026年05月26日 福祉新聞編集部厚生労働省は８日、介護職員の配置基準を下回った際に適用される「人員基準欠如減算」を猶予する特例措置を６月から開始すると発表した。深刻な人材不足が続く介護現場への配慮が狙い。\n現行制度では、特別養護老人ホームなどで介護職員やケアマネジャー、看護職員らの配置数が基準を下回った場合、翌月以降の介護給付費を原則３割減額する。制度創設時から設けられている仕組みだが、厚労省の審議会では「人材不足が深刻化する中、直ちに３割減算とするのは経営悪化につながりかねない」などとして、見直しを求める意見が出ていた。\n特例では、職員や家族の突発的な体調不良など、やむを得ない事情で一時的に人員基準を満たせなくなった場合は年１回に限り、最長３カ月間、減算の適用を猶予する。\n福祉人材センターやハローワークなどを通じて職員募集することや、事業所のウェブサイトで採用情報を公表することなどを条件とした。\n特例の適用を受ける際は、人員基準を下回った月の翌月までに、所定様式に必要事項を記入し、報告時点で有効な求人票の写しを添付し、都道府県へ提出する必要がある。", "summary": "介護の人員欠如減算、猶予特例を６月開始〈厚労省〉\n2026年05月26日 福祉新聞編集部厚生労働省は８日、介護職員の配置基準を下回った際に適用される「人員基準欠如減算」を猶予する特例措置を６月から開始すると発表した。現行制度では、特別養護老人ホームなどで介護職員やケアマネジャー、看護職員らの配置数が基準を下回った場合、翌月以降の介護給付費を原則３割減額する。特例では、職員や家族の突発的な体調不良など、やむを得ない事情で一時的に人員基準を満たせなくなった場合は年１回に限り、最長３カ月間、減算の適用を猶予する。福祉人材センターやハローワークなどを通じて職員募集することや、事業所のウェブサイトで採用情報を公表することなどを条件とした。", "categories": ["人材育成・HR", "施設運営・経営"], "is_new": false}, {"title": "Notes on Pope Leo XIV's encyclical on AI", "url": "https://simonwillison.net/2026/May/25/encyclical-on-ai/#atom-entries", "source": "Simon Willison's LLM Notes", "lang": "en", "content_type": "tech", "category_hint": "AIツール・生産性", "published": "2026-05-26 08:58", "description": "Dropped this morning by the Vatican: Magnifica Humanitas of His Holiness Pope Leo XIV on Safeguarding the Human Person in the Time of Artificial Intelligence . This is a very interesting document. It's some of the clearest writing I've seen on the ethics of integrating AI into modern society. Pope Leo XIV chose the name Leo in honor of Pope Leo XIII, who is known for his 1891 Rerum novarum encyclical on \"Rights and Duties of Capital and Labor\". This story on Vatican News further clarifies the si", "content": "Notes on Pope Leo XIV’s encyclical on AI\n25th May 2026\nDropped this morning by the Vatican: Magnifica Humanitas of His Holiness Pope Leo XIV on Safeguarding the Human Person in the Time of Artificial Intelligence. This is a very interesting document. It’s some of the clearest writing I’ve seen on the ethics of integrating AI into modern society.\nPope Leo XIV chose the name Leo in honor of Pope Leo XIII, who is known for his 1891 Rerum novarum encyclical on “Rights and Duties of Capital and Labor”.\nThis story on Vatican News further clarifies the significance of that decision:\nMeeting with the College of Cardinals for their first formal encounter after his election, Pope Leo XIV explained part of the reason for the choice of his papal name. \"There are different reasons for this,\" he said, before going on to explain that he chose the name Leo \"mainly because Pope Leo XIII, in his historic encyclical Rerum novarum addressed the social question in the context of the first great industrial revolution.\"\n“In our own day,” he continued, “the Church offers to everyone the treasury of her social teaching in response to another industrial revolution and to developments in the field of artificial intelligence that pose new challenges for the defence of human dignity, justice, and labour.”\nAnd now we get Pope Leo XIV’s own encyclical on the AI revolution. There’s a lot in here, but the writing style is very approachable, including to non-Catholics.\nA few of my highlights\n(I listened to most of the encyclical on a walk with our dog, my first time trying the ElevenReader iPhone app. It worked very well: I pasted in a URL to the document and it read it to me in a very high quality voice, highlighting each paragraph as it went.)\nHere are some of my highlights. In each case below emphasis is mine.\nHere’s a useful description of the interpretability problem for LLMs in section 98:\nFirst, any statement regarding AI risks becoming quickly outdated, given the remarkable pace at which these systems are developing. Second, all of us, including those who design them, possess only a limited understanding of their actual functioning. Indeed, current AI systems are more “cultivated” than “built,” for developers do not directly design every detail, but instead create a framework within which the intelligence “grows.” As a result, fundamental scientific aspects — such as the internal representations and computational processes of these systems — remain, at present, unknown.\nI liked section 83’s description of the relationship between development and dignity:\nFor individuals as well as for nations, development is both a duty and a right. Minimum conditions are required for enabling every person and people to flourish in accord with their dignity, without being kept in a state of dependence or excluded from access to necessary goods. Development is truly human when it places people at the center instead of the accumulation of wealth, and when it concerns peoples as well as individuals. Justice demands the recognition of the rights of society and the rights of peoples, and includes a responsibility toward future generations. Development is not truly human if it increases consumption for some while shifting costs and burdens onto others, or relegates entire regions to subordinate roles, preventing them from realizing their full potential.\nBaked in cultural biases and sycophancy get a mention in section 100:\nIn personal use, three aspects in particular deserve careful consideration: the ease with which results are obtained, the impression of objectivity and the simulation of human communication. The speed and simplicity with which information, complex analyses, media content and practical assistance can be accessed undoubtedly makes life easier. Yet they can also encourage excessive reliance and the search for ready-made answers, and weaken personal creativity and judgment. The apparent objectivity of the responses and suggestions these systems provide can lead us to overlook the fact that they reflect the cultural assumptions of those who designed and trained them, with all their strengths and limitations. The artificial imitation of positive human communication — words of advice, empathy, friendship and even love — can be engaging and at times genuinely helpful. However, for less discerning users, it can also be misleading, creating the illusion of a relationship with a real personal subject. When words are simulated, they do not build genuine relationships, but only their appearance. The artificial imitation of care or support can become particularly risky when it enters contexts where real relationships and emotional bonds are lacking.\n101 touches on the environmental impact:\nCurrent AI systems require enormous amounts of energy and water, significantly influencing carbon dioxide emissions, and place heavy demands on natural resources. As their complexity increases, especially in the case of large language models, the need for computing power and storage capacity grows too, which requires an extensive network of machines, cables, data centers and energy-intensive infrastructure. For this reason, it is essential to develop more sustainable technological solutions that reduce environmental impact and help protect our common home.\n102 covers the risks of algorithmic systems making decisions that impact people’s lives without “compassion, mercy, forgiveness”:\nThe use of AI is never a purely technical matter: when it enters processes that affect people’s lives, it touches on rights, opportunities, status and freedom. Important and sensitive decisions — concerning employment, credit, access to public services or even a person’s reputation — risk being fully delegated to automated systems that do not know “compassion, mercy, forgiveness, and above all, the hope that people are able to change,” and can therefore give rise to new forms of exclusion.\n105 emphasizes the need for human accountability in how these systems are applied:\nFor AI to respect human dignity and truly serve the common good, responsibility must be clearly defined at every stage: from those who design and develop these systems to those who use them and rely on them for concrete decisions. In many cases, however, the internal processes leading to a result remain opaque, making it harder to assign responsibility and correct errors. This is where accountability becomes crucial: the possibility of identifying who must “account” for decisions, justify them, monitor them, and, when necessary, challenge them and remedy any harm caused.\nAnd 108 touches on the way AI amplifies the power of those with resources:\nIn fact, as with every major technological shift, AI tends to amplify the power of those who already possess economic resources, expertise and access to data. In light of the common good and the universal destination of goods, this raises serious concerns, since small but highly influential groups can shape information and consumption patterns, influence democratic processes and steer economic dynamics to their own advantage, undermining social justice and solidarity among peoples. For this reason, it is essential that the use of AI, especially when it touches on public goods and fundamental rights, be guided by clear criteria and effective oversight, grounded in participation and subsidiarity.\nThat same section explicitly calls out data as something that should be thought of more as a public good:\n[...] Moreover, ownership of data cannot be left solely in private hands but must be appropriately regulated. Data is the product of many contributors and should not be treated as something to be sold off or entrusted to a select few. It is necessary to think creatively in order to manage data as a common or shared good, in a spirit of participation, as Saint John Paul II already suggested regarding collective goods.\nGiven that Palantir is named after a Lord of the Rings reference, I can’t help but wonder if the J.R.R. Tolkien quote from The Return of the King (section 213) was the Pope throwing a little shade at Peter Thiel.\nThe twentieth-century Catholic author J.R.R. Tolkien, in the words of a protagonist in one of his novels, described our responsibility in this way: “It is not our part to master all the tides of the world, but to do what is in us for the succour of those years wherein we are set, uprooting the evil in the fields that we know, so that those who live after may have clean earth to till.” The civilization of love will not arise from a single or spectacular gesture, but from the sum total of small and steadfast acts of fidelity that serve as a bulwark against dehumanization. For this reason, it is worthwhile pausing to reflect on some aspects of how we, each in our own way, can cooperate in building the civilization of love.\nAnother 2026 prediction down\nOn 6th January this year I joined the Oxide and Friends 2026 predictions podcast episode to talk about predictions for 2026, 2029 and 2032. I wrote mine up here, with hindsight they weren’t nearly ambitious enough—it’s already undeniable that LLMs write good code, we’ve made huge advances in sandboxing and New Zealand kākāpō have indeed had a truly excellent breeding season.\nThere’s one segment from the episode that I didn’t bother to include in my write-up, but that I can’t resist providing as a lightly-edited transcript here:\nBryan Cantrill: 37:13\nI think that AI has created some real public perception problems for itself. And I think that you are gonna have one of the frontier model companies, this year, have a white paper explaining how the proliferation of AI will mean prosperity for everybody. They will be trying to make some economic argument—because this is gonna be a 2026 election issue, how we think of these things and how they are regulated and it’s a big mess. There’s more heat than light in this debate.\nSimon Willison: 38:05\nI’d like to tag something on to that one: I think that only works if they can sort of wash that through existing trusted experts. Sam Altman and Dario are constantly publishing essays about this stuff and nobody believes a word they say. Get Barack Obama’s signature on one of these position papers and maybe you’ve got something people might start to trust a little bit.\nAdam Leventhal: 38:27\nOtherwise, it’s just like “leaded gas is good for you”, says Exxon.\nBryan Cantrill: 38:31\nI mean, yeah. God. Obama... let’s go with that, that’s a great one because if it’s like Bill Clinton everyone’s gonna kind of roll their eyes, so it’s gotta be someone who’s got real credibility saying that this is gonna be broad-based... I’d say if they get that person to do it, it’s gonna be revealed that that’s also a bit crooked.\nSimon Willison: 38:57\nHow about the Pope?\nBryan Cantrill: 39:01\nThe Pope is very into this stuff! That’s a great prediction. We’ve hit pay dirt. The Pope weighing in on LLMs and their economic impact on the world.\nSimon, I’m giving you full credit if the Pope weighs in believing that this is gonna be economic devastation.\nMy prediction here looks a whole lot less insightful given the Leo XIV/Leo XIII relationship, which I was unaware of when we recorded the episode!\nMore recent articles\n- Claude Opus 4.8: \"a modest but tangible improvement\" - 28th May 2026\n- I think Anthropic and OpenAI have found product-market fit - 27th May 2026", "summary": "Notes on Pope Leo XIV’s encyclical on AI\n25th May 2026\nDropped this morning by the Vatican: Magnifica Humanitas of His Holiness Pope Leo XIV on Safeguarding the Human Person in the Time of Artificial Intelligence. Pope Leo XIV chose the name Leo in honor of Pope Leo XIII, who is known for his 1891 Rerum novarum encyclical on “Rights and Duties of Capital and Labor”. Simon Willison: 38:57\nHow about the Pope?. Bryan Cantrill: 39:01\nThe Pope is very into this stuff!.", "categories": ["業務改善・介護テック"], "is_new": false, "title_ja": "AIに関する教皇レオ14世の回勅についてのメモ", "summary_ja": "AIに関する教皇レオ14世の回勅についてのメモ\n2026 年 5 月 25 日\n今朝バチカンから発表された：人工知能の時代における人間の保護についての教皇レオ14世のマグニフィカ・フマニタス。教皇レオ 14 世は、「資本と労働の権利と義務」に関する 1891 年の回勅「レルム・ノヴァルム」で知られる教皇レオ 13 世に敬意を表して、レオという名前を選びました。サイモン・ウィリソン: 38:57\n教皇はどうですか？ブライアン・カントリル: 39:01\n教皇はこのことにとても興味があります!"}, {"title": "医療・介護のAI活用、高市首相が一層の推進を指示　ケアプラン作成や記録など効率化　現場の負担を軽減", "url": "https://www.joint-kaigo.com/articles/46252/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-25 20:38", "description": "政府は22日に開催した経済財政諮問会議で、今後の社会保障制度の改革を俎上に載せた。【Joint編集部】 高市早苗首相はこの中で、医療・介護分野のDX、AIやロボティクスの活用を一層推進するよう関係閣僚に指示した。労働供給 […]", "content": "2026年5月25日\n医療・介護のAI活用、高市首相が一層の推進を指示 ケアプラン作成や記録など効率化 現場の負担を軽減\n政府は22日に開催した経済財政諮問会議で、今後の社会保障制度の改革を俎上に載せた。【Joint編集部】\n高市早苗首相はこの中で、医療・介護分野のDX、AIやロボティクスの活用を一層推進するよう関係閣僚に指示した。労働供給制約が強まっていく中で、より効率的な体制を構築してサービスの質の確保につなげる狙いがある。\n今回の諮問会議では、民間議員が「限られた人材・財源の下でも持続可能なサービス提供体制へ転換していく必要がある」と提言。ケアプランの作成支援や音声入力、フィジカルAIによる介護支援など、AIを最大限に活用して現場の負担軽減と生産性の向上を一体的に進めるべきと促した。\nこのほか上野賢一郎厚生労働相も、「これまでの人材確保は各分野の縦割りで量的なマンパワーの確保に終始し、デジタル・AI時代の変化に対応できていない」と指摘。AIによる業務改革などと介護職員らの処遇改善をセットで進める意向を示し、「デジタル・AI時代の変化に対応した効率的・安定的な地域の人材の確保・養成」を図る方針を打ち出した。", "summary": "【Joint編集部】\n高市早苗首相はこの中で、医療・介護分野のDX、AIやロボティクスの活用を一層推進するよう関係閣僚に指示した。労働供給制約が強まっていく中で、より効率的な体制を構築してサービスの質の確保につなげる狙いがある。このほか上野賢一郎厚生労働相も、「これまでの人材確保は各分野の縦割りで量的なマンパワーの確保に終始し、デジタル・AI時代の変化に対応できていない」と指摘。AIによる業務改革などと介護職員らの処遇改善をセットで進める意向を示し、「デジタル・AI時代の変化に対応した効率的・安定的な地域の人材の確保・養成」を図る方針を打ち出した。", "categories": ["業務改善・介護テック", "人材育成・HR"], "is_new": false}, {"title": "日本ケアマネジメント学会が研究大会　「暮らしを耕す」をテーマに多角的な議論を展開", "url": "https://www.joint-kaigo.com/articles/46237/", "source": "JOINT 介護ニュース", "lang": "ja", "content_type": "care", "category_hint": "施設運営・経営", "published": "2026-05-25 17:06", "description": "日本ケアマネジメント学会の第25回研究大会が5月23日、24日の両日に福井県福井市で開催された。【Joint編集部】 今回は「暮らしを耕すケアマネジメント 〜いのち・日常・環境にかかわるケアマネジャーの仕事を考える〜 」 […]", "content": "日本ケアマネジメント学会の第25回研究大会が5月23日、24日の両日に福井県福井市で開催された。【Joint編集部】\n今回は「暮らしを耕すケアマネジメント 〜いのち・日常・環境にかかわるケアマネジャーの仕事を考える〜 」をメインテーマに掲げた。\n初日の23日には、福井県医師会会長の池端幸彦氏による基調講演「これからのケアマネジャーの使命」や、福井県立大学名誉教授の奥西栄介氏による大会長講演「暮らしを耕すケアマネジメント」が行われた。\nまた、食事・嚥下ケアや認知症ケア、障害者ケア、ヤングケアラーへの対応など、複雑化・複合化する今日的な課題をテーマとした多彩なシンポジウムやワークショップ、口頭発表が展開された。\n学会の理事長を務める国際医療福祉大学大学院教授の白澤政和氏は、「新たなケアマネジメントの可能性を探る」と題した講演の中で、介護報酬の給付対象とならない業務をケアマネジャーが担っている地域の状況にも言及。ケアマネジメントの一時的・代替的な機能について、その重要性を指摘しつつ、「ケアマネジャーの仕事ではないとは言えない」との認識を示した。\nそのうえで、「そこに介護報酬がつかないところに課題がある。介護報酬上の議論をきちんと主張することが必要だ」と述べた。白澤氏はこのほか講演で、AIには代替できないケアマネジャーの専門性・創造性の追求、高齢者の強みに着目する「ストレングスモデル」の実践、本人の生きがいの支援など、多角的な視点から今後のケアマネジメントの可能性を展望した。", "summary": "日本ケアマネジメント学会の第25回研究大会が5月23日、24日の両日に福井県福井市で開催された。【Joint編集部】\n今回は「暮らしを耕すケアマネジメント 〜いのち・日常・環境にかかわるケアマネジャーの仕事を考える〜 」をメインテーマに掲げた。初日の23日には、福井県医師会会長の池端幸彦氏による基調講演「これからのケアマネジャーの使命」や、福井県立大学名誉教授の奥西栄介氏による大会長講演「暮らしを耕すケアマネジメント」が行われた。ケアマネジメントの一時的・代替的な機能について、その重要性を指摘しつつ、「ケアマネジャーの仕事ではないとは言えない」との認識を示した。", "categories": ["福祉・社会保障", "介護保険・制度"], "is_new": false}, {"title": "How To Deal With Regret ( 3 Stoic Strategies to Live Free)", "url": "https://dailystoic.com/how-to-deal-with-regret-3-stoic-strategies-to-live-free/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-08-24 01:48", "description": "What Is Regret? “Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic After a long day at work and terrible traffic, […] The post How To Deal With Regret ( 3 Stoic Strategies to Live Free) appeared first on Daily Stoic .", "content": "What Is Regret?\n“Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic\nAfter a long day at work and terrible traffic, you finally make it home. The stress has taken its toll, and you’re exhausted, bored, and frustrated with the day’s events all at once. You walk into your kitchen to find a heaping pile of dishes–something you asked your spouse to take care of this morning! Yet, they’re relaxing in front of the TV as if nothing’s wrong.\nYou feel the anger rising up, and unable to control yourself, you yell at your spouse. You don’t hold back. You’re out to make a point, to prove that what happened is a really big deal.\nYour spouse is frightened and embarrassed. They’re worried–you’ve never yelled at them like this before. They were going to do the dishes later, but you never gave them that opportunity. The day’s been long for them too, yet you didn’t care. They just wanted to have a nice night with you, but now that’s ruined.\nLater that night, you finally start to understand what losing your temper has cost you. You know you shouldn’t have said what you said. You should have been more considerate. You should have acted differently–you regret your choices.\nMaybe for you it wasn’t a pile of dishes that set you off. Maybe it was your kids using markers on the wall. Or your boss dumping that report on you before your vacation. Regardless of the scenario, we’ve all lost it at some point, and we’ve all felt the pang of regret.\nThe Stoics would define regret as the moment when past events consume our present lives. When we dwell over things we have no control over. When we resist our fate. Marcus Aurelius argued that we must be “satisfied with what [we] have, and accept the present–all of it.” Regret is the contrary–when we’re not satisfied with what we have, when we reject what we’ve been given.\nSeneca said “we often suffer more in imagination than in reality.” He was saying that regret is no more than an emotion of our imagination. We believe that had we said something (or held our tongue), had we acted differently, the outcome would have been different.\nMarcus Aurelius carried a similar mindset, and provided a solution to this problem. “External things are not the problem. It is your assessment of them. Which you can erase right now.”\nLet’s take another look at that “fight” you had with your spouse. Your regrets are not about the actual dishes or your spouse–it’s about your perception of expectations. You expected your spouse to have the dishes done when you got home. So you believe it should have been different, and had it been different, you would be better off.\nSo does that mean it’s your spouse’s fault? Maybe for leaving the dishes in the sink. But certainly not for your overreaction. And definitely not for the regret you felt later that night. Regret is an internal problem, to be both diagnosed and treated by ourselves. We must learn to look past these “self-focused emotions” and master our feelings of regret. This post aims to help you understand your emotions, use the past to your advantage, and conquer your biggest regrets.\nWhy Do I Feel Regret?\n“Life is very short and anxious for those who forget the past, neglect the present, and fear the future” – Seneca\nWe’ve all told ourselves, “no regrets.” There are countless memes, inspirational quotes, and videos reminding us online. Poets, singers, painters, and writers have been creating art about it for millenia. We’ve practically been conditioned to live by it.\nBut no matter how many times we read about it, sing along to a song about it, or tell ourselves not to, we all have something we regret. We all have that nagging feeling that comes back to us. That hits us exactly when we thought we forgot about that time, that place, those people. It comes back at the very worst time. It sucks. It hurts.\nThe power of regret is not to be understated. Bestselling author and founder of the American Regret Project Daniel Pink found that 82 percent of Americans experience regret at least occasionally. Pink describes regret as “an indispensable emotion,” yet also claims it can be “a positive instrument for improving your life.”\nIf we truly want to improve our life, we can’t run away from these negative feelings. We can’t hide them. But should we just accept this despair? Should we just come to terms living with regret?\nThis is what the great writer Samuel Johnson must have been wondering near the end of 1775. With 1776 on the horizon, Johnson wrote in his diary:\n“When I look back on resolutions of improvement and amendment which have year after year been made and broken, either by negligence, forgetfulness, vicious idleness, casual interruption, or morbid infirmity; when I find that so much of my life has been stolen unprofitably away, and that I can descry by retrospection scarcely a few single days properly and vigorously employed, why do I yet try to resolve again? I try because reformation is necessary and despair is criminal.”\nJohnson came to terms with his past, but not with his regret. He chose to reflect upon his hardships in order to better himself, to avoid making those same mistakes in the future. He chose to fight regret–not to wallow in it.\nIf there’s one thing we can learn from Johnson, it must be that experiencing regret is inevitable–but our actions and our mindset are not. Thus, the question is not ‘Why do I feel regret?’, but rather ‘How do I deal with it?’ ‘How do I move on?’ ‘How can I make myself better because of this?’ In order to answer these questions, the Stoics practiced the following strategies to help them build their mental toughness and resilience–starting with examining what they controlled.\nFocus On What You Control\n“Every event has two handles, one by which it can be carried, and one by which it can’t. If your brother does you wrong, don’t grab it by his wronging, because this is the handle incapable of lifting it. Instead, use the other—that he is your brother, that you were raised together, and then you will have hold of the handle that carries.” – Epictetus\nOne of the most important practices in Stoic philosophy, which was introduced by Epictetus, is determining what we control and what we don’t. What we have power over and what we don’t. What we can change and what we can’t.\nThere are two ways in which we can look at the past–two handles we can grab, to use Epictetus’ quote. The first handle forces us to perceive the past as an inevitable experience, destined to wrong and hurt us from the beginning. The opposite handle, however, allows us to extract the good parts, and use our experiences to benefit ourselves.\nIn looking at past decisions, we must grab them by the latter handle. We must understand that what happened, happened. We must see that we can’t change the past, no matter how much it hurt us or someone else. So what good does regret do?\nAbsolutely nothing, as Holocaust survivor and author Dr. Edith Eger explained to Ryan Holiday on an episode of The Daily Stoic Podcast. Ryan was discussing a relationship he regretted messing up, and Dr. Eger offered him one gift that would solve the guilt right then. “I give you a sentence,” she said, “One sentence—if I knew then what I know now, I would have done things differently.” That’s the end of that, she said. “Guilt is in the past, and the one thing you cannot change is the past.”\nAs a society we’ve become disillusioned by the idea of what we control. We all believe we have some control over the outcome of whatever we encounter. We all believe that if we keep thinking about what happened, somehow we’ll be able to change what happened.\nYet, we must come to terms with the fact that some things simply can’t be changed. We must understand that some things are in our control and some that aren’t. Say, if you regret getting a haircut, you’re in control. You can style it, cover it, or just wait for it to grow out again–you command your situation. But if you regret cursing out your boss before quitting your job, you’re not in control–you can’t take back your words.\nAs Marcus Aurelius wrote to himself—and by extension, to us:\n“Remind yourself that past and future have no power over you. Only the present—and even that can be minimized. Just mark off its limits. And if your mind tries to claim that it can’t hold out against that…well, then, heap shame upon it.”\nThe past is done. We can’t linger in our insecurities. We can’t ponder over our regrets. We must learn that what happened is out of our control now–we must let go.\n“Letting go is a necessary, if sometimes heart-wrenching gateway to genuine transformation,” is how the always-zen basketball coach Phil Jackson put it. The Stoics called it the “art of acquiescence”—the giving up and the assenting of whatever things are so that they can be what they are to become.\nIn one way, regret is just wishing things went the way we wanted them to. But by letting things become what they must, we are less likely to regret what we’ve done. In accepting that some things are simply out of our control, we are less likely to wish for a different outcome.\nThe past is something we can’t control anymore. We can’t change what we said, what we did, or how we felt.\nWe can, however, control the present. We control how we grow from our experiences. We control how we respond to adversity. We control how we can use our regret to our advantage.\nWe control how we act right now. We must.\nTo learn more on this topic, check out “You Control How You Play”, where Ryan speaks to the Cleveland Browns about the importance of perspective, staying motivated, and knowing what they control.\nLove Your Fate\n“A blazing fire makes flame and brightness out of everything that is thrown into it.” – Marcus Aurelius\nAfter we sort out what we control, we must find how to respond–regardless if we control what’s happening or not. We must determine how we handle ourselves. We must determine how we overcome obstacles. We must determine how to move forward.\nIn the first book of his Discourses, Epictetus envisions himself being executed by Roman guards, his life out of his control. In a display of tranquility and wisdom, he lays out his thoughts:\n“I must die. But must I die bawling? I must be put in chains–but moaning and groaning too? I must be exiled; but is there anything to keep me from going with a smile, calm and self-composed.”\nThough the term was first coined by German philosopher Friedrich Nietzsche, the practice of amor fati–loving your fate–dates back to Epictetus and the Stoics. Often by means of reflection and meditation, the Stoics would use this practice to settle past trauma and help them achieve a greater sense of inner peace. “The Fates guide the person who accepts them,” Cleanthes said, “and hinder the person who resists them.”\nAmor fati is more than just understanding what happens to us. It’s understanding that our perception doesn’t always have to be negative. It’s understanding that accepting the present circumstances will make us better. It’s understanding that we must be grateful for the cloudy weather sometimes–and that there’s always a way through the storm.\nWe all face hardships. We all get stuck in traffic. We all deal with slow WiFi, or bad cell service, right when we need to send that important message. As rational people, we tend to think that these hardships were made specifically for us. That the world is out to get us. That we can’t win.\nBut this couldn’t be farther from the truth. Everybody goes through obstacles. Everybody gets tripped up sometimes. As we talked about in the first section, we can’t control some things in life. And these hardships, no matter how hard we try, will always be out of our control.\nWhen we accept what happens to us, after understanding that certain things— particularly bad things—are outside our control, we are left with this: loving whatever happens to us and facing it with unfailing cheerfulness and strength. As bestselling author Robert Greene (48 Laws of Power, Mastery) put it, we need to, “accept the fact that all events occur for a reason, and that it is within your capacity to see this reason as positive.”\nMarcus Aurelius portrays this concept perfectly in Meditations through the image of an artisans shop:\n“There are thorns on the path, then keep away! Enough said. Why ponder the existence of nuisance? Such thinking would make you a laughing-stock to the true student of Nature, just as a carpenter or cobbler would laugh if you pointed out the sawdust and chips on the floors of their shops. Yet while those shopkeepers have dustbins for disposal, Nature has no need of them.”\nWhy get tripped up by the thorns? Why ponder over the sawdust on your floor? It’s simply part of nature! As long as you have the capability to see them, you have the capability to move past them.\nIn practicing amor fati, we’re also less likely to have regrets in the future. By embracing the challenges that lay ahead of us, we’re less likely to regret the decisions we make to conquer them – regardless of the outcome. We’re able to tackle the future with confidence, conviction, courage, and so much more.\nAmor fati is more than just a mindset–it’s a way of life. Incorporating amor fati into your life will take time, effort, and sacrifices that probably won’t feel comfortable. But we must. We must move past this existential angst. We must move forward, away from our regret, and towards our future.\nLove what’s happened to you. Love who you’ve become, and how much you’ve changed. Love your fate–amor fati.\nCarry this reminder with you every day with our amor fati medallion from the Daily Stoic Store. Carry this in your pocket as a reminder to treat each and every moment–no matter how challenging–as something to be embraced, not avoided.\nLook Ahead\n“We should project our thoughts ahead of us at every turn and have in mind every possible eventuality instead of only the usual course of action.” – Seneca\nBefore Ryan Holiday gets on stage for a big speech, he runs through everything that could go wrong: trouble with the microphone, the clicker not advancing a slide, the audience not reacting as anticipated. He is able to see potential problems before they arise, and come up with solutions before anything actually happens. He is able to prevent himself from being overwhelmed if a problem arises by being prepared.\n“Rehearse them in your mind: exile, torture, war, shipwreck,” Seneca said. “All the terms of our human lot should be before our eyes.”\nThis practice, called premeditatio malorum, is one of the oldest and most common practices in Stoic philosophy. It literally means the “premeditation of evils.” The Stoics used this practice to help them prepare for life’s inevitable hardships, and remain calm and confident in turbulent times.\nThe world isn’t fair. We all know this. We don’t always get what is ours, even if we’ve earned it. We don’t always win, even if we play hard.\nBut we can’t be surprised when we don’t win. If it comes as a constant surprise each and every time something unexpected occurs, you’re not only going to be miserable whenever you attempt something big, you’re going to have a much harder time accepting it and moving on to attempts two, three, and four. You’re going to have a much harder time living in the present instead of lingering in the past. You’re going to have a much harder time trusting your instincts–and fighting regret.\nThere’s perhaps no better personification of premeditatio malorum than the great Booker T. Washington. Washington ran a school with 1,500 students, all while advising politicians and activists and traveling across the country to give speeches. But how? How did he maintain this lifestyle, and with such striking success?\n“When I begin my work in the morning, I expect to have a successful and pleasant day of it, but at the same time I prepare myself to hear that one of our school buildings is on fire, or has burned, or that some disagreeable accident had occurred, or that someone has abused me in a public address or a printed article, for something that I have done or omitted to do, or or something that he had heard that I had said—probably something I had never thought of saying.”\nHe envisioned the worst possible things that could happen to him throughout his day. Not only envisioned, but he expected them to happen. In doing this, Washington was more prepared for the hardships of the day. A canceled train couldn’t be as bad as his school burning down. Being late to dinner couldn’t be as bad as someone verbally abusing him in public.\nIn preparing himself for challenges, Washington was simultaneously preparing himself for regret. Since he saw his fears right in front of him, and anticipated them happening, he was less scared of the outcomes of his choices–and he was less likely to regret them.\nIn the same manner, Epictetus used this to help him foresee all of the dangers that came with a seemingly easy decision–bathing:\n“If you are going to bathe, represent to yourself the incidents usual in the bath—some persons pouring out, others pushing in, others scolding, others pilfering…. For thus, if any impediment arises in bathing, you will be able to say, “It was not only to bathe that I desired, but to keep my will in harmony with nature; and I shall not keep it thus if I am out of humor at things that happen.”\nPracticing premeditatio malorum allows us to be more prepared for life’s inevitable setbacks. Though it may be hard to admit, everything will not go our way. We might not get that job that we want. We might not win that game. But we will be ready for any obstacles that cross our path.\nWe’ll know that we made the right decision – and we won’t regret our choices.\nIf you want to hear Ryan talk more about this topic, check out The Stoic Secret Of Facing Failure To Achieve Success: Premeditatio Malorum on the Daily Stoic YouTube Channel.\n10 Best Stoic Quotes on Regret\n“Then remind yourself that past and future have no power over you. Only the present – and even that can be minimized.” – Marcus Aurelius, from Meditations\n“He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has.” – Epictetus, from Fragments\n“External things are not the problem. It is your assessment of them. Which you can erase right now.” – Marcus Aurelius, from Meditations\n“Give yourself a gift, the present moment.” – Marcus Aurelius, from Meditations\n“The man who has anticipated the coming of troubles takes away their power when they arrive.”- Seneca, from Consolation to Marcia\n“To shrug it all off and wipe it clean—every annoyance and distraction—and reach utter stillness. Child’s play.” — Marcus Aurelius, from Meditations\n“Two elements must therefore be rooted out once for all, – the fear of future suffering, and the recollection of past suffering; since the latter no longer concerns me, and the former concerns me not yet.” – Seneca, from Letters from a Stoic\n“When we are no longer able to change a situation, we are challenged to change ourselves.” – Viktor Frankl\n“There is only one way to happiness and that is to cease worrying about things which are beyond the power of our will.” – Epictetus, from Discourses\n“Do not spoil what you have by desiring what you have not; remember that what you now have was once among the only things you hoped for.” – Epicurus\nAdditional Resources\nPodcasts:\nHolocaust Survivor Dr. Edith Eger on the Gift of Forgiveness\nKate Courtney, Karen Duffy, Meg Mason, and Susan Cain on Using Stoicism to Endure Life’s Obstacles\nYou can subscribe to the Daily Stoic Podcast here, and our podcast YouTube channel here.\nDaily Stoic Meditations:\n“We Almost Always Regret This”\n“The Question To Ask When You Mess Up”\nTo sign up for one free email per day inspired by Stoic philosophy, click here.\nRyan Holiday’s RSS newsletter:\n24 Things I Wish I Had Done Sooner (or my biggest regrets), from ryanholiday.net\n40 Ways To Live A Full Life (And Leave Nothing On The Table) By Age 30, from ryanholiday.net\nTo receive more of Ryan’s “insider” emails, subscribe here. Twice each month, Ryan writes a longer-than-normal essay on various topics, including wealth, philosophy, parenting, and living the good life. Join over 170,000 subscribers today!\nDaily Stoic Store:\nPremeditatio Malorum Medallion\nTo find other Stoic reminders, jewelry, books, courses and more, you can visit the Daily Stoic store here.", "summary": "You know you shouldn’t have said what you said. You should have acted differently–you regret your choices. Say, if you regret getting a haircut, you’re in control. Love what’s happened to you.", "categories": ["メンタル・哲学", "業務改善・介護テック"], "is_new": false, "title_ja": "後悔にどう対処するか (自由に生きるための 3 つのストイックな戦略)", "summary_ja": "あなたは自分が言ったことを言うべきではなかったと知っています。別の行動を取るべきだった――自分の選択を後悔している。たとえば、散髪したことを後悔しても、それは自分で決めることができます。あなたに起こったことを愛してください。"}, {"title": "What Does It Mean To Be Wealthy?", "url": "https://dailystoic.com/what-does-it-mean-to-be-wealthy/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-08-01 02:13", "description": "“These individuals have riches just as we say that we ‘have a fever,’ when really the fever has us.” — Seneca We all know those people who have lots of money, and yet, they are miserable. On the flip side, we all know people who live happy and fulfilled lives despite not having lots of money. […] The post What Does It Mean To Be Wealthy? appeared first on Daily Stoic .", "content": "“These individuals have riches just as we say that we ‘have a fever,’ when really the fever has us.” — Seneca\nWe all know those people who have lots of money, and yet, they are miserable. On the flip side, we all know people who live happy and fulfilled lives despite not having lots of money.\nMoney, the Stoics said, is not an indicator of wealth.\nThe slave turned teacher Epictetus liked to tell his students of a man who had been offered a lucrative job by the emperor Augustus. “I told him not to touch it,” Epictetus told his students.\nBut, the man told Epictetus, I will make a lot of money.\nYes, Epictetus said, “for little in return.”\nBut, the man said, a lot of people will learn my name.\n“Ok,” Epictetus said, “are you planning to be there every time someone utters your name?”\nBut, the man said, my name will outlive me.\n“So will a rock you carve your name into,” Epictetus said.\nBut, the man said, I will get to wear a gold crown.\n“And they will put a crown made of roses on you for your funeral,” Epictetus said. “You will look even more elegant in that.”\nThe man saw the sum of money, but he didn’t see that a sum of money is a poor indication of value. As Epictetus liked to ask his students,\n“What decides whether a sum of money is good? The money is not going to tell you.”\nIt’s not going to tell you about all you have to give up in exchange for that money. It’s not going to tell you that you might be happier in a job that offers less money. It’s not going to tell you about all the losses that come with the gain.\nWe will. We created this guide—rooted in the experiences and writings of the Stoics—to give you a time-tested playbook to help you learn how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life. This post is going to cover the high level ideas. If you really want to get serious about living what the Stoics called the good life, we suggest checking out our course The Wealthy Stoic: A Daily Stoic Guide To Being Rich, Free, and Happy, a 9-week course designed to equip you with the tools, mindsets, and habits of the wealthiest Stoics in history.\nThis is a long post. It should be saved and revisited. It can be read straight through or if you prefer, feel free to jump around…\nHOW DID THE STOICS VIEW WEALTH?\nMoney Doesn’t Make You Rich\nLook at any millionaire, Seneca tells Lucilius in one of his letters, they are some of the poorest people in Rome. Money has made them obsess over public opinion. Money has control of their schedules and their decisions. Money has put them in the center of a circle of sycophants and grifters. Money has escalated their tastes and expectations beyond quenching.\n“These individuals,” Seneca writes, “have riches just as we say that we ‘have a fever,’ when really the fever has us.” It’s a sad sight, he says.\nWhat’s sadder is that the look-at-any-millionaire experiment still works today—a lot of rich people in this world live very poor lives. They’re rarely not thinking about money. About how to acquire more and of it, about what they can trade of their life in exchange for it, about who they know who has more of it than they do. These poor souls know they have a lot of money, but what they don’t understand is that, really, money has a lot of them.\n“Money never made a man rich,” Seneca adds, “Do you ask the reason for this? He who possesses more begins to be able to possess still more.” This is a universal human battle. It doesn’t really matter the number in your bank account, it is hard to turn off the brain’s desire for more. Until you can turn it off, until you have a sense for what is enough, you are poorer than the poorest people in Rome.\n“[H]e who has enough,” Seneca writes, “has attained that which never fell to the rich man’s lot—a stopping-point.”\nTo learn more on this topic, check out Ryan’s interview with Morgan Housel on the Daily Stoic podcast.\nTHREE STOIC PRACTICES THAT CAN LEAD TO A WEALTHIER LIFESTYLE\nDefine What Wealth Means To You\n“It never ceases to amaze me: we all love ourselves more than other people, but care more about their opinion than our own.” — Marcus Aurelius\nIf Ramit Sethi didn’t beat us to it, we might have named the Daily Stoic Wealth Course, “The Rich Life.”\nRamit is the bestselling author of I Will Teach You To Be Rich and host of the I Will Teach You To Be Rich podcast (one of Ryan’s favorite podcasts), and of the Netflix series How to Get Rich. His work focuses on how to help people live what he calls “The Rich Life.”\nThe title is a bit misleading because he doesn’t use “rich” solely in a monetary wealth way. It’s more an all-encompassing philosophy about living a good life. Ramit talks and writes about entrepreneurship, spending, investing, social skills, fitness, psychology, productivity, and on and on—all these interconnected components that go into living well.\nKey to Ramit’s work is the idea that the definition of The Rich Life varies from person to person. When we interviewed him a while back, he gave this example:\nI have a friend who always has fresh flowers throughout her tiny New York apartment. They look amazing. When I asked her how she keeps up and maintains all these fresh flowers, despite her busy full-time job, she told me that she spends the equivalent of a cable bill every month to surround herself with beautiful, artisanal flowers that are delivered to her house every week. Every week…on “just” flowers!\nThis is the idea of living a Rich Life: If you love how flowers look and make you feel in your home, you don’t “save” buying flowers only for special occasions. You make sure you have them around you all the time.\nRamit, on the other hand, doesn’t really care about flowers. So his Rich Life looks different. His definition of a rich life, he says, is never having to step into a Home Depot.\nThe point is, everyone’s different. Therefore, everyone’s definition of wealth is different. We live in a world that constantly bombards us with messages about what a rich life is supposed to look like. We see pictures of lavish vacations, designer clothing, expensive cars, and luxurious homes. We are told that having more money, more possessions, and more status is the key to happiness and fulfillment.\nBut the truth is the Rich Life means something different for everyone. What makes one person feel rich may not do the same for another.\nThis is why it’s essential to figure out your definition of the Rich Life.\nWatch Ryan Holiday discuss some of the key Stoic concepts of wealth in The Stoics Guide To Becoming Wealthy on the Daily Stoic YouTube channel.\nKnow What Enough Is\n“If you don’t regard what you have as enough, you will never be happy even if you rule the entire world.” – Seneca\nSeneca said this is what it means to be poor: wanting more than you have.\nConsider, Seneca says, the person who has or wants the nicest stuff—the furniture with gold trim, the silverware made by ancient artists, a team of butlers, jewelry from every part of the globe. “Though he should pile up all of these,” Seneca writes, “never will they satisfy his insatiable mind…This is not a thirst, but a sickness. And it is not merely money or food that leads to this result; the same nature is to be found in every desire that derives, not from need, but from vice: all that you pile up to satisfy it will not terminate but advance desire.”\nThat’s the irony of material riches. It’s a series of moving goal posts. You think having X will be sufficient only to find that 2x is better and that 3x is preferable still.\n“Prosperity is a restless thing: it troubles itself,” Seneca says elsewhere. Or rather, it propels itself.\nSee if you can find one millionaire who isn’t trying to become a billionaire. See if you can find one billionaire who doesn’t check the Forbes list every year and glare jealously at the names above them.\nThat’s what getting rich does to us. It rarely gives us a sense of “enough.” Instead, it gives us a sense of how much more there could be.\nNeedless to say this is a path to bankruptcy, mentally and emotionally if not financially. It’s a hedonic treadmill that eventually breaks down…or breaks the person frantically running atop it.\nThe Stoics would try to caution us from ever getting on, or to get off while we still can.\nThere is a story Ryan Holiday writes about in Stillness is the Key. Kurt Vonnegut and Joseph Heller, the authors of Slaughterhouse Five and Catch-22, respectively, were once at a fancy party in New York. As they stood in the home of some billionaire, Vonnegut needled his friend.\n“Joe,” he said, “how does it feel that our host only yesterday may have made more money than your novel has earned in its entire history?”\n“I’ve got something he can never have,” Heller replied.\n“And what on earth could that be?” Vonnegut asked.\n“The knowledge that I’ve got enough.”\nKnowing what is enough. Living in a place of fullness rather than of craving. That, the Stoics would say, is a wealthy person. That is someone whose life is one of abundance.\nPractice Poverty\n“Set aside a certain number of days, during which you shall be content with the scantiest and cheapest fare, with coarse and rough dress, saying to yourself the while: ‘Is this the condition that I feared?’” — Seneca\nWhen Benjamin Franklin was 18 years old, he asked his father for a loan to start a printing business. His father refused to help, so Franklin saved and eventually founded The Pennsylvania Gazette.\nThe business chugged along for a while, but eventually ran into financial troubles, at which point Franklin received a lucrative offer from a customer who wanted to publish a piece in the Gazette.\nFranklin, whose first son had just been born, would have greatly benefited from the money. But the customer’s piece, as Franklin described it, was not only completely misaligned with his principles, it was “scurrilous and defamatory.”\nFranklin lost sleep deciding what to do. It seemed irresponsible to say no. He had a family to take care of. He was afraid that if the business failed he would be poor, they would be poor. Franklin was terrified of poverty. With all that at stake, with all those emotions roiling inside him, why not bite the bullet and just publish the piece?\nTo figure out if he should accept the money, Franklin tried something new by doing something with ancient roots. He channeled his inner Seneca and decided to live like a poor person, to test whether poverty was really the burden he feared it to be. For a few days, he restricted his diet to just bread and water and for a few nights, he wrapped himself in a coat and slept on the floor.\n“From this regimen,” he said, “I feel no inconvenience whatever. Finding I can live in this manner, I have formed a determination never to prostitute my press to the purposes of corruption and abuse of this kind for the sake of gaining a more comfortable subsistence.”\nIsn’t that why many of us do the things we do, take the jobs we take, make the sacrifices we make?\nIt’s why Seneca stood beside Nero for so long. It’s why people continue to work on Wall Street despite being miserable. It’s why people become lawyers despite having no interest in the law. It’s why people take jobs in the incoming administration despite not voting for the president.\nFor the sake of gaining (or holding onto) a more comfortable subsistence, we take jobs we don’t like, we put up with people we don’t like, and we do things we know aren’t right.\nThat is not a rich life. That is not the life of a Wealthy Stoic.\nWhen we interviewed Tim Ferriss, he told us that once a month, he does a three-day fast “to simply expose myself to the rather, often unfamiliar, sensation of real hunger.” Then he mentioned his friend, a wealthy CEO, who schedules a week every quarter where he sleeps on the floor in his living room, limits his spending to $15 for the week, and survives on instant coffee and instant oatmeal. With the reminder that he can thrive on very little, his decision making improves—he doesn’t do things out of fear. “At the end of such an experiment,” Tim said, “people will very often be in a better mental state, feel more content than they did beforehand. It’s very freeing.”\nBut do not misunderstand, Tim is not saying these people no longer care about anything or that they no longer have grand ambitions. To the contrary, many of the people he’s talking about who have run this poverty experiment are elite performers at the top of their industry or sport or craft who only got better, stronger, happier, richer as a result.\nFor The Wealthy Stoic, as Seneca wrote, “Freedom is the prize we are working for.” The freedom to decide what you do most days. The freedom to do what you think is right. The freedom to spend time with who you want to spend time with. The freedom to pursue the things you are interested in. The freedom to leave a job that makes you miserable.\nThe freedom that comes, Seneca wrote, after you “learn how far poverty is from being a burden.”\nWHAT ARE SOME OF THE BEST STOIC QUOTES ON WEALTH?\n“It is not the man who has too little, but the man who craves more, that is poor.” – Seneca\n“Any man, who does not think that what he has is more than ample, is an unhappy man, even if he is the master of the whole world. ” – Seneca\n“At last, then, away with all these treacherous goods! They look better for those who hope for them than to those who have attained them.” -Seneca\n“Anything at all: the applause of the crowd, high office, wealth, or self-indulgence. All of them might seem to be compatible with it—for a while. But suddenly they control us and sweep us away.” – Marcus Aurelius,\n“Wealth consists not in having great possessions, but in having few wants.” – Epictetus\nWHERE CAN I LEARN MORE ABOUT STOICISM AND WEALTH?\nIf you enjoyed these principles and want to incorporate them more into your life, check out….\nThere Is Nothing Special About MoneyWho Owns Who?\nThe Psychology of Money by Morgan Housel\nI Will Teach You To Be Rich by Ramit Sethi\nIf you want to take a deeper dive into Stoicism’s foundational concepts and daily practices how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life, check out The Wealthy Stoic: A Daily Stoic Guide To Being Rich, Free, and Happy!\nIt’s a 9-week course designed to equip you with the tools, mindsets, and habits of the wealthiest Stoics in history.\nThis is not a get-rich-quick kind of a thing.\nThis is not a hustle culture-esque course.\nIt’s the exact opposite. It’s about what Stoicism’s foundational concepts and daily practices were designed to teach us: how to be truly rich, how to get out from under the thumb of money, how to be happy with enough, how to thrive, succeed, and live a good, happy life.\nIf that is the kind of life you want, the Stoics can show you the way.\n“And if you can’t stop prizing a lot of other things? Then you’ll never be free—free, independent, imperturbable. Because you’ll always be envious and jealous, afraid that people might come and take it all away from you.” — Marcus Aurelius", "summary": "The money is not going to tell you.”\nIt’s not going to tell you about all you have to give up in exchange for that money. You make sure you have them around you all the time. That is not a rich life. If that is the kind of life you want, the Stoics can show you the way.", "categories": ["業務改善・介護テック", "メンタル・哲学"], "is_new": false, "title_ja": "裕福であるとはどういう意味ですか?", "summary_ja": "お金ではわかりません。」\nそのお金と引き換えに放棄しなければならないすべてについては説明しません。常にあなたの周りにそれらを置いておくようにしてください。それは豊かな人生ではありません。それがあなたが望むような人生であるなら、ストア派がその道を示してくれるでしょう。"}, {"title": "Perseverance: 7 Stoic Lessons on How To Keep Going", "url": "https://dailystoic.com/perseverance/", "source": "Daily Stoic", "lang": "en", "content_type": "lifestyle", "category_hint": "メンタル・哲学", "published": "2023-05-10 03:50", "description": "“To be like the rock that the waves keep crashing over. It stands unmoved and the raging of the sea falls still around it.” — Marcus Aurelius The question of why and how we are supposed to live has been contemplated for centuries. Absurdist Albert Camus wrote that life is like the Sisyphean task of […] The post Perseverance: 7 Stoic Lessons on How To Keep Going appeared first on Daily Stoic .", "content": "“To be like the rock that the waves keep crashing over. It stands unmoved and the raging of the sea falls still around it.” — Marcus Aurelius\nThe question of why and how we are supposed to live has been contemplated for centuries. Absurdist Albert Camus wrote that life is like the Sisyphean task of pushing a boulder up a mountain for all of eternity. Existence itself, in other words, is persevering. Camus writes, “One must imagine Sisyphus happy.” So, how do we persevere well? How do we persevere happily?\nThankfully, we can look to the Stoics. The Stoics not only wrote about how to persevere, they used Stoicism to persevere in the face of plagues, exiles, imprisonment, and wars.\nThis post is just a small sample of the kind of lessons, ideas, and stories we write about in our daily email newsletter. Every morning, we send a short (~500 word) email inspired by Marcus Aurelius, Seneca, Epictetus, and more. Each email will help you cultivate strength, insight, and wisdom to live your best life.\nJoin over 600,000 people who start their day off with the philosophy that has guided some of history’s greatest men and women.\nDrawing on the timeless wisdom of the Stoics, we created this guide to give you a time-tested playbook to help you persevere. This is a long post. It should be saved and revisited. It can be read straight through or if you prefer, feel free to click the links below to navigate to a specific section\nWhat Does It Mean To Persevere?\n7 Stoic lessons on how to keep going\n10 Best Stoic Quotes on Perseverance\nThe Best Books About Perseverance\nWhat does it mean to persevere?\n“Ask, ‘Why is this so unbearable? Why can’t I endure it?’ You’ll be embarrassed to answer.” — Marcus Aurelius\nJames Stockdale was held captive in Hanoi, North Vietnam. He was sent to a war camp that was famous for its brutal treatment
